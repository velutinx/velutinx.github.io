<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pack Image Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0c10;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: #11151c;
            border-radius: 16px;
            padding: 28px 32px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2f38;
        }

        /* ─── HEADER ─── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
            color: #f0f0f0;
            font-weight: 500;
            letter-spacing: -0.3px;
            font-size: 1.6rem;
        }

        .header h1 i {
            color: #60a5fa;
            margin-right: 8px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pack-badge {
            background: #1e293b;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .pack-badge strong {
            color: #f0f0f0;
            font-weight: 600;
        }

        .btn {
            padding: 8px 22px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #2c6e2c;
            color: white;
        }
        .btn-primary:hover {
            background: #3e8e3e;
            transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline {
            background: transparent;
            color: #aaa;
            border: 1px solid #3a3a44;
        }
        .btn-outline:hover {
            background: #1a1f2a;
            color: #fff;
        }

        .btn-danger-outline {
            background: transparent;
            color: #ef4444;
            border: 1px solid #4a2a2a;
        }
        .btn-danger-outline:hover {
            background: #2a1a1a;
        }

        /* ─── DROP ZONE ─── */
        .drop-zone {
            border: 2px dashed #2a2f38;
            border-radius: 14px;
            padding: 48px 20px;
            text-align: center;
            color: #777;
            transition: 0.25s;
            cursor: pointer;
            background: #0c1017;
            margin-bottom: 24px;
        }

        .drop-zone.dragover {
            border-color: #60a5fa;
            background: #111a26;
            color: #ccc;
        }

        .drop-zone i {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 12px;
            color: #4a5568;
        }

        .drop-zone .sub {
            font-size: 0.85rem;
            color: #555;
            margin-top: 6px;
        }

        .drop-zone .file-input {
            display: none;
        }

        /* ─── STATS BAR ─── */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px 0 16px 0;
            border-bottom: 1px solid #1e232b;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: #888;
        }

        .stats-bar .count {
            color: #e0e0e0;
            font-weight: 500;
        }

        .stats-bar .hint {
            font-size: 0.8rem;
            color: #555;
        }

        /* ─── IMAGE GRID ─── */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            min-height: 120px;
            padding: 4px 0;
        }

        .image-grid:empty::after {
            content: 'No images loaded. Drop your pack images above.';
            display: block;
            grid-column: 1 / -1;
            text-align: center;
            color: #555;
            padding: 60px 20px;
            font-size: 0.95rem;
        }

        .thumb-card {
            background: #0c1017;
            border-radius: 12px;
            border: 2px solid #252b33;
            overflow: hidden;
            cursor: grab;
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            position: relative;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
        }

        .thumb-card:hover {
            border-color: #4a5568;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
        }

        .thumb-card.sortable-chosen {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px #60a5fa44;
        }

        .thumb-card .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #06090e;
            pointer-events: none;
            flex: 1;
        }

        .thumb-card .thumb-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 6px 10px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .thumb-card .thumb-index {
            background: rgba(0, 0, 0, 0.7);
            color: #ccc;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
            border: 1px solid #334155;
            pointer-events: none;
        }

        .thumb-card .thumb-actions {
            display: flex;
            gap: 6px;
            pointer-events: auto;
        }

        .thumb-card .thumb-actions button {
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #ccc;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .thumb-card .thumb-actions button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .thumb-card .thumb-actions .crop-btn {
            color: #60a5fa;
        }
        .thumb-card .thumb-actions .crop-btn:hover {
            background: #1a3a5a;
            color: #93c5fd;
        }
        .thumb-card .thumb-actions .remove-btn {
            color: #f87171;
        }
        .thumb-card .thumb-actions .remove-btn:hover {
            background: #3a1a1a;
            color: #fca5a5;
        }

        /* ─── CROP MODAL ─── */
        .crop-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        .crop-modal.active {
            display: flex;
        }

        .crop-modal-content {
            background: #11151c;
            border: 1px solid #2a2f38;
            border-radius: 16px;
            padding: 24px;
            max-width: 94vw;
            max-height: 94vh;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            width: fit-content;
            min-width: 320px;
        }

        .crop-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .crop-modal-header h2 {
            margin: 0;
            color: #f0f0f0;
            font-weight: 400;
            font-size: 1.15rem;
        }

        .crop-modal-header h2 i {
            color: #60a5fa;
            margin-right: 8px;
        }

        .crop-modal-header .close-modal {
            background: none;
            border: none;
            color: #777;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: 0.15s;
        }
        .crop-modal-header .close-modal:hover {
            color: #fff;
            background: #2a2a34;
        }

        .crop-canvas-wrapper {
            position: relative;
            background: #03060b;
            border-radius: 10px;
            border: 1px solid #2a2f38;
            overflow: hidden;
            max-width: 100%;
        }

        #cropCanvas {
            display: block;
            max-width: 100%;
            max-height: 62vh;
            cursor: crosshair;
            background: #03060b;
            touch-action: none;
        }

        .crop-instructions {
            text-align: center;
            color: #777;
            margin-top: 10px;
            font-size: 0.8rem;
            letter-spacing: 0.2px;
        }

        .crop-instructions span {
            color: #4a6a8a;
        }

        .crop-controls {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .crop-btn {
            padding: 8px 28px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .crop-btn.cancel {
            background: #3a3a44;
            color: #ccc;
        }
        .crop-btn.cancel:hover {
            background: #4a4a54;
        }

        .crop-btn.confirm {
            background: #2c6e2c;
            color: white;
        }
        .crop-btn.confirm:hover {
            background: #3e8e3e;
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e2a1e;
            color: #d4ffd4;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 10001;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            border-left: 4px solid #4caf50;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: #2c1a1a;
            border-left-color: #f44336;
            color: #ffc9c9;
        }

        .toast.info {
            background: #1a2530;
            border-left-color: #2196F3;
            color: #b3d9ff;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 700px) {
            .container {
                padding: 16px;
            }
            .header h1 {
                font-size: 1.2rem;
            }
            .image-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
            .drop-zone {
                padding: 30px 16px;
            }
            .drop-zone i {
                font-size: 2rem;
            }
            .crop-modal-content {
                padding: 16px;
                min-width: unset;
                width: 100%;
            }
            #cropCanvas {
                max-height: 48vh;
            }
            .crop-controls {
                justify-content: center;
            }
            .stats-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            .toast {
                font-size: 0.8rem;
                padding: 10px 18px;
                white-space: normal;
                max-width: 90vw;
            }
        }

        @media (max-width: 450px) {
            .image-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 8px;
            }
            .thumb-card .thumb-overlay {
                padding: 3px 6px;
            }
            .thumb-card .thumb-index {
                font-size: 0.55rem;
                padding: 1px 6px;
            }
            .thumb-card .thumb-actions button {
                width: 20px;
                height: 20px;
                font-size: 0.55rem;
            }
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0c10;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2f38;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3a3f48;
        }

        /* sortable ghost */
        .sortable-ghost {
            opacity: 0.4;
            border-color: #60a5fa;
            transform: scale(0.96);
        }
        .sortable-drag {
            opacity: 0.8;
            transform: scale(1.04) rotate(1deg);
            border-color: #60a5fa;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1><i class="fas fa-images"></i> Pack Image Editor</h1>
            <div class="header-actions">
                <span class="pack-badge" id="packBadge"><i class="fas fa-tag"></i> Pack: <strong id="packNumberDisplay">—</strong></span>
                <button class="btn btn-primary" id="downloadBtn" disabled>
                    <i class="fas fa-download"></i> Download ZIP
                </button>
                <button class="btn btn-danger-outline" id="clearAllBtn">
                    <i class="fas fa-trash-alt"></i> Clear All
                </button>
            </div>
        </div>

        <!-- DROP ZONE -->
        <div class="drop-zone" id="dropZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <div>Drop your <strong>pack###-*.jpg</strong> images here</div>
            <div class="sub">or click to select files</div>
            <input type="file" class="file-input" id="fileInput" accept=".jpg,.jpeg,.png,.webp" multiple />
        </div>

        <!-- STATS -->
        <div class="stats-bar">
            <span class="count" id="imageCount">0 images</span>
            <span class="hint"><i class="fas fa-arrows-alt"></i> Drag to reorder · <i class="fas fa-crop-alt"></i> Click crop to adjust</span>
        </div>

        <!-- IMAGE GRID -->
        <div class="image-grid" id="imageGrid"></div>
    </div>

    <!-- ─── CROP MODAL ─── -->
    <div class="crop-modal" id="cropModal">
        <div class="crop-modal-content">
            <div class="crop-modal-header">
                <h2><i class="fas fa-crop-alt"></i> Crop (1:2 ratio)</h2>
                <button class="close-modal" id="cropModalClose">&times;</button>
            </div>
            <div class="crop-canvas-wrapper">
                <canvas id="cropCanvas"></canvas>
                <div class="crop-instructions">Drag to select – <span>height = 2 × width</span></div>
            </div>
            <div class="crop-controls">
                <button class="crop-btn cancel" id="cropCancelBtn">Cancel</button>
                <button class="crop-btn confirm" id="cropDoneBtn">Crop &amp; Save</button>
            </div>
        </div>
    </div>

    <!-- ─── TOAST ─── -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  STATE
        // ============================================================
        let imageItems = []; // array of { id: number, file: File, blob: Blob|null, url: string, cropped: boolean }
        let nextId = 1;
        let packNumber = null; // e.g., "001" from first file name

        // Crop state
        let cropTargetId = null; // id of image being cropped
        let cropImage = null; // Image object for the canvas
        let cropRect = null;
        let isDragging = false;
        let isMoving = false;
        let startX = 0,
            startY = 0;
        let moveOffsetX = 0,
            moveOffsetY = 0;

        const cropCanvas = document.getElementById('cropCanvas');
        const ctx = cropCanvas.getContext('2d');
        const grid = document.getElementById('imageGrid');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const packNumberDisplay = document.getElementById('packNumberDisplay');
        const imageCountSpan = document.getElementById('imageCount');
        const toastEl = document.getElementById('toast');

        // ============================================================
        //  HELPERS
        // ============================================================
        function showToast(message, type = 'success') {
            toastEl.textContent = message;
            toastEl.className = 'toast show';
            if (type === 'error') toastEl.classList.add('error');
            else if (type === 'info') toastEl.classList.add('info');
            clearTimeout(toastEl._timeout);
            toastEl._timeout = setTimeout(() => toastEl.classList.remove('show'), 3000);
        }

        function extractPackNumber(filename) {
            const match = filename.match(/pack(\d+)-/i);
            return match ? match[1] : null;
        }

        function updateStats() {
            const count = imageItems.length;
            imageCountSpan.textContent = `${count} image${count !== 1 ? 's' : ''}`;
            downloadBtn.disabled = count === 0;
            if (count === 0) {
                packNumberDisplay.textContent = '—';
                packNumber = null;
            } else {
                // update pack number from first item's original name
                const firstFile = imageItems[0].file;
                const pn = extractPackNumber(firstFile.name);
                if (pn) {
                    packNumber = pn;
                    packNumberDisplay.textContent = pn;
                } else {
                    packNumberDisplay.textContent = '?';
                }
            }
        }

        // ============================================================
        //  RENDER GRID
        // ============================================================
        function renderGrid() {
            grid.innerHTML = '';
            imageItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'thumb-card';
                card.dataset.id = item.id;

                const img = document.createElement('img');
                img.className = 'thumb-img';
                img.src = item.url;
                img.alt = `Image ${index + 1}`;
                card.appendChild(img);

                const overlay = document.createElement('div');
                overlay.className = 'thumb-overlay';

                const idxSpan = document.createElement('span');
                idxSpan.className = 'thumb-index';
                idxSpan.textContent = `#${index + 1}`;
                overlay.appendChild(idxSpan);

                const actions = document.createElement('div');
                actions.className = 'thumb-actions';

                const cropBtn = document.createElement('button');
                cropBtn.className = 'crop-btn';
                cropBtn.innerHTML = '<i class="fas fa-crop-alt"></i>';
                cropBtn.title = 'Crop';
                cropBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openCropModal(item.id);
                });
                actions.appendChild(cropBtn);

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '<i class="fas fa-times"></i>';
                removeBtn.title = 'Remove';
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeImage(item.id);
                });
                actions.appendChild(removeBtn);

                overlay.appendChild(actions);
                card.appendChild(overlay);
                grid.appendChild(card);
            });

            // Re-init Sortable
            if (grid.children.length > 1) {
                new Sortable(grid, {
                    animation: 150,
                    handle: '.thumb-card',
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    onEnd: function(evt) {
                        // Update imageItems order based on DOM order
                        const newOrder = [];
                        grid.querySelectorAll('.thumb-card').forEach(el => {
                            const id = parseInt(el.dataset.id, 10);
                            const item = imageItems.find(i => i.id === id);
                            if (item) newOrder.push(item);
                        });
                        imageItems = newOrder;
                        // Update index numbers displayed
                        grid.querySelectorAll('.thumb-card').forEach((el, idx) => {
                            const idxSpan = el.querySelector('.thumb-index');
                            if (idxSpan) idxSpan.textContent = `#${idx + 1}`;
                        });
                        updateStats();
                        showToast('Order updated', 'info');
                    }
                });
            }
            updateStats();
        }

        // ============================================================
        //  ADD / REMOVE IMAGES
        // ============================================================
        function addImages(files) {
            const validFiles = Array.from(files).filter(f =>
                f.type.startsWith('image/') && (f.name.toLowerCase().endsWith('.jpg') || f.name.toLowerCase().endsWith('.jpeg') ||
                    f.name.toLowerCase().endsWith('.png') || f.name.toLowerCase().endsWith('.webp'))
            );
            if (validFiles.length === 0) {
                showToast('Please drop valid image files (JPG, PNG, WebP).', 'error');
                return;
            }

            // If first image, extract pack number
            if (imageItems.length === 0) {
                const first = validFiles[0];
                const pn = extractPackNumber(first.name);
                if (pn) packNumber = pn;
            }

            let added = 0;
            validFiles.forEach(file => {
                const url = URL.createObjectURL(file);
                imageItems.push({
                    id: nextId++,
                    file: file,
                    blob: null, // cropped version will be stored here
                    url: url,
                    cropped: false
                });
                added++;
            });

            renderGrid();
            showToast(`Added ${added} image${added > 1 ? 's' : ''}`, 'success');
        }

        function removeImage(id) {
            const idx = imageItems.findIndex(i => i.id === id);
            if (idx === -1) return;
            const item = imageItems[idx];
            URL.revokeObjectURL(item.url);
            imageItems.splice(idx, 1);
            renderGrid();
            showToast('Image removed', 'info');
        }

        function clearAll() {
            if (imageItems.length === 0) return;
            if (!confirm('Remove all images?')) return;
            imageItems.forEach(item => URL.revokeObjectURL(item.url));
            imageItems = [];
            nextId = 1;
            packNumber = null;
            renderGrid();
            showToast('All cleared', 'info');
        }

        // ============================================================
        //  DROP ZONE EVENTS
        // ============================================================
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                addImages(e.dataTransfer.files);
            }
        });
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                addImages(fileInput.files);
                fileInput.value = '';
            }
        });

        // ============================================================
        //  DOWNLOAD ZIP
        // ============================================================
        downloadBtn.addEventListener('click', async function() {
            if (imageItems.length === 0) {
                showToast('No images to download.', 'error');
                return;
            }

            const pack = packNumber || '001';
            this.disabled = true;
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Preparing...';

            try {
                const zip = new JSZip();
                const promises = imageItems.map(async (item, index) => {
                    // Get the image blob: if cropped, use item.blob; else fetch from the file
                    let blob;
                    if (item.cropped && item.blob) {
                        blob = item.blob;
                    } else {
                        // Read the original file as blob
                        blob = await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                const arrayBuffer = e.target.result;
                                resolve(new Blob([arrayBuffer], { type: item.file.type }));
                            };
                            reader.onerror = reject;
                            reader.readAsArrayBuffer(item.file);
                        });
                    }
                    // Convert to JPEG if not already? We'll keep as is but ensure it's a blob.
                    // For safety, we could convert to JPEG, but we'll keep original format.
                    // However requirement says download as JPG, so we'll convert to JPEG.
                    // Use canvas to re-encode as JPEG.
                    const img = new Image();
                    const url = URL.createObjectURL(blob);
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                        img.src = url;
                    });
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const jpegBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.92));
                    URL.revokeObjectURL(url);
                    const filename = `pack${pack}-${index + 1}.jpg`;
                    zip.file(filename, jpegBlob);
                });

                await Promise.all(promises);
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                saveAs(zipBlob, `pack${pack}.zip`);
                showToast(`✅ Downloaded ${imageItems.length} images as pack${pack}.zip`, 'success');
            } catch (err) {
                console.error(err);
                showToast('❌ Download failed: ' + err.message, 'error');
            } finally {
                this.disabled = false;
                this.innerHTML = '<i class="fas fa-download"></i> Download ZIP';
            }
        });

        // ============================================================
        //  CLEAR ALL
        // ============================================================
        clearAllBtn.addEventListener('click', clearAll);

        // ============================================================
        //  CROP MODAL
        // ============================================================
        function openCropModal(id) {
            const item = imageItems.find(i => i.id === id);
            if (!item) return;
            cropTargetId = id;
            const img = new Image();
            img.crossOrigin = 'anonymous';
            // Use the current displayed URL (which may be cropped or original)
            img.src = item.url;
            img.onload = function() {
                cropImage = img;
                const maxW = Math.min(800, window.innerWidth * 0.8);
                const maxH = Math.min(700, window.innerHeight * 0.65);
                let scale = Math.min(maxW / img.width, maxH / img.height, 1);
                cropCanvas.width = img.width * scale;
                cropCanvas.height = img.height * scale;
                cropRect = null;
                redrawCanvas();
                document.getElementById('cropModal').classList.add('active');
            };
            img.onerror = function() {
                showToast('Failed to load image for cropping.', 'error');
                closeCropModal();
            };
        }

        function closeCropModal() {
            document.getElementById('cropModal').classList.remove('active');
            cropTargetId = null;
            cropImage = null;
            cropRect = null;
        }

        function redrawCanvas() {
            if (!cropImage) return;
            const cw = cropCanvas.width,
                ch = cropCanvas.height;
            ctx.clearRect(0, 0, cw, ch);
            ctx.drawImage(cropImage, 0, 0, cw, ch);
            if (cropRect && cropRect.w > 0 && cropRect.h > 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, cw, ch);
                ctx.save();
                ctx.beginPath();
                ctx.rect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
                ctx.clip();
                ctx.drawImage(cropImage, 0, 0, cw, ch);
                ctx.restore();
                ctx.strokeStyle = '#2c6e2c';
                ctx.lineWidth = 2;
                ctx.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
            }
        }

        // Canvas mouse/touch events for cropping (1:2 ratio)
        function getCanvasPos(e) {
            const rect = cropCanvas.getBoundingClientRect();
            const scaleX = cropCanvas.width / rect.width;
            const scaleY = cropCanvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function isInsideRect(pos) {
            if (!cropRect) return false;
            return pos.x >= cropRect.x && pos.x <= cropRect.x + cropRect.w &&
                pos.y >= cropRect.y && pos.y <= cropRect.y + cropRect.h;
        }

        function onPointerDown(e) {
            e.preventDefault();
            const pos = getCanvasPos(e);
            if (isInsideRect(pos)) {
                isMoving = true;
                moveOffsetX = pos.x - cropRect.x;
                moveOffsetY = pos.y - cropRect.y;
                isDragging = false;
            } else {
                isMoving = false;
                isDragging = true;
                startX = pos.x;
                startY = pos.y;
                cropRect = null;
            }
        }

        function onPointerMove(e) {
            e.preventDefault();
            const pos = getCanvasPos(e);
            if (isMoving && cropRect) {
                let nx = pos.x - moveOffsetX;
                let ny = pos.y - moveOffsetY;
                nx = Math.max(0, Math.min(cropCanvas.width - cropRect.w, nx));
                ny = Math.max(0, Math.min(cropCanvas.height - cropRect.h, ny));
                cropRect.x = nx;
                cropRect.y = ny;
                redrawCanvas();
            } else if (isDragging) {
                let x = Math.min(startX, pos.x);
                let y = Math.min(startY, pos.y);
                let w = Math.abs(pos.x - startX);
                let h = w * 2;
                if (y + h > cropCanvas.height) {
                    h = cropCanvas.height - y;
                    w = h / 2;
                }
                if (x + w > cropCanvas.width) {
                    w = cropCanvas.width - x;
                    h = w * 2;
                }
                if (w < 5) w = 5;
                if (h < 10) h = 10;
                cropRect = { x, y, w, h };
                redrawCanvas();
            } else {
                cropCanvas.style.cursor = isInsideRect(pos) ? 'move' : 'crosshair';
            }
        }

        function onPointerUp(e) {
            if (isMoving) isMoving = false;
            if (isDragging) {
                isDragging = false;
                if (cropRect && (cropRect.w < 5 || cropRect.h < 10)) cropRect = null;
                redrawCanvas();
            }
        }

        cropCanvas.addEventListener('mousedown', onPointerDown);
        cropCanvas.addEventListener('mousemove', onPointerMove);
        cropCanvas.addEventListener('mouseup', onPointerUp);
        cropCanvas.addEventListener('mouseleave', onPointerUp);
        cropCanvas.addEventListener('touchstart', onPointerDown, { passive: false });
        cropCanvas.addEventListener('touchmove', onPointerMove, { passive: false });
        cropCanvas.addEventListener('touchend', onPointerUp);

        document.getElementById('cropCancelBtn').addEventListener('click', closeCropModal);
        document.getElementById('cropModalClose').addEventListener('click', closeCropModal);
        document.getElementById('cropModal').addEventListener('click', function(e) {
            if (e.target === this) closeCropModal();
        });

        document.getElementById('cropDoneBtn').addEventListener('click', function() {
            if (cropTargetId === null || !cropRect || cropRect.w < 5 || cropRect.h < 10) {
                showToast('Please select a crop area.', 'error');
                return;
            }
            performCrop();
        });

        async function performCrop() {
            const id = cropTargetId;
            const item = imageItems.find(i => i.id === id);
            if (!item) return;

            const cw = cropCanvas.width,
                ch = cropCanvas.height;
            const scaleX = cropImage.naturalWidth / cw;
            const scaleY = cropImage.naturalHeight / ch;
            const sx = cropRect.x * scaleX;
            const sy = cropRect.y * scaleY;
            const sw = cropRect.w * scaleX;
            const sh = cropRect.h * scaleY;

            const outCanvas = document.createElement('canvas');
            outCanvas.width = sw;
            outCanvas.height = sh;
            const outCtx = outCanvas.getContext('2d');
            outCtx.drawImage(cropImage, sx, sy, sw, sh, 0, 0, sw, sh);

            try {
                const blob = await new Promise(resolve => outCanvas.toBlob(resolve, 'image/jpeg', 0.92));
                // Revoke old URL
                URL.revokeObjectURL(item.url);
                // Create new URL from cropped blob
                const newUrl = URL.createObjectURL(blob);
                item.url = newUrl;
                item.blob = blob;
                item.cropped = true;
                // Update file? not needed, we store blob separately
                renderGrid();
                closeCropModal();
                showToast('✅ Crop applied!', 'success');
            } catch (err) {
                console.error(err);
                showToast('❌ Crop failed: ' + err.message, 'error');
            }
        }

        // ============================================================
        //  INIT
        // ============================================================
        renderGrid();
        updateStats();

        // Handle paste from clipboard (optional)
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData && e.clipboardData.items;
            if (items) {
                const files = [];
                for (let i = 0; i < items.length; i++) {
                    if (items[i].kind === 'file' && items[i].type.startsWith('image/')) {
                        files.push(items[i].getAsFile());
                    }
                }
                if (files.length) {
                    addImages(files);
                }
            }
        });

        console.log('Pack Image Editor ready!');
    </script>
</body>
</html>
