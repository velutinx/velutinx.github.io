<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Teaser Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0c10;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            font-weight: 500;
            letter-spacing: -0.3px;
            margin-bottom: 20px;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #888;
        }
        .pack-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .pack-card {
            background: #11151c;
            border: 1px solid #2a2f38;
            border-radius: 12px;
            padding: 16px 18px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.15s, transform 0.1s;
        }
        .pack-card:hover {
            border-color: #4a5568;
            background: #161c26;
            transform: translateY(-2px);
        }
        .pack-card .pack-id {
            font-size: 0.75rem;
            color: #6a7a8a;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .pack-card .pack-title {
            font-weight: 600;
            font-size: 1rem;
            margin: 6px 0 4px;
            color: #f0f0f0;
        }
        .pack-card .pack-meta {
            font-size: 0.8rem;
            color: #8a9aaa;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .pack-card .pack-meta span {
            background: #1a1f2a;
            padding: 2px 12px;
            border-radius: 20px;
            border: 1px solid #2a2f38;
        }
        .teaser-section {
            margin-top: 30px;
            background: #11151c;
            border: 1px solid #2a2f38;
            border-radius: 16px;
            padding: 24px;
            display: none;
        }
        .teaser-section.visible {
            display: block;
        }
        .teaser-section .teaser-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .teaser-section .teaser-header h2 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #c0d0e0;
        }
        .teaser-section .teaser-header .close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 6px;
        }
        .teaser-section .teaser-header .close-btn:hover {
            color: #fff;
        }
        .teaser-output {
            background: #0a0e14;
            border: 1px solid #252b33;
            border-radius: 10px;
            padding: 16px 18px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 100px;
            color: #d0d8e8;
        }
        .teaser-actions {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            padding: 8px 22px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #2c6e2c;
            color: white;
        }
        .btn-primary:hover {
            background: #3e8e3e;
        }
        .btn-secondary {
            background: #2a2f38;
            color: #ccc;
        }
        .btn-secondary:hover {
            background: #3a3f48;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e2a1e;
            color: #d4ffd4;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            border-left: 4px solid #4caf50;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            background: #2c1a1a;
            border-left-color: #f44336;
            color: #ffc9c9;
        }
        .loading {
            text-align: center;
            padding: 50px 20px;
            color: #6a7a8a;
            font-size: 1.1rem;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #6a7a8a;
        }
        @media (max-width: 600px) {
            .pack-grid {
                grid-template-columns: 1fr;
            }
            .teaser-section {
                padding: 16px;
            }
            .teaser-output {
                font-size: 0.8rem;
                padding: 12px;
            }
        }
        .btn-download {
            background: #2563eb;
            color: white;
        }
        .btn-download:hover {
            background: #1d4ed8;
        }
        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📦 Pack Teaser Viewer
        <small>Click a pack to generate its Public Teaser text</small>
    </h1>
    <div id="packGrid" class="pack-grid">
        <div class="loading">Loading packs…</div>
    </div>

    <div id="teaserSection" class="teaser-section">
        <div class="teaser-header">
            <h2 id="teaserTitle">Teaser</h2>
            <button class="close-btn" id="closeTeaserBtn">&times;</button>
        </div>
        <div id="teaserOutput" class="teaser-output"></div>
        <div class="teaser-actions">
            <button class="btn btn-primary" id="copyTeaserBtn">📋 Copy Teaser</button>
            <button class="btn btn-download" id="downloadPackBtn">⬇️ Download ZIP</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    (function() {
        // ─── helpers ────────────────────────────────────────────────
        function showToast(message, type = 'success') {
            const el = document.getElementById('toast');
            el.textContent = message;
            el.className = 'toast show';
            if (type === 'error') el.classList.add('error');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.classList.remove('show'), 3000);
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }

        // ─── parse title ─────────────────────────────────────────────
        function parsePackTitle(title) {
            const regex = /^\[Pack (\d+)\]\s+(.+?)\s*-\s*(.+)$/i;
            const match = title.match(regex);
            if (match) {
                return {
                    pack: match[1],
                    character: match[2].trim(),
                    series: match[3].trim()
                };
            }
            return {
                pack: null,
                character: title.trim(),
                series: 'Unknown'
            };
        }

        // ─── generate teaser text ──────────────────────────────────
        function generateTeaser(pack) {
            const { title, illustrationCount } = pack;
            const parsed = parsePackTitle(title);
            const packNumber = parsed.pack || pack.id || '???';
            const character = parsed.character || title;
            const series = parsed.series || 'Unknown';
            const count = illustrationCount || '?';

            return `Preview: ${character} — ${series} — Pack #${packNumber}

Total Set Size: ${count} High-Res Images

🔒 Unlock the full high-resolution pack and explicit versions by joining the Weekly Access tier or higher.

⚠️ Disclaimer: All characters depicted are portrayed as 18+. This is a fictional, consensual AI-generated depiction.`;
        }

        // ─── fetch packs ────────────────────────────────────────────
        async function fetchPacks() {
            const grid = document.getElementById('packGrid');
            try {
                const resp = await fetch('https://packs-api.velutinx.workers.dev/api/packs');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const packs = await resp.json();
                return packs;
            } catch (err) {
                console.error('Failed to fetch packs:', err);
                grid.innerHTML = `<div class="empty">❌ Failed to load packs: ${escapeHtml(err.message)}</div>`;
                return null;
            }
        }

        // ─── render packs ──────────────────────────────────────────
        function renderPacks(packs) {
            const grid = document.getElementById('packGrid');
            if (!packs || packs.length === 0) {
                grid.innerHTML = '<div class="empty">No packs found.</div>';
                return;
            }

            packs.sort((a, b) => parseInt(a.id, 10) - parseInt(b.id, 10));

            grid.innerHTML = '';
            packs.forEach(pack => {
                const card = document.createElement('div');
                card.className = 'pack-card';
                card.dataset.id = pack.id;

                const idSpan = document.createElement('div');
                idSpan.className = 'pack-id';
                idSpan.textContent = `#${pack.id.padStart(3, '0')}`;

                const titleDiv = document.createElement('div');
                titleDiv.className = 'pack-title';
                titleDiv.textContent = pack.title;

                const metaDiv = document.createElement('div');
                metaDiv.className = 'pack-meta';
                const categoryLabel = pack.category === 1 ? 'Female' : pack.category === 2 ? 'Femboy' : 'Other';
                const priceLabel = pack.price || '—';
                metaDiv.innerHTML = `
                    <span>${categoryLabel}</span>
                    <span>${priceLabel}</span>
                    <span>${pack.illustrationCount || '?'} images</span>
                `;

                card.appendChild(idSpan);
                card.appendChild(titleDiv);
                card.appendChild(metaDiv);

                card.addEventListener('click', () => {
                    showTeaser(pack);
                });

                grid.appendChild(card);
            });
        }

        // ─── show teaser ────────────────────────────────────────────
        let currentPack = null;

        function showTeaser(pack) {
            const section = document.getElementById('teaserSection');
            const output = document.getElementById('teaserOutput');
            const titleEl = document.getElementById('teaserTitle');

            const text = generateTeaser(pack);
            output.textContent = text;
            titleEl.textContent = `📝 ${pack.title}`;
            section.classList.add('visible');

            // Store current pack for download
            currentPack = pack;

            // Enable download button
            const downloadBtn = document.getElementById('downloadPackBtn');
            downloadBtn.disabled = false;
            downloadBtn.textContent = '⬇️ Download ZIP';

            section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ─── copy to clipboard ─────────────────────────────────────
        function copyTeaser() {
            const output = document.getElementById('teaserOutput');
            const text = output.textContent;
            if (!text) {
                showToast('Nothing to copy.', 'error');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Teaser copied to clipboard!');
            }).catch(() => {
                const range = document.createRange();
                range.selectNodeContents(output);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
                document.execCommand('copy');
                sel.removeAllRanges();
                showToast('✅ Teaser copied to clipboard!');
            });
        }

        // ─── download pack ──────────────────────────────────────────
        async function downloadPack() {
            if (!currentPack) {
                showToast('No pack selected.', 'error');
                return;
            }

            const downloadBtn = document.getElementById('downloadPackBtn');
            downloadBtn.disabled = true;
            downloadBtn.textContent = '⏳ Fetching link...';

            try {
                // First, try to get the download URL from the pack data
                let downloadUrl = currentPack.downloadUrl;

                // If the pack doesn't have a direct downloadUrl, try to fetch it from the API
                if (!downloadUrl) {
                    const resp = await fetch(`https://packs-api.velutinx.workers.dev/api/packs/${currentPack.id}`);
                    if (!resp.ok) throw new Error(`Failed to fetch pack details: ${resp.status}`);
                    const packData = await resp.json();
                    downloadUrl = packData.downloadUrl;
                }

                if (!downloadUrl) {
                    showToast('No download link available for this pack.', 'error');
                    downloadBtn.disabled = false;
                    downloadBtn.textContent = '⬇️ Download ZIP';
                    return;
                }

                // If it's a Mega link, use the proxy to get a direct download
                if (downloadUrl.includes('mega.nz')) {
                    downloadBtn.textContent = '⏳ Resolving Mega link...';
                    const filename = `${currentPack.title.replace(/[^a-zA-Z0-9 ]/g, '').trim()}.zip`;
                    const proxyUrl = `https://i2-uploader.velutinx.workers.dev/mega-link?filename=${encodeURIComponent(filename)}`;
                    
                    const proxyResp = await fetch(proxyUrl);
                    if (!proxyResp.ok) {
                        throw new Error(`Failed to resolve Mega link: ${proxyResp.status}`);
                    }
                    const proxyData = await proxyResp.json();
                    
                    if (proxyData.url) {
                        downloadUrl = proxyData.url;
                    } else {
                        // Fallback: try to use the direct Mega link with a download attribute
                        // Note: This may not work for all browsers due to Mega's download restrictions
                        downloadBtn.textContent = '⬇️ Download ZIP';
                        downloadBtn.disabled = false;
                        showToast('Mega link could not be resolved. Opening in new tab.', 'info');
                        window.open(downloadUrl, '_blank');
                        return;
                    }
                }

                // Trigger the download
                downloadBtn.textContent = '⏳ Downloading...';
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = `${currentPack.title.replace(/[^a-zA-Z0-9 ]/g, '').trim()}.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showToast('✅ Download started!');
            } catch (err) {
                console.error('Download error:', err);
                showToast(`❌ Download failed: ${err.message}`, 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.textContent = '⬇️ Download ZIP';
            }
        }

        // ─── close teaser ───────────────────────────────────────────
        function closeTeaser() {
            document.getElementById('teaserSection').classList.remove('visible');
            currentPack = null;
        }

        // ─── init ───────────────────────────────────────────────────
        async function init() {
            const packs = await fetchPacks();
            if (packs) renderPacks(packs);

            document.getElementById('copyTeaserBtn').addEventListener('click', copyTeaser);
            document.getElementById('downloadPackBtn').addEventListener('click', downloadPack);
            document.getElementById('closeTeaserBtn').addEventListener('click', closeTeaser);
        }

        document.addEventListener('DOMContentLoaded', init);
    })();
</script>
</body>
</html>
