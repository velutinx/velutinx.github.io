<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Clock · Random Offset</title>

    <style>
        @font-face {
            font-family: "Welbut";
            src: url("https://www.velutinx.com/fonts/welbut__.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
        }

        #display {
            font-family: "Welbut", monospace;
            font-size: 130px;
            line-height: 1;
            letter-spacing: 2px;
            color: #fafafa;
            text-shadow:
                0 0 1px #fff,
                0 0 4px rgba(255, 255, 255, .45),
                1px 1px 0 rgba(0, 0, 0, .5);
            transform: scaleY(1.05);
            user-select: none;
        }

        .sub {
            margin-top: 20px;
            font-size: 18px;
            color: #999;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="display">00:00:00</div>
    <div class="sub" id="timezone"></div>
</div>

<script>
    (function() {
        const display = document.getElementById('display');
        const tzDisplay = document.getElementById('timezone');

        // ── Helper: pad numbers ──
        function pad(n) {
            return String(n).padStart(2, '0');
        }

        // ── Format a total seconds value into HH:MM:SS ──
        function format(sec) {
            sec = Math.max(0, sec);
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            return `${pad(h)}:${pad(m)}:${pad(s)}`;
        }

        // ── Main update loop ──
        function updateClock() {
            // 1. Get the current local time as seconds since midnight
            const now = new Date();
            const totalSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

            // 2. Apply random offset between -10 and +10 seconds (same as original)
            const fakeOffset = Math.floor(Math.random() * 21) - 10;
            const shownSeconds = totalSeconds + fakeOffset;

            // 3. Display the offset time (clamp to 00:00:00 – 23:59:59)
            const clamped = Math.max(0, Math.min(shownSeconds, 86400 - 1));
            display.textContent = format(clamped);

            // 4. Show timezone only once
            if (!tzDisplay.dataset.set) {
                try {
                    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    tzDisplay.textContent = `Your timezone: ${tz}`;
                    tzDisplay.dataset.set = 'true';
                } catch (_) {
                    tzDisplay.textContent = '';
                }
            }
        }

        // ── Start the timer ──
        let timeoutId = null;

        function startTimer() {
            if (timeoutId) clearTimeout(timeoutId);
            // Update every 200 ms (same as original)
            timeoutId = setInterval(updateClock, 200);
            updateClock(); // immediate first draw
        }

        startTimer();
    })();
</script>

</body>
</html>
