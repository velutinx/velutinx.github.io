<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Hashtag Popularity Checker</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0c10;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 2rem;
            color: #e0e0e0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #11151c;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #2a2f38;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
        }
        input {
            background: #0f131a;
            border: 1px solid #334155;
            color: white;
        }
        button {
            background: #2c6e2c;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .result {
            background: #0c1017;
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            border-left: 4px solid #3b82f6;
        }
        .error {
            border-left-color: #ef4444;
        }
        .tweet {
            background: #0a0e14;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        .badge {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            display: inline-block;
        }
        hr { border-color: #2a2f38; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Twitter Hashtag Popularity</h1>
    <p>Check how many recent tweets use a hashtag (last 7 days).<br>
    <small>⚠️ Requires your own Twitter API Bearer token (free).</small></p>

    <label for="bearer">Bearer Token:</label>
    <input type="password" id="bearer" placeholder="AAAAAAAA... (from Twitter Developer Portal)">

    <label for="hashtag">Hashtag (without #):</label>
    <input type="text" id="hashtag" placeholder="e.g., FateGrandOrder">

    <button id="checkBtn">🔍 Check Popularity</button>

    <div id="resultArea"></div>
    <hr>
    <div class="badge">ℹ️ Shows tweet count from last 7 days (Twitter API limit: 100 tweets per query).</div>
</div>

<script>
    const bearerInput = document.getElementById('bearer');
    const hashtagInput = document.getElementById('hashtag');
    const checkBtn = document.getElementById('checkBtn');
    const resultDiv = document.getElementById('resultArea');

    // Basic syntax validation (Twitter rules)
    function isValidFormat(tag) {
        const withHash = tag.startsWith('#') ? tag : '#' + tag;
        // Must contain a letter, only letters/numbers/underscore, max 140 chars
        return /^#(?!\d+$)[\p{L}\p{N}_]+$/u.test(withHash) && withHash.length <= 140;
    }

    async function searchHashtag(hashtag, bearerToken) {
        const cleanTag = hashtag.replace(/^#/, '');
        const url = `https://api.twitter.com/2/tweets/search/recent?query=%23${encodeURIComponent(cleanTag)}&max_results=10&tweet.fields=public_metrics,created_at`;

        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${bearerToken}` }
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || `HTTP ${response.status}`);
        }
        return response.json();
    }

    checkBtn.addEventListener('click', async () => {
        const bearer = bearerInput.value.trim();
        const rawTag = hashtagInput.value.trim();

        if (!bearer) {
            resultDiv.innerHTML = `<div class="result error">❌ Please enter your Twitter Bearer Token.</div>`;
            return;
        }
        if (!rawTag) {
            resultDiv.innerHTML = `<div class="result error">❌ Please enter a hashtag.</div>`;
            return;
        }

        // 1. Syntax validation
        if (!isValidFormat(rawTag)) {
            resultDiv.innerHTML = `<div class="result error">❌ Invalid hashtag format. Only letters, numbers, underscores – and must contain at least one letter.</div>`;
            return;
        }

        resultDiv.innerHTML = `<div class="result">⏳ Searching Twitter for #${rawTag.replace(/^#/, '')}...</div>`;

        try {
            const data = await searchHashtag(rawTag, bearer);
            const tweets = data.data || [];
            const meta = data.meta || {};

            const totalTweets = meta.result_count || 0;

            let html = `<div class="result">
                <strong>🔎 #${rawTag.replace(/^#/, '')}</strong><br>
                📊 Recent tweets (last ~7 days): <strong>${totalTweets}</strong><br>
                <small>Note: API returns max 100 tweets. This is an approximation.</small>`;

            if (tweets.length > 0) {
                html += `<div style="margin-top: 12px;"><strong>📌 Example tweets:</strong></div>`;
                for (let t of tweets.slice(0, 5)) {
                    const metrics = t.public_metrics || {};
                    html += `<div class="tweet">
                        ${t.text.substring(0, 200)}<br>
                        <span style="font-size:0.7rem; color:#94a3b8;">❤️ ${metrics.like_count || 0} · 🔁 ${metrics.retweet_count || 0}</span>
                    </div>`;
                }
            } else {
                html += `<div style="margin-top: 12px;">⚠️ No recent tweets found. The hashtag may be unused or very niche.</div>`;
            }
            html += `</div>`;
            resultDiv.innerHTML = html;
        } catch (err) {
            console.error(err);
            resultDiv.innerHTML = `<div class="result error">❌ API Error: ${err.message}. Check your Bearer token or rate limits.</div>`;
        }
    });
</script>
</body>
</html>
