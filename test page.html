<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Helper → Auto‑store to Cloudflare KV</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0c10;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 24px;
            color: #e0e0e0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #11151c;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #2a2f38;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        h1 {
            margin-top: 0;
            font-weight: 500;
            letter-spacing: -0.3px;
        }
        .dropzone {
            border: 2px dashed #3a4050;
            border-radius: 14px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: #0f131a;
            transition: border 0.2s;
            margin-bottom: 20px;
        }
        .dropzone:hover { border-color: #5a6e3c; }
        .dropzone input { display: none; }
        .status {
            margin: 12px 0;
            font-size: 0.9rem;
            color: #aaa;
        }
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            background: #0c1017;
            padding: 16px;
            border-radius: 60px;
            border: 1px solid #252b33;
        }
        .toggle-label {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .female-label { color: #ec4899; }
        .femboy-label { color: #3b82f6; }
        .switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 34px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #3b82f6;
            transition: 0.3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #ec4899;
        }
        input:checked + .slider:before {
            transform: translateX(36px);
        }
        .output-section {
            margin-top: 30px;
            background: #0c1017;
            border-radius: 16px;
            border: 1px solid #2a2f38;
            padding: 20px;
        }
        .output-title {
            font-size: 1rem;
            margin-bottom: 12px;
            color: #aaa;
        }
        .output-code {
            background: #1e1e2a;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: #9cdcfe;
            border: 1px solid #3a4050;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: #1e2a1e;
            color: #d4ffd4;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 12px black;
            border-left: 4px solid #4caf50;
            opacity: 0;
            transform: translateX(20px);
            transition: opacity 0.2s, transform 0.2s;
        }
        .toast.error {
            background: #2c1a1a;
            border-left-color: #f44336;
            color: #ffc9c9;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div class="container">
    <h1>📦 Pack Helper → Auto‑store to Cloudflare KV</h1>
    <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".zip">
        <div>📂 Drag & drop a ZIP file here, or click to select</div>
    </div>
    <div id="status" class="status"></div>

    <div class="toggle-container">
        <span class="toggle-label femboy-label">👨‍🎤 Femboy</span>
        <label class="switch">
            <input type="checkbox" id="categoryToggle">
            <span class="slider"></span>
        </label>
        <span class="toggle-label female-label">👩‍🦰 Female</span>
    </div>

    <div class="output-section">
        <div class="output-title">📦 Last stored pack (sent to worker):</div>
        <div class="output-code" id="outputCode">Waiting for ZIP...</div>
    </div>
</div>

<script>
    // Toast system
    let toastContainer = null;
    function ensureToastContainer() {
        if (!toastContainer) {
            toastContainer = document.createElement('div');
            toastContainer.className = 'toast-container';
            document.body.appendChild(toastContainer);
        }
        return toastContainer;
    }
    function showToast(message, type = 'success') {
        const container = ensureToastContainer();
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '1'; toast.style.transform = 'translateX(0)'; }, 10);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(20px)';
            setTimeout(() => {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 200);
        }, 2500);
    }

    // Filename parsing
    function cleanFilename(rawName) {
        let name = rawName.replace(/\.zip$/i, '');
        name = name.replace(/\s*\(\d+\)\s*$/, '');
        return name.trim();
    }
    function parseFilename(filename) {
        const base = cleanFilename(filename);
        const regex = /^\[Pack (\d+)\]\s+(.+?)\s*-\s*(.+)$/i;
        const match = base.match(regex);
        if (!match) return null;
        return {
            pack: match[1],
            character: match[2].trim(),
            series: match[3].trim().toUpperCase()
        };
    }
    function extractNumber(filename) {
        const match = filename.match(/\d+/);
        return match ? parseInt(match[0], 10) : Infinity;
    }

    // Worker endpoint (your route)
const WORKER_URL = 'https://pack-storage.velutinx.workers.dev/api/packs';
    
    // Main processing function
    async function processZip(file) {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = '📂 Reading ZIP...';
        try {
            const zip = await JSZip.loadAsync(file);
            const imageEntries = [];
            zip.forEach((path, entry) => {
                if (!entry.dir && /\.(jpg|jpeg|png|gif|webp)$/i.test(path)) {
                    imageEntries.push(entry);
                }
            });
            if (imageEntries.length === 0) {
                statusDiv.textContent = '❌ No images found in ZIP.';
                showToast('No images found', 'error');
                return;
            }

            const parsed = parseFilename(file.name);
            if (!parsed) {
                statusDiv.textContent = '❌ Filename does not match [Pack XXX] ... format.';
                showToast('Invalid filename format', 'error');
                return;
            }

            const packNumber = parsed.pack;
            const illustrationCount = imageEntries.length;
            const price = illustrationCount <= 45 ? "PRICE_1" : "PRICE_2";

            const categoryToggle = document.getElementById('categoryToggle');
            const isFemale = categoryToggle.checked;
            const category = isFemale ? 1 : 2;

            const title = cleanFilename(file.name);
            const id = String(packNumber).padStart(3, '0');

            const packEntry = {
                id: id,
                title: title,
                category: category,
                price: price,
                illustrationCount: illustrationCount
            };

            // Display in output area
            const outputCode = document.getElementById('outputCode');
            outputCode.textContent = JSON.stringify(packEntry, null, 2);

            // Send to worker
// Send to worker using FormData (not JSON)
const formData = new FormData();
formData.append('id', packEntry.id);
formData.append('title', packEntry.title);
formData.append('category', packEntry.category);
formData.append('price', packEntry.price);
formData.append('illustrationCount', packEntry.illustrationCount);

const response = await fetch(WORKER_URL, {
  method: 'POST',
  body: formData,  // no Content-Type header needed – browser sets it automatically
});

            if (response.ok) {
                const result = await response.json();
                statusDiv.textContent = `✅ Pack #${packNumber} stored (index ${result.index}) | ${illustrationCount} images | ${price} | ${isFemale ? 'Female' : 'Femboy'}`;
                showToast(`Pack ${packNumber} saved to KV`, 'success');
            } else {
                const errorData = await response.json();
                throw new Error(errorData.error || 'Worker error');
            }
        } catch (err) {
            console.error(err);
            statusDiv.textContent = '❌ Failed to store pack.';
            showToast(`Error: ${err.message}`, 'error');
        }
    }

    // Set up event listeners
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const categoryToggle = document.getElementById('categoryToggle');

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.style.borderColor = '#5a6e3c';
    });
    dropzone.addEventListener('dragleave', () => {
        dropzone.style.borderColor = '#3a4050';
    });
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.style.borderColor = '#3a4050';
        const file = e.dataTransfer.files[0];
        if (file && file.name.toLowerCase().endsWith('.zip')) {
            processZip(file);
            // Also store the file in the input for later toggle changes
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            fileInput.files = dataTransfer.files;
        } else {
            showToast('Please drop a .zip file', 'error');
        }
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            processZip(e.target.files[0]);
        }
    });
    categoryToggle.addEventListener('change', () => {
        if (fileInput.files && fileInput.files.length > 0) {
            processZip(fileInput.files[0]);
        }
    });
</script>
</body>
</html>
