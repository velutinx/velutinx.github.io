<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Manager → with Download Links</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0c10;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 24px;
            color: #e0e0e0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #11151c;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #2a2f38;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        h1 { margin-top: 0; font-weight: 500; letter-spacing: -0.3px; }
        .dropzone {
            border: 2px dashed #3a4050;
            border-radius: 14px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: #0f131a;
            transition: border 0.2s;
            margin-bottom: 20px;
        }
        .dropzone:hover { border-color: #5a6e3c; }
        .dropzone input { display: none; }
        .url-input {
            margin: 20px 0;
        }
        .url-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .url-input input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: #0f131a;
            border: 1px solid #3a4050;
            color: white;
            font-size: 0.9rem;
        }
        .status {
            margin: 12px 0;
            font-size: 0.9rem;
            color: #aaa;
        }
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            background: #0c1017;
            padding: 16px;
            border-radius: 60px;
            border: 1px solid #252b33;
        }
        .toggle-label { font-weight: bold; font-size: 1.1rem; }
        .female-label { color: #ec4899; }
        .femboy-label { color: #3b82f6; }
        .switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 34px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #3b82f6;
            transition: 0.3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #ec4899; }
        input:checked + .slider:before { transform: translateX(36px); }
        
        .table-section {
            margin-top: 30px;
            background: #0c1017;
            border-radius: 16px;
            border: 1px solid #2a2f38;
            overflow-x: auto;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #2a2f38;
        }
        .refresh-btn {
            background: #2a2f38;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .refresh-btn:hover { background: #3a4050; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid #252b33;
        }
        th {
            background: #0a0e14;
            color: #aaa;
            font-weight: 500;
        }
        .category-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .cat-female { background: #ec489933; color: #ec4899; }
        .cat-femboy { background: #3b82f633; color: #3b82f6; }
        .empty-row td { text-align: center; padding: 40px; color: #777; }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: #1e2a1e;
            color: #d4ffd4;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 12px black;
            border-left: 4px solid #4caf50;
            opacity: 0;
            transform: translateX(20px);
            transition: opacity 0.2s, transform 0.2s;
        }
        .toast.error {
            background: #2c1a1a;
            border-left-color: #f44336;
            color: #ffc9c9;
        }
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #aaa;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a.download-link {
            color: #60a5fa;
            text-decoration: none;
        }
        a.download-link:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://velutinx.github.io/assets/js/cloudflare-pack-add.js"></script>
</head>
<body>
<div class="container">
    <h1>📦 Pack Manager → with Download Links</h1>
    <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".zip">
        <div>📂 Drag & drop a ZIP file here, or click to select</div>
    </div>

    <div class="url-input">
        <label for="downloadUrl">🔗 Download link (Mega, Google Drive, etc.)</label>
        <input type="url" id="downloadUrl" placeholder="https://mega.nz/file/..." autocomplete="off">
    </div>

    <div id="status" class="status"></div>

    <div class="toggle-container">
        <span class="toggle-label femboy-label">👨‍🎤 Femboy</span>
        <label class="switch">
            <input type="checkbox" id="categoryToggle">
            <span class="slider"></span>
        </label>
        <span class="toggle-label female-label">👩‍🦰 Female</span>
    </div>

    <div class="table-section">
        <div class="table-header">
            <strong>📋 All Stored Packs</strong>
            <button class="refresh-btn" id="refreshTableBtn">⟳ Refresh</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="packsTable">
                <thead>
                    <tr><th>ID</th><th>Title</th><th>Category</th><th>Price</th><th>Illustrations</th><th>Download</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row"><td colspan="6">Loading packs...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
