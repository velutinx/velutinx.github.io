<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Voting System</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4CAF50; --bg: #f4f7f6; }
        body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; padding: 20px; background: var(--bg); }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .options { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 20px 0; }
        button { 
            padding: 12px; cursor: pointer; border: 2px solid #eee; border-radius: 8px; 
            background: white; font-weight: 600; transition: 0.2s; font-size: 1rem;
        }
        button:hover { border-color: var(--primary); }
        button.active { border-color: var(--primary); background: #e8f5e9; color: #2e7d32; }
        .results { text-align: left; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .bar-container { background: #eee; border-radius: 10px; height: 8px; margin: 5px 0 15px 0; overflow: hidden; }
        .bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.8s ease; }
        .stats { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; }
        #status-bar { font-size: 0.7rem; color: #888; text-align: right; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Real-time Poll</h2>
    <div id="status-bar">Status: <span id="mode-text">Connecting...</span></div>
    
    <div id="voting-section" class="options">
        <button onclick="castVote('Option A')">Option A</button>
        <button onclick="castVote('Option B')">Option B</button>
        <button onclick="castVote('Option C')">Option C</button>
        <button onclick="castVote('Option D')">Option D</button>
        <button onclick="castVote('Option E')">Option E</button>
    </div>

    <div class="results" id="scoreboard">
        </div>
</div>

<script>
    // Ensure no hidden spaces or characters exist in these strings
    const PROJECT_URL = "https://knbvlyngmjaxndkiqggl.supabase.co".trim();
    const PROJECT_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuYnZseW5nbWpheG5ka2lxZ2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjI0NzEsImV4cCI6MjA4NjM5ODQ3MX0.mxthCDB6dCaHcEDMFN48pFnaJmcBbilXfP7tL-YAV08".trim();
    
    // Initialize client globally
    const sb = supabase.createClient(PROJECT_URL, PROJECT_KEY);

    async function init() {
        console.log("App starting...");
        await fetchResults();
        
        // Setup Realtime
        sb.channel('db-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'website_voting_test' }, () => {
              fetchResults();
          })
          .subscribe((status) => {
              document.getElementById('mode-text').innerText = status === 'SUBSCRIBED' ? 'Live' : 'Polling';
              if (status === 'CHANNEL_ERROR') setInterval(fetchResults, 5000);
          });

        const saved = localStorage.getItem('user_vote');
        if (saved) updateButtonStyles(saved);
    }

    async function fetchResults() {
        const { data, error } = await sb.from('website_voting_test').select('option_selected');
        if (error) return console.error("Fetch Error:", error);

        const options = ['Option A', 'Option B', 'Option C', 'Option D', 'Option E'];
        const counts = {};
        options.forEach(o => counts[o] = 0);
        data.forEach(row => { if(counts[row.option_selected] !== undefined) counts[row.option_selected]++; });

        const total = data.length;
        let html = `<p><strong>Total Voters: ${total}</strong></p>`;
        options.forEach(opt => {
            const count = counts[opt];
            const percent = total === 0 ? 0 : Math.round((count / total) * 100);
            html += `
                <div class="stats"><span>${opt}</span><span>${count} (${percent}%)</span></div>
                <div class="bar-container"><div class="bar" style="width: ${percent}%"></div></div>
            `;
        });
        document.getElementById('scoreboard').innerHTML = html;
    }

    async function castVote(choice) {
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const { ip } = await ipRes.json();

            // UPSERT allows switching votes (Update if IP exists, else Insert)
            const { error } = await sb.from('website_voting_test').upsert(
                { voter_id: ip, option_selected: choice },
                { onConflict: 'voter_id' }
            );

            if (!error) {
                localStorage.setItem('user_vote', choice);
                updateButtonStyles(choice);
                // fetchResults() will trigger via Realtime automatically
            } else {
                alert("Error saving vote. Check Supabase RLS/Constraints.");
            }
        } catch (e) {
            console.error("Vote process failed", e);
        }
    }

    function updateButtonStyles(choice) {
        document.querySelectorAll('#voting-section button').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === choice);
        });
    }

    // Run the ap
    init();
    .bar { 
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
}
</script>
</body>
</html>
