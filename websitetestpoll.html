<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-time Voting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 500px; margin: 2rem auto; text-align: center; color: #333; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        button { padding: 12px; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; background: white; transition: 0.2s; }
        button:hover { background: #f0f0f0; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .results { background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #eee; text-align: left; }
        .bar-container { background: #eee; border-radius: 10px; height: 12px; margin: 5px 0 15px 0; overflow: hidden; }
        .bar { background: #4CAF50; height: 100%; width: 0%; transition: width 0.5s ease-in-out; }
        .vote-item { font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Live Poll</h2>
    <div id="voting-section" class="options">
        <button onclick="castVote('Option A')">Option A</button>
        <button onclick="castVote('Option B')">Option B</button>
        <button onclick="castVote('Option C')">Option C</button>
        <button onclick="castVote('Option D')">Option D</button>
        <button onclick="castVote('Option E')">Option E</button>
    </div>

    <div class="results">
        <h3 style="margin-top:0">Results</h3>
        <div id="scoreboard">Loading...</div>
    </div>

<script>
    const S_URL = "https://knbvlyngmjaxndkiqggl.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuYnZseW5nbWpheG5ka2lxZ2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjI0NzEsImV4cCI6MjA4NjM5ODQ3MX0.mxthCDB6dCaHcEDMFN48pFnaJmcBbilXfP7tL-YAV08";
    
    const sb = supabase.createClient(S_URL, S_KEY);

    async function init() {
        console.log("Initializing App...");
        fetchResults();
        
        // Listen for ANY change on the table
        const channel = sb.channel('db-changes')
            .on('postgres_changes', 
                { event: '*', schema: 'public', table: 'website_voting_test' }, 
                (payload) => {
                    console.log('Change received!', payload);
                    fetchResults();
                }
            )
            .subscribe((status) => {
                console.log("Realtime status:", status);
            });

        if (localStorage.getItem('voted_test')) {
            disableButtons();
        }
    }

    async function fetchResults() {
        const { data, error } = await sb.from('website_voting_test').select('option_selected');
        
        if (error) {
            console.error("Fetch Error:", error);
            return;
        }

        const options = ['Option A', 'Option B', 'Option C', 'Option D', 'Option E'];
        const counts = {};
        options.forEach(opt => counts[opt] = 0);
        data.forEach(row => { if(counts[row.option_selected] !== undefined) counts[row.option_selected]++; });

        const total = data.length;
        let html = `<p><strong>Total Votes: ${total}</strong></p>`;
        options.forEach(opt => {
            const count = counts[opt];
            const percent = total === 0 ? 0 : Math.round((count / total) * 100);
            html += `
                <div class="vote-item">${opt}: ${count}</div>
                <div class="bar-container"><div class="bar" style="width: ${percent}%"></div></div>
            `;
        });
        document.getElementById('scoreboard').innerHTML = html;
    }

    async function castVote(choice) {
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const { ip } = await ipRes.json();

            const { error } = await sb.from('website_voting_test').insert([{ option_selected: choice, voter_id: ip }]);

            if (error) {
                if (error.code === '23505') {
                    alert("You have already voted.");
                    localStorage.setItem('voted_test', 'true');
                    disableButtons();
                } else {
                    console.error("DB Error:", error);
                }
            } else {
                localStorage.setItem('voted_test', 'true');
                disableButtons();
                // We don't need an alert here as the bars will move automatically
            }
        } catch (e) {
            console.error("Network Error:", e);
        }
    }

    function disableButtons() {
        document.querySelectorAll('#voting-section button').forEach(b => b.disabled = true);
    }

    init();
</script>
</body>
</html>
