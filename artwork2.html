<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX — Artwork</title>
  <!-- Header CSS -->
  <link rel="stylesheet" href="/assets/css/mainheader.css">
  <!-- Page‑specific CSS (now in assets/css) -->
  <link rel="stylesheet" href="/assets/css/format.css">
</head>
<body>

  <!-- Swipe animation layer (used by language change) -->
  <div class="lang-swipe" id="langSwipe"></div>

  <div id="page">
    <!-- Header will be injected here by mainheader.js -->
    <div id="navContainer"></div>
    <div class="divider"></div>

    <section class="artwork-wrap">
      <div class="artwork-intro" id="artworkIntro">
        Hello! These are just a few small samples of my artwork — I share a lot more on my free Discord! — Temporal Images
      </div>
      <div class="gallery" id="gallery"></div>
    </section>

    <div class="divider"></div>
  </div>

  <div class="zoom-overlay" id="zoomOverlay"></div>

  <!-- Scripts – order matters -->
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/mainheader.js"></script>
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <!-- Small safety to ensure translations apply even if format.js runs before translt.js -->
  <script>
    (function() {
      // Apply dark mode if stored (already done by mainheader.js, but safe)
      if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark');
      }

      // If applyTranslations isn't defined yet, wait a moment
      if (typeof applyTranslations === 'undefined') {
        console.warn('applyTranslations not defined yet – retrying in 100ms');
        setTimeout(function() {
          if (typeof applyTranslations !== 'undefined') {
            applyTranslations('artwork');
          } else {
            console.error('applyTranslations still missing – check translt.js');
          }
        }, 100);
      } else {
        applyTranslations('artwork');
      }
    })();
  </script>
</body>
</html>
