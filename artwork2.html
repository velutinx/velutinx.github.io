<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX — Artwork</title>
  <!-- Header CSS -->
  <link rel="stylesheet" href="/assets/css/mainheader.css">
  <style>
    /* ====================================================
       Page-specific styles (background, gallery, zoom, etc.)
       ==================================================== */
    :root {
      --bg-page: #d4d0c1;
      --divider: #aa9e76;
      --text: #111;

      --bg-dark: #0f0f12;
      --divider-dark: #6f6a4e;
      --text-dark: #e6e3d8;
    }

    .background-wrapper {
      position: fixed;
      inset: 0;
      z-index: -10;
      pointer-events: none;
      overflow: hidden;
    }

    .background-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        132deg,
        #734128 0%,
        #C7A07A 25%,
        #E2CEB1 50%,
        #FDFCE8 75%,
        #391E10 100%
      );
      background-size: 300% 300%;
      animation: gradientFlow 28s ease infinite;
    }

    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .wave-overlay {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.10;
      mix-blend-mode: overlay;
      animation: slowDrift 140s linear infinite;
      pointer-events: none;
    }

    @keyframes slowDrift {
      0%   { transform: translate3d(0, 0, 0) scale(1.015); }
      50%  { transform: translate3d(4%, 6%, 0) scale(1.045); }
      100% { transform: translate3d(0, 0, 0) scale(1.015); }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(253, 252, 232, 0.28);
      z-index: -9;
      pointer-events: none;
      backdrop-filter: blur(1.5px);
    }

    #page,
    .hero,
    .commission-wrap,
    .artwork-wrap,
    .contact-wrap {
      position: relative;
      z-index: 1;
      background: transparent;
    }

    body.dark .background-gradient {
      background: linear-gradient(
        135deg,
        #00030f 0%,
        #000814 20%,
        #0a1125 40%,
        #001220 60%,
        #0b142b 80%,
        #00030f 100%
      );
      background-size: 400% 400%;
      animation: darkNebulaFlow 55s ease infinite;
    }

    @keyframes darkNebulaFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body.dark::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 3, 15, 0.65);
      z-index: -9;
      pointer-events: none;
      backdrop-filter: blur(1px);
    }

    body.dark .background-gradient::before {
      content: "";
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(#111111 1px, transparent 1px),
        radial-gradient(#0f1e38 1px, transparent 1px),
        radial-gradient(#14253f 1px, transparent 1px);
      background-size: 70px 70px, 90px 90px, 120px 120px;
      background-position: 0 0, 35px 35px, 80px 80px;
      opacity: 0.06;
      animation: starTwinkle 35s ease-in-out infinite;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    @keyframes starTwinkle {
      0%, 100% { opacity: 0.07; transform: scale(1); }
      50%      { opacity: 0.14; transform: scale(1.03); }
    }

    body.dark .wave-overlay {
      opacity: 0.14;
      mix-blend-mode: soft-light;
    }

    body.dark::before {
      background: rgba(15, 15, 18, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: transparent;
      color: var(--text);
      font-family: system-ui, sans-serif;
      overflow-x: hidden;
      transition: color 0.6s ease;
    }

    body.dark {
      background: transparent;
      color: var(--text-dark);
    }

    #page {
      opacity: 0;
      transform: translateY(60px);
      animation: pageReveal 0.7s ease-out forwards;
    }

    @keyframes pageReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .divider {
      width: 80%;
      height: 6px;
      background: var(--divider);
      margin: 22px auto;
      border-radius: 4px;
    }
    body.dark .divider { background: var(--divider-dark); }

    .artwork-wrap {
      max-width: 1800px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
      overflow: hidden;
    }

    .artwork-intro {
      text-align: center;
      font-size: 15px;
      letter-spacing: 1px;
      margin-bottom: 28px;
      opacity: 0.9;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .gallery img {
      width: 100%;
      border: 3px solid var(--divider);
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      background: #eee;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .zoom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 9998;
    }

    .zoom-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .zoom-image {
      position: fixed;
      z-index: 9999;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      cursor: zoom-out;
      transition: all 0.22s cubic-bezier(.2,.8,.2,1);
    }

    .star {
      position: fixed;
      pointer-events: none;
      color: var(--divider);
      font-size: 14px;
      animation: driftFall 2s ease-out forwards;
      z-index: 9999;
    }
    @keyframes driftFall {
      to {
        opacity: 0;
        transform: translate(calc(-20px + 40px * var(--drift)), 90px) scale(0.4);
      }
    }

    .falling-star {
      position: fixed;
      pointer-events: none;
      color: var(--divider);
      font-size: 18px;
      z-index: 3;
      animation: fallDown 6s linear forwards;
    }
    @keyframes fallDown {
      from { opacity: 0; transform: translateY(-10vh); }
      10% { opacity: 1; }
      to { opacity: 0; transform: translateY(calc(100vh + 100px)) translateX(calc(-120px + 240px * var(--drift))); }
    }
  </style>
</head>
<body>

  <!-- Swipe animation layer (used by language change) -->
  <div class="lang-swipe" id="langSwipe"></div>

  <div class="background-wrapper">
    <div class="background-gradient"></div>
    <div class="wave-overlay"></div>
  </div>

  <div id="page">
    <!-- Header will be injected here by mainheader.js -->
    <div id="navContainer"></div>
    <div class="divider"></div>

    <section class="artwork-wrap">
      <div class="artwork-intro" id="artworkIntro">
        Hello! These are just a few small samples of my artwork — I share a lot more on my free Discord! — Temporal Images
      </div>
      <div class="gallery" id="gallery"></div>
    </section>

    <div class="divider"></div>
  </div>

  <div class="zoom-overlay" id="zoomOverlay"></div>

  <!-- Scripts -->
  <script src="/assets/js/translations.js"></script>
  <script src="/assets/js/mainheader.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // Apply dark mode from localStorage (header also does this)
    if (localStorage.getItem("darkMode") === "true") {
      document.body.classList.add("dark");
    }

    // Cursor sparkles
    let lastStarTime = 0;
    document.addEventListener("mousemove", (e) => {
      const now = Date.now();
      if (now - lastStarTime < 45) return;
      lastStarTime = now;

      const star = document.createElement("div");
      star.className = "star";
      star.textContent = "✦";
      star.style.setProperty("--drift", Math.random());
      star.style.left = `${e.clientX}px`;
      star.style.top = `${e.clientY}px`;
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 2000);
    });

    // Full-page falling sparkles
    setInterval(() => {
      const star = document.createElement("div");
      star.className = "falling-star";
      star.textContent = "✦";
      star.style.left = Math.random() * 100 + "vw";
      star.style.top = "-10vh";
      star.style.setProperty("--drift", Math.random() * 2 - 1);
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 8000);
    }, 400);

    // Gallery loading
    const MAX_IMAGES = 45;
    const BASE = "https://www.velutinx.com/images/artwork/";

    const gallery = document.getElementById("gallery");
    for (let i = 1; i <= MAX_IMAGES; i++) {
      const img = document.createElement("img");
      img.src = BASE + i + ".jpg";
      img.alt = `Artwork sample ${i}`;
      img.onerror = () => img.remove();
      img.loading = "lazy";
      gallery.appendChild(img);
    }

    // Zoom functionality
    let activeClone = null;
    let originRect = null;

    document.addEventListener("click", (e) => {
      const img = e.target.closest(".gallery img");
      if (!img) return;

      originRect = img.getBoundingClientRect();
      const scrollY = window.scrollY;

      const clone = img.cloneNode();
      clone.className = "zoom-image";

      clone.style.top = originRect.top + scrollY + "px";
      clone.style.left = originRect.left + "px";
      clone.style.width = originRect.width + "px";
      clone.style.height = originRect.height + "px";

      document.body.appendChild(clone);
      activeClone = clone;

      clone.getBoundingClientRect();
      document.getElementById("zoomOverlay").classList.add("active");
      document.body.classList.add("zoom-active");

      requestAnimationFrame(() => {
        const vw = window.innerWidth * 0.9;
        const vh = window.innerHeight * 0.9;
        const imgRatio = originRect.width / originRect.height;
        const viewRatio = vw / vh;

        let w, h;
        if (imgRatio > viewRatio) {
          w = vw;
          h = vw / imgRatio;
        } else {
          h = vh;
          w = vh * imgRatio;
        }

        clone.style.left = (window.innerWidth - w) / 2 + "px";
        clone.style.top = (window.innerHeight - h) / 2 + scrollY + "px";
        clone.style.width = w + "px";
        clone.style.height = h + "px";
      });
    });

    document.getElementById("zoomOverlay").onclick = () => {
      if (!activeClone) return;

      const scrollY = window.scrollY;
      activeClone.style.left = originRect.left + "px";
      activeClone.style.top = originRect.top + scrollY + "px";
      activeClone.style.width = originRect.width + "px";
      activeClone.style.height = originRect.height + "px";

      document.getElementById("zoomOverlay").classList.remove("active");
      document.body.classList.remove("zoom-active");

      setTimeout(() => {
        activeClone.remove();
        activeClone = null;
        originRect = null;
      }, 230);
    };

    // Apply artwork translations
    function applyArtworkTranslations() {
      const lang = window.currentLanguage || localStorage.getItem('language') || 'en';
      const t = window.translations?.artwork?.[lang];
      if (t && t.artworkIntro) {
        const introEl = document.getElementById('artworkIntro');
        if (introEl) introEl.textContent = t.artworkIntro;
      }
    }

    applyArtworkTranslations();
    document.addEventListener('languageChanged', applyArtworkTranslations);
  </script>
</body>
</html>
