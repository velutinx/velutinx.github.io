<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Shared header CSS -->
  <link rel="stylesheet" href="/assets/css/shared.css">
  <!-- Shared page styles (hero, divider, sparkles, etc.) -->
  <link rel="stylesheet" href="/assets/css/format.css">
  <style>
    /* Hide Website button, cart wrapper, and floating cart on index page */
    .index-page .login-btn,
    .index-page .cart-wrapper,
    .index-page .floating-cart {
      display: none !important;
    }
    /* Adjust top‑nav background to match page background */
    .index-page .top-nav {
      background: var(--bg) !important;
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body class="index-page">

  <!-- Header will be injected here by shared.js -->
  <div id="header-placeholder"></div>

  <div id="mainWebsite" style="opacity:0; transition:opacity 0.8s ease;">
    <div id="page">
      <div class="divider"></div>

      <section class="hero">
        <div class="hero-image" id="heroImage">
          <img src="https://www.velutinx.com/images/Main.jpg" alt="Velutinx">
        </div>

        <div class="hero-text">
          <div class="hero-name">VELUTINX</div>
          <div class="hero-sub" id="heroSub">♡ Freelance Illustrator ♡</div>
          <div class="hero-sub" id="heroSubExtra">🇺🇸 / 🇯🇵 / 🇪🇸 = OK!</div>
          <div class="divider"></div>

          <a class="discord-link" href="https://discord.gg/HKyH4bmQez" target="_blank">
            <img src="https://www.velutinx.com/images/LogoDiscord.png" alt="Discord">
          </a>
        </div>
      </section>

      <div class="divider"></div>
    </div>
  </div>

  <!-- Shared header JS (injects header, sidebar, cart, etc.) -->
  <script src="/assets/js/shared.js"></script>
  <!-- Page‑specific scripts -->
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/intro-loader.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // Apply index translations using translt.js
    function applyIndexTranslations() {
      if (typeof window.applyTranslations === 'function') {
        window.applyTranslations('index');
      }
    }

    // Initial apply (when page loads, after translt.js is ready)
    applyIndexTranslations();

    // When language changes via shared header, update translt.js and reapply
document.addEventListener('languageChanged', (e) => {
  const newLang = e.detail.language;
      if (newLang && typeof window.setLanguage === 'function') {
        window.setLanguage(newLang);
      } else if (newLang) {
        window.currentLanguage = newLang;
      }
  applyIndexTranslations();
});

    // Dark mode from localStorage
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }

    // Social‑star sparkles inside hero image (same as original)
    const heroImage = document.getElementById('heroImage');
    if (heroImage) {
      setInterval(() => {
        const star = document.createElement('div');
        star.className = 'social-star';
        star.textContent = '✦';
        star.style.left = `${Math.random() * heroImage.clientWidth}px`;
        star.style.top = '0px';
        heroImage.appendChild(star);
        setTimeout(() => star.remove(), 6000);
      }, 700);
    }

    // Fade in main content (same as original intro-loader)
    const mainDiv = document.getElementById('mainWebsite');
    if (mainDiv) {
      setTimeout(() => {
        mainDiv.style.opacity = '1';
      }, 100);
    }
  </script>
</body>
</html>
