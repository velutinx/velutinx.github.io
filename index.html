<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VELUTINX</title>

  <!-- Fonts -->
  <style>
    @font-face {
      font-family: 'Kozuka Mincho Pr6N L';
      src: url('/fonts/KozukaMinchoPr6NL.otf') format('opentype');
    }

    @font-face {
      font-family: 'Trajan Pro Bold';
      src: url('/fonts/TrajanPro-Bold.otf') format('opentype');
    }
  </style>

  <!-- Intro / Loading Sequence Styles -->
  <style id="introStyles">
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: white;
    }

    .intro-container {
      position: relative;
      z-index: 10;
      text-align: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      border: 2px solid black;
      padding: 5px 60px;
      background: white;
      transform: scale(5);
      filter: blur(12px);
      opacity: 0;
      animation: loadIn 0.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      cursor: pointer;
      display: inline-block;
    }

    @keyframes loadIn {
      to { transform: scale(1); filter: blur(0); opacity: 1; }
    }

    .japanese {
      font-family: 'Kozuka Mincho Pr6N L', serif;
      font-size: 20px;
      letter-spacing: 0.35em;
      font-weight: bold;
    }

    .english {
      font-family: 'Trajan Pro Bold', serif;
      font-size: 7px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-top: 20px;
      opacity: 0;
      animation: fadeInText 0.4s ease 0.15s forwards;
    }

    @keyframes fadeInText {
      to { opacity: 1; }
    }

    .fade-out {
      animation: blurFade 1.2s ease forwards;
    }

    @keyframes blurFade {
      0%   { filter: blur(0); opacity: 1; }
      50%  { filter: blur(8px); opacity: 0.6; }
      100% { filter: blur(20px); opacity: 0; }
    }

    .tv-glitch {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      background:
        repeating-linear-gradient(to bottom, transparent 0px, #111 1px, transparent 3px, #000 4px),
        linear-gradient(90deg, rgba(255,0,0,0.15) 0%, transparent 33%, rgba(0,255,255,0.12) 66%, transparent 100%);
      background-size: 100% 4px, 100% 100%;
      mix-blend-mode: multiply;
    }

    .tv-glitch.active {
      opacity: 0.9;
      animation: glitchShake 1.2s steps(10) forwards, verticalRoll 0.10s linear infinite;
    }

    @keyframes glitchShake {
      0%   { transform: translate(0,0); opacity: 0; }
      10%  { transform: translate(6px,-6px); opacity: 1; }
      30%  { transform: translate(-7px,7px); }
      50%  { transform: translate(5px,-5px); }
      70%  { transform: translate(-6px,6px); }
      100% { transform: translate(0,0); opacity: 0; }
    }

    @keyframes verticalRoll {
      0%   { background-position: 0 0, 0 0; }
      100% { background-position: 0 12px, 0 0; }
    }

    .white-screen {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .white-screen.active { opacity: 1; }

    .shutdown {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .shutdown.active { opacity: 1; }

    .shutdown-line {
      width: 100%;
      height: 100%;
      background: white;
      transform-origin: center;
    }

    @keyframes collapseY {
      0% { transform: scaleY(1); }
      100% { transform: scaleY(0.02); }
    }

    @keyframes collapseX {
      0% { transform: scaleX(1); }
      100% { transform: scaleX(0); }
    }

    /* Loading screen (Phase 2) */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
    }

    .loading-screen.active { opacity: 1; }

    :root { --coffee: #E6D5B8; }

    .wrapper { text-align: center; }

    .loader {
      position: relative;
      width: 600px;
      max-width: 90vw;
      height: 32px;
    }

    .fill {
      position: absolute;
      top: 8px;
      left: 8px;
      height: 16px;
      width: 0%;
      background: var(--coffee);
      animation: fillBar 1.3s linear forwards;
    }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    rect.progress-border {
      fill: none;
      stroke: var(--coffee);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 1264;
      stroke-dashoffset: 1264;
      animation: borderBuild 1.3s linear forwards;
    }

    .percent {
      margin-top: 18px;
      font-size: 48px;
      font-family: 'Trajan Pro Bold', serif;
      color: var(--coffee);
      letter-spacing: 2px;
    }

    .flash {
      animation: flashAnim 0.18s ease-in-out 3;
    }

    @keyframes fillBar {
      from { width: 0%; }
      to   { width: calc(100% - 16px); }
    }

    @keyframes borderBuild {
      from { stroke-dashoffset: 1264; }
      to   { stroke-dashoffset: 0; }
    }

    @keyframes flashAnim {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    /* Final vertical sweep reveal */
    .final-sweep {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
    }

    .final-sweep.active { opacity: 1; }

    .sweep-bar {
      position: absolute;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100%;
      background: #aa9e76;
      animation: sweepRightToLeft 2s ease-in-out forwards;
    }

    @keyframes sweepRightToLeft {
      to { right: 100%; }
    }
  </style>

  <!-- Your main website styles (link to external CSS) -->
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>

<!-- Intro / Loading Sequence -->
<div class="container">
  <div class="card" id="card">
    <div class="japanese">入場</div>
  </div>
  <div class="english" id="englishText">ACCESS WEBSITE</div>
</div>

<div class="tv-glitch" id="glitch"></div>
<div class="white-screen" id="whiteScreen"></div>

<div class="shutdown" id="shutdown">
  <div class="shutdown-line" id="shutdownLine"></div>
</div>

<div class="loading-screen" id="loadingScreen">
  <div class="wrapper">
    <div class="loader">
      <div class="fill" id="fill"></div>
      <svg viewBox="0 0 600 32">
        <rect class="progress-border" id="border" x="1.5" y="1.5" width="597" height="29"/>
      </svg>
    </div>
    <div class="percent" id="percent">0%</div>
  </div>
</div>

<div class="final-sweep" id="finalSweep">
  <div class="sweep-bar"></div>
</div>

<!-- Your main website content (hidden until sweep reveal) -->
<div id="mainWebsite" style="opacity:0; transition:opacity 0.6s ease;">
  <div class="background-wrapper">
    <div class="background-gradient"></div>
    <div class="wave-overlay"></div>
  </div>
  
  <div class="lang-swipe" id="langSwipe"></div>
  <div class="lang-toggle" id="langToggle">🇯🇵</div>
  <div class="theme-toggle" id="themeToggle"><div class="theme-knob"></div></div>

  <div id="page">
    <div id="navContainer"></div>
    <div class="divider"></div>

    <section class="hero">
      <div class="hero-image" id="heroImage">
        <img src="/images/Main.jpg" alt="Velutinx">
      </div>

      <div class="hero-text">
        <div class="hero-name">VELUTINX</div>
        <div class="hero-sub" id="heroSub">♡ Freelance Illustrator ♡</div>
        <div class="hero-sub">🇺🇸 / 🇯🇵 / 🇪🇸 = OK!</div>
        <div class="divider"></div>

        <a class="discord-link" href="https://discord.gg/6sHSVMEE" target="_blank">
          <img src="/images/LogoDiscord.png" alt="Discord">
        </a>
      </div>
    </section>

    <div class="divider"></div>
  </div>
</div>

<script src="/assets/js/navigation.js"></script>
<script src="/assets/js/tab-title-animation.js"></script>

<script>
// Phase 1 & 2 script (unchanged from your last version)
document.addEventListener("DOMContentLoaded", function(){
  const card = document.getElementById('card');
  const english = document.getElementById('englishText');
  const glitch = document.getElementById('glitch');
  const whiteScreen = document.getElementById('whiteScreen');
  const shutdown = document.getElementById('shutdown');
  const loadingScreen = document.getElementById('loadingScreen');
  const finalSweep = document.getElementById('finalSweep');
  const mainWebsite = document.getElementById('mainWebsite');

  card.addEventListener('click', () => {
    glitch.classList.add('active');
    card.classList.add('fade-out');
    english.classList.add('fade-out');

    setTimeout(() => whiteScreen.classList.add('active'), 1200);

    setTimeout(() => {
      shutdown.classList.add('active');
      const line = document.getElementById("shutdownLine");
      line.style.animation = "collapseY 0.35s forwards";
      setTimeout(() => line.style.animation = "collapseX 0.25s forwards", 350);
    }, 1600);

    setTimeout(() => {
      loadingScreen.classList.add("active");
      document.getElementById("fill").style.animation = "fillBar 1.3s linear forwards";
      document.getElementById("border").style.animation = "borderBuild 1.3s linear forwards";
      startPercent();
    }, 2200);
  });

  function startPercent(){
    const duration = 1300;
    const percentEl = document.getElementById("percent");
    let start = null;

    function animate(timestamp){
      if(!start) start = timestamp;
      let progress = timestamp - start;
      let percent = Math.min(Math.floor((progress/duration)*100),100);
      percentEl.textContent = percent + "%";

      if(progress < duration){
        requestAnimationFrame(animate);
      } else {
        percentEl.classList.add("flash");

        // After flash → start final sweep to reveal main site
        setTimeout(() => {
          finalSweep.classList.add("active");
          // Reveal main website after sweep starts
          setTimeout(() => {
            mainWebsite.style.opacity = "1";
            // Hide intro elements
            document.querySelector('.container').style.display = 'none';
            glitch.style.display = 'none';
            whiteScreen.style.display = 'none';
            shutdown.style.display = 'none';
            loadingScreen.style.display = 'none';
          }, 1200); // sweep duration
        }, 800);
      }
    }

    requestAnimationFrame(animate);
  }

  // Your existing main site scripts (language, theme, sparkles, etc.)
  const savedLang = localStorage.getItem("language");
  const savedDark = localStorage.getItem("darkMode") === "true";
  let isJapanese = savedLang === "jp";

  function translateBlobs(isJp) {
    const blobs = document.querySelectorAll(".blob-text");
    if (blobs.length === 0) {
      setTimeout(() => translateBlobs(isJp), 100);
      return;
    }
    blobs.forEach(t => {
      t.textContent = isJp ? t.dataset.jp : t.dataset.en;
    });
  }

  translateBlobs(isJapanese);

  document.getElementById("heroSub").textContent = isJapanese
    ? "♡ フリーランスイラストレーター ♡"
    : "♡ Freelance Illustrator ♡";

  document.getElementById("langToggle").textContent = isJapanese ? "🇺🇸" : "🇯🇵";

  if (savedDark) document.body.classList.add("dark");

  langToggle.onclick = () => {
    langSwipe.classList.remove("active");
    void langSwipe.offsetWidth;
    langSwipe.classList.add("active");

    setTimeout(() => {
      isJapanese = !isJapanese;
      translateBlobs(isJapanese);
      document.getElementById("heroSub").textContent = isJapanese
        ? "♡ フリーランスイラストレーター ♡"
        : "♡ Freelance Illustrator ♡";
      langToggle.textContent = isJapanese ? "🇺🇸" : "🇯🇵";
      localStorage.setItem("language", isJapanese ? "jp" : "en");
    }, 180);
  };

  themeToggle.onclick = () => {
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", document.body.classList.contains("dark"));
  };

  let lastStarTime = 0;
  document.addEventListener("mousemove", (e) => {
    const now = Date.now();
    if (now - lastStarTime < 45) return;
    lastStarTime = now;

    const star = document.createElement("div");
    star.className = "star";
    star.textContent = "✦";
    star.style.setProperty("--drift", Math.random());
    star.style.left = e.clientX + "px";
    star.style.top = e.clientY + "px";

    document.body.appendChild(star);
    setTimeout(() => star.remove(), 2000);
  });

  setInterval(() => {
    const star = document.createElement("div");
    star.className = "social-star";
    star.textContent = "✦";
    star.style.left = Math.random() * heroImage.clientWidth + "px";
    star.style.top = "0px";
    heroImage.appendChild(star);
    setTimeout(() => star.remove(), 6000);
  }, 700);
});
</script>

</body>
</html>
