<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Header CSS -->
  <link rel="stylesheet" href="/assets/css/mainheader.css">
  <!-- Shared page styles (hero, divider, sparkles, etc.) -->
  <link rel="stylesheet" href="/assets/css/format.css">
  <style>
    /* Override header background to match page flat background */
    .top-nav {
      background: var(--bg) !important;
      backdrop-filter: none !important;
      border-bottom: 1px solid var(--border);
    }
    /* Hide store button and both cart icons on this page */
    .index-page .store-btn,
    .index-page .cart-wrapper,
    .index-page .floating-cart {
      display: none !important;
    }
  </style>
</head>
<body class="index-page">

  <div class="lang-swipe" id="langSwipe"></div>

  <div id="mainWebsite" style="opacity:0; transition:opacity 0.8s ease;">
    <div id="page">
      <div id="navContainer"></div>
      <div class="divider"></div>

      <section class="hero">
        <div class="hero-image" id="heroImage">
          <img src="https://www.velutinx.com/images/Main.jpg" alt="Velutinx">
        </div>

        <div class="hero-text">
          <div class="hero-name">VELUTINX</div>
          <div class="hero-sub" id="heroSub">♡ Freelance Illustrator ♡</div>
          <div class="hero-sub">🇺🇸 / 🇯🇵 / 🇪🇸 = OK!</div>
          <div class="divider"></div>

          <a class="discord-link" href="https://discord.gg/XF363uYfSh" target="_blank">
            <img src="/images/LogoDiscord.png" alt="Discord">
          </a>
        </div>
      </section>

      <div class="divider"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/mainheader.js"></script>
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/intro-loader.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // Apply index translations
    if (typeof window.applyTranslations === 'function') {
      window.applyTranslations('index');
      document.addEventListener('languageChanged', () => {
        window.applyTranslations('index');
      });
    }

    // Dark mode from localStorage (already set by header, but safe)
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }

    // Social-star sparkles inside hero image (same as original)
    const heroImage = document.getElementById('heroImage');
    if (heroImage) {
      setInterval(() => {
        const star = document.createElement('div');
        star.className = 'social-star';
        star.textContent = '✦';
        star.style.left = `${Math.random() * heroImage.clientWidth}px`;
        star.style.top = '0px';
        heroImage.appendChild(star);
        setTimeout(() => star.remove(), 6000);
      }, 700);
    }
  </script>
</body>
</html>
