<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>

  <div class="lang-swipe" id="langSwipe"></div>

  <div class="background-wrapper">
    <div class="background-gradient"></div>
    <div class="wave-overlay"></div>
  </div>

  <div id="langContainer">
    <button class="lang-btn" title="Select Language">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 5h7"></path>
        <path d="M7 4c0 4.846 0 7 .5 8"></path>
        <path d="M10 8.5c0 2.286 -2 4.5 -3.5 4.5s-2.5 -1.135 -2.5 -2c0 -2 1 -3 3 -3s5 .57 5 2.857c0 1.524 -.667 2.571 -2 3.143"></path>
        <path d="M12 20l4 -9l4 9"></path>
        <path d="M19.1 18h-6.2"></path>
      </svg>
    </button>

    <div id="languagePopover">
      <div class="lang-item" data-lang="en">
        <img src="https://flagcdn.com/w40/us.png" alt="English" />
        <p>English</p>
      </div>
      <div class="lang-item" data-lang="ja">
        <img src="https://flagcdn.com/w40/jp.png" alt="Japanese" />
        <p>日本語</p>
      </div>
      <div class="lang-item" data-lang="zh">
        <img src="https://flagcdn.com/w40/cn.png" alt="Chinese" />
        <p>简体中文</p>
      </div>
      <div class="lang-item" data-lang="es">
        <img src="https://flagcdn.com/w40/mx.png" alt="Spanish" />
        <p>Español</p>
      </div>
    </div>
  </div>

  <div class="theme-toggle" id="themeToggle">
    <div class="theme-knob"></div>
  </div>

  <div id="mainWebsite" style="opacity:0; transition:opacity 0.8s ease;">
    <div id="page">
      <div id="navContainer"></div>
      <div class="divider"></div>

      <section class="hero">
        <div class="hero-image" id="heroImage">
          <img src="https://www.velutinx.com/images/Main.jpg" alt="Velutinx">
        </div>

        <div class="hero-text">
          <div class="hero-name">VELUTINX</div>
          <div class="hero-sub" id="heroSub">♡ Freelance Illustrator ♡</div>
          <div class="hero-sub">🇺🇸 / 🇯🇵 / 🇪🇸 = OK!</div>
          <div class="divider"></div>

          <a class="discord-link" href="https://discord.gg/XF363uYfSh" target="_blank">
            <img src="/images/LogoDiscord.png" alt="Discord">
          </a>
        </div>
      </section>

      <div class="divider"></div>
    </div>
  </div>

  <script src="/assets/js/intro-loader.js"></script>
  <script src="/assets/js/navigation.js"></script>
  <script src="/assets/js/translations.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // Apply dark mode
    if (localStorage.getItem("darkMode") === "true") {
      document.body.classList.add("dark");
    }

    // Theme toggle
    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode", document.body.classList.contains("dark"));
    };

    // Cursor sparkles
    let lastStarTime = 0;
    document.addEventListener("mousemove", (e) => {
      const now = Date.now();
      if (now - lastStarTime < 45) return;
      lastStarTime = now;

      const star = document.createElement("div");
      star.className = "star";
      star.textContent = "✦";
      star.style.setProperty("--drift", Math.random());
      star.style.left = `${e.clientX}px`;
      star.style.top = `${e.clientY}px`;
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 2000);
    });

    // Social-star sparkles
    const heroImage = document.getElementById("heroImage");
    if (heroImage) {
      setInterval(() => {
        const star = document.createElement("div");
        star.className = "social-star";
        star.textContent = "✦";
        star.style.left = `${Math.random() * heroImage.clientWidth}px`;
        star.style.top = "0px";
        heroImage.appendChild(star);
        setTimeout(() => star.remove(), 6000);
      }, 700);
    }

    // Language switch
    document.querySelectorAll('.lang-item').forEach(item => {
      item.addEventListener('click', () => {
        if (typeof setLanguage === 'function') setLanguage(item.dataset.lang);
      });
    });

    // Apply translations
    document.addEventListener('DOMContentLoaded', () => {
       if (typeof applyTranslations === 'function') applyTranslations('index');
    });
    document.addEventListener('languageChanged', () => {
       if (typeof applyTranslations === 'function') applyTranslations('index');
    });
  </script>
</body>
</html>
