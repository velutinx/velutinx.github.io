<!DOCTYPE html>
<html>
<head>
    <title>Check PayPal Plan</title>
    <style>body { font-family: monospace; white-space: pre-wrap; }</style>
</head>
<body>
    <h2>Checking if plan P-37M89451YE788052ENG3FYDQ exists</h2>
    <pre id="result">Loading...</pre>
    <script>
        const CLIENT_ID = 'AR7igvBzCZr6spSQ8DswwyQ28fU5U9hY0JwFGHcQmI7NZ5M8kvgPAqqQEN9xPPo5E1UNl-om-OWnscI3';
        const SECRET = 'ENwoPkJPp9NOdFlVCpM4GIgrwTowUZW6gAFJ4E8-757iN1mQfYIaEBWSuTQusn-ejFoGbICP-GaCRIU5';  // <-- REPLACE WITH YOUR ACTUAL SECRET
        const PLAN_ID = 'P-9FK1452173617351CNHCLMCY';

        async function getAccessToken() {
            const response = await fetch('https://api-m.sandbox.paypal.com/v1/oauth2/token', {
                method: 'POST',
                headers: {
                    'Authorization': 'Basic ' + btoa(`${CLIENT_ID}:${SECRET}`),
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'grant_type=client_credentials'
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error_description || 'Failed to get token');
            return data.access_token;
        }

        async function getPlan(accessToken) {
            const response = await fetch(`https://api-m.sandbox.paypal.com/v1/billing/plans/${PLAN_ID}`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            if (!response.ok) {
                const error = await response.text();
                throw new Error(`HTTP ${response.status}: ${error}`);
            }
            return await response.json();
        }

        (async () => {
            try {
                const token = await getAccessToken();
                const plan = await getPlan(token);
                document.getElementById('result').innerText = JSON.stringify(plan, null, 2);
            } catch (err) {
                document.getElementById('result').innerText = 'Error: ' + err.message;
            }
        })();
    </script>
</body>
</html>
