<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal Subscription Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 2rem auto; padding: 1rem; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #10b981; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 40px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background-color: #059669; transform: scale(1.02); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; transform: none; }
        .message { margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none; }
        .success { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .error { background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
    </style>
</head>
<body>
    <h1>🔁 PayPal Subscription Test</h1>
    <p>Subscribe to <strong>✨ Bronze</strong> for $4.50/month (10% off)</p>

    <div>
        <label for="discordId">Your Discord ID (required)</label>
        <input type="text" id="discordId" placeholder="e.g., 123456789012345678" value="1467153810970644638">
    </div>

    <div id="paypal-button-container"></div>
    <div id="message" class="message"></div>

    <!-- Load PayPal SDK with vault=true for subscriptions -->
    <script src="https://www.paypal.com/sdk/js?client-id=AR7igvBzCZr6spSQ8DswwyQ28fU5U9hY0JwFGHcQmI7NZ5M8kvgPAqqQEN9xPPo5E1UNl-om-OWnscI3&currency=USD&vault=true"></script>

    <script>
        const PLAN_ID = 'P-9FK1452173617351CNHCLMCY'; // your new plan ID

        const discordInput = document.getElementById('discordId');
        const container = document.getElementById('paypal-button-container');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 6000);
        }

        function isValidDiscordId(id) {
            return /^\d{17,19}$/.test(id);
        }

        function renderButton() {
            const discordId = discordInput.value.trim();
            const isValid = isValidDiscordId(discordId);

            container.innerHTML = ''; // clear

            if (!isValid) {
                const placeholder = document.createElement('button');
                placeholder.textContent = 'Enter a valid Discord ID first';
                placeholder.disabled = true;
                container.appendChild(placeholder);
                return;
            }

            // Render the PayPal subscription button
            paypal.Buttons({
                style: {
                    label: 'subscribe',
                    color: 'blue',    // will be overridden by CSS
                    shape: 'pill',
                    height: 40
                },
                createSubscription: function(data, actions) {
                    console.log('Creating subscription with plan ID:', PLAN_ID);
                    return actions.subscription.create({
                        plan_id: PLAN_ID,
                        custom_id: JSON.stringify({ discordId: discordId, tier: 1 })
                    });
                },
                onApprove: function(data, actions) {
                    const subscriptionId = data.subscriptionID;
                    showMessage(`✅ Subscription created! ID: ${subscriptionId}`, 'success');
                    console.log('Subscription approved:', subscriptionId);
                    // Here you would call your worker to store the subscription
                },
                onError: function(err) {
                    console.error('PayPal error:', err);
                    let msg = '❌ Subscription failed. ';
                    if (err.message && err.message.includes('RESOURCE_NOT_FOUND')) {
                        msg += 'Plan not found. Check plan ID.';
                    } else {
                        msg += 'See console for details.';
                    }
                    showMessage(msg, 'error');
                }
            }).render(container);
        }

        // Wait for the SDK to be ready
        window.addEventListener('load', () => {
            // small delay to ensure paypal is defined
            setTimeout(() => {
                if (typeof paypal === 'undefined') {
                    showMessage('PayPal SDK failed to load. Check your internet connection.', 'error');
                    return;
                }
                renderButton();
            }, 500);
        });

        // Re-render when Discord ID changes
        discordInput.addEventListener('input', renderButton);
    </script>

    <style>
        /* Override PayPal button color to green */
        .paypal-button {
            background-color: #10b981 !important;
            border-radius: 40px !important;
        }
        .paypal-button:hover {
            background-color: #059669 !important;
        }
    </style>
</body>
</html>
