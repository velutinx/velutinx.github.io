<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX — Membership</title>
  <link rel="stylesheet" href="/assets/css/shared.css">
  <!-- Load PayPal SDK with vault=true for subscriptions -->
  <script src="https://www.paypal.com/sdk/js?client-id=AR7igvBzCZr6spSQ8DswwyQ28fU5U9hY0JwFGHcQmI7NZ5M8kvgPAqqQEN9xPPo5E1UNl-om-OWnscI3&currency=USD&vault=true"></script>
  <style>
    /* All styles remain the same as before */
    /* ... keep all existing styles ... */
    .paypal-buttons { width: 100% !important; }
    .paypal-button { border-radius: 40px !important; font-weight: 600 !important; transition: 0.2s !important; }
    .paypal-button:hover { transform: scale(1.02) !important; }
    .paypal-button-number-0 { background-color: #10b981 !important; }
    .paypal-button-number-0:hover { background-color: #059669 !important; }
  </style>
  <meta name="referrer" content="origin">
</head>
<body>

<div id="header-placeholder"></div>

<main class="container">
  <!-- same header and discord section as before -->
  <h1 class="membership-title" id="membershipTitle">✨ Choose Your Membership</h1>
  <p class="membership-description" id="membershipDescription">Support my work and unlock exclusive perks</p>

  <div class="discord-section">
    <div class="discord-input">
      <label for="discordId" id="discordIdLabel">Your Discord ID <span style="color:#ef4444;">*</span></label>
      <input type="text" id="discordId" placeholder="e.g., 123456789012345678" value="" required>
      <!-- ... help text etc ... -->
    </div>
    <!-- ... note box etc ... -->
  </div>

<div class="carousel-container">
<div class="carousel-scroll" id="tierCarousel">
  <!-- Tier 1: Bronze -->
  <div class="tier-card" data-tier="1">
    <img src="https://www.velutinx.com/i/packmembership-1-1.jpg" alt="Bronze" style="width:100%; height:auto; border-radius:8px; margin-bottom:1rem;">
    <div class="tier-header">
      <span class="tier-star">...</span>
      <h3 class="tier-title" id="tier1Title">BRONZE</h3>
    </div>
    <div class="tier-price" data-price-usd="5"><span class="price-value"></span> <span class="per-month">/ month</span></div>
    <ul class="tier-perks">...</ul>
    <div class="button-row">
      <div class="month-selector-container">...</div>
      <button class="membership-btn btn-monthly" data-tier="1" data-type="monthly">Add to Cart</button>
      <!-- Subscription button container -->
      <div id="paypal-subscribe-container-1" class="paypal-subscribe-container" data-tier="1"></div>
    </div>
  </div>

  <!-- Tier 2–5 similar, but we'll keep them as is for now -->
  <!-- ... -->
</div>
</div>
</main>

<script src="/assets/js/shared.js"></script>
<script src="/s/js/translations.js"></script>

<script>
  // ============================================================================
  // All helper functions (getTranslation, formatLocalPrice, fetchConversions, etc.)
  // Keep them exactly as in your original membership.html
  // ============================================================================

  // ============================================================================
  // Main initialization after header is ready
  // ============================================================================
  document.addEventListener('headerReady', async () => {
    // ... remove old cart elements, build custom cart UI (same as before) ...

    // Load conversions
    await fetchConversions();

    // Fetch plan IDs from your worker
    const planResponse = await fetch('https://subscription-worker.velutinx.workers.dev/api/subscription-plans');
    const planIds = await planResponse.json();

    // Function to render subscription buttons (direct PayPal button, using the current Discord ID)
    function renderSubscriptionButtons() {
      const discordId = document.getElementById('discordId')?.value.trim();
      const isValidId = discordId && /^\d{17,19}$/.test(discordId);

      for (let tier = 1; tier <= 5; tier++) {
        const container = document.getElementById(`paypal-subscribe-container-${tier}`);
        if (!container) continue;

        const planId = planIds[tier];
        if (!planId) {
          container.innerHTML = '<button class="membership-btn btn-subscribe disabled" disabled>Plan not ready</button>';
          continue;
        }

        container.innerHTML = ''; // clear

        if (!isValidId) {
          const placeholderBtn = document.createElement('button');
          placeholderBtn.className = 'membership-btn btn-subscribe disabled';
          placeholderBtn.textContent = getTranslation('enterDiscordFirst', 'Enter Discord ID first');
          placeholderBtn.disabled = true;
          container.appendChild(placeholderBtn);
          continue;
        }

        // Render the PayPal subscription button directly
        paypal.Buttons({
          style: {
            label: 'subscribe',
            color: 'blue',
            shape: 'pill',
            height: 40
          },
          createSubscription: function(data, actions) {
            return actions.subscription.create({
              plan_id: planId,
              custom_id: JSON.stringify({ discordId: discordId, tier: tier })
            });
          },
          onApprove: async function(data, actions) {
            const subscriptionId = data.subscriptionID;
            const response = await fetch('https://subscription-worker.velutinx.workers.dev/api/store-subscription', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                discordId: discordId,
                subscriptionId: subscriptionId,
                tier: tier,
                planId: planId
              })
            });
            if (response.ok) {
              alert('Subscription started! Your role will be added shortly.');
            } else {
              const error = await response.text();
              console.error('Store subscription error:', error);
              alert('There was an error storing your subscription. Please contact support.');
            }
          },
          onError: function(err) {
            console.error(err);
            alert('Could not start subscription. Please try again.');
          }
        }).render(container);
      }
    }

    // Function to enable/disable monthly buttons based on Discord ID
    function updateMonthlyButtonsState() {
      const discordId = document.getElementById('discordId')?.value.trim();
      const isValidId = discordId && /^\d{17,19}$/.test(discordId);
      const monthlyBtnText = getTranslation('addToCart', 'Add to Cart');
      const disabledText = getTranslation('enterDiscordFirstMonthly', 'Enter Discord ID first');

      for (let tier = 1; tier <= 5; tier++) {
        const monthlyBtn = document.querySelector(`.tier-card[data-tier="${tier}"] .membership-btn[data-type="monthly"]`);
        if (!monthlyBtn) continue;

        if (!isValidId) {
          monthlyBtn.textContent = disabledText;
          monthlyBtn.classList.add('disabled');
          monthlyBtn.disabled = true;
        } else {
          monthlyBtn.textContent = monthlyBtnText;
          monthlyBtn.classList.remove('disabled');
          monthlyBtn.disabled = false;
        }
      }
    }

    // Initial render
    renderSubscriptionButtons();
    updateMonthlyButtonsState();

    // Re‑render when Discord ID changes
    const discordInput = document.getElementById('discordId');
    if (discordInput) {
      discordInput.addEventListener('input', () => {
        renderSubscriptionButtons();
        updateMonthlyButtonsState();
      });
    }

    // Setup dropdowns and monthly button listeners (same as before)
    setupDropdowns();
    attachButtonListeners();

    // Initial UI updates
    updateCartUI();
    updateMembershipButtons();
    updateMembershipText();

    // Listen for language changes
    document.addEventListener('languageChanged', (e) => {
      localStorage.setItem('language', e.detail.language);
      updateMembershipText();
      updateMembershipButtons();
      updateCartUI();
      updateMonthlyButtonsState();
      renderSubscriptionButtons();
    });
  });

  // ... other functions (setupDropdowns, attachButtonListeners, updateCartUI, etc.) remain unchanged ...
</script>
</body>
</html>
