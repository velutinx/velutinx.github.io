<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX — Poll</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>

  <style>
    :root {
      --bg: #d4d0c1;
      --divider: #aa9e76;
      --text: #111;
      --bg-dark: #0f0f12;
      --divider-dark: #6f6a4e;
      --text-dark: #e6e3d8;
    }

    .background-wrapper {
      position: fixed;
      inset: 0;
      z-index: -10;
      pointer-events: none;
      overflow: hidden;
    }
    .background-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(132deg, #734128 0%, #C7A07A 25%, #E2CEB1 50%, #FDFCE8 75%, #391E10 100%);
      background-size: 300% 300%;
      animation: gradientFlow 28s ease infinite;
    }
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .wave-overlay {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.10;
      mix-blend-mode: overlay;
      animation: slowDrift 140s linear infinite;
      pointer-events: none;
    }
    @keyframes slowDrift {
      0%   { transform: translate3d(0,0,0) scale(1.015); }
      50%  { transform: translate3d(4%,6%,0) scale(1.045); }
      100% { transform: translate3d(0,0,0) scale(1.015); }
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(253,252,232,0.28);
      z-index: -9;
      pointer-events: none;
      backdrop-filter: blur(1.5px);
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: var(--text);
      background: transparent;
      overflow-x: hidden;
    }
    body.dark {
      color: var(--text-dark);
    }
    body.dark .background-gradient {
      background: linear-gradient(135deg, #00030f 0%, #000814 20%, #0a1125 40%, #001220 60%, #0b142b 80%, #00030f 100%);
      background-size: 400% 400%;
      animation: darkNebulaFlow 55s ease infinite;
    }
    @keyframes darkNebulaFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body.dark::before {
      background: rgba(15,15,18,0.45);
    }
    body.dark .wave-overlay {
      opacity: 0.14;
      mix-blend-mode: soft-light;
    }

    .poll-section {
      max-width: 1600px;
      margin: 0 auto;
      padding: 40px 24px;
      position: relative;
    }
    .poll-title {
      text-align: center;
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .poll-subtitle {
      text-align: center;
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .big-card {
      position: absolute;
      top: 23%;
      transform: translateY(-50%);
      width: 500px;
      height: 750px;
      border-radius: 24px;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 15;
      background: transparent;
      border: 2px solid var(--divider);
      backdrop-filter: blur(8px);
    }
    body.dark .big-card { border-color: var(--divider-dark); }
    .big-card.show { opacity: 1; }
    .big-card img { width: 100%; height: 100%; object-fit: contain; }
    #leftBig  { left: -375px; }
    #rightBig { right: -375px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }
    .card {
      background: transparent;
      border: 2px solid var(--divider);
      border-radius: 12px;
      padding: 8px;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s ease;
      backdrop-filter: blur(8px);
    }
    body.dark .card { border-color: var(--divider-dark); }
    .card:hover {
      transform: scale(1.05);
      animation: blobWobble 1.6s ease-in-out infinite;
    }
    @keyframes blobWobble {
      0%   { transform: scale(1.05) rotate(0deg); }
      25%  { transform: scale(1.05) rotate(-4deg); }
      50%  { transform: scale(1.05) rotate(4deg); }
      75%  { transform: scale(1.05) rotate(-3deg); }
      100% { transform: scale(1.05) rotate(0deg); }
    }

    .card.active-vote {
      border-color: #5a8cff !important;
      box-shadow: 0 0 15px rgba(90,140,255,0.4);
    }
    .card.active-vote::before {
      content: '✓';
      position: absolute;
      top: -8px;
      right: -8px;
      background: #5a8cff;
      color: white;
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      z-index: 20;
    }

    .card.winner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: url('https://www.velutinx.com/images/cross.png') center / 65% no-repeat;
      opacity: 0.65;
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: multiply;
      animation: pulseCross 2.8s ease-in-out infinite;
    }
    body.dark .card.winner::after {
      mix-blend-mode: screen;
      opacity: 0.75;
    }
    @keyframes pulseCross {
      0%,100% { opacity: 0.50; }
      50%     { opacity: 0.80; }
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .progress {
      position: absolute;
      left: 8px; right: 8px; bottom: 26px;
      height: 18px;
      border-radius: 9px;
      background: rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5a8cff, #8fb6ff);
      transition: width 0.8s ease;
    }
    .progress-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 11px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .label {
      margin-top: 6px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
    }

    .bottom {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      margin-top: 60px;
    }

    #leaderboard {
      background: transparent;
      border: 2px solid var(--divider);
      padding: 16px;
      border-radius: 12px;
      min-width: 280px;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    body.dark #leaderboard {
      border-color: var(--divider-dark);
    }

    .leaderboard-entry {
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
    }
    body.dark .leaderboard-entry {
      border-bottom-color: rgba(255,255,255,0.08);
    }
    .leaderboard-entry.spoiled {
      opacity: 0.5;
      text-decoration: line-through;
      filter: blur(5px);
      user-select: none;
      cursor: default;
      transition: filter 0.9s ease-out, transform 0.5s ease;
    }
    .leaderboard-entry.spoiled:hover {
      filter: blur(0) brightness(1.08);
      transform: scale(1.015);
    }

    .icon-link img {
      width: 180px;
      transition: transform 0.25s ease;
    }
    .icon-link img:hover {
      transform: scale(1.1);
    }

    .tooltip {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .discord-disclaimer {
      font-size: 13px;
      margin-top: 8px;
      opacity: 0.85;
    }

    @media (max-width: 1200px) {
      .big-card { display: none; }
      .grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 800px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
      .bottom { flex-direction: column; align-items: center; }
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 24px;
      width: 54px;
      height: 28px;
      background: rgba(255,255,255,0.15);
      border: 2px solid var(--divider);
      border-radius: 999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 3px;
      z-index: 9999;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }
    body.dark .theme-toggle {
      border-color: var(--divider-dark);
    }
    .theme-knob {
      width: 22px;
      height: 22px;
      background: #000;
      border-radius: 50%;
      transition: transform 0.4s ease;
    }
    body.dark .theme-knob {
      transform: translateX(26px);
      background: #e6e3d8;
    }

    #langContainer {
      position: fixed;
      top: 80px;
      right: 24px;
      z-index: 10000;
    }
    .lang-btn {
      width: 54px;
      height: 54px;
      background: rgba(255,255,255,0.15);
      border: 2px solid var(--divider);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.3s;
    }
    body.dark .lang-btn { border-color: var(--divider-dark); }
    .lang-btn:hover { transform: scale(1.1); }

    #languagePopover {
      position: absolute;
      top: 0;
      right: 100%;
      margin-right: 12px;
      background: rgba(255,255,255,0.92);
      border: 2px solid var(--divider);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      min-width: 220px;
      padding: 8px 0;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-12px);
      transition: all 0.35s ease;
      backdrop-filter: blur(8px);
    }
    body.dark #languagePopover {
      background: rgba(20,20,28,0.92);
      border-color: var(--divider-dark);
    }
    #langContainer:hover #languagePopover {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }
    .lang-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
    }
    .lang-item:hover {
      background: rgba(170,158,118,0.2);
    }
    .lang-item img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }

    .lang-swipe {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      height: 20%;
      background: var(--divider);
      z-index: 99999;
      pointer-events: none;
    }
    .lang-swipe.active {
      animation: langSwipeUp 0.55s ease-in forwards;
    }
    @keyframes langSwipeUp {
      to { bottom: 100%; }
    }
  </style>
</head>
<body>

<div class="lang-swipe" id="langSwipe"></div>

<div class="background-wrapper">
  <div class="background-gradient"></div>
  <div class="wave-overlay"></div>
</div>

<div id="langContainer">
  <button class="lang-btn">🌐</button>
  <div id="languagePopover">
    <div class="lang-item" data-lang="en"><img src="https://flagcdn.com/w40/us.png" alt="EN"/> English</div>
    <div class="lang-item" data-lang="ja"><img src="https://flagcdn.com/w40/jp.png" alt="JA"/> 日本語</div>
    <div class="lang-item" data-lang="zh"><img src="https://flagcdn.com/w40/cn.png" alt="ZH"/> 简体中文</div>
    <div class="lang-item" data-lang="es"><img src="https://flagcdn.com/w40/mx.png" alt="ES"/> Español</div>
  </div>
</div>

<div class="theme-toggle" id="themeToggle"><div class="theme-knob"></div></div>

<div id="page">
  <section class="poll-section">
    <h1 class="poll-title" data-i18n="pollTitle">Vote for Your Favorite Character</h1>
    <p class="poll-subtitle" data-i18n="pollSubtitle">Click once — you can change your vote anytime</p>

    <div class="poll-page">
      <div class="big-card" id="leftBig"><img id="leftImg" src="https://www.velutinx.com/images/poll/1.jpg"></div>
      <div class="big-card" id="rightBig"><img id="rightImg" src="https://www.velutinx.com/images/poll/1.jpg"></div>

      <div class="center">
        <div class="grid" id="grid"></div>

        <div class="bottom">
          <div id="leaderboard">
            <h3 data-i18n="leaderboardTitle">Leaderboard</h3>
            <div class="tooltip" data-i18n="leaderboardTooltip">Website + Discord votes</div>
            <div id="results">Loading…</div>
          </div>

          <div class="icon-wrapper">
            <a class="icon-link" href="https://discord.gg/XF363uYfSh" target="_blank">
              <img src="https://www.velutinx.com/images/LogoDiscord.png" alt="Discord">
            </a>
            <div class="discord-disclaimer" data-i18n="discordDisclaimer">Join discord for an extra vote!!</div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
// Supabase config
const S_URL = "https://knbvlyngmjaxndkiqggl.supabase.co";
const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuYnZseW5nbWpheG5ka2lxZ2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjI0NzEsImV4cCI6MjA4NjM5ODQ3MX0.mxthCDB6dCaHcEDMFN48pFnaJmcBbilXfP7tL-YAV08";

const sb = supabase.createClient(S_URL, S_KEY, { auth: { persistSession: false } });

const POLL_ID = "character_poll_new";
const TOTAL_CARDS = 12;

const grid = document.getElementById("grid");
const resultsBox = document.getElementById("results");

let fpPromise = null;

// Cookie helpers
function setVoteCookie(optionId) {
  const d = new Date();
  d.setTime(d.getTime() + 30*24*60*60*1000);
  document.cookie = `votedPoll=${optionId}; expires=${d.toUTCString()}; path=/`;
}
function getVoteCookie() {
  const name = 'votedPoll=';
  const ca = document.cookie.split(';');
  for (let c of ca) {
    c = c.trim();
    if (c.startsWith(name)) return c.substring(name.length);
  }
  return null;
}

// Fingerprint
async function initFingerprint() {
  const fp = await FingerprintJS.load();
  const result = await fp.get();
  return result.visitorId;
}

// Create cards
for (let i = 1; i <= TOTAL_CARDS; i++) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id = i;
  card.innerHTML = `
    <img src="https://www.velutinx.com/images/poll/${i}.jpg" loading="lazy">
    <div class="progress"><div class="progress-fill"></div><div class="progress-text">0%</div></div>
    <div class="label">Loading...</div>
  `;
  card.onclick = () => { showSelected(i); castVote(i); };
  grid.appendChild(card);
}

// Voting
async function castVote(id) {
  try {
    let visitorId;
    try {
      visitorId = await fpPromise;
    } catch {
      const res = await fetch('https://api.ipify.org?format=json');
      const { ip } = await res.json();
      visitorId = ip;
    }

    await sb.from('website_voting').upsert(
      { voter_id: visitorId, option_id: id, poll_id: POLL_ID },
      { onConflict: 'voter_id' }
    );

    localStorage.setItem('voted_id', id);
    setVoteCookie(id);
    updateCardStyles(id);
    fetchGridResults();
  } catch (err) {
    console.error("Vote failed", err);
  }
}

// Grid results (website votes only)
async function fetchGridResults() {
  const { data, error } = await sb.from('website_voting')
    .select('option_id')
    .eq('poll_id', POLL_ID);

  if (error) return;

  const counts = {};
  for (let i = 1; i <= TOTAL_CARDS; i++) counts[i] = 0;
  data.forEach(v => { if (counts[v.option_id] !== undefined) counts[v.option_id]++; });

  const total = data.length || 1;

  document.querySelectorAll(".card").forEach(card => {
    const id = Number(card.dataset.id);
    const percent = Math.round((counts[id] / total) * 100);
    card.querySelector(".progress-fill").style.width = percent + "%";
    card.querySelector(".progress-text").textContent = percent + "%";
  });
}

// FIXED: Now uses poll_result (the table Supabase actually has) + selected_at for winners
async function fetchLeaderboard() {
  try {
    const { data: rows, error } = await sb.from('poll_result')
      .select('option_id, character_name, score, selected_at')
      .eq('poll_id', POLL_ID)
      .order('score', { ascending: false });

    if (error) throw error;

    // Winners = rows where selected_at IS NOT NULL
    const winnerIds = new Set(
      rows
        .filter(r => r.selected_at !== null && r.selected_at !== '')
        .map(r => Number(r.option_id))
    );

    // Populate leaderboard
    resultsBox.innerHTML = rows.map(r => {
      const id = Number(r.option_id);
      const isWinner = winnerIds.has(id);
      return `<div class="leaderboard-entry ${isWinner ? 'spoiled' : ''}">
        <span>${r.character_name || `Option ${id}`}</span>
        <span>${Number(r.score || 0).toFixed(1)}</span>
      </div>`;
    }).join('') || "No votes yet";

    // Sync names + winner cross overlay
    document.querySelectorAll(".card").forEach(card => {
      const id = Number(card.dataset.id);
      const row = rows.find(r => Number(r.option_id) === id);
      if (row?.character_name) {
        card.querySelector(".label").textContent = row.character_name;
      }
      card.classList.toggle("winner", winnerIds.has(id));
    });
  } catch (err) {
    console.error("Leaderboard error:", err);
    resultsBox.innerHTML = "Error loading leaderboard – check console";
  }
}

function updateCardStyles(votedId) {
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('active-vote', Number(c.dataset.id) === votedId);
  });
}

// Big card preview
function showSelected(id) {
  const left = document.getElementById("leftBig");
  left.classList.remove("show");
  setTimeout(() => {
    document.getElementById("leftImg").src = `https://www.velutinx.com/images/poll/${id}.jpg`;
    left.classList.add("show");
  }, 150);
}

let rotateIndex = 1;
function rotate() {
  const right = document.getElementById("rightBig");
  right.classList.remove("show");
  setTimeout(() => {
    document.getElementById("rightImg").src = `https://www.velutinx.com/images/poll/${rotateIndex}.jpg`;
    right.classList.add("show");
    rotateIndex = (rotateIndex % TOTAL_CARDS) + 1;
  }, 150);
}

// Init
async function init() {
  fpPromise = initFingerprint().catch(() => null);

  await Promise.all([fetchGridResults(), fetchLeaderboard()]);

  const saved = localStorage.getItem('voted_id') || getVoteCookie();
  if (saved) updateCardStyles(Number(saved));

  // Realtime listeners
  sb.channel('grid-refresh')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'website_voting' }, fetchGridResults)
    .subscribe();

  sb.channel('board-refresh')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'poll_result' }, fetchLeaderboard)
    .subscribe();

  setInterval(rotate, 3500);
  rotate();
  showSelected(1);
}

init();

// Dark mode
if (localStorage.getItem("darkMode") === "true") document.body.classList.add("dark");
document.getElementById("themeToggle").onclick = () => {
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
};

// Embedded translations
const translations = {
  poll: {
    en: { pollTitle: "Vote for Your Favorite Character", pollSubtitle: "Click once — you can change your vote anytime", leaderboardTitle: "Leaderboard", leaderboardTooltip: "Website + Discord votes", discordDisclaimer: "Join discord for an extra vote!!" },
    ja: { pollTitle: "お気に入りのキャラクターに投票", pollSubtitle: "一度クリック — いつでも投票を変更できます", leaderboardTitle: "リーダーボード", leaderboardTooltip: "ウェブサイト + Discord 投票", discordDisclaimer: "追加投票のためにDiscordに参加!!" },
    zh: { pollTitle: "为你最喜欢的角色投票", pollSubtitle: "点击一次 — 随时可以更改投票", leaderboardTitle: "排行榜", leaderboardTooltip: "网站 + Discord 投票", discordDisclaimer: "加入Discord获得额外一票!!" },
    es: { pollTitle: "Vota por tu personaje favorito", pollSubtitle: "Haz clic una vez — puedes cambiar tu voto cuando quieras", leaderboardTitle: "Tabla de clasificación", leaderboardTooltip: "Votos del sitio web + Discord", discordDisclaimer: "¡Únete al Discord para un voto extra!!" }
  }
};

let currentLanguage = localStorage.getItem('language') || 'en';

function applyTranslations() {
  const t = translations.poll[currentLanguage] || translations.poll.en;
  document.querySelector('[data-i18n="pollTitle"]').textContent = t.pollTitle;
  document.querySelector('[data-i18n="pollSubtitle"]').textContent = t.pollSubtitle;
  document.querySelector('[data-i18n="leaderboardTitle"]').textContent = t.leaderboardTitle;
  document.querySelector('[data-i18n="leaderboardTooltip"]').textContent = t.leaderboardTooltip;
  document.querySelector('[data-i18n="discordDisclaimer"]').textContent = t.discordDisclaimer;
}

function setLanguage(lang) {
  if (!['en','ja','zh','es'].includes(lang)) lang = 'en';
  currentLanguage = lang;
  localStorage.setItem('language', lang);

  const swipe = document.getElementById('langSwipe');
  if (swipe) {
    swipe.classList.remove('active');
    void swipe.offsetHeight;
    swipe.classList.add('active');
  }
  applyTranslations();
}

document.querySelectorAll('.lang-item').forEach(item => {
  item.addEventListener('click', () => setLanguage(item.dataset.lang));
});

applyTranslations();
</script>
</body>
</html>
