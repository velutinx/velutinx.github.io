<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX — Poll</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <!-- Header CSS -->
  <link rel="stylesheet" href="/assets/css/mainheader.css">
  <!-- Supabase & fingerprint -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
  <style>
    /* Override header background */
    .top-nav {
      background: var(--bg) !important;
      backdrop-filter: none !important;
      border-bottom: 1px solid var(--border);
    }
    /* Hide store button and cart icons */
    .poll-page .store-btn,
    .poll-page .cart-wrapper,
    .poll-page .floating-cart {
      display: none !important;
    }
    /* Discord link wobble */
    .icon-link img {
      transition: transform 0.25s ease;
    }
    .icon-link:hover img {
      animation: blobWobble 1.6s ease-in-out infinite;
    }
    @keyframes blobWobble {
      0% { transform: scale(1.15) rotate(0deg); }
      25% { transform: scale(1.15) rotate(-4deg); }
      50% { transform: scale(1.15) rotate(4deg); }
      75% { transform: scale(1.15) rotate(-3deg); }
      100% { transform: scale(1.15) rotate(0deg); }
    }

    /* ==================== POLL STYLES ==================== */
    .poll-section {
      max-width: 1600px;
      margin: 0 auto;
      padding: 40px 24px;
      position: relative;
    }
    .poll-title {
      text-align: center;
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .poll-subtitle {
      text-align: center;
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 40px;
    }
    .poll-page {
      position: relative;
    }
    .big-card {
      position: absolute;
      top: 23%;
      transform: translateY(-50%);
      width: 500px;
      height: 750px;
      border-radius: 24px;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 15;
    }
    .big-card.show { opacity: 1; }
    .big-card img { width: 100%; height: 100%; object-fit: contain; }
    #leftBig { left: -375px; }
    #rightBig { right: -375px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }
    .card {
      background: rgba(245,241,223,0.97);
      border: 3px solid #ffffff;
      border-radius: 12px;
      padding: 8px;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s ease, border-color 0.3s ease;
    }
    body.dark .card {
      background: rgba(30, 30, 35, 0.97);
      border: 3px solid #444;
    }
    .card:hover {
      transform: scale(1.05);
      animation: blobWobble 1.6s ease-in-out infinite;
    }
    .card.active-vote {
      border-color: #5a8cff !important;
      box-shadow: 0 0 15px rgba(90, 140, 255, 0.4);
    }
    .card.active-vote::before {
      content: '✓';
      position: absolute;
      top: -8px;
      right: -8px;
      background: #5a8cff;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      z-index: 20;
    }
    /* Winner overlay (cross) */
    .card.winner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: url('https://www.velutinx.com/images/cross.png') center / 65% no-repeat;
      opacity: 0.65;
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: multiply;
      animation: pulseCross 2.8s ease-in-out infinite;
    }
    body.dark .card.winner::after {
      mix-blend-mode: screen;
      opacity: 0.75;
    }
    @keyframes pulseCross {
      0%, 100% { opacity: 0.50; }
      50% { opacity: 0.80; }
    }
    .card img { width: 100%; border-radius: 8px; }
    .progress {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 26px;
      height: 18px;
      border-radius: 9px;
      background: rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#5a8cff,#8fb6ff);
      transition: width 0.8s ease;
    }
    .progress-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 11px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
    .label {
      margin-top: 6px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
    }
    .bottom {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      margin-top: 60px;
    }
    #leaderboard {
      background: rgba(255,255,255,0.9);
      border: 3px solid #ffffff;
      padding: 16px;
      border-radius: 12px;
      min-width: 280px;
      text-align: center;
    }
    body.dark #leaderboard {
      background: rgba(30, 30, 35, 0.9);
      border: 3px solid #444;
      color: #fff;
    }
    .leaderboard-entry {
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
    }
    .leaderboard-entry.spoiled {
      opacity: 0.5;
      text-decoration: line-through;
    }
    .icon-link img { width: 180px; transition: transform 0.25s ease; }
    .icon-link img:hover { transform: scale(1.1); }
    @media (max-width: 1200px) {
      .big-card { display: none; }
      .grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 800px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
      .bottom { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body class="poll-page">

  <div class="lang-swipe" id="langSwipe"></div>

  <div id="page">
    <div id="navContainer"></div>
    <div class="divider"></div>

    <section class="poll-section">
      <h1 class="poll-title">Vote for Your Favorite Character</h1>
      <p class="poll-subtitle">Click once — you can change your vote anytime</p>

      <div class="poll-page">
        <div class="big-card" id="leftBig"><img id="leftImg" src="https://www.velutinx.com/images/poll/1.jpg"></div>
        <div class="big-card" id="rightBig"><img id="rightImg" src="https://www.velutinx.com/images/poll/1.jpg"></div>

        <div class="center">
          <div class="grid" id="grid"></div>
          <div class="bottom">
            <div id="leaderboard">
              <h3>Leaderboard</h3>
              <div class="tooltip">Website + Discord votes</div>
              <div id="results">Loading…</div>
            </div>
            <div class="icon-wrapper">
              <a class="icon-link" href="https://discord.gg/XF363uYfSh" target="_blank">
                <img src="https://www.velutinx.com/images/LogoDiscord.png" alt="Discord">
              </a>
              <div class="discord-disclaimer">Join discord for an extra vote!!</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="divider"></div>
  </div>

  <!-- Scripts -->
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/mainheader.js"></script>
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // ==================== SUPABASE & POLL LOGIC ====================
    const S_URL = "https://knbvlyngmjaxndkiqggl.supabase.co".trim();
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuYnZseW5nbWpheG5ka2lxZ2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjI0NzEsImV4cCI6MjA4NjM5ODQ3MX0.mxthCDB6dCaHcEDMFN48pFnaJmcBbilXfP7tL-YAV08".trim();
    const sb = supabase.createClient(S_URL, S_KEY, { auth: { persistSession: false } });

    const POLL_ID = "character_poll_new";
    const TOTAL_CARDS = 12;
    const grid = document.getElementById("grid");
    const resultsBox = document.getElementById("results");

    let fpPromise = null;

    // Cookie helpers
    function setVoteCookie(optionId) {
      const d = new Date();
      d.setTime(d.getTime() + 30 * 24 * 60 * 60 * 1000);
      document.cookie = `votedPoll=${optionId}; expires=${d.toUTCString()}; path=/`;
    }
    function getVoteCookie() {
      const name = 'votedPoll=';
      const decodedCookie = decodeURIComponent(document.cookie);
      const ca = decodedCookie.split(';');
      for (let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) == ' ') c = c.substring(1);
        if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
      }
      return null;
    }

    async function initFingerprint() {
      const fp = await FingerprintJS.load();
      const result = await fp.get();
      return result.visitorId;
    }

    // Create grid cards
    for (let i = 1; i <= TOTAL_CARDS; i++) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = i;
      card.innerHTML = `
        <img src="https://www.velutinx.com/images/poll/${i}.jpg" loading="lazy">
        <div class="progress"><div class="progress-fill"></div><div class="progress-text">0%</div></div>
        <div class="label">Loading...</div>
      `;
      card.onclick = () => { showSelected(i); castVote(i); };
      grid.appendChild(card);
    }

    async function castVote(id) {
      try {
        let visitorId;
        try {
          visitorId = await fpPromise;
        } catch (e) {
          console.warn('Fingerprint failed, using IP fallback', e);
          const ipRes = await fetch('https://api.ipify.org?format=json');
          const { ip } = await ipRes.json();
          visitorId = ip;
        }

        await sb.from('website_voting').upsert(
          { voter_id: visitorId, option_id: id, poll_id: POLL_ID },
          { onConflict: 'voter_id' }
        );

        localStorage.setItem('voted_id', id);
        setVoteCookie(id);
        updateCardStyles(id);
        fetchGridResults(); // immediate refresh
      } catch (err) { console.error("Vote failed", err); }
    }

    async function fetchGridResults() {
      const { data, error } = await sb.from('website_voting').select('option_id').eq('poll_id', POLL_ID);
      if (error) return;
      const counts = {};
      for (let i = 1; i <= TOTAL_CARDS; i++) counts[i] = 0;
      data.forEach(v => { if (counts[v.option_id] !== undefined) counts[v.option_id]++; });
      const total = data.length || 1;
      document.querySelectorAll(".card").forEach(card => {
        const id = Number(card.dataset.id);
        const percent = Math.round((counts[id] / total) * 100);
        card.querySelector(".progress-fill").style.width = percent + "%";
        card.querySelector(".progress-text").textContent = percent + "%";
      });
    }

    async function fetchLeaderboard() {
      try {
        // Get winners (selected_at not null)
        const { data: winners, error: winError } = await sb
          .from('poll_winners')
          .select('option_id')
          .eq('poll_id', POLL_ID)
          .not('selected_at', 'is', null);
        const winnerIds = new Set(winners?.map(w => Number(w.option_id)) || []);

        // Get scores from final_votes
        const { data: rows, error } = await sb
          .from('final_votes')
          .select('option_id, character_name, score')
          .eq('poll_id', POLL_ID)
          .order('score', { ascending: false });

        if (error) throw error;

        resultsBox.innerHTML = rows.map(r => {
          const id = Number(r.option_id);
          const isWinner = winnerIds.has(id);
          return `<div class="leaderboard-entry ${isWinner ? 'spoiled' : ''}">
            <span>${r.character_name || `Option ${id}`}</span>
            <span>${Number(r.score || 0).toFixed(1)}</span>
          </div>`;
        }).join('') || "No votes yet";

        // Update card labels and winner overlay
        document.querySelectorAll(".card").forEach(card => {
          const id = Number(card.dataset.id);
          const row = rows.find(r => Number(r.option_id) === id);
          if (row?.character_name) card.querySelector(".label").textContent = row.character_name;
          card.classList.toggle("winner", winnerIds.has(id));
        });
      } catch (err) { console.error("Leaderboard error:", err); }
    }

    function updateCardStyles(votedId) {
      document.querySelectorAll('.card').forEach(c => {
        c.classList.toggle('active-vote', Number(c.dataset.id) === votedId);
      });
    }

    async function init() {
      fpPromise = initFingerprint().catch(() => null);
      await Promise.all([fetchGridResults(), fetchLeaderboard()]);
      const saved = localStorage.getItem('voted_id') || getVoteCookie();
      if (saved) updateCardStyles(Number(saved));

      // Real-time subscriptions (separate channels to ensure they work)
      sb.channel('grid-updates')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'website_voting' }, fetchGridResults)
        .subscribe();

      sb.channel('leaderboard-updates')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'final_votes' }, fetchLeaderboard)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'poll_winners' }, fetchLeaderboard)
        .subscribe();
    }

    // Visual helpers
    let rotateIndex = 1;
    function showSelected(id) {
      const left = document.getElementById("leftBig");
      left.classList.remove("show");
      setTimeout(() => {
        document.getElementById("leftImg").src = `https://www.velutinx.com/images/poll/${id}.jpg`;
        left.classList.add("show");
      }, 150);
    }
    function rotate() {
      const right = document.getElementById("rightBig");
      right.classList.remove("show");
      setTimeout(() => {
        document.getElementById("rightImg").src = `https://www.velutinx.com/images/poll/${rotateIndex}.jpg`;
        right.classList.add("show");
        rotateIndex = (rotateIndex % TOTAL_CARDS) + 1;
      }, 150);
    }

    setInterval(rotate, 3500);
    rotate(); showSelected(1); init();

    // Dark mode from localStorage
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }

    // Apply poll translations
    if (typeof window.applyTranslations === 'function') {
      window.applyTranslations('poll');
      document.addEventListener('languageChanged', () => {
        window.applyTranslations('poll');
      });
    }
  </script>
</body>
</html>
