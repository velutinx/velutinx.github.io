<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX — Poll</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <!-- Shared header CSS -->
  <link rel="stylesheet" href="/assets/css/shared.css">
  <!-- Shared page styles (includes poll styles, star effects) -->
  <link rel="stylesheet" href="/assets/css/format.css">
  <!-- Supabase & fingerprint -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
  <style>
    /* Hide cart and website button on poll page */
    .poll-page .login-btn,
    .poll-page .cart-wrapper,
    .poll-page .floating-cart {
      display: none !important;
    }
    /* Adjust top‑nav background to match page background */
    .poll-page .top-nav {
      background: var(--bg) !important;
      border-bottom: 1px solid var(--border);
    }
    /* Discord logo wobble (same as index) */
    .icon-link img {
      transition: transform 0.25s ease;
    }
    .icon-link:hover img {
      animation: blobWobble 1.6s ease-in-out infinite;
    }
  </style>
</head>
<body class="poll-page">

  <!-- Header will be injected here by shared.js -->
  <div id="header-placeholder"></div>

  <div class="divider"></div>

  <section class="poll-section">
    <h1 class="poll-title">Vote for Your Favorite Character</h1>
    <p class="poll-subtitle">Click once — you can change your vote anytime</p>

    <div class="poll-page">
      <div class="big-card" id="leftBig"><img id="leftImg" src="https://www.velutinx.com/images/poll/1.jpg"></div>
      <div class="big-card" id="rightBig"><img id="rightImg" src="https://www.velutinx.com/images/poll/1.jpg"></div>

      <div class="center">
        <div class="grid" id="grid"></div>
        <div class="bottom">
          <div id="leaderboard">
            <h3>Leaderboard</h3>
            <div class="tooltip">Website + Discord votes</div>
            <div id="results">Loading…</div>
          </div>
          <div class="icon-wrapper">
            <a class="icon-link" href="https://discord.gg/XF363uYfSh" target="_blank">
              <img src="https://www.velutinx.com/images/LogoDiscord.png" alt="Discord">
            </a>
            <div class="discord-disclaimer">Join discord for an extra vote!!</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- Shared header JS (injects header, sidebar, cart, etc.) -->
  <script src="/assets/js/shared.js"></script>
  <!-- Page‑specific scripts (translations, format, tab animation) -->
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // ==================== POLL TRANSLATIONS ====================
    function applyPollTranslations() {
      if (typeof window.applyTranslations === 'function') {
        window.applyTranslations('poll');
      }
    }

    // Initial apply (when page loads)
    applyPollTranslations();

    // When language changes via shared header, update translt.js and reapply
    document.addEventListener('languageChanged', (e) => {
      const newLang = e.detail.language;
      if (newLang && typeof window.setLanguage === 'function') {
        window.setLanguage(newLang);
      } else if (newLang) {
        window.currentLanguage = newLang;
      }
      applyPollTranslations();
    });

    // ==================== SUPABASE & POLL LOGIC (unchanged) ====================
    const S_URL = "https://knbvlyngmjaxndkiqggl.supabase.co".trim();
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuYnZseW5nbWpheG5ka2lxZ2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjI0NzEsImV4cCI6MjA4NjM5ODQ3MX0.mxthCDB6dCaHcEDMFN48pFnaJmcBbilXfP7tL-YAV08".trim();
    const sb = supabase.createClient(S_URL, S_KEY, { auth: { persistSession: false } });

    const POLL_ID = "character_poll_new";
    const TOTAL_CARDS = 12;
    const grid = document.getElementById("grid");
    const resultsBox = document.getElementById("results");

    let fpPromise = null;

    // Cookie helpers
    function setVoteCookie(optionId) {
      const d = new Date();
      d.setTime(d.getTime() + 30 * 24 * 60 * 60 * 1000);
      document.cookie = `votedPoll=${optionId}; expires=${d.toUTCString()}; path=/`;
    }
    function getVoteCookie() {
      const name = 'votedPoll=';
      const decodedCookie = decodeURIComponent(document.cookie);
      const ca = decodedCookie.split(';');
      for (let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) == ' ') c = c.substring(1);
        if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
      }
      return null;
    }

    async function initFingerprint() {
      const fp = await FingerprintJS.load();
      const result = await fp.get();
      return result.visitorId;
    }

    // Create grid cards
    for (let i = 1; i <= TOTAL_CARDS; i++) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = i;
      card.innerHTML = `
        <img src="https://www.velutinx.com/images/poll/${i}.jpg" loading="lazy">
        <div class="progress"><div class="progress-fill"></div><div class="progress-text">0%</div></div>
        <div class="label">Loading...</div>
      `;
      card.onclick = () => { showSelected(i); castVote(i); };
      grid.appendChild(card);
    }

async function castVote(id) {
  // 1. Initialize variables outside the try blocks
  let visitorId = 'unknown_fp';
  let currentIp = '0.0.0.0';

  try {
    // 2. Try to get the Fingerprint ID
    try {
      const fp = await FingerprintJS.load();
      const result = await fp.get();
      visitorId = result.visitorId;
    } catch (e) {
      console.warn('Fingerprint failed', e);
    }

    // 3. Try to get the actual IP Address
    try {
      const ipRes = await fetch('https://api.ipify.org?format=json');
      const ipData = await ipRes.json();
      currentIp = ipData.ip;
    } catch (e) {
      console.error("IP fetch failed", e);
    }


    
// 4. Send both to Supabase 
    // We now use 'poll_id, user_ip' to ensure one vote per IP, 
    // but still allow the user to change their mind/choice.
const { data, error } = await sb.from('website_voting').upsert(
      { 
        voter_id: visitorId, 
        user_ip: currentIp, 
        option_id: id, 
        poll_id: POLL_ID 
      },
      { onConflict: 'poll_id, user_ip' } 
    );

    if (error) throw error;

    localStorage.setItem('voted_id', id);
    setVoteCookie(id);
    updateCardStyles(id);
    fetchGridResults();

} catch (err) { 
    console.error("Vote failed:", err.message); 
    
    if (err.message.includes("voting quota")) {
        alert("This network range (VPN/Proxy) is restricted to 1 vote total. Your vote was not counted.");
    } else if (err.message.includes("fingerprint")) {
        alert("Security check failed. Please refresh or disable ad-blockers.");
    } else if (err.message.includes("unique_ip_per_poll")) {
        // This handles the "Exact Duplicate IP" if the upsert fails
        alert("You have already voted from this IP address.");
    } else {
        alert("Something went wrong. Please try again.");
    }
  }
}

    async function fetchGridResults() {
      const { data, error } = await sb.from('website_voting').select('option_id').eq('poll_id', POLL_ID);
      if (error) return;
      const counts = {};
      for (let i = 1; i <= TOTAL_CARDS; i++) counts[i] = 0;
      data.forEach(v => { if (counts[v.option_id] !== undefined) counts[v.option_id]++; });
      const total = data.length || 1;
      document.querySelectorAll(".card").forEach(card => {
        const id = Number(card.dataset.id);
        const percent = Math.round((counts[id] / total) * 100);
        card.querySelector(".progress-fill").style.width = percent + "%";
        card.querySelector(".progress-text").textContent = percent + "%";
      });
    }

    async function fetchLeaderboard() {
      try {
        const { data: rows, error } = await sb
          .from('final_votes')
          .select('option_id, character_name, score, selected_at')
          .eq('poll_id', POLL_ID)
          .order('score', { ascending: false });

        if (error) throw error;

        const winnerIds = new Set();
        rows.forEach(row => {
          if (row.selected_at && row.selected_at !== null) {
            winnerIds.add(Number(row.option_id));
          }
        });

        resultsBox.innerHTML = rows.map(row => {
          const id = Number(row.option_id);
          const isWinner = winnerIds.has(id);
          return `<div class="leaderboard-entry ${isWinner ? 'spoiled' : ''}">
            <span>${row.character_name || `Option ${id}`}</span>
            <span>${Number(row.score || 0).toFixed(1)}</span>
          </div>`;
        }).join('') || "No votes yet";

        document.querySelectorAll(".card").forEach(card => {
          const id = Number(card.dataset.id);
          const row = rows.find(r => Number(r.option_id) === id);
          if (row?.character_name) card.querySelector(".label").textContent = row.character_name;
          card.classList.toggle("winner", winnerIds.has(id));
        });
      } catch (err) {
        console.error("Leaderboard error:", err);
        resultsBox.innerHTML = '<div>Error loading leaderboard</div>';
      }
    }

    function updateCardStyles(votedId) {
      document.querySelectorAll('.card').forEach(c => {
        c.classList.toggle('active-vote', Number(c.dataset.id) === votedId);
      });
    }

async function init() {
  // 1. Initial Data Fetch
  fpPromise = initFingerprint().catch(() => null);
  await Promise.all([fetchGridResults(), fetchLeaderboard()]);
  
  const saved = localStorage.getItem('voted_id') || getVoteCookie();
  if (saved) updateCardStyles(Number(saved));

  // 2. Real-time for Progress Bars (website_voting table)
  sb.channel('grid-live')
    .on('postgres_changes', 
        { event: '*', schema: 'public', table: 'website_voting' }, 
        () => {
          console.log('Grid update detected!');
          fetchGridResults();
        })
    .subscribe();

  // 3. Real-time for Leaderboard (final_votes table)
  sb.channel('leaderboard-live')
    .on('postgres_changes', 
        { event: 'UPDATE', schema: 'public', table: 'final_votes' }, 
        (payload) => {
          console.log('Leaderboard updated by Bot!', payload);
          fetchLeaderboard(); 
        })
    .subscribe();
}

    // Visual helpers
    let rotateIndex = 1;
    function showSelected(id) {
      const left = document.getElementById("leftBig");
      left.classList.remove("show");
      setTimeout(() => {
        document.getElementById("leftImg").src = `https://www.velutinx.com/images/poll/${id}.jpg`;
        left.classList.add("show");
      }, 150);
    }
    function rotate() {
      const right = document.getElementById("rightBig");
      right.classList.remove("show");
      setTimeout(() => {
        document.getElementById("rightImg").src = `https://www.velutinx.com/images/poll/${rotateIndex}.jpg`;
        right.classList.add("show");
        rotateIndex = (rotateIndex % TOTAL_CARDS) + 1;
      }, 150);
    }

    setInterval(rotate, 3500);
    rotate(); showSelected(1); init();

    // Dark mode from localStorage
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }
  </script>

  <style>
/* Ensure cross appears in dark mode and is red */
body.dark .card.winner::after {
  display: block !important;
  filter: brightness(0) saturate(100%) invert(14%) sepia(95%) saturate(5772%) hue-rotate(356deg) brightness(100%) contrast(118%);
  /* This turns any black/white image into red */
}

  /* Optional: ensure cross is properly positioned */
  .card.winner::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://www.velutinx.com/images/cross.png') center / contain no-repeat;
    pointer-events: none;
    z-index: 10;
  }
</style>
</body>
</html>
