<!-- poll.html – dynamic image count + D1 backend -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX — Poll</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/assets/css/shared.css">
  <link rel="stylesheet" href="/assets/css/format.css">
  <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
  <style>
    .poll-page .login-btn,
    .poll-page .cart-wrapper,
    .poll-page .floating-cart {
      display: none !important;
    }
    .poll-page .top-nav {
      background: var(--bg) !important;
      border-bottom: 1px solid var(--border);
    }
    #page {
      opacity: 0;
    }
  </style>
</head>
<body class="poll-page">

  <div id="header-placeholder"></div>

  <div id="page">
    <div class="divider"></div>

    <section class="poll-section">
      <h1 class="poll-title">Vote for Your Favorite Character</h1>
      <p class="poll-subtitle">Click once — you can change your vote anytime</p>

      <div class="poll-page">
        <div class="big-card" id="leftBig"><img id="leftImg" src="https://www.velutinx.com/images/poll/1.jpg"></div>
        <div class="big-card" id="rightBig"><img id="rightImg" src="https://www.velutinx.com/images/poll/1.jpg"></div>

        <div class="center">
          <div class="grid" id="grid"></div>
          <div class="bottom">
            <div id="leaderboard">
              <h3>Leaderboard</h3>
              <div class="tooltip">Website + Discord votes</div>
              <div id="results"></div>
            </div>
            <div class="icon-wrapper">
              <a class="icon-link" href="https://discord.gg/HKyH4bmQez" target="_blank" data-cursor-expand>
                <img src="https://www.velutinx.com/images/LogoDiscord.png" alt="Discord">
              </a>
              <div class="discord-disclaimer">Join discord for an extra vote!!</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="divider"></div>
  </div>

  <script src="/assets/js/shared.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // ---------- Cloudflare D1 API ----------
    const API_BASE = 'https://database-one-time-setup.velutinx.workers.dev';

    function applyPollTranslations() {
      if (typeof window.applyTranslations === 'function') {
        window.applyTranslations('poll');
      }
    }
    applyPollTranslations();
    document.addEventListener('languageChanged', (e) => {
      const newLang = e.detail.language;
      if (newLang && typeof window.setLanguage === 'function') {
        window.setLanguage(newLang);
      } else if (newLang) {
        window.currentLanguage = newLang;
      }
      applyPollTranslations();
    });

    const POLL_ID = "character_poll_new";
    const MIN_CARDS = 8;
    let TOTAL_CARDS = MIN_CARDS;

    async function detectTotalCards() {
      let count = MIN_CARDS;
      for (let i = MIN_CARDS + 1; i <= 12; i++) {
        const url = `https://www.velutinx.com/images/poll/${i}.jpg?t=${Date.now()}`;
        try {
          const loaded = await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = url;
          });
          if (loaded) count = i;
          else break;
        } catch {
          break;
        }
      }
      return count;
    }

    function setVoteCookie(optionId) {
      const d = new Date();
      d.setTime(d.getTime() + 30 * 24 * 60 * 60 * 1000);
      document.cookie = `votedPoll=${optionId}; expires=${d.toUTCString()}; path=/`;
    }
    function getVoteCookie() {
      const name = 'votedPoll=';
      const decodedCookie = decodeURIComponent(document.cookie);
      const ca = decodedCookie.split(';');
      for (let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) == ' ') c = c.substring(1);
        if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
      }
      return null;
    }

    async function castVote(id) {
      let visitorId = 'unknown_fp';
      let currentIp = '0.0.0.0';
      try {
        try {
          const fp = await FingerprintJS.load();
          const result = await fp.get();
          visitorId = result.visitorId;
        } catch (e) { console.warn('Fingerprint failed', e); }

        try {
          const ipRes = await fetch('https://api.ipify.org?format=json');
          const ipData = await ipRes.json();
          currentIp = ipData.ip;
        } catch (e) { console.error("IP fetch failed", e); }

        // Get character name
        let characterName = `Option ${id}`;
        try {
          const charRes = await fetch(`${API_BASE}/api/poll/results`);
          const chars = await charRes.json();
          const found = chars.find(c => c.option_id === id);
          if (found) characterName = found.character_name || characterName;
        } catch (e) {}

        // Send vote
        const res = await fetch(`${API_BASE}/api/poll/vote`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            option_id: id,
            voter_id: visitorId,
            user_ip: currentIp,
            character_name: characterName
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Vote failed');

        localStorage.setItem('voted_id', id);
        setVoteCookie(id);
        updateCardStyles(id);
        fetchGridResults();
        fetchLeaderboard();
      } catch (err) {
        console.error("Vote failed:", err.message);
        alert("Something went wrong. Please try again.");
      }
    }

    async function fetchGridResults() {
      try {
        const res = await fetch(`${API_BASE}/api/poll/website-votes`);
        const data = await res.json();
        const counts = {};
        for (let i = 1; i <= TOTAL_CARDS; i++) counts[i] = 0;
        data.forEach(v => { if (counts[v.option_id] !== undefined) counts[v.option_id]++; });
        const total = data.length || 1;
        document.querySelectorAll(".card").forEach(card => {
          const id = Number(card.dataset.id);
          const percent = Math.round((counts[id] / total) * 100);
          card.querySelector(".progress-fill").style.width = percent + "%";
          card.querySelector(".progress-text").textContent = percent + "%";
        });
      } catch (e) {
        console.error("Grid results error:", e);
      }
    }

    async function fetchLeaderboard() {
      try {
        const res = await fetch(`${API_BASE}/api/poll/results`);
        const rows = await res.json();

        const resultsBox = document.getElementById("results");
        const entries = Array.from(resultsBox.querySelectorAll('.leaderboard-entry'));
        const oldPositions = new Map();
        entries.forEach(el => {
          oldPositions.set(el.dataset.id, el.getBoundingClientRect());
        });

        rows.forEach((row) => {
          const id = String(row.option_id);
          let el = resultsBox.querySelector(`.leaderboard-entry[data-id="${id}"]`);

          if (!el) {
            el = document.createElement('div');
            el.className = 'leaderboard-entry';
            el.dataset.id = id;
            el.innerHTML = `<span></span><span></span>`;
            resultsBox.appendChild(el);
          }

          el.children[0].textContent = row.character_name || `Option ${id}`;
          el.children[1].textContent = Number(row.score || 0).toFixed(1);

          if (row.selected_at) el.classList.add('spoiled');
          else el.classList.remove('spoiled');
        });

        rows.forEach((row) => {
          const el = resultsBox.querySelector(`.leaderboard-entry[data-id="${row.option_id}"]`);
          resultsBox.appendChild(el);
        });

        rows.forEach((row) => {
          const id = String(row.option_id);
          const el = resultsBox.querySelector(`.leaderboard-entry[data-id="${id}"]`);
          const oldPos = oldPositions.get(id);

          if (oldPos) {
            const newPos = el.getBoundingClientRect();
            const dy = oldPos.top - newPos.top;

            if (dy !== 0) {
              gsap.fromTo(el,
                { y: dy, zIndex: 10 },
                { y: 0, duration: 0.35, ease: "back.out(1.2)", clearProps: "all" }
              );
              gsap.fromTo(el,
                { backgroundColor: "rgba(90, 140, 255, 0.4)" },
                { backgroundColor: "rgba(0, 0, 0, 0.03)", duration: 0.4 }
              );
            }
          } else {
            gsap.from(el, {
              opacity: 0,
              filter: "blur(5px)",
              scale: 0.9,
              duration: 0.3
            });
          }
        });

        document.querySelectorAll(".card").forEach(card => {
          const id = Number(card.dataset.id);
          const row = rows.find(r => Number(r.option_id) === id);
          if (row?.character_name) card.querySelector(".label").textContent = row.character_name;
          card.classList.toggle("winner", !!row?.selected_at);
        });

      } catch (err) {
        console.error("Leaderboard error:", err);
        document.getElementById("results").innerHTML = '<div>Error loading leaderboard</div>';
      }
    }

    function updateCardStyles(votedId) {
      document.querySelectorAll('.card').forEach(c => {
        c.classList.toggle('active-vote', Number(c.dataset.id) === votedId);
      });
    }

    async function startPoll() {
      TOTAL_CARDS = await detectTotalCards();

      const grid = document.getElementById("grid");
      grid.innerHTML = '';
      for (let i = 1; i <= TOTAL_CARDS; i++) {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = i;
        card.setAttribute('data-cursor-expand', '');
        card.innerHTML = `
          <img src="https://www.velutinx.com/images/poll/${i}.jpg" loading="lazy">
          <div class="progress"><div class="progress-fill"></div><div class="progress-text">0%</div></div>
          <div class="label"></div>
        `;
        card.onclick = () => { showSelected(i); castVote(i); };
        grid.appendChild(card);
      }

      if (TOTAL_CARDS === 12) {
        grid.classList.add("grid-12");
      } else {
        grid.classList.remove("grid-12");
      }

      await Promise.all([fetchGridResults(), fetchLeaderboard()]);

      const saved = localStorage.getItem('voted_id') || getVoteCookie();
      if (saved) updateCardStyles(Number(saved));

      // Poll every 10 seconds instead of realtime
      setInterval(() => {
        fetchGridResults();
        fetchLeaderboard();
      }, 10000);

      let rotateIndex = 1;
      function rotate() {
        const right = document.getElementById("rightBig");
        right.classList.remove("show");
        setTimeout(() => {
          document.getElementById("rightImg").src = `https://www.velutinx.com/images/poll/${rotateIndex}.jpg`;
          right.classList.add("show");
          rotateIndex = (rotateIndex % TOTAL_CARDS) + 1;
        }, 150);
      }
      setInterval(rotate, 3500);
      rotate();
      showSelected(1);

      function showSelected(id) {
        const left = document.getElementById("leftBig");
        left.classList.remove("show");
        setTimeout(() => {
          document.getElementById("leftImg").src = `https://www.velutinx.com/images/poll/${id}.jpg`;
          left.classList.add("show");
        }, 150);
      }
    }

    startPoll();

    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }
  </script>

</body>
</html>
