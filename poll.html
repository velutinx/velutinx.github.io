<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX — Poll</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    /* Poll-specific styles (unchanged) */
    .poll-section {
      max-width: 1600px;
      margin: 0 auto;
      padding: 40px 24px;
      position: relative;
    }

    .poll-title {
      text-align: center;
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .poll-subtitle {
      text-align: center;
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .poll-page {
      position: relative;
    }

    .big-card {
      position: absolute;
      top: 23%;
      transform: translateY(-50%);
      width: 500px;
      height: 750px;
      border-radius: 24px;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 15;
    }

    .big-card.show {
      opacity: 1;
    }

    .big-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      loading: lazy;
    }

    #leftBig { left: -375px; }
    #rightBig { right: -375px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    .card {
      background: rgba(245,241,223,0.97);
      border: 3px solid #ffffff;
      border-radius: 12px;
      padding: 8px;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s ease, border-color 0.3s ease;
    }

    body.dark .card {
      background: rgba(30, 30, 35, 0.97);
      border: 3px solid #444;
    }

    .card:hover {
      transform: scale(1.05);
      animation: blobWobble 1.6s ease-in-out infinite;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      loading: lazy;
    }

    .progress {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 26px;
      height: 18px;
      border-radius: 9px;
      background: rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#5a8cff,#8fb6ff);
      transition: width 0.4s ease;
    }

    .progress-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .label {
      margin-top: 6px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
    }

    .card.winner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: url('/images/cross.png') center / 65% no-repeat;
      opacity: 0.65;
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: multiply;
      animation: pulseCross 2.8s ease-in-out infinite;
    }

    body.dark .card.winner::after {
      mix-blend-mode: screen;
      opacity: 0.75;
    }

    .card.winner {
      box-shadow: 0 0 0 3px #e63946 inset;
    }

    @keyframes pulseCross {
      0%, 100% { opacity: 0.50; }
      50%      { opacity: 0.80; }
    }

    .bottom {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      margin-top: 60px;
    }

    #leaderboard {
      background: rgba(255,255,255,0.9);
      border: 3px solid #ffffff;
      padding: 12px 16px;
      border-radius: 10px;
      min-width: 260px;
      text-align: center;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    body.dark #leaderboard {
      background: rgba(30, 30, 35, 0.9);
      border: 3px solid #444;
      color: var(--text-dark);
    }

    #leaderboard h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .tooltip {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .leaderboard-entry {
      font-size: 13px;
      padding: 2px 0;
    }

    .icon-link img {
      width: 180px;
      transition: transform 0.25s ease;
    }

    .icon-link img:hover {
      animation: blobWobble 1.6s ease-in-out infinite;
    }

    .discord-disclaimer {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.9;
    }

    @media (max-width: 1200px) {
      .big-card { display: none; }
      .grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
      .bottom { flex-direction: column; align-items: center; gap: 20px; }
    }
  </style>
</head>
<body>

  <!-- Swipe animation layer -->
  <div class="lang-swipe" id="langSwipe"></div>

  <div class="background-wrapper">
    <div class="background-gradient"></div>
    <div class="wave-overlay"></div>
  </div>

  <!-- Language selector: globe button + popover -->
  <div id="langContainer">
    <button class="lang-btn" title="Select Language">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 5h7"></path>
        <path d="M7 4c0 4.846 0 7 .5 8"></path>
        <path d="M10 8.5c0 2.286 -2 4.5 -3.5 4.5s-2.5 -1.135 -2.5 -2c0 -2 1 -3 3 -3s5 .57 5 2.857c0 1.524 -.667 2.571 -2 3.143"></path>
        <path d="M12 20l4 -9l4 9"></path>
        <path d="M19.1 18h-6.2"></path>
      </svg>
    </button>

    <div id="languagePopover">
      <div class="lang-item" data-lang="en">
        <img src="https://flagcdn.com/w40/us.png" alt="English" />
        <p>English</p>
      </div>
      <div class="lang-item" data-lang="ja">
        <img src="https://flagcdn.com/w40/jp.png" alt="Japanese" />
        <p>日本語</p>
      </div>
      <div class="lang-item" data-lang="zh">
        <img src="https://flagcdn.com/w40/cn.png" alt="Chinese" />
        <p>简体中文</p>
      </div>
      <div class="lang-item" data-lang="es">
        <img src="https://flagcdn.com/w40/mx.png" alt="Spanish" />
        <p>Español</p>
      </div>
    </div>
  </div>

  <!-- Theme toggle -->
  <div class="theme-toggle" id="themeToggle">
    <div class="theme-knob"></div>
  </div>

  <!-- Page wrapper -->
  <div id="page">

    <!-- Navigation -->
    <div id="navContainer"></div>

    <div class="divider"></div>

    <!-- Poll section -->
    <section class="poll-section">
      <h1 class="poll-title" id="pollTitle">Vote for Your Favorite Character</h1>
      <p class="poll-subtitle" id="pollSubtitle">Click once — you can change your vote anytime</p>

      <div class="poll-page">
        <!-- Big cards -->
        <div class="big-card" id="leftBig">
          <img id="leftImg" src="/images/poll/1.jpg" loading="lazy">
        </div>
        <div class="big-card" id="rightBig">
          <img id="rightImg" src="/images/poll/1.jpg" loading="lazy">
        </div>

        <!-- Center content -->
        <div class="center">
          <div class="grid" id="grid"></div>

          <div class="bottom">
            <div id="leaderboard">
              <h3 id="leaderboardTitle">Leaderboard</h3>
              <div class="tooltip" id="leaderboardTooltip">Website + Discord votes</div>
              <div id="results">Loading…</div>
            </div>

            <div class="icon-wrapper">
              <a class="icon-link" href="https://discord.gg/XF363uYfSh" target="_blank">
                <img src="/images/LogoDiscord.png" alt="Discord">
              </a>
              <div class="discord-disclaimer" id="discordDisclaimer">Join discord for an extra vote!!</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="divider"></div>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/navigation.js"></script>
  <script src="/assets/js/translations.js"></script>

  <script>
    // Dark mode
    if (localStorage.getItem("darkMode") === "true") {
      document.body.classList.add("dark");
    }

    // Theme toggle
    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode", document.body.classList.contains("dark"));
    };

    // Cursor sparkles
    let lastStarTime = 0;
    document.addEventListener("mousemove", (e) => {
      const now = Date.now();
      if (now - lastStarTime < 45) return;
      lastStarTime = now;

      const star = document.createElement("div");
      star.className = "star";
      star.textContent = "✦";
      star.style.setProperty("--drift", Math.random());
      star.style.left = `${e.clientX}px`;
      star.style.top = `${e.clientY}px`;
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 2000);
    });

    // Full-page falling sparkles
    setInterval(() => {
      const star = document.createElement("div");
      star.className = "falling-star";
      star.textContent = "✦";
      star.style.left = Math.random() * 100 + "vw";
      star.style.top = "-10vh";
      star.style.setProperty("--drift", Math.random() * 2 - 1);
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 8000);
    }, 400);

    // Poll logic (unchanged except language)
    const SUPABASE_URL = "https://knbvlyngmjaxndkiqggl.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuYnZseW5nbWpheG5ka2lxZ2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjI0NzEsImV4cCI6MjA4NjM5ODQ3MX0.mxthCDB6dCaHcEDMFN48pFnaJmcBbilXfP7tL-YAV08";

    const POLL_ID = "character_poll_new";
    const TOTAL = 12;

    const grid = document.getElementById("grid");
    const resultsBox = document.getElementById("results");

    const leftImg = document.getElementById("leftImg");
    const leftBig = document.getElementById("leftBig");

    const rightImg = document.getElementById("rightImg");
    const rightBig = document.getElementById("rightBig");

    let rotateIndex = 1;

    let voterHash = localStorage.getItem("voter_hash_poll");
    if (!voterHash) {
      voterHash = crypto.randomUUID();
      localStorage.setItem("voter_hash_poll", voterHash);
    }

    // Build small cards
    for (let i = 1; i <= TOTAL; i++) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = i;

      card.innerHTML = `
        <img src="/images/poll/${i}.jpg" loading="lazy">
        <div class="progress">
          <div class="progress-fill"></div>
          <div class="progress-text">0%</div>
        </div>
        <div class="label">Loading…</div>
      `;

      card.onclick = async () => {
        showSelected(i);
        await vote(i);
      };

      grid.appendChild(card);
    }

    function showSelected(id) {
      leftBig.classList.remove("show");
      setTimeout(() => {
        leftImg.src = `/images/poll/${id}.jpg`;
        leftBig.classList.add("show");
      }, 150);
    }

    function rotate() {
      rightBig.classList.remove("show");
      setTimeout(() => {
        rightImg.src = `/images/poll/${rotateIndex}.jpg`;
        rightBig.classList.add("show");
        rotateIndex = (rotateIndex % TOTAL) + 1;
      }, 150);
    }

    setInterval(rotate, 3500);
    rotate();
    showSelected(1);

    async function vote(optionId) {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/votes?on_conflict=poll_id,voter_hash`, {
          method: "POST",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            Prefer: "resolution=merge-duplicates"
          },
          body: JSON.stringify({
            poll_id: POLL_ID,
            option_id: optionId,
            voter_hash: voterHash,
            source: "website"
          })
        });

        if (response.ok || response.status === 409) {
          console.log("Vote successful / updated");
          setTimeout(() => {
            fetchResults();
            fetchLeaderboard();
          }, 800);
        } else {
          console.error("Vote failed:", response.status);
        }
      } catch (err) {
        console.error("Vote error:", err);
      }
    }

    async function fetchResults() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/votes?poll_id=eq.${POLL_ID}&select=option_id`, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        });

        if (!res.ok) throw new Error(await res.text());

        const votes = await res.json();
        const counts = {};
        for (let i = 1; i <= TOTAL; i++) counts[i] = 0;
        votes.forEach(v => { if (v.option_id) counts[v.option_id]++; });

        const total = votes.length || 1;

        document.querySelectorAll(".card").forEach(card => {
          const id = Number(card.dataset.id);
          const percent = Math.round((counts[id] / total) * 100);
          card.querySelector(".progress-fill").style.width = percent + "%";
          card.querySelector(".progress-text").textContent = percent + "%";
        });
      } catch (err) {
        console.error("fetchResults error:", err);
      }
    }

    async function fetchLeaderboard() {
      try {
        const winRes = await fetch(
          `${SUPABASE_URL}/rest/v1/poll_winners?poll_id=eq.${POLL_ID}&select=option_id,selected_at`,
          { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
        );

        const winners = await winRes.json();
        const winnerIds = new Set(winners.map(w => Number(w.option_id)));

        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/poll_result?poll_id=eq.${POLL_ID}&order=option_id.asc&select=option_id,character_name,score`,
          { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
        );

        const rows = await res.json();
        const sortedRows = rows.sort((a, b) => Number(b.score || 0) - Number(a.score || 0));

        let html = "";
        sortedRows.forEach(r => {
          const id = Number(r.option_id);
          const isWinner = winnerIds.has(id);
          const cls = isWinner ? "spoiled" : "";
          const name = r.character_name || `Option ${id}`;
          const score = Number(r.score || 0).toFixed(1);

          html += `
            <div class="leaderboard-entry ${cls}">
              ${name}: ${score}
            </div>
          `;
        });

        resultsBox.innerHTML = html || "No votes yet";

        document.querySelectorAll(".card").forEach(card => {
          card.classList.remove("winner");
          const id = Number(card.dataset.id);
          const row = rows.find(r => Number(r.option_id) === id);

          if (row?.character_name) {
            card.querySelector(".label").textContent = row.character_name;
          }

          if (winnerIds.has(id)) {
            card.classList.add("winner");
          }
        });
      } catch (err) {
        console.error("fetchLeaderboard error:", err);
        resultsBox.innerHTML = "Error loading leaderboard";
      }
    }

    fetchResults();
    fetchLeaderboard();
    setInterval(fetchResults, 30000);
    setInterval(fetchLeaderboard, 30000);

    // Language switch
    document.querySelectorAll('.lang-item').forEach(item => {
      item.addEventListener('click', () => {
        setLanguage(item.dataset.lang);
      });
    });

    // Apply poll page translations on load
    applyTranslations('poll');

    // Re-apply after language change
    document.addEventListener('languageChanged', () => {
      applyTranslations('poll');
    });
  </script>

  <script src="/assets/js/tab-title-animation.js"></script>

</body>
</html>
