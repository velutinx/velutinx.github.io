<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX — Poll</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Poll-specific styles */
    .poll-section {
      max-width: 1600px;
      margin: 0 auto;
      padding: 40px 24px;
      position: relative;
    }

    .poll-title {
      text-align: center;
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .poll-subtitle {
      text-align: center;
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .poll-page {
      position: relative;
    }

    .big-card {
      position: absolute;
      top: 23%;
      transform: translateY(-50%);
      width: 500px;
      height: 750px;
      border-radius: 24px;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 15;
    }

    .big-card.show { opacity: 1; }
    .big-card img { width: 100%; height: 100%; object-fit: contain; }

    #leftBig { left: -375px; }
    #rightBig { right: -375px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    .card {
      background: rgba(245,241,223,0.97);
      border: 3px solid #ffffff;
      border-radius: 12px;
      padding: 8px;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s ease, border-color 0.3s ease;
    }

    body.dark .card {
      background: rgba(30, 30, 35, 0.97);
      border: 3px solid #444;
    }

    .card:hover {
      transform: scale(1.05);
      animation: blobWobble 1.6s ease-in-out infinite;
    }

    /* Voted State */
    .card.active-vote {
      border-color: #5a8cff !important;
      box-shadow: 0 0 15px rgba(90, 140, 255, 0.4);
    }

    .card.active-vote::before {
      content: '✓';
      position: absolute;
      top: -10px;
      right: -10px;
      background: #5a8cff;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      z-index: 20;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .progress {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 26px;
      height: 18px;
      border-radius: 9px;
      background: rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#5a8cff,#8fb6ff);
      transition: width 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }

    .progress-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 11px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .label {
      margin-top: 6px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
    }

    .bottom {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      margin-top: 60px;
    }

    #leaderboard {
      background: rgba(255,255,255,0.9);
      border: 3px solid #ffffff;
      padding: 16px;
      border-radius: 12px;
      min-width: 280px;
      text-align: center;
    }

    body.dark #leaderboard {
      background: rgba(30, 30, 35, 0.9);
      border: 3px solid #444;
      color: #fff;
    }

    .leaderboard-entry {
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
    }

    .icon-link img { width: 180px; transition: transform 0.25s ease; }
    .icon-link img:hover { transform: scale(1.1); }

    @media (max-width: 1200px) {
      .big-card { display: none; }
      .grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
      .bottom { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <div class="lang-swipe" id="langSwipe"></div>

  <div class="background-wrapper">
    <div class="background-gradient"></div>
    <div class="wave-overlay"></div>
  </div>

  <div id="langContainer">
    <button class="lang-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 5h7"></path><path d="M7 4c0 4.846 0 7 .5 8"></path><path d="M10 8.5c0 2.286 -2 4.5 -3.5 4.5s-2.5 -1.135 -2.5 -2c0 -2 1 -3 3 -3s5 .57 5 2.857c0 1.524 -.667 2.571 -2 3.143"></path><path d="M12 20l4 -9l4 9"></path><path d="M19.1 18h-6.2"></path>
      </svg>
    </button>
    <div id="languagePopover">
      <div class="lang-item" data-lang="en"><img src="https://flagcdn.com/w40/us.png" alt="English" /><p>English</p></div>
      <div class="lang-item" data-lang="ja"><img src="https://flagcdn.com/w40/jp.png" alt="Japanese" /><p>日本語</p></div>
      <div class="lang-item" data-lang="zh"><img src="https://flagcdn.com/w40/cn.png" alt="Chinese" /><p>简体中文</p></div>
      <div class="lang-item" data-lang="es"><img src="https://flagcdn.com/w40/mx.png" alt="Spanish" /><p>Español</p></div>
    </div>
  </div>

  <div class="theme-toggle" id="themeToggle"><div class="theme-knob"></div></div>

  <div id="page">
    <div id="navContainer"></div>
    <div class="divider"></div>

    <section class="poll-section">
      <h1 class="poll-title" id="pollTitle">Vote for Your Favorite Character</h1>
      <p class="poll-subtitle" id="pollSubtitle">Click once — you can change your vote anytime</p>

      <div class="poll-page">
        <div class="big-card" id="leftBig"><img id="leftImg" src="https://www.velutinx.com/images/poll/1.jpg"></div>
        <div class="big-card" id="rightBig"><img id="rightImg" src="https://www.velutinx.com/images/poll/1.jpg"></div>

        <div class="center">
          <div class="grid" id="grid"></div>
          <div class="bottom">
            <div id="leaderboard">
              <h3 id="leaderboardTitle">Leaderboard</h3>
              <div class="tooltip" id="leaderboardTooltip">Website votes only</div>
              <div id="results">Loading…</div>
            </div>
            <div class="icon-wrapper">
              <a class="icon-link" href="https://discord.gg/XF363uYfSh" target="_blank">
                <img src="https://www.velutinx.com/images/LogoDiscord.png" alt="Discord">
              </a>
              <div class="discord-disclaimer" id="discordDisclaimer">Join discord for more!!</div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <div class="divider"></div>
  </div>

  <script src="/assets/js/navigation.js"></script>
  <script src="/assets/js/translations.js"></script>

  <script>
    // --- GLOBAL CONFIG ---
    const S_URL = "https://knbvlyngmjaxndkiqggl.supabase.co".trim();
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuYnZseW5nbWpheG5ka2lxZ2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjI0NzEsImV4cCI6MjA4NjM5ODQ3MX0.mxthCDB6dCaHcEDMFN48pFnaJmcBbilXfP7tL-YAV08".trim();
    const sb = supabase.createClient(S_URL, S_KEY, { auth: { persistSession: false } });

    const POLL_ID = "character_poll_new";
    const TOTAL_CARDS = 12;
    const grid = document.getElementById("grid");
    const resultsBox = document.getElementById("results");

    // --- INITIALIZE UI ---
    for (let i = 1; i <= TOTAL_CARDS; i++) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = i;
      card.innerHTML = `
        <img src="https://www.velutinx.com/images/poll/${i}.jpg" loading="lazy">
        <div class="progress"><div class="progress-fill"></div><div class="progress-text">0%</div></div>
        <div class="label">Character ${i}</div>
      `;
      card.onclick = () => {
        showSelected(i);
        castVote(i);
      };
      grid.appendChild(card);
    }

    // --- VOTING CORE ---
    async function castVote(id) {
      try {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const { ip } = await ipRes.json();

        // Table is now strictly lowercase 'website_voting'
        const { error } = await sb.from('website_voting').upsert(
          { voter_id: ip, option_id: id, poll_id: POLL_ID },
          { onConflict: 'voter_id' }
        );

        if (!error) {
          localStorage.setItem('voted_id', id);
          updateCardStyles(id);
        } else {
          console.error("Supabase error:", error.message);
        }
      } catch (err) { console.error("Vote failed", err); }
    }

    async function fetchResults() {
      const { data, error } = await sb.from('website_voting').select('option_id').eq('poll_id', POLL_ID);
      if (error) return;

      const counts = {};
      for (let i = 1; i <= TOTAL_CARDS; i++) counts[i] = 0;
      data.forEach(v => { if (counts[v.option_id] !== undefined) counts[v.option_id]++; });

      const total = data.length || 1;
      
      document.querySelectorAll(".card").forEach(card => {
        const id = Number(card.dataset.id);
        const percent = Math.round((counts[id] / total) * 100);
        card.querySelector(".progress-fill").style.width = percent + "%";
        card.querySelector(".progress-text").textContent = percent + "%";
      });

      const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 6);
      resultsBox.innerHTML = sorted.map(([id, count]) => 
        `<div class="leaderboard-entry"><span>Character ${id}</span> <span>${count} votes</span></div>`
      ).join('');
    }

    function updateCardStyles(votedId) {
      document.querySelectorAll('.card').forEach(c => {
        c.classList.toggle('active-vote', Number(c.dataset.id) === votedId);
      });
    }

    // --- REALTIME & INIT ---
    async function init() {
      await fetchResults();
      const saved = localStorage.getItem('voted_id');
      if (saved) updateCardStyles(Number(saved));

      sb.channel('live-poll')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'website_voting' }, fetchResults)
        .subscribe();
    }

    // --- VISUAL HELPERS ---
    let rotateIndex = 1;
    function showSelected(id) {
      const left = document.getElementById("leftBig");
      left.classList.remove("show");
      setTimeout(() => {
        document.getElementById("leftImg").src = `https://www.velutinx.com/images/poll/${id}.jpg`;
        left.classList.add("show");
      }, 150);
    }
    function rotate() {
      const right = document.getElementById("rightBig");
      right.classList.remove("show");
      setTimeout(() => {
        document.getElementById("rightImg").src = `https://www.velutinx.com/images/poll/${rotateIndex}.jpg`;
        right.classList.add("show");
        rotateIndex = (rotateIndex % TOTAL_CARDS) + 1;
      }, 150);
    }

    setInterval(rotate, 3500);
    rotate();
    showSelected(1);
    init();

    // Dark Mode
    if (localStorage.getItem("darkMode") === "true") document.body.classList.add("dark");
    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode", document.body.classList.contains("dark"));
    };

    // Language logic
    document.querySelectorAll('.lang-item').forEach(item => {
      item.addEventListener('click', () => setLanguage(item.dataset.lang));
    });
    applyTranslations('poll');
    document.addEventListener('languageChanged', () => applyTranslations('poll'));
  </script>
  <script src="/assets/js/tab-title-animation.js"></script>
</body>
</html>
