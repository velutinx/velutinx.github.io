<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX | Official Store</title>

  <style>
    :root {
      --bg: #d3d0c1; --card: #e8e5d8; --darker: #c0bcaa; --text: #3a3528;
      --text-light: #e8e5d8; --accent: #aa9e76; --success: #22c55e;
      --gray: #8a7b6f; --border: #aa9e76; --overlay: rgba(170,158,118,0.25);
      --btn-cart: #3a3528; --price-red: #dc2626;
    }
    body.dark {
      --bg: #0f0f12; --card: #1a1a20; --darker: #121216; --text: #e6e3d8;
      --accent: #d4c08a; --success: #8b8a5e; --border: #6f6a4e;
      --overlay: rgba(15,15,18,0.75); --price-red: #f87171;
    }
    body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
    body.drawer-open { overflow:hidden; }
    .top-nav { display:flex; justify-content:space-between; align-items:center; padding:0.9rem 2rem; background:var(--darker); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1000; }
    .nav-left { display:flex; align-items:center; gap:1rem; }
    .logo { font-size:1.8rem; font-weight:900; letter-spacing:2px; color:#000; }
    body.dark .logo { color:var(--accent); }
    .nav-actions { display:flex; align-items:center; gap:1rem; }
    .nav-icon, .menu-toggle { width:42px; height:42px; background:var(--accent); border-radius:9999px; display:flex; align-items:center; justify-content:center; color:white; border:none; cursor:pointer; transition:0.2s; }
    .nav-icon:hover, .menu-toggle:hover { transform:scale(1.08); background:#38aae8; }
    .login-btn { padding:0.55rem 1.6rem; background:transparent; color:var(--accent); border:1px solid var(--accent); border-radius:9999px; font-weight:600; font-size:0.9rem; text-decoration:none; }
    #languagePopover { position:absolute; top:55px; right:8px; background:var(--card); border:1px solid var(--border); border-radius:10px; min-width:210px; z-index:1100; opacity:0; visibility:hidden; transform:translateY(-8px); transition:0.2s; }
    #languagePopover.show { opacity:1; visibility:visible; transform:translateY(0); }
    .lang-item { display:flex; align-items:center; gap:12px; padding:10px 16px; cursor:pointer; color:var(--text); }
    .lang-item:hover { background:var(--darker); }
    .lang-item img { width:28px; height:28px; border-radius:50%; }
    .floating-cart { position:fixed; bottom:24px; right:24px; width:64px; height:64px; background:var(--accent); border-radius:9999px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,0.25); z-index:1150; transition:0.2s; }
    .floating-cart:hover { transform:scale(1.08); background:#38aae8; }
    .cart-badge, .floating-badge { position:absolute; top:0; right:0; transform:translate(50%,-50%); background:#ef4444; color:white; font-size:0.7rem; min-width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:0 6px; border:2px solid var(--darker); }
    .cart-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(5px); z-index:1249; opacity:0; pointer-events:none; transition:opacity 0.3s; }
    .cart-overlay.active { opacity:1; pointer-events:all; }
    .cart-drawer { position:fixed; top:0; right:-400px; width:400px; height:100%; background:var(--accent); border-left:1px solid var(--border); box-shadow:-8px 0 30px rgba(0,0,0,0.4); z-index:1250; transition:right 0.3s cubic-bezier(0.2,0.9,0.4,1.1); display:flex; flex-direction:column; }
    .cart-drawer.open { right:0; }
    .cart-header { display:flex; justify-content:space-between; align-items:center; padding:1.2rem 1.5rem; border-bottom:1px solid var(--border); }
    .cart-close { background:none; border:none; font-size:2rem; cursor:pointer; }
    .cart-items { flex:1; overflow-y:auto; padding:1rem; }
    .cart-item { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
    .cart-item img { width:70px; height:70px; object-fit:cover; border-radius:8px; background:#e8e5d8; }
    .sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:1299; opacity:0; pointer-events:none; }
    .sidebar-overlay.active { opacity:1; pointer-events:all; }
    .sidebar { position:fixed; top:0; left:-280px; width:280px; height:100%; background:var(--card); z-index:1300; transition:left 0.3s cubic-bezier(0.2,0.9,0.4,1.1); box-shadow:4px 0 20px rgba(0,0,0,0.3); display:flex; flex-direction:column; }
    .sidebar.open { left:0; }
    .sidebar-header { display:flex; align-items:center; gap:12px; padding:1.2rem; border-bottom:1px solid var(--border); }
    .sidebar-menu { flex:1; padding:1rem 0; }
    .menu-item { display:flex; align-items:center; gap:14px; padding:0.8rem 1.5rem; color:var(--text); text-decoration:none; font-weight:700; font-size:1.05rem; transition:0.2s; }
    .menu-item:hover { background:var(--darker); }
    .sidebar-footer { padding:1rem; text-align:center; font-size:0.75rem; color:var(--gray); border-top:1px solid var(--border); }
    #snackbar { position:fixed; top:20px; right:20px; background:var(--success); padding:12px 20px; border-radius:40px; display:flex; gap:10px; align-items:center; color:white; z-index:1400; transform:translateY(-120px); opacity:0; transition:0.25s; }
    #snackbar.show { transform:translateY(0); opacity:1; }
    .main-container { display:flex; max-width:1400px; margin:0 auto; padding:1.5rem 2rem 2rem; gap:2rem; }
    .store-filter-sidebar { width:260px; flex-shrink:0; }
    .product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:1.8rem; }
    .product-card { background:var(--card); border-radius:20px; overflow:hidden; border:1px solid var(--border); cursor:pointer; transition:all 0.2s; }
    .product-card:hover { transform:translateY(-6px); box-shadow:0 14px 28px rgba(0,0,0,0.2); }
    .card-image { width:100%; aspect-ratio:3/3.5; object-fit:cover; background:#d9d4c2; }
    .price { font-size:1.3rem; font-weight:700; color:var(--price-red); }
    .cart-btn { width:44px; height:44px; background:var(--btn-cart); border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .cart-btn.added { background:var(--success); }
    @media (max-width:780px) { .main-container { flex-direction:column; } .store-filter-sidebar { width:100%; } }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-left">
    <button class="menu-toggle" id="menuToggle" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="logo">VELUTINX</div>
  </div>
  <div class="nav-actions">
    <a href="https://velutinx.com/" class="login-btn">Website</a>
    <div style="position:relative">
      <button class="nav-icon" id="langBtn">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 5h7"/><path d="M7 4c0 4.846 0 7 .5 8"/><path d="M10 8.5c0 2.286-2 4.5-3.5 4.5s-2.5-1.135-2.5-2c0-2 1-3 3-3s5 .57 5 2.857c0 1.524-.667 2.571-2 3.143"/><path d="M12 20l4-9l4 9"/><path d="M19.1 18h-6.2"/></svg>
      </button>
      <div id="languagePopover">
        <div class="lang-item" data-lang="en"><img src="https://flagcdn.com/w40/us.png" alt="en"> English</div>
        <div class="lang-item" data-lang="ja"><img src="https://flagcdn.com/w40/jp.png" alt="ja"> 日本語</div>
        <div class="lang-item" data-lang="zh"><img src="https://flagcdn.com/w40/cn.png" alt="zh"> 简体中文</div>
        <div class="lang-item" data-lang="es"><img src="https://flagcdn.com/w40/mx.png" alt="es"> Español</div>
      </div>
    </div>
    <button class="nav-icon" id="themeBtn">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"/></svg>
    </button>
    <div style="position:relative">
      <button class="nav-icon" id="cartBtn">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 17h-11v-14h-2"/><path d="M6 5l14 1l-.86 6.017"/></svg>
      </button>
      <span class="cart-badge" id="cartCount">0</span>
    </div>
  </div>
</nav>

<button class="floating-cart" id="floatingCartBtn">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
    <path d="M6 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
    <path d="M17 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
    <path d="M17 17h-11v-14h-2"/>
    <path d="M6 5l14 1l-1 7h-13"/>
  </svg>
  <span class="floating-badge" id="floatingCartCount">0</span>
</button>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header"><h5>Shopping Cart</h5><button class="cart-close" id="cartClose">×</button></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-total"><span>Total</span><span id="cartTotal">US$0.00</span></div>
  <button id="demoCheckoutBtn">Proceed to checkout (DEMO)</button>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button id="sidebarMenuToggle" style="background:transparent; color:var(--text); border:none; cursor:pointer;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="logo">VELUTINX</div>
  </div>
  <div class="sidebar-menu">
    <a href="https://velutinx.com/" class="menu-item"><span>HOME</span></a>
    <a href="https://velutinx.com/commission" class="menu-item"><span>COMMISSIONS</span></a>
    <a href="https://velutinx.com/artwork" class="menu-item"><span>ARTWORK</span></a>
    <a href="https://velutinx.com/poll" class="menu-item"><span>POLL</span></a>
    <a href="https://velutinx.com/store" class="menu-item"><span>STORE</span></a>
    <a href="https://velutinx.com/contact" class="menu-item"><span>CONTACT</span></a>
  </div>
  <div class="sidebar-footer">© VELUTINX</div>
</aside>

<div id="snackbar"><span id="snackText"></span></div>

<div class="main-container">
  <aside class="store-filter-sidebar">
    <!-- your filter sidebar HTML here (same as before) -->
    <div class="section-title">Filter by Category</div>
    <ul class="category-list" id="categoryList">
      <li data-cat="all" class="active">All Products</li>
      <li data-cat="female">Female Models</li>
      <li data-cat="femboy">Femboy Models</li>
      <li data-cat="membership">Memberships</li>
    </ul>
    <div class="section-title">Sort by</div>
    <div id="sortContainer">
      <button class="sort-btn active" data-sort="newest">Newest</button>
      <button class="sort-btn" data-sort="oldest">Oldest</button>
      <button class="sort-btn" data-sort="price-asc">Price: Low to High</button>
      <button class="sort-btn" data-sort="price-desc">Price: High to Low</button>
    </div>
  </aside>
  <main class="products-section">
    <div class="products-header">
      <h2>Latest Content</h2>
      <div class="search-bar-wrapper">
        <input type="search" id="searchInput" placeholder="Search...">
      </div>
    </div>
    <div class="product-grid" id="productGrid"></div>
  </main>
</div>

<script>
  // === SHARED LOGIC (cart, drawers, language, theme, snackbar) ===
  let cart = JSON.parse(localStorage.getItem('velutinx_cart') || '[]');
  let currentLang = localStorage.getItem('language') || 'en';

  function saveCart() {
    localStorage.setItem('velutinx_cart', JSON.stringify(cart));
    document.querySelectorAll('#cartCount, #floatingCartCount').forEach(el => el.textContent = cart.length);
  }

  function showSnack(msg, isRemove = false) {
    const sb = document.getElementById('snackbar');
    document.getElementById('snackText').textContent = msg;
    sb.style.background = isRemove ? '#ef4444' : '#22c55e';
    sb.classList.add('show');
    setTimeout(() => sb.classList.remove('show'), 2200);
  }

  window.addOrToggleCart = function(product) {
    const idx = cart.findIndex(i => i.id === product.id);
    if (idx > -1) {
      cart.splice(idx, 1);
      showSnack('Removed from cart', true);
    } else {
      cart.push({ id: product.id, title: product.title, image: `https://velutinx.com/i/pack${String(product.id).padStart(3,'0')}-1.jpg` });
      showSnack('Added to cart');
    }
    saveCart();
    updateCartDrawer();
  };

  function updateCartDrawer() {
    const container = document.getElementById('cartItems');
    container.innerHTML = cart.length === 0 ? '<div>Your cart is empty</div>' : '';
    cart.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `<img src="${item.image}" alt=""><div>${item.title}</div><button data-idx="${idx}">×</button>`;
      container.appendChild(div);
    });
    document.querySelectorAll('.cart-item button').forEach(btn => {
      btn.onclick = () => {
        const idx = btn.dataset.idx;
        cart.splice(idx, 1);
        saveCart();
        updateCartDrawer();
        showSnack('Removed from cart', true);
      };
    });
    document.getElementById('cartTotal').textContent = 'US$' + (cart.length * 3).toFixed(2);
  }

  // Drawers
  document.getElementById('cartBtn').onclick = document.getElementById('floatingCartBtn').onclick = () => {
    document.getElementById('cartDrawer').classList.add('open');
    document.getElementById('cartOverlay').classList.add('active');
    document.body.classList.add('drawer-open');
    updateCartDrawer();
  };
  document.getElementById('cartClose').onclick = document.getElementById('cartOverlay').onclick = () => {
    document.getElementById('cartDrawer').classList.remove('open');
    document.getElementById('cartOverlay').classList.remove('active');
    document.body.classList.remove('drawer-open');
  };
  document.getElementById('menuToggle').onclick = () => {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('active');
    document.body.classList.add('drawer-open');
  };
  document.getElementById('sidebarMenuToggle').onclick = document.getElementById('sidebarOverlay').onclick = () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');
    document.body.classList.remove('drawer-open');
  };

  // Language (simplified - add translations if needed)
  document.getElementById('langBtn').onclick = () => document.getElementById('languagePopover').classList.toggle('show');
  document.querySelectorAll('.lang-item').forEach(item => {
    item.onclick = () => {
      currentLang = item.dataset.lang;
      localStorage.setItem('language', currentLang);
      document.getElementById('languagePopover').classList.remove('show');
    };
  });

  // Theme
  document.getElementById('themeBtn').onclick = () => document.body.classList.toggle('dark');

  // Cart demo button
  document.getElementById('demoCheckoutBtn').onclick = () => alert('Demo checkout - items saved locally');

  // === STORE LOGIC ===
  let products = [];
  let activeCategory = "all";
  let currentSort = "newest";
  let searchQuery = "";

  async function loadProducts() {
    try {
      const res = await fetch('https://velutinx.com/assets/js/packs-data.js');
      const text = await res.text();
      const match = text.match(/export default (\[[\s\S]*?\]);/);
      if (match) {
        products = eval(match[1]);
        renderGrid();
      }
    } catch(e) {
      console.error(e);
      document.getElementById('productGrid').innerHTML = '<div>Failed to load products</div>';
    }
  }

  function renderGrid() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    let filtered = products.filter(p => {
      if (activeCategory === "all") return true;
      if (activeCategory === "female") return p.category === 1;
      if (activeCategory === "femboy") return p.category === 2;
      if (activeCategory === "membership") return p.category === 3;
      return false;
    });
    if (searchQuery) filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery.toLowerCase()));
    if (currentSort === "newest") filtered.sort((a,b) => b.id - a.id);
    if (currentSort === "oldest") filtered.sort((a,b) => a.id - b.id);
    filtered.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';
      const img = `https://velutinx.com/i/pack${String(p.id).padStart(3,'0')}-1.jpg`;
      card.innerHTML = `
        <img src="${img}" class="card-image" alt="${p.title}" onerror="this.src='https://placehold.co/300x420?text=Preview'">
        <div class="card-content">
          <div class="card-title">${p.title}</div>
          <div class="price-row">
            <div class="price">US$3.00</div>
            <button class="cart-btn"></button>
          </div>
        </div>
      `;
      card.querySelector('.cart-btn').onclick = e => {
        e.stopPropagation();
        window.addOrToggleCart(p);
      };
      card.onclick = () => location.href = `/s/pack?id=${p.id}`;
      grid.appendChild(card);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    saveCart();
    loadProducts();
    document.querySelectorAll('#categoryList li').forEach(li => li.onclick = () => {
      document.querySelectorAll('#categoryList li').forEach(l => l.classList.remove('active'));
      li.classList.add('active');
      activeCategory = li.dataset.cat;
      renderGrid();
    });
    document.querySelectorAll('#sortContainer button').forEach(btn => btn.onclick = () => {
      document.querySelectorAll('#sortContainer button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      renderGrid();
    });
    document.getElementById('searchInput').oninput = e => {
      searchQuery = e.target.value;
      renderGrid();
    };
  });
</script>
</body>
</html>
