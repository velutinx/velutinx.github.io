<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velutinx – Censorship Tool</title>
  <link rel="stylesheet" href="/assets/css/shared.css">
  <link rel="stylesheet" href="/assets/css/format-private.css">
</head>
<body class="censor-tool-body">

  <div id="censor-main">
    <div id="censor-viewer">
      <div id="censor-dropZone">Drop PNG or JPG Here</div>
      <div id="censor-canvasWrapper">
        <canvas id="censorCanvas"></canvas>
      </div>
    </div>
    <div id="censor-sidebar">
      <div class="title">Image Censorship</div>
      <div class="subtitle">Drag an image into the editor.</div>
      <button id="censor-addBtn" disabled>Add Censorship</button>
      <button id="censor-saveBtn" disabled>Save JPG</button>
      <div class="section">
        <div class="label">Controls</div>
        <div class="info">
          <kbd>Drag</kbd> Move censor<br /><br />
          <kbd>Corner</kbd> Resize<br /><br />
          <kbd>Scroll</kbd> Resize (up/down)<br /><br />
          Always stays square
        </div>
      </div>
      <div class="footer">Velutinx Tool</div>
    </div>
  </div>

  <script src="/assets/js/censor.js"></script>
</body>
</html>
