<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velutinx – Censorship Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0c10;
      color: #e0e0e0;
    }
    body {
      display: flex;
    }
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #viewer {
      flex: 1;
      position: relative;
      background: #090b0f;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: auto;
    }
    #dropZone {
      width: 100%;
      height: 100%;
      min-height: 300px;
      border: 2px dashed #3a4050;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #888;
      font-size: 24px;
      transition: 0.15s;
      text-align: center;
      padding: 20px;
    }
    #dropZone.drag {
      border-color: #5a6e3c;
      background: #10151b;
    }
    #canvasWrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: none;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      max-width: 100%;
      max-height: 100%;
      image-rendering: auto;
    }
    #sidebar {
      width: 280px;
      background: #11151c;
      border-left: 1px solid #2a2f38;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .title {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #888;
      font-size: 13px;
      margin-bottom: 20px;
    }
    button {
      border: none;
      border-radius: 30px;
      background: #2c6e2c;
      color: white;
      font-size: 15px;
      padding: 12px;
      cursor: pointer;
      transition: 0.15s;
    }
    button:hover:not(:disabled) {
      background: #3f8f3f;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .section {
      border-top: 1px solid #2a2f38;
      padding-top: 16px;
    }
    .label {
      font-size: 13px;
      color: #9aa0aa;
      margin-bottom: 8px;
    }
    .info {
      font-size: 13px;
      line-height: 22px;
      color: #aaa;
    }
    kbd {
      background: #0b0f15;
      border: 1px solid #2a2f38;
      border-radius: 6px;
      padding: 2px 6px;
    }
    .footer {
      margin-top: auto;
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="main">
    <div id="viewer">
      <div id="dropZone">Drop PNG or JPG Here</div>
      <div id="canvasWrapper">
        <canvas id="editorCanvas"></canvas>
      </div>
    </div>
    <div id="sidebar">
      <div class="title">Image Censorship</div>
      <div class="subtitle">Drag an image into the editor.</div>
      <button id="addButton" disabled>Add Censorship</button>
      <button id="saveButton" disabled>Save JPG</button>
      <div class="section">
        <div class="label">Controls</div>
        <div class="info">
          <kbd>Drag</kbd> Move censor<br /><br />
          <kbd>Corner</kbd> Resize<br /><br />
          <kbd>Scroll</kbd> Resize (up/down)<br /><br />
          Always stays square
        </div>
      </div>
      <div class="footer">Velutinx Tool</div>
    </div>
  </div>

  <script>
    (function() {
      // ----- DOM refs -----
      const canvas = document.getElementById('editorCanvas');
      const ctx = canvas.getContext('2d');
      const dropZone = document.getElementById('dropZone');
      const addButton = document.getElementById('addButton');
      const saveButton = document.getElementById('saveButton');
      const canvasWrapper = document.getElementById('canvasWrapper');

      // ----- Load censorship image from absolute URL -----
      const censorImage = new Image();
      censorImage.crossOrigin = 'anonymous';
      censorImage.src = 'https://www.velutinx.com/images/Censoring.png';

      // ----- State -----
      let originalImage = null;
      let originalFileName = 'image';
      let imageLoaded = false;
      let darkOverlay = false;

      // Editor rectangle
      const editor = {
        x: 0,
        y: 0,
        size: 180,
        visible: false,
      };

      const HANDLE_SIZE = 16;
      const MIN_SIZE = 32;
      let maxSize = 2000; // will be set when image loads

      // Scale factor between canvas pixels and CSS pixels
      let canvasScale = 1;

      // ----- Fit canvas inside wrapper (preserve aspect ratio) -----
      function fitCanvas(img) {
        const wrapperRect = canvasWrapper.getBoundingClientRect();
        const availWidth = wrapperRect.width - 12;
        const availHeight = wrapperRect.height - 12;

        const imgW = img.width;
        const imgH = img.height;

        const scaleX = availWidth / imgW;
        const scaleY = availHeight / imgH;
        canvasScale = Math.min(scaleX, scaleY, 1);

        canvas.width = imgW;
        canvas.height = imgH;

        canvas.style.width = (imgW * canvasScale) + 'px';
        canvas.style.height = (imgH * canvasScale) + 'px';

        canvas.style.display = 'block';
        dropZone.style.display = 'none';

        // Set max size for censorship to half the smaller dimension
        maxSize = Math.min(imgW, imgH) / 1.5;
        if (editor.size > maxSize) editor.size = maxSize;
      }

      // ----- Drawing -----
      function draw() {
        if (!imageLoaded) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

        if (darkOverlay) {
          ctx.fillStyle = 'rgba(0,0,0,0.35)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        if (editor.visible && censorImage.complete && censorImage.naturalWidth > 0) {
          ctx.drawImage(censorImage, editor.x, editor.y, editor.size, editor.size);
          drawSelection();
        }
      }

      function drawSelection() {
        ctx.save();
        ctx.strokeStyle = '#45ff45';
        ctx.lineWidth = 2;
        ctx.strokeRect(editor.x, editor.y, editor.size, editor.size);

        ctx.fillStyle = '#45ff45';
        const hx = editor.x + editor.size - HANDLE_SIZE / 2;
        const hy = editor.y + editor.size - HANDLE_SIZE / 2;
        ctx.fillRect(hx, hy, HANDLE_SIZE, HANDLE_SIZE);
        ctx.restore();
      }

      // ----- Mouse coordinate to canvas space -----
      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      // ----- Hit testing -----
      function insideEditor(x, y) {
        return x >= editor.x && x <= editor.x + editor.size &&
               y >= editor.y && y <= editor.y + editor.size;
      }

      function insideHandle(x, y) {
        const hx = editor.x + editor.size - HANDLE_SIZE / 2;
        const hy = editor.y + editor.size - HANDLE_SIZE / 2;
        return x >= hx && x <= hx + HANDLE_SIZE &&
               y >= hy && y <= hy + HANDLE_SIZE;
      }

      // ----- Drag / Resize state -----
      let dragging = false;
      let resizing = false;
      let dragOffsetX = 0;
      let dragOffsetY = 0;

      // ----- Canvas mouse events -----
      canvas.addEventListener('mousedown', function(e) {
        if (!editor.visible) return;
        const p = canvasPoint(e);
        if (insideHandle(p.x, p.y)) {
          resizing = true;
          return;
        }
        if (insideEditor(p.x, p.y)) {
          dragging = true;
          dragOffsetX = p.x - editor.x;
          dragOffsetY = p.y - editor.y;
        }
      });

      window.addEventListener('mouseup', function() {
        dragging = false;
        resizing = false;
      });

      canvas.addEventListener('mousemove', function(e) {
        if (!editor.visible) return;
        const p = canvasPoint(e);

        if (dragging) {
          editor.x = p.x - dragOffsetX;
          editor.y = p.y - dragOffsetY;
          clamp();
          draw();
          return;
        }
        if (resizing) {
          const newSize = Math.max(MIN_SIZE, Math.max(p.x - editor.x, p.y - editor.y));
          editor.size = Math.min(newSize, maxSize);
          clamp();
          draw();
          return;
        }

        if (insideHandle(p.x, p.y)) {
          canvas.style.cursor = 'nwse-resize';
        } else if (insideEditor(p.x, p.y)) {
          canvas.style.cursor = 'move';
        } else {
          canvas.style.cursor = 'default';
        }
      });

      // ----- Mouse wheel resize -----
      canvas.addEventListener('wheel', function(e) {
        if (!editor.visible) return;
        e.preventDefault(); // prevent page scroll

        const delta = e.deltaY > 0 ? -1 : 3; // scroll down = smaller, up = bigger
        const step = e.shiftKey ? 20 : 10;    // shift for finer control
        let newSize = editor.size + delta * step;
        newSize = Math.max(MIN_SIZE, Math.min(newSize, maxSize));
        editor.size = newSize;
        clamp();
        draw();
      }, { passive: false });

      // ----- Clamp editor inside canvas -----
      function clamp() {
        if (editor.x < 0) editor.x = 0;
        if (editor.y < 0) editor.y = 0;
        if (editor.x + editor.size > canvas.width) editor.x = canvas.width - editor.size;
        if (editor.y + editor.size > canvas.height) editor.y = canvas.height - editor.size;
      }

      // ----- Keyboard arrows -----
      window.addEventListener('keydown', function(e) {
        if (!editor.visible) return;
        const step = e.shiftKey ? 10 : 1;
        switch (e.key) {
          case 'ArrowLeft':  editor.x -= step; break;
          case 'ArrowRight': editor.x += step; break;
          case 'ArrowUp':    editor.y -= step; break;
          case 'ArrowDown':  editor.y += step; break;
          default: return;
        }
        clamp();
        draw();
        e.preventDefault();
      });

      // ----- Drop zone -----
      dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        dropZone.classList.add('drag');
      });

      dropZone.addEventListener('dragleave', function() {
        dropZone.classList.remove('drag');
      });

      dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        dropZone.classList.remove('drag');
        const file = e.dataTransfer.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
          alert('Please drop a PNG or JPG image.');
          return;
        }

        originalFileName = file.name.replace(/\.[^.]+$/, '');

        const reader = new FileReader();
        reader.onload = function(ev) {
          const img = new Image();
          img.onload = function() {
            originalImage = img;
            imageLoaded = true;
            fitCanvas(img);

            // Initial censor size: 1/4 of smaller dimension
            editor.size = Math.min(img.width, img.height) / 4;
            editor.x = (img.width - editor.size) / 2;
            editor.y = (img.height - editor.size) / 2;

            addButton.disabled = false;
            saveButton.disabled = false;
            draw();
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });

      // ----- Add / Remove censorship -----
      addButton.addEventListener('click', function() {
        editor.visible = !editor.visible;
        darkOverlay = editor.visible;
        draw();
        addButton.textContent = editor.visible ? 'Remove Censorship' : 'Add Censorship';
      });

      // ----- Save as JPG -----
      saveButton.addEventListener('click', function() {
        if (!imageLoaded) return;

        const out = document.createElement('canvas');
        out.width = canvas.width;
        out.height = canvas.height;
        const octx = out.getContext('2d');

        octx.drawImage(originalImage, 0, 0, out.width, out.height);

        if (editor.visible && censorImage.complete && censorImage.naturalWidth > 0) {
          octx.drawImage(censorImage, editor.x, editor.y, editor.size, editor.size);
        }

        const link = document.createElement('a');
        link.download = originalFileName + '.jpg';
        link.href = out.toDataURL('image/jpeg', 0.95);
        link.click();
      });

      // ----- Handle window resize -----
      window.addEventListener('resize', function() {
        if (imageLoaded) {
          fitCanvas(originalImage);
          draw();
        }
      });

      // ----- Censor image load -----
      censorImage.onload = function() {
        if (imageLoaded) draw();
      };
      censorImage.onerror = function() {
        console.warn('Failed to load censorship image. Check URL.');
      };

      if (censorImage.complete && censorImage.naturalWidth > 0) {
        // already loaded, nothing else
      }
    })();
  </script>
</body>
</html>
