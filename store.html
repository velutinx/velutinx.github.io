<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VELUTINX | Official Store</title>
  <link rel="stylesheet" href="/assets/css/shared.css">
<script src="https://www.paypal.com/sdk/js?client-id=AarYGoVTnq3s7nZoCb7D8P39_k6ScybQQrLBkZ6YWN39lhIRj521sJDxana7gWLi2jYbdHfXhGB63a6v&currency=USD"></script>
  <style>
    /* store-specific styles */
    .main-container {
      display: flex;
      max-width: 1600px;
      margin: 0 auto;
      padding: 1.5rem 2rem 2rem;
      gap: 2rem;
    }
    .store-filter-sidebar {
      width: 260px;
      flex-shrink: 0;
    }
    .section-title {
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-list, .sort-options {
      list-style: none;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 1.8rem;
      overflow: hidden;
    }
    .category-list li, .sort-btn {
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text);
      background: var(--card);
      border: none;
      width: 100%;
      text-align: left;
      font-size: 1rem;
    }
    .category-list li svg, .sort-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }
    .category-list li:hover, .sort-btn:hover { background: var(--darker); }
    .category-list li.active, .sort-btn.active {
      background: var(--accent);
      color: #1f1a12;
      font-weight: 600;
    }
    .products-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .products-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }
    .search-bar-wrapper { width: 280px; }
    .input-base {
      display: flex;
      align-items: center;
      background: var(--card);
      border-radius: 40px;
      border: 1px solid var(--border);
      padding: 6px 12px;
      gap: 8px;
    }
    .input-element {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      padding: 8px 0;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.8rem;
    }
    @media (max-width: 1200px) {
      .product-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 1000px) {
      .product-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 780px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); }
      .main-container { flex-direction: column; }
      .store-filter-sidebar { width: 100%; }
    }
    @media (max-width: 500px) {
      .product-grid { grid-template-columns: 1fr; }
    }
    .product-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.2);
    }
    .card-image {
      width: 100%;
      aspect-ratio: 3/3.5;
      object-fit: cover;
      display: block;
      background: #d9d4c2;
    }
    .card-content { padding: 1rem; }
    .card-title { font-weight: 600; margin-bottom: 0.5rem; }
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--red-discount);
    }
    .cart-btn {
      width: 44px;
      height: 44px;
      background: var(--btn-cart);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .cart-btn svg { width: 26px; height: 26px; }
    .cart-btn.added { background: var(--success); }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="main-container">
  <aside class="store-filter-sidebar">
    <div class="section-title" id="filterTitle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h16"/><path d="M8 6v4M16 12v6"/></svg><span>Filter by Category</span></div>
    <ul class="category-list" id="categoryList">
      <li data-cat="all" class="active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span id="catAll">All Products</span></li>
      <li data-cat="female"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="9" r="6" stroke="currentColor" stroke-width="2"/><path d="M12 15V21M9 18H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span id="catFemale">Female Models</span></li>
      <li data-cat="femboy"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="14" r="6" stroke="currentColor" stroke-width="2"/><path d="M16 8L20 4M20 4H16M20 4V8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span id="catFemboy">Femboy Models</span></li>
      <li data-cat="membership"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3 6 6 .7-4.5 4.1L18 19l-6-3-6 3 1.5-6.2L3 8.7 9 8z"/></svg><span id="catMembership">Memberships</span></li>
    </ul>
    <div class="section-title" id="sortTitle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 3v12M7 15l-3-3M7 15l3-3M17 21V9M17 9l-3 3M17 9l3 3"/></svg><span>Sort by</span></div>
    <div id="sortContainer">
      <button class="sort-btn active" data-sort="newest"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v12M12 15l-3-3M12 15l3-3"/><path d="M5 21h14"/></svg><span id="sortNewest">Newest</span></button>
      <button class="sort-btn" data-sort="oldest"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21V9M12 9l-3 3M12 9l3 3"/><path d="M5 3h14"/></svg><span id="sortOldest">Oldest</span></button>
      <button class="sort-btn" data-sort="price-asc"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 15h6M4 9h10M4 3h14M20 9v12M20 21l3-3M20 21l-3-3"/></svg><span id="sortLow">Price: Low to High</span></button>
      <button class="sort-btn" data-sort="price-desc"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 15h6M4 9h10M4 3h14M20 21V9M20 9l3 3M20 9l-3-3"/></svg><span id="sortHigh">Price: High to Low</span></button>
    </div>
  </aside>

  <main class="products-section">
    <div class="products-header">
      <h2 id="latestTitle">Latest Content</h2>
      <div class="search-bar-wrapper">
        <div class="input-base">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="gray" stroke-width="2"><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path><path d="M21 21l-6 -6"></path></svg>
          <input type="search" id="searchInput" class="input-element" placeholder="Search...">
        </div>
      </div>
    </div>
    <div class="product-grid" id="productGrid"></div>
  </main>
</div>

<script src="/assets/js/shared.js"></script>
<script src="/assets/js/price.js" type="module"></script>

<script type="module">
import packsData from '/assets/js/packs-data.js';

// ==================== Store‑specific translations ====================
const storeTranslations = {
  en: {
    filterTitle: "Filter by Category", sortTitle: "Sort by", catAll: "All Products",
    catFemale: "Female Models", catFemboy: "Femboy Models", catMembership: "Memberships",
    sortNewest: "Newest", sortOldest: "Oldest", sortLow: "Price: Low to High", sortHigh: "Price: High to Low",
    latestTitle: "Latest Content", searchPlaceholder: "Search...", emptyCart: "Your cart is empty",
    addedMsg: "Added to cart", removedMsg: "Removed from cart",
    membershipTitle: "Requests & Membership",
    membershipLearnMore: "Learn More"
  },
  ja: {
    filterTitle: "カテゴリで絞り込み", sortTitle: "並び替え", catAll: "すべて",
    catFemale: "婦人", catFemboy: "男の娘", catMembership: "メンバーシップ",
    sortNewest: "新着順", sortOldest: "古い順", sortLow: "価格: 安い順", sortHigh: "価格: 高い順",
    latestTitle: "最新コンテンツ", searchPlaceholder: "検索...", emptyCart: "カートは空です",
    addedMsg: "カートに追加しました", removedMsg: "カートから削除しました",
    membershipTitle: "リクエスト＆メンバーシップ",
    membershipLearnMore: "詳細を見る"
  },
  zh: {
    filterTitle: "按分类筛选", sortTitle: "排序方式", catAll: "所有商品",
    catFemale: "女性模型", catFemboy: "伪娘模型", catMembership: "会员资格",
    sortNewest: "最新", sortOldest: "最旧", sortLow: "价格: 从低到高", sortHigh: "价格: 从高到低",
    latestTitle: "最新内容", searchPlaceholder: "搜索...", emptyCart: "购物车是空的",
    addedMsg: "已添加到购物车", removedMsg: "已从购物车移除",
    membershipTitle: "请求与会员资格",
    membershipLearnMore: "了解更多"
  },
  es: {
    filterTitle: "Filtrar por Categoría", sortTitle: "Ordenar por", catAll: "Todos los productos",
    catFemale: "Modelos Femeninos", catFemboy: "Modelos Femboy", catMembership: "Membresías",
    sortNewest: "Más reciente", sortOldest: "Más antiguo", sortLow: "Precio: menor a mayor", sortHigh: "Precio: mayor a menor",
    latestTitle: "Último Contenido", searchPlaceholder: "Buscar...", emptyCart: "Tu carrito está vacío",
    addedMsg: "Añadido al carrito", removedMsg: "Eliminado del carrito",
    membershipTitle: "Solicitudes y Membresía",
    membershipLearnMore: "Más información"
  }
};

// ==================== Store cart ====================
let storeCart = JSON.parse(localStorage.getItem('velutinx_store_cart') || '[]');

function saveStoreCart() {
  localStorage.setItem('velutinx_store_cart', JSON.stringify(storeCart));
  updateStoreCartUI();
}

function updateStoreCartUI() {
  const container = document.getElementById('cartItems');
  const totalSpan = document.getElementById('cartTotal');
  if (!container) return;
  const t = storeTranslations[window.currentLanguage || 'en'];
  container.innerHTML = storeCart.length === 0 ? `<div style="padding:1rem;">${t.emptyCart}</div>` : '';
  let total = 0;
  storeCart.forEach((item, idx) => {
    const priceStr = window.getFormattedPrice(item.priceKey);
    total += window.priceKeyMap[item.priceKey] || 0;
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `<img src="${item.image}" alt="${item.title}"><div class="cart-item-info"><div class="cart-item-title">${escapeHtml(item.title)}</div><div class="cart-item-price">${priceStr}</div></div><button class="cart-item-remove" data-idx="${idx}">✕</button>`;
    container.appendChild(div);
  });
  document.querySelectorAll('.cart-item-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const idx = parseInt(btn.dataset.idx);
      storeCart.splice(idx, 1);
      saveStoreCart();
      showSnackbar(t.removedMsg, true);
      renderStoreGrid();
    });
  });
  if (totalSpan) totalSpan.innerText = window.formatPrice(total);
  document.querySelectorAll('#cartCount, #floatingCartCount').forEach(el => { if (el) el.textContent = storeCart.length; });

  const cartDrawer = document.getElementById('cartDrawer');
  if (cartDrawer && cartDrawer.classList.contains('open')) renderPayPalButton();
}

function showSnackbar(msg, isRemove) {
  const sb = document.getElementById('snackbar');
  if (sb) {
    sb.style.background = isRemove ? '#ef4444' : '#22c55e';
    const textSpan = sb.querySelector('#snackText');
    if (textSpan) textSpan.innerText = msg;
    sb.classList.add('show');
    setTimeout(() => sb.classList.remove('show'), 2000);
  } else alert(msg);
}

window.addOrToggleCart = function(product) {
  const idx = storeCart.findIndex(i => String(i.id) === String(product.id));
  const t = storeTranslations[window.currentLanguage || 'en'];
  if (idx > -1) {
    storeCart.splice(idx, 1);
    showSnackbar(t.removedMsg, true);
  } else {
    storeCart.push({ id: product.id, title: product.title, priceKey: product.priceKey, image: product.image, type: 'store' });
    showSnackbar(t.addedMsg, false);
  }
  saveStoreCart();
  renderStoreGrid();
};

// ==================== Store rendering logic ====================
let products = [];
let activeCategory = "all";
let currentSort = "newest";
let searchQuery = "";
let currentLang = localStorage.getItem('language') || 'en';

function applyStoreTranslations() {
  const t = storeTranslations[currentLang];
  const filterSpan = document.querySelector('#filterTitle span');
  if (filterSpan) filterSpan.innerText = t.filterTitle;
  const sortSpan = document.querySelector('#sortTitle span');
  if (sortSpan) sortSpan.innerText = t.sortTitle;
  const catAll = document.getElementById('catAll');
  if (catAll) catAll.innerText = t.catAll;
  const catFemale = document.getElementById('catFemale');
  if (catFemale) catFemale.innerText = t.catFemale;
  const catFemboy = document.getElementById('catFemboy');
  if (catFemboy) catFemboy.innerText = t.catFemboy;
  const catMembership = document.getElementById('catMembership');
  if (catMembership) catMembership.innerText = t.catMembership;
  const sortNewest = document.getElementById('sortNewest');
  if (sortNewest) sortNewest.innerText = t.sortNewest;
  const sortOldest = document.getElementById('sortOldest');
  if (sortOldest) sortOldest.innerText = t.sortOldest;
  const sortLow = document.getElementById('sortLow');
  if (sortLow) sortLow.innerText = t.sortLow;
  const sortHigh = document.getElementById('sortHigh');
  if (sortHigh) sortHigh.innerText = t.sortHigh;
  const latestTitle = document.getElementById('latestTitle');
  if (latestTitle) latestTitle.innerText = t.latestTitle;
  const searchInput = document.getElementById('searchInput');
  if (searchInput) searchInput.placeholder = t.searchPlaceholder;
}

function getFilteredSorted() {
  let filtered = products.filter(p => {
    if (activeCategory === "all") return true;
    if (activeCategory === "female") return p.category === 1;
    if (activeCategory === "femboy") return p.category === 2;
    if (activeCategory === "membership") return p.category === 3;
    return false;
  });
  if (searchQuery) {
    filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery.toLowerCase()));
  }
  if (currentSort === "newest") {
    filtered.sort((a, b) => {
      if (a.id === 'membership') return -1;
      if (b.id === 'membership') return 1;
      return parseInt(b.id) - parseInt(a.id);
    });
  } else if (currentSort === "oldest") {
    filtered.sort((a, b) => {
      if (a.id === 'membership') return -1;
      if (b.id === 'membership') return 1;
      return parseInt(a.id) - parseInt(b.id);
    });
  } else if (currentSort === "price-asc") {
    filtered.sort((a, b) => {
      if (a.id === 'membership') return -1;
      if (b.id === 'membership') return 1;
      return (window.priceKeyMap[a.priceKey] || 0) - (window.priceKeyMap[b.priceKey] || 0);
    });
  } else if (currentSort === "price-desc") {
    filtered.sort((a, b) => {
      if (a.id === 'membership') return -1;
      if (b.id === 'membership') return 1;
      return (window.priceKeyMap[b.priceKey] || 0) - (window.priceKeyMap[a.priceKey] || 0);
    });
  }
  return filtered;
}

function renderStoreGrid() {
  const grid = document.getElementById('productGrid');
  if (!grid) return;
  const items = getFilteredSorted();
  grid.innerHTML = '';
  items.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.dataset.id = p.id;

    if (p.id === 'membership') {
      const t = storeTranslations[currentLang];
      card.innerHTML = `
        <img src="https://www.velutinx.com/i/packmembership-1-1.jpg" class="card-image" onerror="this.src='https://placehold.co/300x350?text=Membership'">
        <div class="card-content">
          <div class="card-title">${escapeHtml(t.membershipTitle)}</div>
          <div class="price-row" style="justify-content: center;">
            <a href="/s/membership" style="background: var(--accent); color: white; padding: 0.5rem 1rem; border-radius: 40px; text-decoration: none; font-weight: 600; margin-top: 8px; display: inline-block;">${escapeHtml(t.membershipLearnMore)}</a>
          </div>
        </div>
      `;
      card.onclick = () => { window.location.href = '/s/membership'; };
    } else {
      const imgUrl = `https://www.velutinx.com/i/pack${String(p.id).padStart(3, '0')}-1.jpg`;
      const priceString = window.getFormattedPrice(p.priceKey);
      const inCart = storeCart.some(i => String(i.id) === String(p.id));
      const cartButtonSvg = inCart
        ? `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 3H4.5L6.5 15H19L21 7H8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="20" r="2" stroke="white" stroke-width="2"/><circle cx="17" cy="20" r="2" stroke="white" stroke-width="2"/><circle cx="18" cy="7" r="5" fill="#e74c3c"/><path d="M16 7H20" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>`
        : `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 3H4.5L6.5 15H19L21 7H8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="20" r="2" stroke="white" stroke-width="2"/><circle cx="17" cy="20" r="2" stroke="white" stroke-width="2"/><circle cx="18" cy="7" r="5" fill="#2ecc71"/><path d="M18 5V9M16 7H20" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>`;
      card.innerHTML = `<img src="${imgUrl}" class="card-image" onerror="this.src='https://placehold.co/300x350?text=preview'"><div class="card-content"><div class="card-title">${escapeHtml(p.title)}</div><div class="price-row"><div class="price">${priceString}</div><button class="cart-btn ${inCart ? 'added' : ''}">${cartButtonSvg}</button></div></div>`;
      const btn = card.querySelector('.cart-btn');
      btn.onclick = (e) => {
        e.stopPropagation();
        window.addOrToggleCart({ id: p.id, title: p.title, priceKey: p.priceKey, image: imgUrl, type: 'store' });
      };
      card.onclick = () => { window.location.href = `/s/pack?id=${p.id}`; };
    }
    grid.appendChild(card);
  });
}

function escapeHtml(str) {
  return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
}

function bindStoreEvents() {
  document.querySelectorAll('.category-list li').forEach(li => {
    li.addEventListener('click', () => {
      document.querySelectorAll('.category-list li').forEach(l => l.classList.remove('active'));
      li.classList.add('active');
      activeCategory = li.dataset.cat;
      renderStoreGrid();
    });
  });
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      renderStoreGrid();
    });
  });
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderStoreGrid();
  });
  document.addEventListener('languageChanged', () => {
    currentLang = localStorage.getItem('language') || 'en';
    applyStoreTranslations();
    renderStoreGrid();
    const drawer = document.getElementById('cartDrawer');
    if (drawer && drawer.classList.contains('open')) updateStoreCartUI();
  });
}

// ==================== Cart drawer observer ====================
function observeCartDrawer() {
  const cartDrawer = document.getElementById('cartDrawer');
  if (!cartDrawer) return;
  const observer = new MutationObserver((mutations) => {
    for (const mutation of mutations) {
      if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
        if (cartDrawer.classList.contains('open')) updateStoreCartUI();
      }
    }
  });
  observer.observe(cartDrawer, { attributes: true });
}

// ==================== PayPal integration ====================
let isRendering = false;

function renderPayPalButton() {
  const container = document.getElementById('paypal-button-container');
  if (!container || !document.body.contains(container)) return;
  const cartDrawer = document.getElementById('cartDrawer');
  if (!cartDrawer || !cartDrawer.classList.contains('open')) return;
  if (isRendering) return;
  isRendering = true;

  const cart = storeCart;
  if (cart.length === 0) {
    container.innerHTML = '<p style="text-align:center; margin-top:1rem;">Add items to checkout</p>';
    isRendering = false;
    return;
  }

  container.innerHTML = '';
  paypal.Buttons({
    createOrder: async () => {
      const response = await fetch('https://velutinx-paypal-worker.velutinx.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Order creation failed');
      return data.orderID;
    },
    onApprove: async (data, actions) => {
      try {
        const capture = await actions.order.capture();
        const orderID = capture.id;

        // Send cart to orders worker to store in Supabase
        const storeResponse = await fetch('https://orders.velutinx.workers.dev/store-cart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderID, cart })
        });
        if (!storeResponse.ok) {
          const errorText = await storeResponse.text();
          console.error('Failed to store order in Supabase:', errorText);
          alert('Payment succeeded but there was an issue recording your order. Please contact support with your order ID: ' + orderID);
        }

        // Clear cart and redirect
        storeCart = [];
        saveStoreCart();
        updateStoreCartUI();
        renderStoreGrid();
        window.location.href = `/s/success.html?orderID=${orderID}`;
      } catch (err) {
        console.error('Error in onApprove:', err);
        alert('Something went wrong after payment. Please contact support.');
      }
    },
    onError: (err) => {
      console.error('PayPal error', err);
      alert('Something went wrong. Please try again.');
    },
    onCancel: () => {
      isRendering = false;
    }
  }).render(container).then(() => {
    isRendering = false;
  }).catch(() => {
    isRendering = false;
  });
}

window.setupStoreCheckout = () => renderPayPalButton();

// ==================== Intercept cart button clicks ====================
function interceptCartButtons() {
  const cartBtn = document.getElementById('cartBtn');
  const floatCartBtn = document.getElementById('floatingCartBtn');
  if (!cartBtn && !floatCartBtn) return;

  const openOurCart = (e) => {
    e.stopPropagation();
    e.preventDefault();
    const drawer = document.getElementById('cartDrawer');
    const overlay = document.getElementById('cartOverlay');
    if (drawer && !drawer.classList.contains('open')) {
      drawer.classList.add('open');
      overlay.classList.add('active');
      document.body.classList.add('drawer-open');
      renderPayPalButton();
    }
  };

  if (cartBtn) cartBtn.addEventListener('click', openOurCart, true);
  if (floatCartBtn) floatCartBtn.addEventListener('click', openOurCart, true);
}

// ==================== Initialisation ====================
function initStore() {
  if (!window.priceKeyMap || !window.priceUsdMap) {
    setTimeout(initStore, 200);
    return;
  }
  // Build products array from packsData
  const packProducts = packsData.map(p => ({
    id: p.id,
    title: p.title,
    category: p.category,
    priceKey: p.price
  }));
  // Add membership item as the first product (newest)
  const membershipItem = {
    id: "membership",
    title: "Requests & Membership", // fallback, will be replaced by translation
    category: 3, // membership category
    priceKey: null,
    isLink: true
  };
  products = [membershipItem, ...packProducts];

  applyStoreTranslations();
  bindStoreEvents();
  renderStoreGrid();
  updateStoreCartUI();
  observeCartDrawer();
  interceptCartButtons();
  renderPayPalButton();

  // Override shared.js functions to prevent interference
  window.renderPayPalButton = function() {};
  window.updateCartUI = function() {};
  window.saveCart = function() {};

  if (window.headerReady) {
  initStore();
} else {
  document.addEventListener('headerReady', initStore);
}

document.addEventListener('headerReady', () => {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initStore);
  } else {
    initStore();
  }
});
</script>
