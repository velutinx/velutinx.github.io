<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP | VELUTINX</title>

  <link rel="preconnect" href="https://www.velutinx.com" crossorigin>
  <link rel="stylesheet" href="https://velutinx.com/assets/css/material-symbols.css">
  <link rel="stylesheet" href="https://velutinx.com/assets/css/header.css">
 
  <style>
    #shopTitle {
      visibility: hidden;
      transition: visibility 0s linear 0.1s;
    }
    #shopTitle.loaded {
      visibility: visible;
    }
    .store-filter-sidebar {
      width: 268px;
      flex-shrink: 0;
    }
    .shop-header { 
      padding: 2.2rem 2.8rem 1.6rem; 
      background: var(--bg); 
    }
    .shop-container { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      max-width: 1400px; 
      margin: 0 auto; 
      gap: 2rem; 
      flex-wrap: wrap; 
    }
    .shop-left { 
      display: flex; 
      align-items: center; 
      gap: 1.2rem; 
    }
    .shop-title { 
      font-size: 2.3rem; 
      font-weight: 800; 
      color: #000; 
      margin: 0; 
    }
    body.dark .shop-title { 
      color: var(--accent); 
    }
    .main-container { 
      display: flex; 
      max-width: 1480px; 
      margin: 0 auto; 
      padding: 1.5rem 2.5rem; 
      gap: 2.5rem; 
    }
    .products-section { 
      flex: 1; 
    }
    .section-title { 
      font-size: 1.15rem; 
      font-weight: 600; 
      margin-bottom: 0.9rem; 
      color: var(--text); 
      padding-left: 0.5rem; 
    }
    .category-list { 
      list-style: none; 
      background: var(--card); 
      border-radius: 12px; 
      overflow: hidden; 
      border: 1px solid var(--border); 
      padding: 0; 
    }
    .category-list li { 
      padding: 1rem 1.25rem; 
      display: flex; 
      align-items: center; 
      gap: 0.9rem; 
      color: var(--text); 
      cursor: pointer; 
      transition: 0.2s; 
    }
    .category-list li:hover { 
      background: #c0bcaa; 
    }
    .category-list li.active { 
      background: var(--accent); 
      color: #1f1a12; 
      font-weight: 600; 
    }
    .sort-options { 
      margin-top: 2rem; 
    }
    .sort-btn { 
      width: 100%; 
      padding: 1rem 1.25rem; 
      background: var(--card); 
      border: 1px solid var(--border); 
      text-align: left; 
      margin-bottom: 0.5rem; 
      border-radius: 10px; 
      font-size: 1rem; 
      cursor: pointer; 
      transition: 0.2s; 
      display: flex; 
      align-items: center; 
      gap: 0.9rem; 
      color: var(--text); 
    }
    .sort-btn.active { 
      background: var(--accent); 
      color: #1f1a12; 
    }
    .sort-btn:hover:not(.active) { 
      background: #c0bcaa; 
    }
    .products-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 1.8rem; 
      flex-wrap: wrap; 
      gap: 1rem; 
    }
    .products-header h2 { 
      font-size: 1.65rem; 
      font-weight: 700; 
      color: var(--text); 
    }
    .search-bar-wrapper { 
      width: 340px; 
      max-width: 100%; 
    }
    .input-base { 
      position: relative; 
      display: flex; 
      align-items: center; 
      background: var(--card); 
      border-radius: 8px; 
      overflow: hidden; 
      border: 1px solid var(--border); 
      padding-left: 12px; 
      transition: border-color 0.2s; 
    }
    .input-base:focus-within { 
      border-color: var(--accent); 
      box-shadow: 0 0 0 2px rgba(170,158,118,0.2); 
    }
    .input-element { 
      flex: 1; 
      padding: 12px; 
      background: transparent; 
      border: none; 
      outline: none; 
      color: var(--text); 
      font-size: 0.95rem; 
    }
    .product-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); 
      gap: 1.8rem; 
    }
    .product-card { 
      background: var(--card); 
      border-radius: 16px; 
      overflow: hidden; 
      transition: all 0.25s; 
      border: 1px solid var(--border); 
      cursor: pointer; 
      position: relative; 
    }
    .product-card.hidden { 
      display: none; 
    }
    .product-card:hover { 
      transform: translateY(-8px); 
      box-shadow: 0 16px 32px rgba(0,0,0,0.2); 
    }
    .card-image { 
      width: 100%; 
      aspect-ratio: 3 / 3.7; 
      object-fit: cover; 
      display: block; 
    }
    .card-content { 
      padding: 1.2rem; 
    }
    .card-title { 
      font-size: 1.1rem; 
      font-weight: 600; 
      margin-bottom: 0.5rem; 
      color: var(--text); 
    }
    .price-row { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .price { 
      font-size: 1.3rem; 
      font-weight: 700; 
      color: var(--accent); 
    }
  </style>
</head>
<body>

  <div class="lang-swipe" id="langSwipe"></div>

  <nav class="top-nav">
    <div class="nav-left">
      <button id="menuToggle" class="nav-icon" title="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="logo" id="logo">VELUTINX</div>
    </div>

    <div class="nav-actions">
      <button class="login-btn" id="loginBtn">Website</button>
      <div id="langContainer">
        <button class="nav-icon lang-btn" id="langBtn" title="Language">
          <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 5h7"></path><path d="M7 4c0 4.846 0 7 .5 8"></path><path d="M10 8.5c0 2.286 -2 4.5 -3.5 4.5s-2.5 -1.135 -2.5 -2c0 -2 1 -3 3 -3s5 .57 5 2.857c0 1.524 -.667 2.571 -2 3.143"></path><path d="M12 20l4 -9l4 9"></path><path d="M19.1 18h-6.2"></path>
          </svg>
        </button>
        <div id="languagePopover">
          <div class="lang-item" data-lang="en"><img src="https://flagcdn.com/w40/us.png" alt="US"/><p>English (USD)</p></div>
          <div class="lang-item" data-lang="ja"><img src="https://flagcdn.com/w40/jp.png" alt="JP"/><p>日本語 (円)</p></div>
          <div class="lang-item" data-lang="zh"><img src="https://flagcdn.com/w40/cn.png" alt="CN"/><p>简体中文 (元)</p></div>
          <div class="lang-item" data-lang="es"><img src="https://flagcdn.com/w40/mx.png" alt="MX"/><p>Español (MXN)</p></div>
        </div>
      </div>
      <button class="nav-icon" id="themeBtn" title="Night Mode">
        <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"></path>
        </svg>
      </button>
      <div class="cart-wrapper">
        <button class="nav-icon cart-icon" id="cartBtn" title="Cart">
          <svg id="cartIcon" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"></path>
            <path d="M17 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"></path>
            <path d="M17 17h-11v-14h-2"></path>
            <path d="M6 5l14 1l-.86 6.017m-2.64 .983h-10.5"></path>
            <path d="M16 19h6"></path>
            <path d="M19 16v6"></path>
          </svg>
        </button>
        <span class="cart-badge" id="cartCount">0</span>
      </div>
    </div>
  </nav>

  <button class="floating-cart cart-icon" id="floatingCartBtn">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M6 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"></path>
      <path d="M17 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"></path>
      <path d="M17 17h-11v-14h-2"></path>
      <path d="M6 5l14 1l-1 7h-13"></path>
    </svg>
    <span class="floating-badge" id="floatingCartCount">0</span>
  </button>

  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h5 id="cartTitle">Shopping Cart</h5>
      <button class="cart-close" id="cartClose">×</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total">
      <div class="cart-total-row">
        <span id="totalLabel">Total</span>
        <span id="cartTotal">US$0.00</span>
      </div>
      <div id="paypal-button-container"></div>
    </div>
  </div>

  <div id="snackbar">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <path d="M20 6L9 17l-5-5"></path>
    </svg>
    <span id="snackText">Added successfully</span>
  </div>

  <header class="shop-header">
    <div class="shop-container">
      <div class="shop-left">
        <h1 class="shop-title" id="shopTitle">Loading...</h1>
      </div>
    </div>
  </header>

  <div class="main-container">
    <aside class="store-filter-sidebar">
      <div class="section-title" id="filterTitle">Filter by Category</div>
      <ul class="category-list">
        <li class="active" data-cat="0">
          <span class="material-symbols-outlined">done_all</span>
          <span id="catAll">All Products</span>
        </li>
        <li data-cat="1">
          <span class="material-symbols-outlined">female</span>
          <span id="catFemale">Female Models</span>
        </li>
        <li data-cat="2">
          <span class="material-symbols-outlined">male</span>
          <span id="catFemboy">Femboy Models</span>
        </li>
        <li data-cat="3">
          <span class="material-symbols-outlined">collections_bookmark</span>
          <span id="catCollections">Full Collections</span>
        </li>
      </ul>
      <div class="sort-options">
        <div class="section-title" id="sortTitle">Sort by</div>
        <button class="sort-btn active" data-sort="newest">
          <span class="material-symbols-outlined">clock_arrow_up</span>
          <span id="sortNewest">Newest</span>
        </button>
        <button class="sort-btn" data-sort="oldest">
          <span class="material-symbols-outlined">clock_arrow_down</span>
          <span id="sortOldest">Oldest</span>
        </button>
        <button class="sort-btn" data-sort="price-asc">
          <span class="material-symbols-outlined">stat_3</span>
          <span id="sortLow">Price: Low to High</span>
        </button>
        <button class="sort-btn" data-sort="price-desc">
          <span class="material-symbols-outlined">stat_minus_3</span>
          <span id="sortHigh">Price: High to Low</span>
        </button>
      </div>
    </aside>

    <main class="products-section">
      <div class="products-header">
        <h2 id="productsTitle">Latest Content</h2>
        <div class="search-bar-wrapper">
          <div class="input-base">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="gray" stroke-width="2">
              <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path><path d="M21 21l-6 -6"></path>
            </svg>
            <input type="search" id="searchInput" class="input-element" placeholder="" />
          </div>
        </div>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>

  <script src="https://velutinx.com/assets/js/header.js"></script>
  <script src="https://velutinx.com/assets/js/packs-data.js"></script>
  
  <script>
    const localTranslations = {
      en: { shopTitle: "VELUTINX STORE", filterTitle: "Filter by Category", catAll: "All Products", catFemale: "Female Models", catFemboy: "Femboy Models", catCollections: "Full Collections", sortTitle: "Sort by", sortNewest: "Newest", sortOldest: "Oldest", sortLow: "Price: Low to High", sortHigh: "Price: High to Low", productsTitle: "Latest Content", searchPlaceholder: "Search products...", cartTitle: "Shopping Cart", totalLabel: "Total", snackText: "Added successfully" },
      ja: { shopTitle: "VELUTINX ストア", filterTitle: "カテゴリでフィルター", catAll: "すべての商品", catFemale: "女性モデル", catFemboy: "男の娘モデル", catCollections: "フルコレクション", sortTitle: "並び替え", sortNewest: "最新", sortOldest: "最古", sortLow: "価格: 低い → 高い", sortHigh: "価格: 高い → 低い", productsTitle: "最新コンテンツ", searchPlaceholder: "商品を検索...", cartTitle: "ショッピングカート", totalLabel: "合計", snackText: "カートに追加しました" },
      zh: { shopTitle: "VELUTINX 商店", filterTitle: "按类别筛选", catAll: "所有商品", catFemale: "女性模型", catFemboy: "伪娘模型", catCollections: "完整收藏", sortTitle: "排序方式", sortNewest: "最新", sortOldest: "最旧", sortLow: "价格: 低到高", sortHigh: "价格: 高到低", productsTitle: "最新内容", searchPlaceholder: "搜索商品...", cartTitle: "购物车", totalLabel: "总计", snackText: "已成功添加到购物车" },
      es: { shopTitle: "TIENDA VELUTINX", filterTitle: "Filtrar por Categoría", catAll: "Todos los Productos", catFemale: "Modelos Femeninos", catFemboy: "Modelos Femboy", catCollections: "Colecciones Completas", sortTitle: "Ordenar por", sortNewest: "Más reciente", sortOldest: "Más antiguo", sortLow: "Precio: Bajo a Alto", sortHigh: "Precio: Alto a Bajo", productsTitle: "Contenido más reciente", searchPlaceholder: "Buscar productos...", cartTitle: "Carrito de Compras", totalLabel: "Total", snackText: "Añadido con éxito" }
    };

    function updateUIForLanguage() {
      const lang = localStorage.getItem("language") || "en";
      const t = localTranslations[lang] || localTranslations.en;
      if (document.getElementById("shopTitle")) document.getElementById("shopTitle").textContent = t.shopTitle;
      document.getElementById("filterTitle").textContent = t.filterTitle;
      document.getElementById("catAll").textContent = t.catAll;
      document.getElementById("catFemale").textContent = t.catFemale;
      document.getElementById("catFemboy").textContent = t.catFemboy;
      document.getElementById("catCollections").textContent = t.catCollections;
      document.getElementById("sortTitle").textContent = t.sortTitle;
      document.querySelector('[data-sort="newest"] span:last-child').textContent = t.sortNewest;
      document.querySelector('[data-sort="oldest"] span:last-child').textContent = t.sortOldest;
      document.querySelector('[data-sort="price-asc"] span:last-child').textContent = t.sortLow;
      document.querySelector('[data-sort="price-desc"] span:last-child').textContent = t.sortHigh;
      document.getElementById("productsTitle").textContent = t.productsTitle;
      const searchInput = document.getElementById("searchInput");
      if (searchInput) searchInput.placeholder = t.searchPlaceholder;
      if (document.getElementById("cartTitle")) document.getElementById("cartTitle").textContent = t.cartTitle;
      if (document.getElementById("totalLabel")) document.getElementById("totalLabel").textContent = t.totalLabel;
      if (document.getElementById("snackText")) document.getElementById("snackText").textContent = t.snackText;
    }

    window.addEventListener('load', () => {
      updateUIForLanguage();
      document.getElementById("shopTitle")?.classList.add("loaded");
    });

    document.addEventListener('languageChanged', () => {
      updateUIForLanguage();
      if (window.createCards) window.createCards();
    });
  </script>

  <script type="module">
    import packsData from 'https://velutinx.com/assets/js/packs-data.js';

    let productsData = [];
    const grid = document.getElementById("productGrid");
    const searchInput = document.getElementById("searchInput");
    const sortButtons = document.querySelectorAll(".sort-btn");
    const categoryItems = document.querySelectorAll(".category-list li");
    let currentCategory = 0;

    window.createCards = function() {
      if (!grid) return;
      grid.innerHTML = "";
      
      productsData = packsData.map(p => ({
        ...p,
        priceKey: p.price,
        price: window.getPriceForPack(p),
        category: p.category || 0
      }));

      productsData.forEach(p => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.dataset.id = p.id;
        card.dataset.category = p.category;
        card.dataset.price = p.price;

        const imageUrl = `https://www.velutinx.com/i/pack${String(p.id).padStart(3, '0')}-1.jpg`;
        card.innerHTML = `
          <img src="${imageUrl}" alt="${p.title}" class="card-image" loading="lazy" onerror="this.src='https://via.placeholder.com/248x300?text=Error'">
          <div class="card-content">
            <div class="card-title">${p.title}</div>
            <div class="price-row">
              <div class="price">${window.formatPrice(p.price)}</div>
              <button class="cart-btn" title="Add to Cart">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 19a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"></path><path d="M12.5 17h-6.5v-14h-2"></path><path d="M6 5l14 1l-.86 6.017m-2.64 .983h-10.5"></path><path d="M16 19h6"></path><path d="M19 16v6"></path>
                </svg>
              </button>
            </div>
          </div>
        `;

        card.addEventListener("click", e => {
          if (!e.target.closest(".cart-btn")) window.location.href = `/s/pack?id=${p.id}`;
        });

        card.querySelector(".cart-btn").addEventListener("click", e => {
          e.stopPropagation();
          window.addOrToggleCart?.({ ...p, tier: p.priceKey });
        });

        grid.appendChild(card);
        p.element = card;
      });
      filterAndSort();
    };

    function filterAndSort() {
      const query = searchInput.value.toLowerCase().trim();
      const activeSort = document.querySelector(".sort-btn.active")?.dataset.sort || "newest";

      productsData.forEach(p => {
        if (!p.element) return;
        const titleMatch = p.title.toLowerCase().includes(query);
        const catMatch = currentCategory === 0 || p.category === currentCategory;
        p.element.classList.toggle("hidden", !(titleMatch && catMatch));
      });

      let visible = Array.from(grid.children).filter(el => !el.classList.contains("hidden"));
      visible.sort((a, b) => {
        if (activeSort === "newest") return parseInt(b.dataset.id) - parseInt(a.dataset.id);
        if (activeSort === "oldest") return parseInt(a.dataset.id) - parseInt(b.dataset.id);
        if (activeSort === "price-asc") return parseFloat(a.dataset.price) - parseFloat(b.dataset.price);
        if (activeSort === "price-desc") return parseFloat(b.dataset.price) - parseFloat(a.dataset.price);
        return 0;
      });
      visible.forEach(el => grid.appendChild(el));
    }

    categoryItems.forEach((item, idx) => {
      item.addEventListener("click", () => {
        categoryItems.forEach(i => i.classList.remove("active"));
        item.classList.add("active");
        currentCategory = idx;
        filterAndSort();
      });
    });

    sortButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        sortButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        filterAndSort();
      });
    });

    searchInput.addEventListener("input", filterAndSort);

    window.addEventListener('load', () => {
      if (window.getPriceForPack) window.createCards();
      else window.addEventListener('headerReady', window.createCards, { once: true });
    });
  </script>
</body>
</html>
