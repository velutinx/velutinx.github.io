<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP | VELUTINX</title>
  <link rel="stylesheet" href="https://velutinx.github.io/assets/css/header.css">
  <style>
    :root {
      --success: #22c55e;
    }
    .shop-header { padding: 2.2rem 2.8rem 1.6rem; background: var(--bg); }
    .shop-container { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; gap: 2rem; flex-wrap: wrap; }
    .shop-left { display: flex; align-items: center; gap: 1.2rem; }
    .shop-title { font-size: 2.3rem; font-weight: 800; color: #000; margin: 0; }
    body.dark .shop-title { color: var(--accent); }

    .main-container { display: flex; max-width: 1480px; margin: 0 auto; padding: 1.5rem 2.5rem; gap: 2.5rem; }
    .sidebar { width: 268px; flex-shrink: 0; }
    .products-section { flex: 1; }
    .section-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.9rem; color: var(--text); padding-left: 0.5rem; }
    
    .category-list { list-style: none; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); padding: 0; }
    .category-list li { padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.9rem; color: var(--text); cursor: pointer; transition: 0.2s; }
    .category-list li:hover { background: #c0bcaa; }
    .category-list li.active { background: var(--accent); color: #1f1a12; font-weight: 600; }
    .category-icon { width: 19px; height: 19px; stroke: currentColor; stroke-width: 1.5; flex-shrink: 0; }

    .sort-options { margin-top: 2rem; }
    .sort-btn { width: 100%; padding: 1rem 1.25rem; background: var(--card); border: 1px solid var(--border); text-align: left; margin-bottom: 0.5rem; border-radius: 10px; font-size: 1rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 0.9rem; color: var(--text); }
    .sort-btn.active { background: var(--accent); color: #1f1a12; }
    .sort-btn:hover:not(.active) { background: #c0bcaa; }
    .sort-icon { width: 19px; height: 19px; stroke: currentColor; stroke-width: 1.5; flex-shrink: 0; }

    .products-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.8rem; flex-wrap: wrap; gap: 1rem; }
    .products-header h2 { font-size: 1.65rem; font-weight: 700; color: var(--text); }
    .search-bar-wrapper { width: 340px; max-width: 100%; }
    
    .input-base { position: relative; display: flex; align-items: center; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .outlined-input:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(170,158,118,0.2); }
    .input-element { flex: 1; padding: 10px 14px; background: transparent; border: none; outline: none; color: var(--text); font-size: 0.95rem; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 1.8rem; }
    .product-card { background: var(--card); border-radius: 16px; overflow: hidden; transition: all 0.25s; border: 1px solid var(--border); cursor: pointer; position: relative; }
    .product-card.hidden { display: none; }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 16px 32px rgba(0,0,0,0.2); }
    
    .card-image { width: 100%; aspect-ratio: 3 / 3.7; object-fit: cover; display: block; }
    .card-content { padding: 1.2rem; }
    .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
    .price-row { display: flex; justify-content: space-between; align-items: center; }
    .price { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    
    .cart-btn { width: 44px; height: 44px; background: var(--btn-cart); border: none; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .cart-btn:hover { background: var(--btn-cart-hover); transform: scale(1.08); }
    .cart-btn.added { background: var(--success); }

    /* Snackbar positioning */
    #snackbar { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; }
    #snackbar.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.0s; }
    @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
  </style>
</head>
<body>
  <div class="lang-swipe" id="langSwipe"></div>
  
  <nav class="top-nav">
    <div class="logo" onclick="window.location.href='/'">VELUTINX</div>
    <div class="nav-actions">
      <button class="login-btn" id="loginBtn">Website</button>
      <div id="langContainer">
        <button class="nav-icon lang-btn" id="langBtn" title="Language">
          <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 5h7"></path><path d="M7 4c0 4.846 0 7 .5 8"></path><path d="M10 8.5c0 2.286 -2 4.5 -3.5 4.5s-2.5 -1.135 -2.5 -2c0 -2 1 -3 3 -3s5 .57 5 2.857c0 1.524 -.667 2.571 -2 3.143"></path><path d="M12 20l4 -9l4 9"></path><path d="M19.1 18h-6.2"></path>
          </svg>
        </button>
        <div id="languagePopover">
          <div class="lang-item" data-lang="en"><img src="https://flagcdn.com/w40/us.png" alt="US" /><p>English (USD)</p></div>
          <div class="lang-item" data-lang="ja"><img src="https://flagcdn.com/w40/jp.png" alt="JP" /><p>日本語 (円)</p></div>
          <div class="lang-item" data-lang="zh"><img src="https://flagcdn.com/w40/cn.png" alt="CN" /><p>简体中文 (元)</p></div>
          <div class="lang-item" data-lang="es"><img src="https://flagcdn.com/w40/mx.png" alt="MX" /><p>Español (MXN)</p></div>
        </div>
      </div>
      <button class="nav-icon" id="themeBtn" title="Night Mode">
        <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path><path d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"></path>
        </svg>
      </button>
      <div class="cart-wrapper">
        <button class="nav-icon cart-icon" id="cartBtn" title="Cart">
          <svg id="cartIcon" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"></path><path d="M17 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"></path><path d="M17 17h-11v-14h-2"></path><path d="M6 5l14 1l-.86 6.017m-2.64 .983h-10.5"></path><path d="M16 19h6"></path><path d="M19 16v6"></path>
          </svg>
        </button>
        <span class="cart-badge" id="cartCount">0</span>
      </div>
    </div>
  </nav>

  <button class="floating-cart cart-icon" id="floatingCartBtn">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M6 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"></path><path d="M17 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"></path><path d="M17 17h-11v-14h-2"></path><path d="M6 5l14 1l-1 7h-13"></path>
    </svg>
    <span class="floating-badge" id="floatingCartCount">0</span>
  </button>

  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h5 id="cartTitle">Shopping Cart</h5>
      <button class="cart-close" id="cartClose">×</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total">
      <div class="cart-total-row">
        <span id="totalLabel">Total</span>
        <span id="cartTotal">US$0.00</span>
      </div>
      <div id="paypal-button-container"></div>
    </div>
  </div>

  <div id="snackbar">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <path d="M20 6L9 17l-5-5"></path>
    </svg>
    <span id="snackText">Added successfully</span>
  </div>

  <header class="shop-header">
    <div class="shop-container">
      <div class="shop-left">
        <h1 class="shop-title" id="shopTitle">Velutinx Studio</h1>
      </div>
    </div>
  </header>

  <div class="main-container">
    <aside class="sidebar">
      <div class="section-title" id="filterTitle">Filter by Category</div>
      <ul class="category-list">
        <li class="active" data-cat="0">
          <svg class="category-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 7m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path><path d="M6.5 17m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path><path d="M17.5 17m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path></svg>
          <span id="catAll">All</span>
        </li>
        <li data-cat="1">
          <svg class="category-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><line x1="12" y1="11" x2="12" y2="21"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
          <span id="catFemale">Female</span>
        </li>
        <li data-cat="2">
          <svg class="category-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="15" r="5"/><line x1="12.5" y1="11.5" x2="20" y2="4"/><polyline points="16,4 20,4 20,8"/></svg>
          <span id="catFemboy">Femboy</span>
        </li>
        <li data-cat="3">
          <svg class="category-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span id="catCollections">Collections</span>
        </li>
      </ul>

      <div class="sort-options">
        <div class="section-title" id="sortTitle">Sort by</div>
        <button class="sort-btn active" data-sort="newest">
          <svg class="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 17.75l-6.172 3.245l1.179 -6.873l-5 -4.867l6.9 -1l3.086 -6.253l3.086 6.253l6.9 1l-5 4.867l1.179 6.873z"></path></svg>
          <span id="sortNewest">Newest</span>
        </button>
        <button class="sort-btn" data-sort="oldest">
          <svg class="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 6.5v11M5 12h14"></path><path d="M12 17.5l-7-7 7-7"></path></svg>
          <span id="sortOldest">Oldest</span>
        </button>
        <button class="sort-btn" data-sort="price-asc">
          <svg class="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 9l3 -3l3 3"></path><path d="M17 6v12"></path></svg>
          <span id="sortLow">Price: Low to High</span>
        </button>
      </div>
    </aside>

    <main class="products-section">
      <div class="products-header">
        <h2 id="productsTitle">Products</h2>
        <div class="search-bar-wrapper">
          <div class="input-base outlined-input">
            <input type="search" id="searchInput" placeholder="Search..." class="input-element" />
          </div>
        </div>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>

  <script src="https://velutinx.github.io/assets/js/header.js"></script>
  <script src="https://velutinx.github.io/assets/js/shop-shared.js"></script>

  <script src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js"></script>
  <script>
    kofiWidgetOverlay.draw('velutinxstudio', {
      'type': 'floating-chat',
      'floating-chat.donateButton.text': 'Support Me',
      'floating-chat.donateButton.background-color': '#29abe0',
      'floating-chat.donateButton.text-color': '#fff'
    });
  </script>

  <script type="module">
    import packsData from 'https://velutinx.github.io/assets/js/packs-data.js';

    window.addEventListener('load', async () => {
      const productsData = packsData.map(p => ({
        ...p,
        price: window.getPriceForPack?.(p) ?? 0,
        date: p.date || Date.now(),
        category: p.category || 0
      }));

      const grid = document.getElementById("productGrid");
      const searchInput = document.getElementById("searchInput");
      const sortButtons = document.querySelectorAll(".sort-btn");
      const categoryItems = document.querySelectorAll(".category-list li");

      let currentCategory = 0;

      function createCards() {
        grid.innerHTML = "";
        productsData.forEach(p => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.dataset.id = p.id;
          card.dataset.price = p.price;
          card.dataset.category = p.category;

          card.innerHTML = `
            <img src="https://velutinx.neocities.org/i/pack${parseInt(p.id)}-1.jpg" alt="${p.title}" class="card-image" onerror="this.src='https://via.placeholder.com/248x300?text=Pack+${p.id}';">
            <div class="card-content">
              <div class="card-title">${p.title}</div>
              <div class="price-row">
                <div class="price" data-price="${p.price}">US$${p.price.toFixed(2)}</div>
                <button class="cart-btn" title="Add to Cart">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"></path><path d="M12.5 17h-6.5v-14h-2"></path><path d="M6 5l14 1l-.86 6.017m-2.64 .983h-10.5"></path><path d="M16 19h6"></path><path d="M19 16v6"></path>
                  </svg>
                </button>
              </div>
            </div>
          `;

          card.addEventListener("click", e => {
            if (e.target.closest(".cart-btn")) return;
            window.location.href = `/s/pack?id=${p.id}`;
          });

          const btn = card.querySelector(".cart-btn");
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            window.addOrToggleCart?.(p);
            updateBtnState(btn, p.id);
            window.updateCartDisplay?.();
          });

          grid.appendChild(card);
          p.element = card;
          updateBtnState(btn, p.id);
        });
      }

      function updateBtnState(btn, id) {
        const isInCart = window.getCart?.().some(item => item.id === id);
        btn.classList.toggle("added", isInCart);
        if(isInCart) {
          btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"></path><path d="M11.5 17h-5.5v-14h-2"></path><path d="M6 5l14 1l-1 7h-13"></path><path d="M15 19l2 2l4 -4"></path></svg>`;
          document.getElementById("snackbar").classList.add("show");
          setTimeout(() => document.getElementById("snackbar").classList.remove("show"), 2000);
        } else {
          btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"></path><path d="M12.5 17h-6.5v-14h-2"></path><path d="M6 5l14 1l-.86 6.017m-2.64 .983h-10.5"></path><path d="M16 19h6"></path><path d="M19 16v6"></path></svg>`;
        }
      }

      function filterAndSort() {
        const query = searchInput.value.toLowerCase();
        const activeSort = document.querySelector(".sort-btn.active").dataset.sort;

        productsData.forEach(p => {
          const matchSearch = p.title.toLowerCase().includes(query);
          const matchCat = currentCategory === 0 || p.category == currentCategory;
          p.element.classList.toggle("hidden", !(matchSearch && matchCat));
        });

        const items = [...grid.children].filter(el => !el.classList.contains("hidden"));
        items.sort((a, b) => {
          if (activeSort === "newest") return b.dataset.id - a.dataset.id;
          if (activeSort === "oldest") return a.dataset.id - b.dataset.id;
          if (activeSort === "price-asc") return a.dataset.price - b.dataset.price;
          return 0;
        });
        items.forEach(item => grid.appendChild(item));
      }

      categoryItems.forEach(li => {
        li.addEventListener("click", () => {
          categoryItems.forEach(i => i.classList.remove("active"));
          li.classList.add("active");
          currentCategory = parseInt(li.dataset.cat);
          filterAndSort();
        });
      });

      sortButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          sortButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          filterAndSort();
        });
      });

      searchInput.addEventListener("input", filterAndSort);
      createCards();
      filterAndSort();
    });
  </script>
</body>
</html>
