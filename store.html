<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP | VELUTINX</title>

  <link rel="preconnect" href="https://www.velutinx.com" crossorigin>
  <link rel="stylesheet" href="https://velutinx.com/assets/css/material-symbols.css">
  <link rel="stylesheet" href="https://velutinx.com/assets/css/socials.css">
  <link rel="stylesheet" href="https://velutinx.com/assets/css/header.css">

  <style>
    /* Prevent flash of old title */
    #shopTitle {
      visibility: hidden;
      transition: visibility 0s linear 0.1s;
    }
    #shopTitle.loaded {
      visibility: visible;
    }

    /* Store filter sidebar */
    .store-filter-sidebar {
      width: 268px;
      flex-shrink: 0;
    }

    /* Shop page specific styles */
    .shop-header { 
      padding: 2.2rem 2.8rem 1.6rem; 
      background: var(--bg); 
    }
    .shop-container { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      max-width: 1400px; 
      margin: 0 auto; 
      gap: 2rem; 
      flex-wrap: wrap; 
    }
    .shop-left { 
      display: flex; 
      align-items: center; 
      gap: 1.2rem; 
    }
    .shop-title { 
      font-size: 2.3rem; 
      font-weight: 800; 
      color: #000; 
      margin: 0; 
    }
    body.dark .shop-title { 
      color: var(--accent); 
    }
    .main-container { 
      display: flex; 
      max-width: 1480px; 
      margin: 0 auto; 
      padding: 1.5rem 2.5rem; 
      gap: 2.5rem; 
    }
    .products-section { 
      flex: 1; 
    }
    .section-title { 
      font-size: 1.15rem; 
      font-weight: 600; 
      margin-bottom: 0.9rem; 
      color: var(--text); 
      padding-left: 0.5rem; 
    }
    .category-list { 
      list-style: none; 
      background: var(--card); 
      border-radius: 12px; 
      overflow: hidden; 
      border: 1px solid var(--border); 
      padding: 0; 
    }
    .category-list li { 
      padding: 1rem 1.25rem; 
      display: flex; 
      align-items: center; 
      gap: 0.9rem; 
      color: var(--text); 
      cursor: pointer; 
      transition: 0.2s; 
    }
    .category-list li:hover { 
      background: #c0bcaa; 
    }
    .category-list li.active { 
      background: var(--accent); 
      color: #1f1a12; 
      font-weight: 600; 
    }
    .sort-options { 
      margin-top: 2rem; 
    }
    .sort-btn { 
      width: 100%; 
      padding: 1rem 1.25rem; 
      background: var(--card); 
      border: 1px solid var(--border); 
      text-align: left; 
      margin-bottom: 0.5rem; 
      border-radius: 10px; 
      font-size: 1rem; 
      cursor: pointer; 
      transition: 0.2s; 
      display: flex; 
      align-items: center; 
      gap: 0.9rem; 
      color: var(--text); 
    }
    .sort-btn.active { 
      background: var(--accent); 
      color: #1f1a12; 
    }
    .sort-btn:hover:not(.active) { 
      background: #c0bcaa; 
    }
    .products-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 1.8rem; 
      flex-wrap: wrap; 
      gap: 1rem; 
    }
    .products-header h2 { 
      font-size: 1.65rem; 
      font-weight: 700; 
      color: var(--text); 
    }
    .search-bar-wrapper { 
      width: 340px; 
      max-width: 100%; 
    }
    .input-base { 
      position: relative; 
      display: flex; 
      align-items: center; 
      background: var(--card); 
      border-radius: 8px; 
      overflow: hidden; 
      border: 1px solid var(--border); 
      padding-left: 12px; 
      transition: border-color 0.2s; 
    }
    .input-base:focus-within { 
      border-color: var(--accent); 
      box-shadow: 0 0 0 2px rgba(170,158,118,0.2); 
    }
    .input-element { 
      flex: 1; 
      padding: 12px; 
      background: transparent; 
      border: none; 
      outline: none; 
      color: var(--text); 
      font-size: 0.95rem; 
    }
    .product-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); 
      gap: 1.8rem; 
    }
    .product-card { 
      background: var(--card); 
      border-radius: 16px; 
      overflow: hidden; 
      transition: all 0.25s; 
      border: 1px solid var(--border); 
      cursor: pointer; 
      position: relative; 
    }
    .product-card.hidden { 
      display: none; 
    }
    .product-card:hover { 
      transform: translateY(-8px); 
      box-shadow: 0 16px 32px rgba(0,0,0,0.2); 
    }
    .card-image { 
      width: 100%; 
      aspect-ratio: 3 / 3.7; 
      object-fit: cover; 
      display: block; 
    }
    .card-content { 
      padding: 1.2rem; 
    }
    .card-title { 
      font-size: 1.1rem; 
      font-weight: 600; 
      margin-bottom: 0.5rem; 
      color: var(--text); 
    }
    .price-row { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .price { 
      font-size: 1.3rem; 
      font-weight: 700; 
      color: var(--accent); 
    }
  </style>
</head>

  <!-- Product listing script -->
  <script type="module">
    import packsData from 'https://velutinx.com/assets/js/packs-data.js';

    window.addEventListener('load', async () => {
      const productsData = packsData.map(p => ({
        ...p,
        price: window.getPriceForPack?.(p) ?? 0,
        date: p.date || Date.now() - (parseInt(p.id) * 86400000 * 7),
        category: p.category || 0
      }));

      const grid = document.getElementById("productGrid");
      const searchInput = document.getElementById("searchInput");
      const sortButtons = document.querySelectorAll(".sort-btn");
      const categoryItems = document.querySelectorAll(".category-list li");
      let currentCategory = 0;

      function createCards() {
        grid.innerHTML = "";
        productsData.forEach(p => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.dataset.title = p.title.toLowerCase();
          card.dataset.price = p.price;
          card.dataset.date = p.date;
          card.dataset.id = p.id;
          card.dataset.category = p.category;

          const imageUrl = `https://www.velutinx.com/i/pack${String(p.id).padStart(3, '0')}-1.jpg`;
          card.innerHTML = `
            <img src="${imageUrl}"
                 alt="${p.title}"
                 class="card-image"
                 loading="lazy"
                 onerror="this.src='https://via.placeholder.com/248x300?text=Image+Error'">
            <div class="card-content">
              <div class="card-title">${p.title}</div>
              <div class="price-row">
                <div class="price" data-price="${p.price}"></div>
                <button class="cart-btn" title="Add to Cart">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"></path>
                    <path d="M12.5 17h-6.5v-14h-2"></path>
                    <path d="M6 5l14 1l-.86 6.017m-2.64 .983h-10.5"></path>
                    <path d="M16 19h6"></path>
                    <path d="M19 16v6"></path>
                  </svg>
                </button>
              </div>
            </div>
          `;

          card.addEventListener("click", e => {
            if (e.target.closest(".cart-btn")) return;
            window.location.href = `/s/pack?id=${p.id}`;
          });

          const cartBtn = card.querySelector(".cart-btn");
          cartBtn.addEventListener("click", e => {
            e.stopPropagation();
            window.addOrToggleCart?.(p);
          });

          grid.appendChild(card);
          p.element = card;
          p.cartBtn = cartBtn;
        });

        window.updateCartDisplay?.();
        window.updateAllPrices?.();
        updateUIForLanguage(); // Initial UI update
      }

      function filterAndSort() {
        const query = searchInput.value.toLowerCase().trim();
        const activeSort = document.querySelector(".sort-btn.active")?.dataset.sort || "newest";

        productsData.forEach(p => {
          const titleMatch = p.title.toLowerCase().includes(query);
          const categoryMatch = currentCategory === 0 || p.category === currentCategory;
          p.element.classList.toggle("hidden", !(titleMatch && categoryMatch));
        });

        let visible = Array.from(grid.children).filter(el => !el.classList.contains("hidden"));
        if (activeSort === "newest") {
          visible.sort((a, b) => parseInt(b.dataset.id || 0) - parseInt(a.dataset.id || 0));
        } else if (activeSort === "oldest") {
          visible.sort((a, b) => parseInt(a.dataset.id || 0) - parseInt(b.dataset.id || 0));
        } else if (activeSort === "price-asc") {
          visible.sort((a, b) => parseFloat(a.dataset.price) - parseFloat(b.dataset.price));
        } else if (activeSort === "price-desc") {
          visible.sort((a, b) => parseFloat(b.dataset.price) - parseFloat(a.dataset.price));
        }

        visible.forEach(el => grid.appendChild(el));
      }

      categoryItems.forEach((item, index) => {
        item.addEventListener("click", () => {
          categoryItems.forEach(i => i.classList.remove("active"));
          item.classList.add("active");
          currentCategory = index === 0 ? 0 : index;
          filterAndSort();
        });
      });

      sortButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          sortButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          filterAndSort();
        });
      });

      searchInput.addEventListener("input", filterAndSort);

      createCards();
      filterAndSort();
      window.updateCartDisplay?.();
    });
  </script>

      document.querySelector('[data-sort="oldest"] span:last-child').textContent = t.sortOldest;

      document.getElementById("productsTitle").textContent = t.productsTitle;

      const searchInput = document.getElementById("searchInput");
      if (searchInput) searchInput.placeholder = t.searchPlaceholder;

      // Cart title (in drawer)
      const cartTitleEl = document.getElementById("cartTitle");
      if (cartTitleEl) cartTitleEl.textContent = t.cartTitle;

      // Total label
      const totalLabelEl = document.getElementById("totalLabel");
      if (totalLabelEl) totalLabelEl.textContent = t.totalLabel;

      // Snackbar default text
      const snackTextEl = document.getElementById("snackText");
      if (snackTextEl) snackTextEl.textContent = t.snackText;
    }

    // Run on page load
    window.addEventListener('load', () => {
      updateUIForLanguage();

          updateUIForLanguage();
        }, 100);
      });
    });
  </script>

                <div class="price" data-price="${p.price}"></div>
                <button class="cart-btn" title="Add to Cart">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"></path>
                    <path d="M12.5 17h-6.5v-14h-2"></path>
                    <path d="M6 5l14 1l-.86 6.017m-2.64 .983h-10.5"></path>
                    <path d="M16 19h6"></path>
                    <path d="M19 16v6"></path>
                  </svg>
                </button>
              </div>
            </div>
          `;

          card.addEventListener("click", e => {
            if (e.target.closest(".cart-btn")) return;
            window.location.href = `/s/pack?id=${p.id}`;
          });

          const cartBtn = card.querySelector(".cart-btn");
          cartBtn.addEventListener("click", e => {
            e.stopPropagation();
            window.addOrToggleCart?.(p);
          });

          grid.appendChild(card);
          p.element = card;
          p.cartBtn = cartBtn;
        });

        window.updateCartDisplay?.();
        window.updateAllPrices?.();
        updateUIForLanguage(); // Ensure initial update
      }

      function filterAndSort() {
        const query = searchInput.value.toLowerCase().trim();
        const activeSort = document.querySelector(".sort-btn.active")?.dataset.sort || "newest";

        productsData.forEach(p => {
          const titleMatch = p.title.toLowerCase().includes(query);
          const categoryMatch = currentCategory === 0 || p.category === currentCategory;
          p.element.classList.toggle("hidden", !(titleMatch && categoryMatch));
        });

        let visible = Array.from(grid.children).filter(el => !el.classList.contains("hidden"));
        if (activeSort === "newest") {
          visible.sort((a, b) => parseInt(b.dataset.id || 0) - parseInt(a.dataset.id || 0));
        } else if (activeSort === "oldest") {
          visible.sort((a, b) => parseInt(a.dataset.id || 0) - parseInt(b.dataset.id || 0));
        } else if (activeSort === "price-asc") {
          visible.sort((a, b) => parseFloat(a.dataset.price) - parseFloat(b.dataset.price));
        } else if (activeSort === "price-desc") {
          visible.sort((a, b) => parseFloat(b.dataset.price) - parseFloat(a.dataset.price));
        }

        visible.forEach(el => grid.appendChild(el));
      }

      categoryItems.forEach((item, index) => {
        item.addEventListener("click", () => {
          categoryItems.forEach(i => i.classList.remove("active"));
          item.classList.add("active");
          currentCategory = index === 0 ? 0 : index;
          filterAndSort();
        });
      });

      sortButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          sortButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          filterAndSort();
        });
      });

      searchInput.addEventListener("input", filterAndSort);

      createCards();
      filterAndSort();
      window.updateCartDisplay?.();
    });
  </script>
</body>
</html>
