<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHOP | VELUTINX</title>

  <link rel="preconnect" href="https://www.velutinx.com" crossorigin>
  <link rel="stylesheet" href="https://velutinx.com/assets/css/material-symbols.css">

  <!-- Inline critical styles (from your original + mainheader.css parts that matter) -->
  <style>
    :root {
      --bg: #d3d0c1; --card: #e8e5d8; --darker: #c0bcaa; --text: #3a3528;
      --accent: #aa9e76; --success: #22c55e; --red-discount: #a64a5c;
      --gray: #8a7b6f; --border: #aa9e76; --overlay: rgba(170,158,118,0.25);
      --btn-cart: #3a3528; --btn-cart-hover: #4a4538;
    }
    body.dark {
      --bg: #0f0f12; --card: #1a1a20; --darker: #121216; --text: #e6e3d8;
      --accent: #d4c08a; --success: #8b8a5e; --border: #6f6a4e;
      --overlay: rgba(15,15,18,0.75);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif; background:var(--bg); color:var(--text);
      line-height:1.5; transition: background .4s, color .4s;
    }
    body.drawer-open::after {
      content:""; position:fixed; inset:0; background:var(--overlay); z-index:1190;
    }
    /* Cart drawer */
    .cart-drawer {
      position:fixed; top:0; right:-400px; width:400px; height:100%;
      background:var(--accent); border-left:1px solid var(--border);
      box-shadow:-10px 0 30px rgba(0,0,0,.5); z-index:1200;
      transition:right .35s ease; display:flex; flex-direction:column; color:#1f1a12;
    }
    .cart-drawer.open { right:0; }
    .cart-header { display:flex; justify-content:space-between; align-items:center; padding:1.4rem 1.6rem; border-bottom:1px solid var(--border); }
    .cart-close { background:none; border:none; color:#1f1a12; font-size:1.8rem; cursor:pointer; }
    .cart-items { flex:1; overflow-y:auto; padding:1.2rem; }
    .cart-item { display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--border); }
    .cart-item img { width:85px; height:85px; object-fit:cover; border-radius:8px; }
    .cart-item-price { font-weight:700; }
    .cart-item-remove { background:none; border:none; color:var(--red-discount); font-size:1.4rem; cursor:pointer; }
    .cart-total { padding:1.4rem 1.6rem; border-top:1px solid var(--border); }
    /* Snackbar */
    #snackbar {
      position:fixed; top:28px; right:28px; background:var(--success); color:white;
      padding:14px 22px; border-radius:10px; box-shadow:0 6px 16px rgba(0,0,0,.5);
      display:flex; align-items:center; gap:14px; z-index:1300;
      transform:translateY(-120px); opacity:0; transition:all .45s ease;
    }
    #snackbar.show { transform:translateY(0); opacity:1; }
    /* Sidebar reinforcement */
    .sidebar { width:268px; flex-shrink:0; background:var(--card); border-radius:12px; border:1px solid var(--border); padding:1.2rem; }
    .category-list li { padding:1rem 1.25rem; cursor:pointer; }
    .category-list li:hover, .category-list li.active { background:var(--accent); color:#1f1a12; }
    /* Product card etc. – keep your original */
    .product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(248px,1fr)); gap:1.8rem; }
    .product-card { background:var(--card); border-radius:16px; border:1px solid var(--border); overflow:hidden; transition:all .25s; cursor:pointer; }
    .product-card:hover { transform:translateY(-8px); box-shadow:0 16px 32px rgba(0,0,0,.2); }
    .card-image { width:100%; aspect-ratio:3/3.7; object-fit:cover; }
    .price { font-size:1.3rem; font-weight:700; color:var(--accent); }
    .cart-btn { width:44px; height:44px; background:var(--btn-cart); border:none; border-radius:50%; color:white; cursor:pointer; }
    .cart-btn.added { background:#22c55e; }
    .main-container { display:flex; max-width:1480px; margin:0 auto; padding:1.5rem 2.5rem; gap:2.5rem; }
    @media (max-width:960px) { .main-container { flex-direction:column; } .sidebar { width:100%; } }
  </style>
</head>
<body>

  <!-- Cart Drawer -->
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h5 id="cartTitle">Shopping Cart</h5>
      <button class="cart-close" id="cartClose">×</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total">
      <div class="cart-total-row">
        <span id="totalLabel">Total</span>
        <span id="cartTotal">US$0.00</span>
      </div>
      <div id="paypal-button-container"></div>
    </div>
  </div>

  <!-- Snackbar -->
  <div id="snackbar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <path d="M20 6L9 17l-5-5"></path>
    </svg>
    <span id="snackText">Added successfully</span>
  </div>

  <!-- Main Content -->
  <div class="shop-container" style="max-width:1480px; margin:0 auto; padding:2.8rem 2.5rem 1.2rem;">
    <h1 class="shop-title" id="shopTitle">VELUTINX Store</h1>
  </div>

  <div class="main-container">
    <aside class="sidebar">
      <div class="section-title" id="filterTitle">Filter by Category</div>
      <ul class="category-list">
        <li class="active" data-cat="0"><span class="material-symbols-outlined">done_all</span> All Products</li>
        <li data-cat="1"><span class="material-symbols-outlined">female</span> Female Models</li>
        <li data-cat="2"><span class="material-symbols-outlined">male</span> Femboy Models</li>
        <li data-cat="3"><span class="material-symbols-outlined">collections_bookmark</span> Full Collections</li>
      </ul>
      <div class="sort-options" style="margin-top:2rem;">
        <div class="section-title">Sort by</div>
        <button class="sort-btn active" data-sort="newest">Newest</button>
        <button class="sort-btn" data-sort="oldest">Oldest</button>
        <button class="sort-btn" data-sort="price-asc">Price: Low to High</button>
        <button class="sort-btn" data-sort="price-desc">Price: High to Low</button>
      </div>
    </aside>

    <main class="products-section" style="flex:1;">
      <div class="products-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.8rem; flex-wrap:wrap; gap:1rem;">
        <h2 id="productsTitle">Latest Content</h2>
        <div style="width:340px; max-width:100%;">
          <input type="search" id="searchInput" placeholder="Search products..." style="width:100%; padding:12px; border:1px solid var(--border); border-radius:8px; background:var(--card); color:var(--text);"/>
        </div>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>

  <!-- Core logic – inline until mainheader.js is fixed -->
  <script>
    const tierMap = {1.5:{JPY:250,CNY:10.5,MXN:25},3:{JPY:500,CNY:21,MXN:50},10:{JPY:1500,CNY:69,MXN:175}};
    const approxRates = {JPY:158,CNY:6.9,MXN:18};
    let cart = JSON.parse(localStorage.getItem("velutinx_cart")||"[]");
    let currentLang = localStorage.getItem("language")||"en";
    let currentCurrency = currentLang==="en"?"USD":currentLang==="ja"?"JPY":currentLang==="zh"?"CNY":"MXN";

    function formatPrice(value) {
      if (currentCurrency==="USD") return `US$${value.toFixed(2)}`;
      const rounded = Math.round(value*100)/100;
      if (tierMap[rounded]?.[currentCurrency]) return (currentCurrency==="JPY"?"円":currentCurrency==="CNY"?"元":"MXN$") + tierMap[rounded][currentCurrency];
      let conv = value * (approxRates[currentCurrency]||1);
      conv = (currentCurrency==="JPY"||currentCurrency==="MXN")?Math.ceil(conv):Math.ceil(conv*10)/10;
      return (currentCurrency==="JPY"?"円":currentCurrency==="CNY"?"元":"MXN$") + conv;
    }

    function updateAllPrices() {
      document.querySelectorAll(".price").forEach(el => {
        const base = parseFloat(el.dataset.price);
        if (!isNaN(base)) el.textContent = formatPrice(base);
      });
    }

    function showSnackbar(msg, isRemove=false) {
      const sb = document.getElementById("snackbar");
      sb.querySelector("span").textContent = msg;
      sb.classList.add("show");
      setTimeout(()=>sb.classList.remove("show"), 2500);
    }

    function saveCart() { localStorage.setItem("velutinx_cart", JSON.stringify(cart)); }

    window.addOrToggleCart = function(pack) {
      const idx = cart.findIndex(i=>i.id===pack.id);
      if (idx===-1) {
        cart.push({id:pack.id, title:pack.title, image:`https://www.velutinx.com/i/pack${String(pack.id).padStart(3,'0')}-1.jpg`, price:pack.price||0, quantity:1});
        showSnackbar("Added to cart");
      } else {
        cart.splice(idx,1);
        showSnackbar("Removed from cart", true);
      }
      saveCart();
      updateCartDisplay();
    };

    function updateCartDisplay() {
      const count = cart.length;
      const total = cart.reduce((s,i)=>s+i.price,0);
      document.getElementById("cartTotal").textContent = formatPrice(total);
      // Add badge update if you add cart icon later
    }

    // Drawer controls
    document.getElementById("cartClose")?.addEventListener("click", ()=>{
      document.getElementById("cartDrawer").classList.remove("open");
      document.body.classList.remove("drawer-open");
    });

    // Cart item remove (stub – expand if needed)
    document.getElementById("cartItems")?.addEventListener("click", e=>{
      if (e.target.classList.contains("cart-item-remove")) {
        // remove logic here if you populate cart items
      }
    });

    // Language change stub (expand later)
    function setLanguage(lang) {
      currentLang = lang;
      currentCurrency = lang==="en"?"USD":lang==="ja"?"JPY":lang==="zh"?"CNY":"MXN";
      localStorage.setItem("language", lang);
      updateAllPrices();
    }
  </script>

  <!-- Product grid (your original logic, adapted) -->
  <script type="module">
    import packsData from 'https://velutinx.com/assets/js/packs-data.js';

    window.addEventListener('load', () => {
      const productsData = packsData.map(p=>({...p, price:p.price||0, category:p.category||0}));

      const grid = document.getElementById("productGrid");
      const search = document.getElementById("searchInput");
      const sortBtns = document.querySelectorAll(".sort-btn");
      const catItems = document.querySelectorAll(".category-list li");
      let curCat = 0;

      function render() {
        grid.innerHTML = "";
        productsData.forEach(p => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.dataset.id = p.id;
          card.dataset.price = p.price;
          card.dataset.category = p.category;
          card.innerHTML = `
            <img src="https://www.velutinx.com/i/pack${String(p.id).padStart(3,'0')}-1.jpg" class="card-image" alt="${p.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/248x300?text=Pack ${p.id}'">
            <div style="padding:1.2rem;">
              <div style="font-weight:600; margin-bottom:0.5rem;">${p.title}</div>
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="price" data-price="${p.price}">${formatPrice(p.price)}</div>
                <button class="cart-btn">Add</button>
              </div>
            </div>
          `;
          card.querySelector(".cart-btn").onclick = e => {
            e.stopPropagation();
            window.addOrToggleCart(p);
          };
          card.onclick = e => {
            if (!e.target.closest(".cart-btn")) location.href = `/s/pack?id=${p.id}`;
          };
          grid.appendChild(card);
        });
      }

      function filterSort() {
        const q = search.value.toLowerCase().trim();
        const sort = document.querySelector(".sort-btn.active")?.dataset.sort || "newest";
        productsData.forEach(p=>{
          const show = (curCat===0 || p.category===curCat) && p.title.toLowerCase().includes(q);
          const el = grid.querySelector(`[data-id="${p.id}"]`);
          if (el) el.style.display = show ? "" : "none";
        });
        // Sorting can be added similarly if needed
      }

      catItems.forEach((li,i)=>{
        li.onclick = ()=>{
          catItems.forEach(l=>l.classList.remove("active"));
          li.classList.add("active");
          curCat = i;
          filterSort();
        };
      });
      sortBtns.forEach(b=>b.onclick=()=>{ sortBtns.forEach(bb=>bb.classList.remove("active")); b.classList.add("active"); filterSort(); });
      search.oninput = filterSort;

      render();
      filterSort();
    });
  </script>

</body>
</html>
