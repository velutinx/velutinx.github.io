<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Velutinx's Shop</title>

  <!-- Load shared header styles -->
  <link rel="stylesheet" href="https://velutinx.github.io/assets/css/header.css">

  <!-- Shop/product-specific styles (only the parts that are not in header.css) -->
  <style>
    .shop-header {
      padding: 2.2rem 2.8rem 1.6rem;
      background: var(--bg);
    }

    .shop-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .shop-left {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .shop-title {
      font-size: 2.3rem;
      font-weight: 800;
      color: #000;
      margin: 0;
    }

    body.dark .shop-title {
      color: var(--accent);
    }

    .gift-btn {
      width: 68px;
      height: 68px;
      background: transparent;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s;
      color: #22c55e;
    }

    .gift-btn:hover {
      transform: scale(1.18);
    }

    .gift-btn svg {
      width: 48px;
      height: 48px;
      stroke: currentColor;
      stroke-width: 2;
    }

    .main-container {
      display: flex;
      max-width: 1480px;
      margin: 0 auto;
      padding: 1.5rem 2.5rem;
      gap: 2.5rem;
    }

    .sidebar {
      width: 268px;
      flex-shrink: 0;
    }

    .products-section {
      flex: 1;
    }

    .section-title {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.9rem;
      color: var(--text);
      padding-left: 0.5rem;
    }

    .category-list {
      list-style: none;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .category-list li {
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      color: var(--text);
      cursor: pointer;
      transition: 0.2s;
    }

    .category-list li:hover {
      background: #c0bcaa;
    }

    .category-list li.active {
      background: var(--accent);
      color: #1f1a12;
      font-weight: 600;
    }

    .category-icon {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      stroke-width: 1.5;
      flex-shrink: 0;
    }

    .sort-options {
      margin-top: 2rem;
    }

    .sort-btn {
      width: 100%;
      padding: 1rem 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      text-align: left;
      margin-bottom: 0.5rem;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      color: var(--text);
    }

    .sort-btn.active {
      background: var(--accent);
      color: #1f1a12;
    }

    .sort-btn:hover:not(.active) {
      background: #c0bcaa;
    }

    .sort-icon {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      stroke-width: 1.5;
      flex-shrink: 0;
    }

    .reset-btn {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: #1f1a12;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .products-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .products-header h2 {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text);
    }

    .search-bar-wrapper {
      width: 340px;
      max-width: 100%;
    }

    .search-field {
      position: relative;
    }

    .input-base {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--card);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .outlined-input:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(170,158,118,0.2);
    }

    .adorned-start {
      display: flex;
      align-items: center;
      padding-left: 12px;
    }

    .input-adornment.start svg {
      color: var(--gray);
      opacity: 0.7;
    }

    .input-element {
      flex: 1;
      padding: 8px 14px 8px 8px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
    }

    .input-element::placeholder {
      color: var(--gray);
      opacity: 0.7;
    }

    .notched-outline {
      position: absolute;
      inset: -1px 0 0;
      pointer-events: none;
      border: 1px solid var(--border);
      border-radius: inherit;
      transition: border-color 0.2s;
    }

    .outlined-input:focus-within .notched-outline {
      border-color: var(--accent);
    }

    .notched-outline legend {
      padding: 0 6px;
      font-size: 0.75rem;
      visibility: hidden;
      width: auto;
      height: 0;
      line-height: 0;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
      gap: 1.8rem;
    }

    .product-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.25s;
      border: 1px solid var(--border);
    }

    .product-card.hidden {
      display: none;
    }

    .product-card.added-flash {
      animation: flashGreen 0.6s ease-out;
    }

    @keyframes flashGreen {
      0% { box-shadow: 0 0 0 4px rgba(34,197,94,0.6); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.2);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 3 / 3.7;
      object-fit: cover;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .card-content {
      padding: 1.2rem;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }

    .price del {
      color: var(--gray);
      font-size: 1rem;
      margin-left: 0.6rem;
    }

    .cart-btn {
      width: 44px;
      height: 44px;
      background: var(--btn-cart);
      border: none;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cart-btn:hover {
      background: var(--btn-cart-hover);
      transform: scale(1.08);
    }

    .cart-btn.added {
      background: var(--success);
    }
  </style>
</head>
<body>

  <!-- Header is now fully managed by external header.js + header.css -->
  <script src="https://velutinx.github.io/assets/js/header.js"></script>

  <!-- Shop content -->
  <header class="shop-header">
    <div class="shop-container">
      <div class="shop-left">
        <div style="display:flex; align-items:center; gap:1.2rem;">
          <h1 class="shop-title" id="shopTitle">Velutinx's Shop</h1>
          <button class="gift-btn" title="Gift / Support">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2">
              <path d="M3 8m0 1a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v2a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1z"></path>
              <path d="M12 8l0 13"></path>
              <path d="M19 12v7a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-7"></path>
              <path d="M7.5 8a2.5 2.5 0 0 1 0 -5a4.8 8 0 0 1 4.5 5a4.8 8 0 0 1 4.5 -5a2.5 2.5 0 0 1 0 5"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="main-container">
    <aside class="sidebar">
      <div class="section-title" id="filterTitle">Filter by Category</div>
      <ul class="category-list">
        <li class="active">
          <svg class="category-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 7m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path>
            <path d="M6.5 17m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path>
            <path d="M17.5 17m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path>
          </svg>
          <span id="catAll">All</span>
        </li>
        <li>
          <svg class="category-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10 20.415a8 8 0 1 0 3 -15.415h-3"></path>
            <path d="M13 8l-3 -3l3 -3"></path>
            <path d="M7 17l4 -4l-4 -4l-4 4z"></path>
          </svg>
          <span id="catNot">Not On Booth</span>
        </li>
        <li>
          <svg class="category-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10 20.415a8 8 0 1 0 3 -15.415h-3"></path>
            <path d="M13 8l-3 -3l3 -3"></path>
            <path d="M7 17l4 -4l-4 -4l-4 4z"></path>
          </svg>
          <span id="catFrom">From Booth</span>
        </li>
        <li>
          <svg class="category-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10 20.415a8 8 0 1 0 3 -15.415h-3"></path>
            <path d="M13 8l-3 -3l3 -3"></path>
            <path d="M7 17l4 -4l-4 -4l-4 4z"></path>
          </svg>
          <span id="catSisters">The Sisters Corner</span>
        </li>
      </ul>

      <div class="sort-options">
        <div class="section-title" id="sortTitle">Sort by</div>
        <button class="sort-btn active" data-sort="default">
          <svg class="sort-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 17.75l-6.172 3.245l1.179 -6.873l-5 -4.867l6.9 -1l3.086 -6.253l3.086 6.253l6.9 1l-5 4.867l1.179 6.873z"></path>
          </svg>
          <span id="sortDefault">Default</span>
        </button>
        <button class="sort-btn" data-sort="newest">
          <svg class="sort-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M11.933 5h-6.933v16h13v-8"></path>
            <path d="M14 17h-5"></path>
            <path d="M9 13h5v-4h-5z"></path>
            <path d="M15 5v-2"></path>
            <path d="M18 6l2 -2"></path>
            <path d="M19 9h2"></path>
          </svg>
          <span id="sortNewest">Newest</span>
        </button>
        <button class="sort-btn" data-sort="price-asc">
          <svg class="sort-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 9l3 -3l3 3"></path>
            <path d="M5 5m0 .5a.5 .5 0 0 1 .5 -.5h4a.5 .5 0 0 1 .5 .5v4a.5 .5 0 0 1 -.5 .5h-4a.5 .5 0 0 1 -.5 -.5z"></path>
            <path d="M5 14m0 .5a.5 .5 0 0 1 .5 -.5h4a.5 .5 0 0 1 .5 .5v4a.5 .5 0 0 1 -.5 .5h-4a.5 .5 0 0 1 -.5 -.5z"></path>
            <path d="M17 6v12"></path>
          </svg>
          <span id="sortLow">Price: Low to High</span>
        </button>
        <button class="sort-btn" data-sort="price-desc">
          <svg class="sort-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M5 5m0 .5a.5 .5 0 0 1 .5 -.5h4a.5 .5 0 0 1 .5 .5v4a.5 .5 0 0 1 -.5 .5h-4a.5 .5 0 0 1 -.5 -.5z"></path>
            <path d="M5 14m0 .5a.5 .5 0 0 1 .5 -.5h4a.5 .5 0 0 1 .5 .5v4a.5 .5 0 0 1 -.5 .5h-4a.5 .5 0 0 1 -.5 -.5z"></path>
            <path d="M14 15l3 3l3 -3"></path>
            <path d="M17 18v-12"></path>
          </svg>
          <span id="sortHigh">Price: High to Low</span>
        </button>
      </div>

      <button class="reset-btn" id="resetBtn">Reset Filters</button>
    </aside>

    <main class="products-section">
      <div class="products-header">
        <h2 id="productsTitle">Products</h2>
        <div class="search-bar-wrapper">
          <div class="search-field">
            <div class="input-base outlined-input adorned-start">
              <div class="adorned-start">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path>
                  <path d="M21 21l-6 -6"></path>
                </svg>
              </div>
              <input type="search" id="searchInput" placeholder="Search" class="input-element" />
              <fieldset class="notched-outline"><legend><span></span></legend></fieldset>
            </div>
          </div>
        </div>
      </div>

      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>

  <!-- Your product / cart logic (expects productsData, cart, etc. from store.js or header.js) -->
  <script src="store.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    window.addEventListener('load', () => {
      const SUPABASE_URL = window.__ENV?.SUPABASE_URL || "https://your-supabase-url.supabase.co";
      const SUPABASE_ANON_KEY = window.__ENV?.SUPABASE_ANON_KEY;

      if (SUPABASE_URL && SUPABASE_ANON_KEY) {
        window.supabaseClient = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }

      window.getNextPurchaseNumber = async function() {
        if (!window.supabaseClient) return '000001';
        const { data, error } = await window.supabaseClient
          .from('purchases')
          .select('purchase_number')
          .order('id', { ascending: false })
          .limit(1);

        if (error || !data || data.length === 0) return '000001';
        const last = parseInt(data[0].purchase_number, 10);
        return (last + 1).toString().padStart(6, '0');
      };
    });
  </script>

  <!-- PayPal -->
  <script>
    const paypalScript = document.createElement("script");
    paypalScript.src = `https://www.paypal.com/sdk/js?client-id=${window.__ENV?.PAYPAL_CLIENT_ID || 'AarYGoVTnq3s7nZoCb7D8P39_k6ScybQQrLBkZ6YWN39lhIRj521sJDxana7gWLi2jYbdHfXhGB63a6v'}&currency=USD`;
    paypalScript.onload = initPayPal;
    document.body.appendChild(paypalScript);

    function initPayPal() {
      paypal.Buttons({
        createOrder: function(data, actions) {
          const total = realTotalUSD.toFixed(2);
          return actions.order.create({
            purchase_units: [{ amount: { value: total, currency_code: "USD" } }]
          });
        },

        onApprove: async function(data, actions) {
          await actions.order.capture();

          const purchase_number = await window.getNextPurchaseNumber();

          if (window.supabaseClient) {
            await window.supabaseClient.from('purchases').insert({
              purchase_number: purchase_number,
              paypal_order_id: data.orderID,
              amount_usd: realTotalUSD,
              items: cart.map(i => i.id)
            });
          }

          alert("✅ Payment successful! Purchase #" + purchase_number);
          cart = [];
          updateCartDisplay();
        }
      }).render("#paypal-button-container");
    }
  </script>

</body>
</html>
