name = "velutinx-pages"
compatibility_date = "2026-03-05"  # or today's date

[site]
bucket = "./"  # serves your static files from root

[functions]
# This enables Functions and ensures env vars are injected
directory = "./functions"

# Explicitly bind your env vars to Functions runtime
[vars]
PRICE_LOW = "1.5"
PRICE_MED = "3.0"
PRICE_HIGH = "10.0"
