<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscribe</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 2rem auto; padding: 1rem; text-align: center; }
    .discord-input { margin-bottom: 1rem; }
    input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    .paypal-button-container { margin-top: 1rem; }
    #message { margin-top: 1rem; padding: 0.75rem; border-radius: 8px; }
    .success { background: #d1fae5; color: #065f46; }
    .error { background: #fee2e2; color: #dc2626; }
    .loading { background: #e0e7ff; color: #3730a3; }
  </style>
<script src="https://www.paypal.com/sdk/js?client-id=AarYGoVTnq3s7nZoCb7D8P39_k6ScybQQrLBkZ6YWN39lhIRj521sJDxana7gWLi2jYbdHfXhGB63a6v&currency=USD&vault=true"></script>
  <script src="/s/js/translations.js"></script>
</head>
<body>
  <h3 id="title">Subscribe to ✨ Bronze</h3>
  <p id="price" class="loading">Loading price...</p>
  <div class="discord-input">
    <label for="discordId" id="discordIdLabel">Your Discord ID</label>
    <input type="text" id="discordId" placeholder="123456789012345678" required>
  </div>
  <div id="paypal-button-container"></div>
  <div id="message"></div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const tierParam = parseInt(urlParams.get('tier')) || 1;
  const discordIdParam = urlParams.get('discordId');
  const lang = localStorage.getItem('language') || 'en';

  // Plan IDs for each tier (USD plans – these are the discounted prices)
  const PLAN_IDS = {
    1: 'P-26U13678G4534693YNHC7I3Y',   // Bronze
    2: 'P-79P38435MN077911JNHDDQDQ',   // Copper
    3: 'P-6CR14535JT482713LNHDDQDQ',   // Silver
    4: 'P-4BC07846FC390260HNHDDQDY',   // Gold
    5: 'P-45P87011TD4756018NHDDQDY'    // Platinum
  };

  // Original prices before discount (used for currency conversion)
  const ORIGINAL_PRICES = { 1: 5, 2: 10, 3: 18, 4: 30, 5: 40 };
  // Discounted prices (actual charged USD amount)
  const USD_PRICES = { 1: 4.50, 2: 9.00, 3: 16.20, 4: 27.00, 5: 36.00 };
  const TIER_NAMES = { 1: 'Bronze', 2: 'Copper', 3: 'Silver', 4: 'Gold', 5: 'Platinum' };

  const tier = tierParam;
  const planId = PLAN_IDS[tier];
  const tierName = TIER_NAMES[tier];
  const usdPrice = USD_PRICES[tier];
  const originalUsd = ORIGINAL_PRICES[tier];

  if (!planId) {
    document.body.innerHTML = '<h3>Invalid tier selected</h3><p>Please go back and choose a valid membership.</p>';
    throw new Error('Invalid tier');
  }

  // Translation helper
  function getTranslation(key, fallback = '') {
    const t = window.translations?.[lang] || window.translations?.en || {};
    return t[key] !== undefined ? t[key] : fallback;
  }

  // Format price in local currency (handles both USD and converted currencies)
  function formatLocalPrice(amount, lang) {
    if (amount === undefined || amount === null || isNaN(amount)) return '0.00';
    if (lang === 'en') return `US$${amount.toFixed(2)}`;
    let currency, sym;
    if (lang === 'ja') { currency = 'JPY'; sym = '円'; }
    else if (lang === 'zh') { currency = 'CNY'; sym = '元'; }
    else if (lang === 'es') { currency = 'MXN'; sym = 'MXN$'; }
    else { currency = 'USD'; sym = 'US$'; }
    if (currency === 'USD') return `US$${amount.toFixed(2)}`;
    const formatted = (currency === 'JPY' || currency === 'MXN') ? Math.round(amount) : amount.toFixed(2);
    return `${sym}${formatted}`;
  }

  // Fetch local prices from the conversion worker
  async function fetchLocalPrices() {
    try {
      const resp = await fetch('https://supabase-link.velutinx.workers.dev');
      if (!resp.ok) throw new Error('Failed to fetch conversions');
      const data = await resp.json();
      return data.tiers;
    } catch (err) {
      console.error('Failed to load conversions', err);
      // Fallback approximate rates
      const approx = { JPY: 158, CNY: 6.9, MXN: 18 };
      return [
        { usd: 5, jpy: Math.round(5 * approx.JPY), cny: 5 * approx.CNY, mxn: 5 * approx.MXN },
        { usd: 10, jpy: Math.round(10 * approx.JPY), cny: 10 * approx.CNY, mxn: 10 * approx.MXN },
        { usd: 18, jpy: Math.round(18 * approx.JPY), cny: 18 * approx.CNY, mxn: 18 * approx.MXN },
        { usd: 30, jpy: Math.round(30 * approx.JPY), cny: 30 * approx.CNY, mxn: 30 * approx.MXN },
        { usd: 40, jpy: Math.round(40 * approx.JPY), cny: 40 * approx.CNY, mxn: 40 * approx.MXN }
      ];
    }
  }

  // Get local price for a given USD amount (must match an entry in tiers)
  function getLocalPrice(tiers, usdAmount, lang) {
    const tierData = tiers.find(t => Math.abs(t.usd - usdAmount) < 0.01);
    if (!tierData) return usdAmount;
    if (lang === 'ja') return tierData.jpy;
    if (lang === 'zh') return tierData.cny;
    if (lang === 'es') return tierData.mxn;
    return usdAmount;
  }

  // Set translated title and price (now using original price for conversion, then apply discount)
  async function setLocalizedContent() {
    const tiers = await fetchLocalPrices();
    // Get local price for the original USD amount
    const localOriginal = getLocalPrice(tiers, originalUsd, lang);
    // Apply 10% discount to the local price
    const discountFactor = 0.9;
    const localDiscounted = localOriginal * discountFactor;
    const formattedPrice = formatLocalPrice(localDiscounted, lang);
    
    const translatedTierName = getTranslation(`tier${tierName}`, tierName.toUpperCase());
    const titleText = getTranslation('subscribeTitle', 'Subscribe to ✨ {tier}').replace('{tier}', translatedTierName);
    const priceText = getTranslation('priceMonthly', '${price}/month (10% off)').replace('${price}', formattedPrice);
    const discordLabelText = getTranslation('discordIdLabel', 'Your Discord ID');
    const placeholderText = getTranslation('discordIdPlaceholder', '123456789012345678');

    document.getElementById('title').textContent = titleText;
    document.getElementById('price').textContent = priceText;
    document.getElementById('discordIdLabel').textContent = discordLabelText;
    document.getElementById('discordId').placeholder = placeholderText;
    document.getElementById('price').classList.remove('loading');
  }
    // Run after page loads
    setLocalizedContent();

    const discordInput = document.getElementById('discordId');
    const container = document.getElementById('paypal-button-container');
    const messageDiv = document.getElementById('message');
    const enterIdFirstText = getTranslation('enterDiscordFirst', 'Enter Discord ID first');

    if (discordIdParam && /^\d{17,19}$/.test(discordIdParam)) {
      discordInput.value = discordIdParam;
    }

    function showMessage(text, isError = false) {
      messageDiv.textContent = text;
      messageDiv.className = isError ? 'error' : 'success';
  //    setTimeout(() => { messageDiv.textContent = ''; messageDiv.className = ''; }, 5000);
    }

    function isValidDiscordId(id) {
      return /^\d{17,19}$/.test(id);
    }

    function renderButton() {
      const discordId = discordInput.value.trim();
      const isValid = isValidDiscordId(discordId);
      container.innerHTML = '';
      if (!isValid) {
        const btn = document.createElement('button');
        btn.textContent = enterIdFirstText;
        btn.disabled = true;
        btn.style.background = '#9ca3af';
        btn.style.borderRadius = '40px';
        btn.style.padding = '12px';
        btn.style.width = '100%';
        btn.style.border = 'none';
        btn.style.color = 'white';
        container.appendChild(btn);
        return;
      }
      paypal.Buttons({
        style: { label: 'subscribe', color: 'blue', shape: 'pill', height: 40 },
        createSubscription: function(data, actions) {
          return actions.subscription.create({
            plan_id: planId,
            custom_id: JSON.stringify({ discordId: discordId, tier: tier })
          });
        },
onApprove: async function(data, actions) {
  const subscriptionId = data.subscriptionID;
  const discordId = discordInput.value.trim();
  
  // Store membership
  const membershipResponse = await fetch('https://subscription-worker.velutinx.workers.dev/api/store-subscription', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      discordId: discordId,
      subscriptionId: subscriptionId,
      tier: tier,
      planId: planId,
      recurring: true
    })
  });
  
  // Also record in successs table via orders worker
  const cartItem = {
    type: 'subscription',
    tier: tier,
    discordId: discordId,
    title: `${tierName} ${getTranslation('subscriptionLabel', 'Subscription (10% off)')}`,
    id: `M-${tier}`,
    months: 1,
    priceUSD: usdPrice,
    recurring: true,
    planId: planId
  };
  const orderResponse = await fetch('https://orders.velutinx.workers.dev/store-cart', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      orderID: subscriptionId,
      cart: [cartItem]
    })
  });
  
  if (membershipResponse.ok && orderResponse.ok) {
    showMessage(getTranslation('subscriptionSuccess', '✅ Subscription started! Your role will be assigned shortly.'));
  } else {
            const errorText = await response.text();
            console.error(errorText);
            showMessage(getTranslation('subscriptionError', '❌ Error recording subscription. Contact support.'), true);
          }
        },
        onError: function(err) {
          console.error(err);
          showMessage(getTranslation('subscriptionFailed', '❌ Subscription failed. Try again.'), true);
        }
      }).render(container);
    }

    renderButton();
    discordInput.addEventListener('input', renderButton);
  </script>
</body>
</html>
