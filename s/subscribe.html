<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Confirmed | VELUTINX</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
            text-align: center;
        }
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
        }
        .loading {
            background: #e0e7ff;
            color: #3730a3;
        }
        .details {
            font-family: monospace;
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 0.5rem;
            background: #f3f4f6;
            border-radius: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🎉 Thank You for Your Purchase!</h1>
    <div id="result"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderID');

        const resultDiv = document.getElementById('result');

        if (!orderId) {
            resultDiv.innerHTML = '<div class="message error">No order ID provided. Please contact support.</div>';
        } else {
            processOrder(orderId);
        }

        async function processOrder(orderId) {
            resultDiv.innerHTML = '<div class="message loading">Processing your order...</div>';

            try {
                // 1. Fetch the cart from the worker
                const cartResponse = await fetch(`https://subscription-worker.velutinx.workers.dev/api/get-cart?orderId=${orderId}`);
                if (!cartResponse.ok) {
                    throw new Error(`Cart not found (${cartResponse.status})`);
                }
                const cart = await cartResponse.json();

                // 2. Find subscription items in the cart
                const subscriptionItems = cart.filter(item => item.type === 'subscription');
                if (subscriptionItems.length === 0) {
                    resultDiv.innerHTML = '<div class="message success">Order complete! No subscriptions to activate.</div>';
                    return;
                }

                // 3. For each subscription item, call /api/store-subscription
                const results = await Promise.all(subscriptionItems.map(async (item) => {
                    const payload = {
                        discordId: item.discordId,
                        subscriptionId: orderId,          // use the PayPal order ID as the subscription identifier
                        tier: item.tier,
                        planId: null,
                        recurring: false,                  // one-time purchase
                    };
                    const storeResponse = await fetch('https://subscription-worker.velutinx.workers.dev/api/store-subscription', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    if (!storeResponse.ok) {
                        const error = await storeResponse.text();
                        throw new Error(`Failed to activate subscription for tier ${item.tier}: ${error}`);
                    }
                    return { tier: item.tier, success: true };
                }));

                // All succeeded
                resultDiv.innerHTML = `
                    <div class="message success">
                        ✅ Order confirmed!<br>
                        Your membership(s) have been activated. You will receive your Discord role shortly.
                    </div>
                    <div class="details">
                        Order ID: ${orderId}<br>
                        Activated tiers: ${results.map(r => r.tier).join(', ')}
                    </div>
                `;
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = `
                    <div class="message error">
                        ⚠️ There was an error processing your order.<br>
                        Please contact support with your order ID: ${orderId}
                    </div>
                    <div class="details">Error: ${err.message}</div>
                `;
            }
        }
    </script>
</body>
</html>
