<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 2rem auto;
            padding: 1rem;
            text-align: center;
            background: white;
        }
        .discord-input {
            margin-bottom: 1rem;
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .paypal-button-container {
            margin-top: 1rem;
        }
        .paypal-button {
            background-color: #10b981 !important;
            border-radius: 40px !important;
        }
        .paypal-button:hover {
            background-color: #059669 !important;
        }
        #message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
        }
    </style>
    <script src="https://www.paypal.com/sdk/js?client-id=AR7igvBzCZr6spSQ8DswwyQ28fU5U9hY0JwFGHcQmI7NZ5M8kvgPAqqQEN9xPPo5E1UNl-om-OWnscI3&currency=USD&vault=true"></script>
</head>
<body>
    <h3>Subscribe to ✨ Bronze</h3>
    <p>$4.50/month (10% off)</p>
    <div class="discord-input">
        <label for="discordId">Your Discord ID</label>
        <input type="text" id="discordId" placeholder="123456789012345678" required>
    </div>
    <div id="paypal-button-container"></div>
    <div id="message"></div>

    <script>
        // Get tier and Discord ID from URL parameters (if any)
        const urlParams = new URLSearchParams(window.location.search);
        const tierParam = urlParams.get('tier');
        const discordIdParam = urlParams.get('discordId');

        const PLAN_ID = 'P-9FK1452173617351CNHCLMCY'; // Bronze plan
        const discordInput = document.getElementById('discordId');
        const container = document.getElementById('paypal-button-container');
        const messageDiv = document.getElementById('message');

        // Prefill Discord ID if passed in URL
        if (discordIdParam && /^\d{17,19}$/.test(discordIdParam)) {
            discordInput.value = discordIdParam;
        }

        function showMessage(text, isError = false) {
            messageDiv.textContent = text;
            messageDiv.className = isError ? 'error' : 'success';
            setTimeout(() => { messageDiv.textContent = ''; messageDiv.className = ''; }, 5000);
        }

        function isValidDiscordId(id) {
            return /^\d{17,19}$/.test(id);
        }

        function renderButton() {
            const discordId = discordInput.value.trim();
            const isValid = isValidDiscordId(discordId);
            container.innerHTML = '';
            if (!isValid) {
                const btn = document.createElement('button');
                btn.textContent = 'Enter a valid Discord ID first';
                btn.disabled = true;
                btn.style.background = '#9ca3af';
                btn.style.borderRadius = '40px';
                btn.style.padding = '12px';
                btn.style.width = '100%';
                btn.style.border = 'none';
                btn.style.color = 'white';
                container.appendChild(btn);
                return;
            }
            paypal.Buttons({
                style: { label: 'subscribe', color: 'blue', shape: 'pill', height: 40 },
                createSubscription: function(data, actions) {
                    return actions.subscription.create({
                        plan_id: PLAN_ID,
                        custom_id: JSON.stringify({ discordId: discordId, tier: 1 })
                    });
                },
                onApprove: async function(data, actions) {
                    const subscriptionId = data.subscriptionID;
                    const response = await fetch('https://subscription-worker.velutinx.workers.dev/api/store-subscription', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ discordId: discordId, subscriptionId: subscriptionId, tier: 1, planId: PLAN_ID })
                    });
                    if (response.ok) {
                        showMessage('✅ Subscription started! Role will be assigned soon.');
                    } else {
                        const errorText = await response.text();
                        console.error(errorText);
                        showMessage('❌ Error storing subscription. Contact support.', true);
                    }
                },
                onError: function(err) {
                    console.error(err);
                    showMessage('❌ Subscription failed. Try again.', true);
                }
            }).render(container);
        }

        renderButton();
        discordInput.addEventListener('input', renderButton);
    </script>
</body>
</html>
