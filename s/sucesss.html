<script>
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get("token");

fetch(`/api/get-download?token=${token}`)
  .then(res => res.json())
  .then(data => {
    const section = document.getElementById("download-section");

    if (data.link) {
      section.innerHTML = `
        <p>Click below to download your purchase:</p>
        <a href="${data.link}" class="download-btn" target="_blank">
          Download Now
        </a>
      `;
    } else {
      section.innerHTML = `<p id="error-message">Invalid payment.</p>`;
    }
  });
</script>
