<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark Preview Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0c10;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .drop-area {
            border: 2px dashed #3a4050;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: #0f131a;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .drop-area:hover, .drop-area.drag-over {
            border-color: #5a6e3c;
        }
        .preview-canvas {
            width: 100%;
            max-width: 600px;
            display: block;
            margin: 0 auto 20px auto;
            border-radius: 8px;
            border: 1px solid #2a2f38;
            background: #03060b;
            display: none;
        }
        .download-btn {
            width: 100%;
            padding: 12px;
            background: #2c6e2c;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
            display: none;
            margin-top: 10px;
        }
        .download-btn:hover {
            background: #3e8e3e;
        }
        .status {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🖼️ Watermark Preview</h1>
    <div class="drop-area" id="dropArea">
        <p>📂 Drop a JPG/PNG image here or click to select</p>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
    </div>
    <canvas id="previewCanvas" class="preview-canvas"></canvas>
    <button id="downloadBtn" class="download-btn">📥 Download Watermarked Image</button>
    <div class="status" id="status"></div>
</div>

<script>
    (function() {
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');

        // Watermark URLs
        const centerWmUrl = 'https://www.velutinx.com/images/Watermark/Rotated%20Watermark.png';
        const cornerWmUrl = 'https://www.velutinx.com/images/Watermark/Watermark%20Corner.png';

        let centerWmImg = null;
        let cornerWmImg = null;
        let currentImage = null;       // user's original image File
        let currentCanvas = null;      // final watermarked canvas

        // Load watermarks once
        async function loadWatermarks() {
            try {
                const [center, corner] = await Promise.all([
                    loadImage(centerWmUrl),
                    loadImage(cornerWmUrl)
                ]);
                centerWmImg = center;
                cornerWmImg = corner;
                status.textContent = '✅ Watermarks loaded. Drop an image.';
            } catch (err) {
                status.textContent = '⚠️ Could not load watermarks. Check CORS/network.';
                console.error(err);
            }
        }

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error(`Failed to load ${src}`));
                img.src = src;
            });
        }

        // Process image when dropped/selected
        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                status.textContent = 'Please drop a valid image file.';
                return;
            }
            currentImage = file;
            status.textContent = 'Processing…';

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    composeImage(img);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function composeImage(userImg) {
            if (!centerWmImg || !cornerWmImg) {
                status.textContent = 'Watermarks not loaded yet.';
                return;
            }

            const width = userImg.width;
            const height = userImg.height;

            canvas.width = width;
            canvas.height = height;
            ctx.clearRect(0, 0, width, height);

            // 1. Draw user image
            ctx.drawImage(userImg, 0, 0, width, height);

            // 2. Draw center watermark at 20% opacity, centered
            ctx.globalAlpha = 0.20;
            const centerX = (width - centerWmImg.width) / 2;
            const centerY = (height - centerWmImg.height) / 2;
            ctx.drawImage(centerWmImg, centerX, centerY);
            ctx.globalAlpha = 1.0;

            // 3. Draw corner watermark at northeast with offset +70+30
            // Northeast gravity means right edge, top edge.
            // Geometry +70+30 means 70 pixels left from right edge, 30 pixels down from top.
            const cornerX = width - cornerWmImg.width - 70;
            const cornerY = 30;
            ctx.drawImage(cornerWmImg, cornerX, cornerY);

            // Store final canvas
            currentCanvas = canvas;

            // Show preview
            canvas.style.display = 'block';
            downloadBtn.style.display = 'block';
            status.textContent = '✅ Ready. Click download to save.';
        }

        // Download as JPEG (quality 70% to match your script)
        function downloadImage() {
            if (!currentCanvas) return;
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            const link = document.createElement('a');
            link.href = dataUrl;
            const originalName = currentImage?.name || 'image';
            const baseName = originalName.replace(/\.[^/.]+$/, '');
            link.download = baseName + '_watermarked.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            status.textContent = '✅ Downloaded!';
        }

        // Event listeners
        dropArea.addEventListener('click', () => fileInput.click());
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('drag-over');
        });
        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('drag-over');
        });
        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });
        downloadBtn.addEventListener('click', downloadImage);

        // Kick off loading watermarks
        loadWatermarks();
    })();
</script>
</body>
</html>
