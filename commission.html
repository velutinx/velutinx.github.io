<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX — Commissions</title>
  <!-- Header CSS -->
  <link rel="stylesheet" href="/assets/css/mainheader.css">
  <!-- Page‑specific CSS (commission box styles) -->
  <style>
    /* ==================== COMMISSION PAGE STYLES ==================== */
    .divider {
      width: 80%;
      height: 6px;
      background: var(--divider, #aa9e76);
      margin: 22px auto;
      border-radius: 4px;
    }
    body.dark .divider {
      background: var(--divider-dark, #6f6a4e);
    }

    .commission-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 24px 80px;
      position: relative;
    }

    .commission-box {
      background: transparent;
      border: 2px solid var(--divider, #aa9e76);
      border-radius: 16px;
      padding: 40px 36px;
      min-height: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
      text-align: center;
    }

    .commission-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(238, 234, 224, 0.18);
      border-radius: 14px;
      z-index: -1;
      pointer-events: none;
    }

    body.dark .commission-box {
      border-color: var(--divider-dark, #6f6a4e);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    body.dark .commission-box::before {
      background: rgba(22, 22, 27, 0.25);
    }

    .commission-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
      backdrop-filter: blur(16px);
    }

    .commission-box h2,
    .commission-box p,
    .commission-box .placeholder {
      position: relative;
      z-index: 2;
    }

    .commission-box h2 {
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .commission-box p {
      font-size: 14px;
      line-height: 1.6;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    .placeholder {
      margin-top: 40px;
      font-style: italic;
      opacity: 0.7;
    }

    /* Box‑specific falling sparkles */
    .box-star {
      position: absolute;
      color: var(--divider, #aa9e76);
      font-size: 18px;
      pointer-events: none;
      animation: boxStarFall 6s linear forwards;
      z-index: 1;
    }

    @keyframes boxStarFall {
      from { opacity: 0; transform: translateY(-20px); }
      10% { opacity: 1; }
      to { opacity: 0; transform: translateY(420px); }
    }
  </style>
</head>
<body>

  <!-- Swipe animation layer (used by language change) -->
  <div class="lang-swipe" id="langSwipe"></div>

  <div id="page">
    <div id="navContainer"></div>
    <div class="divider"></div>

    <section class="commission-wrap">
      <div class="commission-box" id="commissionBox">
        <h2 id="comTitle">COMMISSIONS</h2>
        <p id="comInfo">Commission information will be added here soon.</p>
        <p class="placeholder" id="comList">
          ✦ Prices<br>
          ✦ Examples<br>
          ✦ Terms of Service<br>
          ✦ Queue Status<br><br>
          (Placeholder content — coming soon ♡)
        </p>
      </div>
    </section>

    <div class="divider"></div>
  </div>

  <!-- Scripts: translt.js must be first -->
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/mainheader.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // ==================== Page‑specific logic ====================
    // Apply dark mode from localStorage (header already does, but safe)
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }

    // Box‑specific falling sparkles (original commission box effect)
    const commissionBox = document.getElementById("commissionBox");
    if (commissionBox) {
      setInterval(() => {
        const star = document.createElement("div");
        star.className = "box-star";
        star.textContent = "✦";
        star.style.left = `${Math.random() * commissionBox.clientWidth}px`;
        star.style.top = "0px";
        commissionBox.appendChild(star);
        setTimeout(() => star.remove(), 6000);
      }, 700);
    }

    // Apply translations for commissions page
    function applyCommissionsTranslations() {
      if (typeof window.applyTranslations === 'function') {
        window.applyTranslations('commissions');
      }
    }

    applyCommissionsTranslations();
    document.addEventListener('languageChanged', applyCommissionsTranslations);
  </script>

</body>
</html>
