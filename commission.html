<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX — Commissions</title>
  <link rel="stylesheet" href="/assets/css/shared.css">
  <link rel="stylesheet" href="/assets/css/format.css">
  <style>
    .commissions-page .login-btn,
    .commissions-page .cart-wrapper,
    .commissions-page .floating-cart {
      display: none !important;
    }
    .commissions-page .top-nav {
      background: var(--bg) !important;
      border-bottom: 1px solid var(--border);
    }
    /* ✅ Fix: Start invisible so the reveal animation is visible */
    #page {
      opacity: 0;
    }
  </style>
</head>
<body class="commissions-page">

  <div id="header-placeholder"></div>

  <!-- ✅ Wrap everything in a #page div -->
  <div id="page">
    <div class="divider"></div>
    <section class="commission-wrap">
      <div class="commission-box" id="commissionBox">
        <h2 id="comTitle">COMMISSIONS</h2>
        <p id="comInfo">Commission information will be added here soon.</p>
        <p class="placeholder" id="comList">
          ✦ Prices<br>
          ✦ Examples<br>
          ✦ Terms of Service<br>
          ✦ Queue Status<br><br>
          (Placeholder content — coming soon ♡)
        </p>
      </div>
    </section>
    <div class="divider"></div>
  </div>

  <script src="/assets/js/shared.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    function applyCommissionsTranslations() {
      if (typeof window.applyTranslations === 'function') {
        window.applyTranslations('commissions');
      }
    }
    applyCommissionsTranslations();
    document.addEventListener('languageChanged', (e) => {
      const newLang = e.detail.language;
      if (newLang && typeof window.setLanguage === 'function') {
        window.setLanguage(newLang);
      } else if (newLang) {
        window.currentLanguage = newLang;
      }
      applyCommissionsTranslations();
    });
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
