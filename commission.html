<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX — Commissions</title>
  <!-- Header CSS -->
  <link rel="stylesheet" href="/assets/css/mainheader.css">
  <!-- Shared page styles (gallery, commission box, stars, etc.) -->
  <link rel="stylesheet" href="/assets/css/format.css">
  <style>
    /* Override header background to match page flat background */
    .top-nav {
      background: var(--bg) !important;
      backdrop-filter: none !important;
      border-bottom: 1px solid var(--border);
    }
    /* Hide store button and both cart icons on this page */
    .commissions-page .store-btn,
    .commissions-page .cart-wrapper,
    .commissions-page .floating-cart {
      display: none !important;
    }
  </style>
</head>
<body class="commissions-page">

  <div class="lang-swipe" id="langSwipe"></div>

  <div id="page">
    <div id="navContainer"></div>
    <div class="divider"></div>

    <section class="commission-wrap">
      <div class="commission-box" id="commissionBox">
        <h2 id="comTitle">COMMISSIONS</h2>
        <p id="comInfo">Commission information will be added here soon.</p>
        <p class="placeholder" id="comList">
          ✦ Prices<br>
          ✦ Examples<br>
          ✦ Terms of Service<br>
          ✦ Queue Status<br><br>
          (Placeholder content — coming soon ♡)
        </p>
      </div>
    </section>

    <div class="divider"></div>
  </div>

  <!-- Scripts: translt.js must be first -->
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/mainheader.js"></script>
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // Apply translations for commissions page
    if (typeof window.applyTranslations === 'function') {
      window.applyTranslations('commissions');
      document.addEventListener('languageChanged', () => {
        window.applyTranslations('commissions');
      });
    }

    // Ensure dark mode from localStorage
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
