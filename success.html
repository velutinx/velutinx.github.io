<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Successful - VELUTINX</title>
    <link rel="stylesheet" href="https://velutinx.github.io/assets/css/header.css">
    <style>
        :root { --success-green: #13DEB9; --bg-light: #f8f9fa; }
        body { background-color: var(--bg-light); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .success-wrapper { max-width: 650px; margin: 60px auto; padding: 20px; }
        .success-container { background: #ffffff; border-radius: 16px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .success-container h1 { color: #000000; margin-bottom: 8px; font-size: 24px; }
        .order-number { background: #f0f0f0; padding: 4px 10px; border-radius: 6px; font-family: monospace; font-weight: bold; color: #000 !important; }
        #download-section { margin: 30px 0; min-height: 50px; }
        .download-item { display: flex; align-items: center; justify-content: center; background: #49BEFF; color: white !important; text-decoration: none; padding: 18px 24px; border-radius: 10px; margin-bottom: 12px; font-weight: 600; transition: transform 0.2s, background 0.2s; }
        .download-item:hover { background: #38aae8; transform: translateY(-2px); }
        .disclaimer-box { margin-top: 30px; padding-top: 25px; border-top: 1px solid #eee; text-align: left; font-size: 14px; }
        .id-note { background: #fff3cd; padding: 15px; border-radius: 8px; border: 1px solid #ffeeba; margin-top: 10px; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } }
    </style>
</head>
<body>

<div class="success-wrapper">
    <div class="success-container">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#13DEB9" stroke-width="2.5" style="margin-bottom: 20px;">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <h1 id="confTitle">Confirming...</h1>
        <p><span id="orderLabel">Order:</span> <span class="order-number" id="order-id">#00000</span></p>
        <div id="download-section"><p class="loading-dots" id="loadingText">Preparing assets</p></div>
        <div class="disclaimer-box">
            <p id="supportText"></p>
            <p id="idText" class="id-note"></p>
            <p id="noticeText" style="font-weight: bold; margin-top: 10px;"></p>
        </div>
    </div>
</div>

<script src="https://velutinx.github.io/assets/js/header.js" crossorigin="anonymous"></script>

<script>
    const hardcoded = {
        ja: {
            confTitle: "購入が完了しました！",
            orderLabel: "注文番号:",
            readyLabel: "ダウンロードの準備ができました:",
            dlBtn: "ダウンロード",
            supportText: "サポート: Discord (velutinxx) またはメール support@velutinx.com まで。",
            idText: "本人確認: 注文番号とPayPalのメールアドレスを記載してください。",
            noticeText: "注意: リンクは24時間有効です。共有しないでください。"
        },
        en: {
            confTitle: "Purchase Confirmed!",
            orderLabel: "Order Number:",
            readyLabel: "Your files are ready:",
            dlBtn: "Download",
            supportText: "Support: Message me on Discord (velutinxx) or email support@velutinx.com.",
            idText: "Identification: Include your Order Number and PayPal Email.",
            noticeText: "Notice: Links valid for 24 hours. Do not share."
        }
    };

    window.addEventListener('load', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");
        let lang = urlParams.get("lang") || "en";

        // Fix the 'zh' error on the fly
        if (lang === "zh") lang = "ja";

        // Try global translations object from header.js, then hardcoded ja/en
        const t = (window.translations && window.translations[lang]) 
                  ? window.translations[lang] 
                  : (hardcoded[lang] || hardcoded.en);

        document.getElementById("confTitle").textContent = t.confTitle;
        document.getElementById("orderLabel").textContent = t.orderLabel;
        document.getElementById("supportText").innerHTML = t.supportText.replace('Discord (velutinxx)', '<strong>Discord (velutinxx)</strong>').replace('support@velutinx.com', '<strong>support@velutinx.com</strong>');
        document.getElementById("idText").innerHTML = t.idText.replace('注文番号', '<strong>注文番号</strong>').replace('Order Number', '<strong>Order Number</strong>').replace('PayPal Email', '<strong>PayPal Email</strong>');
        document.getElementById("noticeText").textContent = t.noticeText;

        if (!token) {
            document.getElementById("download-section").innerHTML = "Error: Token Missing";
            return;
        }

        fetch(`/get-download?token=${token}`)
            .then(res => res.json())
            .then(data => {
                const section = document.getElementById("download-section");
                if (data.items && data.items.length > 0) {
                    document.getElementById("order-id").innerText = "#" + data.order_number.toString().padStart(5, '0');
                    let html = `<p style="font-weight:bold; margin-bottom:10px;">${t.readyLabel}</p>`;
                    data.items.forEach(item => {
                        html += `<a href="${item.link}" class="download-item" target="_blank">${t.dlBtn} ${item.title} ↓</a>`;
                    });
                    section.innerHTML = html;
                    localStorage.removeItem("velutinx_cart");
                } else {
                    section.innerHTML = "Vault Error: Links not found.";
                }
            })
            .catch(() => { 
                document.getElementById("download-section").innerHTML = "Server connection error.";
            });
    });
</script>
</body>
</html>
