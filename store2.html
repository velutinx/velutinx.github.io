<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VELUTINX | Official Store</title>
  <link rel="stylesheet" href="/assets/css/shared.css">
  <!-- PayPal SDK – must be loaded before shared.js -->
  <script src="https://www.paypal.com/sdk/js?client-id=AR7igvBzCZr6spSQ8DswwyQ28fU5U9hY0JwFGHcQmI7NZ5M8kvgPAqqQEN9xPPo5E1UNl-om-OWnscI3&currency=USD"></script>
  <style>
    /* store-specific styles (same as before) */
    .main-container { display: flex; max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 2rem; gap: 2rem; }
    .store-filter-sidebar { width: 260px; flex-shrink: 0; }
    /* ... (rest of styles unchanged) ... */
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="main-container">
    <aside class="store-filter-sidebar">
      <!-- filter & sort sidebar – same as before -->
    </aside>
    <main class="products-section">
      <div class="products-header">
        <h2 id="latestTitle">Latest Content</h2>
        <div class="search-bar-wrapper">
          <div class="input-base">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="gray" stroke-width="2"><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path><path d="M21 21l-6 -6"></path></svg>
            <input type="search" id="searchInput" class="input-element" placeholder="Search...">
          </div>
        </div>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>

  <script src="/assets/js/shared.js"></script>
  <script src="/assets/js/price.js" type="module"></script>

  <script type="module">
    import packsData from '/assets/js/packs-data.js';

    // ----- store‑specific translations (same as before) -----
    const storeTranslations = {
      en: { filterTitle: "Filter by Category", sortTitle: "Sort by", catAll: "All Products", catFemale: "Female Models", catFemboy: "Femboy Models", catMembership: "Memberships", sortNewest: "Newest", sortOldest: "Oldest", sortLow: "Price: Low to High", sortHigh: "Price: High to Low", latestTitle: "Latest Content", searchPlaceholder: "Search..." },
      ja: { filterTitle: "カテゴリで絞り込み", sortTitle: "並び替え", catAll: "すべて", catFemale: "婦人", catFemboy: "男の娘", catMembership: "メンバーシップ", sortNewest: "新着順", sortOldest: "古い順", sortLow: "価格: 安い順", sortHigh: "価格: 高い順", latestTitle: "最新コンテンツ", searchPlaceholder: "検索..." },
      zh: { filterTitle: "按分类筛选", sortTitle: "排序方式", catAll: "所有商品", catFemale: "女性模型", catFemboy: "伪娘模型", catMembership: "会员资格", sortNewest: "最新", sortOldest: "最旧", sortLow: "价格: 从低到高", sortHigh: "价格: 从高到低", latestTitle: "最新内容", searchPlaceholder: "搜索..." },
      es: { filterTitle: "Filtrar por Categoría", sortTitle: "Ordenar por", catAll: "Todos los productos", catFemale: "Modelos Femeninos", catFemboy: "Modelos Femboy", catMembership: "Membresías", sortNewest: "Más reciente", sortOldest: "Más antiguo", sortLow: "Precio: menor a mayor", sortHigh: "Precio: mayor a menor", latestTitle: "Último Contenido", searchPlaceholder: "Buscar..." }
    };

    // ----- Store cart (separate from membership cart) -----
    let storeCart = JSON.parse(localStorage.getItem('velutinx_store_cart') || '[]');

    function saveStoreCart() {
      localStorage.setItem('velutinx_store_cart', JSON.stringify(storeCart));
      updateStoreCartUI();
    }

    function updateStoreCartUI() {
      // Reuse shared cart drawer elements, but we must update the badge and total
      const container = document.getElementById('cartItems');
      const totalSpan = document.getElementById('cartTotal');
      if (!container) return;
      const t = storeTranslations[window.currentLanguage || 'en'];
      container.innerHTML = storeCart.length === 0 ? `<div style="padding:1rem;">${t?.emptyCart || 'Your cart is empty'}</div>` : '';
      let total = 0;
      storeCart.forEach((item, idx) => {
        const priceStr = window.getFormattedPrice(item.priceKey);
        total += window.priceKeyMap[item.priceKey] || 0;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `<img src="${item.image}" alt="${item.title}"><div class="cart-item-info"><div class="cart-item-title">${escapeHtml(item.title)}</div><div class="cart-item-price">${priceStr}</div></div><button class="cart-item-remove" data-idx="${idx}">✕</button>`;
        container.appendChild(div);
      });
      document.querySelectorAll('.cart-item-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(btn.dataset.idx);
          storeCart.splice(idx, 1);
          saveStoreCart();
          showSnackbar(t?.removedMsg || 'Removed from cart', true);
          renderStoreGrid();
        });
      });
      if (totalSpan) totalSpan.innerText = window.formatPrice(total);
      document.querySelectorAll('#cartCount, #floatingCartCount').forEach(el => { if (el) el.textContent = storeCart.length; });
    }

    function showSnackbar(msg, isRemove) {
      const sb = document.getElementById('snackbar');
      if (sb) {
        sb.style.background = isRemove ? '#ef4444' : '#22c55e';
        const textSpan = sb.querySelector('#snackText');
        if (textSpan) textSpan.innerText = msg;
        sb.classList.add('show');
        setTimeout(() => sb.classList.remove('show'), 2000);
      } else alert(msg);
    }

    window.addOrToggleCart = function(product) {
      const idx = storeCart.findIndex(i => String(i.id) === String(product.id));
      const t = storeTranslations[window.currentLanguage || 'en'];
      if (idx > -1) {
        storeCart.splice(idx, 1);
        showSnackbar(t?.removedMsg || 'Removed from cart', true);
      } else {
        storeCart.push({ id: product.id, title: product.title, priceKey: product.priceKey, image: product.image, type: 'store' });
        showSnackbar(t?.addedMsg || 'Added to cart', false);
      }
      saveStoreCart();
      renderStoreGrid();
    };

    // ----- Store rendering logic (same as before) -----
    let products = [];
    let activeCategory = "all";
    let currentSort = "newest";
    let searchQuery = "";
    let currentLang = localStorage.getItem('language') || 'en';

    function applyStoreTranslations() { /* ... (same as before) ... */ }
    function getFilteredSorted() { /* ... (same as before) ... */ }
    function renderStoreGrid() { /* ... (same as before, using storeCart to set button state) ... */ }
    function escapeHtml(str) { /* ... */ }
    function bindStoreEvents() { /* ... */ }

    // After header and price maps are ready, initialize the store and setup checkout
    document.addEventListener('headerReady', () => {
      document.addEventListener('priceMapReady', () => {
        // Build products from packsData
        products = packsData.map(p => ({
          id: p.id,
          title: p.title,
          category: p.category,
          priceKey: p.price
        }));
        applyStoreTranslations();
        bindStoreEvents();
        renderStoreGrid();
        updateStoreCartUI();

        // Setup PayPal checkout using store cart
        window.setupStoreCheckout(
          () => storeCart.map(item => ({ priceKey: item.priceKey, quantity: 1 })),
          () => {
            storeCart = [];
            saveStoreCart();
            updateStoreCartUI();
            renderStoreGrid();
          }
        );
      });
      if (window.priceKeyMap && window.priceUsdMap) document.dispatchEvent(new CustomEvent('priceMapReady'));
    });
  </script>
</body>
</html>
