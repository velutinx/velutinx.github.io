<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX | Store</title>
  <!-- Shared CSS (relative path) -->
  <link rel="stylesheet" href="/assets/css/top.css">
  <!-- Store-specific styles (product grid, filters) -->
  <style>
    .main-container {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      gap: 2rem;
    }
    .store-filter-sidebar {
      width: 260px;
      flex-shrink: 0;
    }
    .section-title {
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--text);
    }
    .category-list, .sort-options {
      list-style: none;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 1.8rem;
      overflow: hidden;
    }
    .category-list li, .sort-btn {
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text);
      background: var(--card);
      border: none;
      width: 100%;
      text-align: left;
      font-size: 1rem;
    }
    .category-list li:hover, .sort-btn:hover { background: var(--darker); }
    .category-list li.active, .sort-btn.active {
      background: var(--accent);
      color: #1f1a12;
      font-weight: 600;
    }
    .products-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .products-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }
    .search-bar-wrapper { width: 280px; }
    .input-base {
      display: flex;
      align-items: center;
      background: var(--card);
      border-radius: 40px;
      border: 1px solid var(--border);
      padding: 6px 12px;
      gap: 8px;
    }
    .input-element {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      padding: 8px 0;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.8rem;
    }
    .product-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.2);
    }
    .card-image {
      width: 100%;
      aspect-ratio: 3/3.5;
      object-fit: cover;
      display: block;
      background: #d9d4c2;
    }
    .card-content { padding: 1rem; }
    .card-title { font-weight: 600; margin-bottom: 0.5rem; }
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--price-red);
    }
    .cart-btn {
      width: 44px;
      height: 44px;
      background: var(--btn-cart);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .cart-btn svg { width: 26px; height: 26px; }
    .cart-btn.added { background: var(--success); }
    @media (max-width: 780px) {
      .main-container { flex-direction: column; }
      .store-filter-sidebar { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Header placeholder – shared header will be injected here -->
  <div id="header-placeholder"></div>

  <!-- Store content (unique to this page) -->
  <div class="main-container">
    <aside class="store-filter-sidebar">
      <div class="section-title">Filter by Category</div>
      <ul class="category-list" id="categoryList">
        <li data-cat="all" class="active">All Products</li>
        <li data-cat="female">Female Models</li>
        <li data-cat="femboy">Femboy Models</li>
        <li data-cat="membership">Memberships</li>
      </ul>
      <div class="section-title">Sort by</div>
      <div id="sortContainer">
        <button class="sort-btn active" data-sort="newest">Newest</button>
        <button class="sort-btn" data-sort="oldest">Oldest</button>
        <button class="sort-btn" data-sort="price-asc">Price: Low to High</button>
        <button class="sort-btn" data-sort="price-desc">Price: High to Low</button>
      </div>
    </aside>
    <main class="products-section">
      <div class="products-header">
        <h2>Latest Content</h2>
        <div class="search-bar-wrapper">
          <div class="input-base">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="gray"><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path><path d="M21 21l-6 -6"></path></svg>
            <input type="search" id="searchInput" class="input-element" placeholder="Search...">
          </div>
        </div>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>

  <!-- Shared JS (relative path) -->
  <script src="/assets/js/top.js"></script>

  <!-- Store-specific JS: product loading, filtering, rendering -->
  <script>
    // Wait for shared header to be fully loaded and initialised
    document.addEventListener('headerReady', function() {
      console.log('Shared header ready, initialising store...');
      initStore();
    });
    // Fallback: if event doesn't fire, run after a short delay
    setTimeout(function() {
      if (typeof window.addOrToggleCart === 'function') {
        initStore();
      } else {
        console.warn('Shared header not ready, retrying...');
      }
    }, 500);

    function initStore() {
      // ----- GLOBALS -----
      let products = [];
      let activeCategory = "all";
      let currentSort = "newest";
      let searchQuery = "";
      let currentLang = localStorage.getItem('language') || 'en';

      // ----- Load products from external source (velutinx.com) -----
      async function loadProducts() {
        const url = 'https://velutinx.com/assets/js/packs-data.js';
        try {
          // Try dynamic import (if CORS allows)
          const module = await import(url);
          if (module.default && Array.isArray(module.default)) {
            products = module.default.map(p => ({
              id: p.id,
              title: p.title,
              category: p.category,
              price: 3.0
            }));
            renderGrid();
            return;
          }
        } catch (e) {
          console.warn('Dynamic import failed, trying fetch+eval', e);
        }
        // Fallback: fetch as text and evaluate
        try {
          const resp = await fetch(url);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const text = await resp.text();
          const match = text.match(/export default (\[[\s\S]*?\]);/);
          if (match && match[1]) {
            const data = eval(match[1]);
            products = data.map(p => ({
              id: p.id,
              title: p.title,
              category: p.category,
              price: 3.0
            }));
            renderGrid();
            return;
          }
        } catch (err) {
          console.error('Failed to load products from external source', err);
          document.getElementById('productGrid').innerHTML = '<div style="text-align:center; padding:2rem;">⚠️ Failed to load products. Please refresh or check your connection.</div>';
        }
      }

      // ----- Filtering & Sorting -----
      function getFilteredSorted() {
        let filtered = products.filter(p => {
          if (activeCategory === "all") return true;
          if (activeCategory === "female") return p.category === 1;
          if (activeCategory === "femboy") return p.category === 2;
          if (activeCategory === "membership") return p.category === 3;
          return false;
        });
        if (searchQuery) {
          filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery.toLowerCase()));
        }
        if (currentSort === "newest") {
          filtered.sort((a, b) => parseInt(b.id) - parseInt(a.id));
        } else if (currentSort === "oldest") {
          filtered.sort((a, b) => parseInt(a.id) - parseInt(b.id));
        }
        // price sorts are just placeholder (all products same price)
        return filtered;
      }

      // ----- Render product grid -----
      function renderGrid() {
        const grid = document.getElementById('productGrid');
        if (!grid) return;
        const items = getFilteredSorted();
        grid.innerHTML = '';
        items.forEach(p => {
          const card = document.createElement('div');
          card.className = 'product-card';
          card.dataset.id = p.id;
          const imgUrl = `https://www.velutinx.com/i/pack${String(p.id).padStart(3, '0')}-1.jpg`;
          card.innerHTML = `
            <img src="${imgUrl}" class="card-image" onerror="this.src='https://placehold.co/300x350?text=preview'">
            <div class="card-content">
              <div class="card-title">${escapeHtml(p.title)}</div>
              <div class="price-row">
                <div class="price">${window.formatPrice(3.0)}</div>
                <button class="cart-btn"></button>
              </div>
            </div>
          `;
          const btn = card.querySelector('.cart-btn');
          btn.onclick = (e) => {
            e.stopPropagation();
            window.addOrToggleCart(p);
          };
          card.onclick = () => { window.location.href = `/s/pack?id=${p.id}`; };
          grid.appendChild(card);
        });
        // Sync cart button states
        if (window.syncCartButtons) window.syncCartButtons();
      }

      function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }

      // ----- Event listeners -----
      function bindEvents() {
        // Category filter
        document.querySelectorAll('.category-list li').forEach(li => {
          li.addEventListener('click', () => {
            document.querySelectorAll('.category-list li').forEach(l => l.classList.remove('active'));
            li.classList.add('active');
            activeCategory = li.dataset.cat;
            renderGrid();
          });
        });
        // Sort buttons
        document.querySelectorAll('.sort-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSort = btn.dataset.sort;
            renderGrid();
          });
        });
        // Search
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGrid();
          });
        }
        // Language change (re-render prices)
        document.addEventListener('languageChanged', () => {
          renderGrid(); // re-render to update prices with new currency
        });
      }

      // ----- Initialise -----
      bindEvents();
      loadProducts();
    }
  </script>
</body>
</html>
