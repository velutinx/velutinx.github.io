<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VELUTINX | Official Store</title>

  <!-- Shared CSS (header, sidebar, cart, snackbar) -->
  <link rel="stylesheet" href="/assets/css/shared.css">

  <!-- Store-specific styles (product grid, filters) -->
  <style>
    /* ----- STORE LAYOUT ----- */
    .main-container {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem 2rem;
      gap: 2rem;
    }
    .store-filter-sidebar {
      width: 260px;
      flex-shrink: 0;
    }
    .section-title {
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-list, .sort-options {
      list-style: none;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 1.8rem;
      overflow: hidden;
    }
    .category-list li, .sort-btn {
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text);
      background: var(--card);
      border: none;
      width: 100%;
      text-align: left;
      font-size: 1rem;
    }
    .category-list li svg, .sort-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }
    .category-list li:hover, .sort-btn:hover { background: var(--darker); }
    .category-list li.active, .sort-btn.active {
      background: var(--accent);
      color: #1f1a12;
      font-weight: 600;
    }
    .products-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .products-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }
    .search-bar-wrapper { width: 280px; }
    .input-base {
      display: flex;
      align-items: center;
      background: var(--card);
      border-radius: 40px;
      border: 1px solid var(--border);
      padding: 6px 12px;
      gap: 8px;
    }
    .input-element {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      padding: 8px 0;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.8rem;
    }
    .product-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.2);
    }
    .card-image {
      width: 100%;
      aspect-ratio: 3/3.5;
      object-fit: cover;
      display: block;
      background: #d9d4c2;
    }
    .card-content { padding: 1rem; }
    .card-title { font-weight: 600; margin-bottom: 0.5rem; }
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--price-red);
    }
    .cart-btn {
      width: 44px;
      height: 44px;
      background: var(--btn-cart);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .cart-btn svg { width: 26px; height: 26px; }
    .cart-btn.added { background: var(--success); }
    @media (max-width: 780px) {
      .main-container { flex-direction: column; }
      .store-filter-sidebar { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Shared header will be injected here -->
  <div id="header-placeholder"></div>

  <!-- ========== STORE CONTENT (unique to this page) ========== -->
  <div class="main-container">
    <aside class="store-filter-sidebar">
      <div class="section-title" id="filterTitle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h16"/><path d="M8 6v4M16 12v6"/></svg>
        <span>Filter by Category</span>
      </div>
      <ul class="category-list" id="categoryList">
        <li data-cat="all" class="active">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span id="catAll">All Products</span>
        </li>
        <li data-cat="female">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="9" r="6" stroke="currentColor" stroke-width="2"/>
            <path d="M12 15V21M9 18H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span id="catFemale">Female Models</span>
        </li>
        <li data-cat="femboy">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="14" r="6" stroke="currentColor" stroke-width="2"/>
            <path d="M16 8L20 4M20 4H16M20 4V8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="catFemboy">Femboy Models</span>
        </li>
        <li data-cat="membership">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3 6 6 .7-4.5 4.1L18 19l-6-3-6 3 1.5-6.2L3 8.7 9 8z"/></svg>
          <span id="catMembership">Memberships</span>
        </li>
      </ul>
      <div class="section-title" id="sortTitle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 3v12M7 15l-3-3M7 15l3-3M17 21V9M17 9l-3 3M17 9l3 3"/></svg>
        <span>Sort by</span>
      </div>
      <div id="sortContainer">
        <button class="sort-btn active" data-sort="newest">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v12M12 15l-3-3M12 15l3-3"/><path d="M5 21h14"/></svg>
          <span id="sortNewest">Newest</span>
        </button>
        <button class="sort-btn" data-sort="oldest">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21V9M12 9l-3 3M12 9l3 3"/><path d="M5 3h14"/></svg>
          <span id="sortOldest">Oldest</span>
        </button>
        <button class="sort-btn" data-sort="price-asc">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 15h6M4 9h10M4 3h14M20 9v12M20 21l3-3M20 21l-3-3"/></svg>
          <span id="sortLow">Price: Low to High</span>
        </button>
        <button class="sort-btn" data-sort="price-desc">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 15h6M4 9h10M4 3h14M20 21V9M20 9l3 3M20 9l-3-3"/></svg>
          <span id="sortHigh">Price: High to Low</span>
        </button>
      </div>
    </aside>

    <main class="products-section">
      <div class="products-header">
        <h2 id="latestTitle">Latest Content</h2>
        <div class="search-bar-wrapper">
          <div class="input-base">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="gray" stroke-width="2"><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path><path d="M21 21l-6 -6"></path></svg>
            <input type="search" id="searchInput" class="input-element" placeholder="Search...">
          </div>
        </div>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>

  <!-- Shared JavaScript (injects header, handles cart, language, theme) -->
  <script src="/assets/js/shared.js"></script>

  <!-- Store‑specific JavaScript (product loading, filtering, rendering) -->
  <script>
    // Wait for the shared header to be fully injected
    document.addEventListener('headerReady', function() {
      initStore();
    });

    // Fallback in case the event doesn't fire
    setTimeout(function() {
      if (typeof window.addOrToggleCart === 'function') {
        initStore();
      }
    }, 1000);

    function initStore() {
      // --------------------------------------------------------------
      // 1. Store‑specific translations (filter titles, product grid)
      // --------------------------------------------------------------
      const storeTranslations = {
        en: {
          filterTitle: "Filter by Category",
          sortTitle: "Sort by",
          catAll: "All Products",
          catFemale: "Female Models",
          catFemboy: "Femboy Models",
          catMembership: "Memberships",
          sortNewest: "Newest",
          sortOldest: "Oldest",
          sortLow: "Price: Low to High",
          sortHigh: "Price: High to Low",
          latestTitle: "Latest Content",
          searchPlaceholder: "Search..."
        },
        ja: {
          filterTitle: "カテゴリで絞り込み",
          sortTitle: "並び替え",
          catAll: "すべて",
          catFemale: "女性モデル",
          catFemboy: "男の娘モデル",
          catMembership: "メンバーシップ",
          sortNewest: "新着順",
          sortOldest: "古い順",
          sortLow: "価格: 安い順",
          sortHigh: "価格: 高い順",
          latestTitle: "最新コンテンツ",
          searchPlaceholder: "検索..."
        },
        zh: {
          filterTitle: "按分类筛选",
          sortTitle: "排序方式",
          catAll: "所有商品",
          catFemale: "女性模型",
          catFemboy: "伪娘模型",
          catMembership: "会员资格",
          sortNewest: "最新",
          sortOldest: "最旧",
          sortLow: "价格: 从低到高",
          sortHigh: "价格: 从高到低",
          latestTitle: "最新内容",
          searchPlaceholder: "搜索..."
        },
        es: {
          filterTitle: "Filtrar por Categoría",
          sortTitle: "Ordenar por",
          catAll: "Todos los productos",
          catFemale: "Modelos Femeninos",
          catFemboy: "Modelos Femboy",
          catMembership: "Membresías",
          sortNewest: "Más reciente",
          sortOldest: "Más antiguo",
          sortLow: "Precio: menor a mayor",
          sortHigh: "Precio: mayor a menor",
          latestTitle: "Último Contenido",
          searchPlaceholder: "Buscar..."
        }
      };

      // --------------------------------------------------------------
      // 2. State
      // --------------------------------------------------------------
      let products = [];
      let activeCategory = "all";
      let currentSort = "newest";
      let searchQuery = "";
      let currentLang = localStorage.getItem('language') || 'en';

      // --------------------------------------------------------------
      // 3. Helper functions
      // --------------------------------------------------------------
      function applyStoreTranslations() {
        const t = storeTranslations[currentLang] || storeTranslations.en;
        document.getElementById('filterTitle').querySelector('span').innerText = t.filterTitle;
        document.getElementById('sortTitle').querySelector('span').innerText = t.sortTitle;
        document.getElementById('catAll').innerText = t.catAll;
        document.getElementById('catFemale').innerText = t.catFemale;
        document.getElementById('catFemboy').innerText = t.catFemboy;
        document.getElementById('catMembership').innerText = t.catMembership;
        document.getElementById('sortNewest').innerText = t.sortNewest;
        document.getElementById('sortOldest').innerText = t.sortOldest;
        document.getElementById('sortLow').innerText = t.sortLow;
        document.getElementById('sortHigh').innerText = t.sortHigh;
        document.getElementById('latestTitle').innerText = t.latestTitle;
        document.getElementById('searchInput').placeholder = t.searchPlaceholder;
      }

      function getFilteredSorted() {
        let filtered = products.filter(p => {
          if (activeCategory === "all") return true;
          if (activeCategory === "female") return p.category === 1;
          if (activeCategory === "femboy") return p.category === 2;
          if (activeCategory === "membership") return p.category === 3;
          return false;
        });
        if (searchQuery) {
          filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery.toLowerCase()));
        }
        if (currentSort === "newest") {
          filtered.sort((a, b) => parseInt(b.id) - parseInt(a.id));
        } else if (currentSort === "oldest") {
          filtered.sort((a, b) => parseInt(a.id) - parseInt(b.id));
        }
        return filtered;
      }

      function renderGrid() {
        const grid = document.getElementById('productGrid');
        if (!grid) return;
        const items = getFilteredSorted();
        grid.innerHTML = '';
        items.forEach(p => {
          const card = document.createElement('div');
          card.className = 'product-card';
          card.dataset.id = p.id;
          const imgUrl = `https://www.velutinx.com/i/pack${String(p.id).padStart(3, '0')}-1.jpg`;
          card.innerHTML = `
            <img src="${imgUrl}" class="card-image" onerror="this.src='https://placehold.co/300x350?text=preview'">
            <div class="card-content">
              <div class="card-title">${escapeHtml(p.title)}</div>
              <div class="price-row">
                <div class="price">${window.formatPrice(3.0)}</div>
                <button class="cart-btn"></button>
              </div>
            </div>
          `;
          const btn = card.querySelector('.cart-btn');
          btn.onclick = (e) => {
            e.stopPropagation();
            window.addOrToggleCart(p);
          };
          card.onclick = () => { window.location.href = `/s/pack?id=${p.id}`; };
          grid.appendChild(card);
        });
        // Sync cart button states (shared function)
        if (window.syncCartButtons) window.syncCartButtons();
      }

      function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }

      // --------------------------------------------------------------
      // 4. Load products from external source (same as before)
      // --------------------------------------------------------------
      async function loadProducts() {
        const url = 'https://velutinx.com/assets/js/packs-data.js';
        try {
          const module = await import(url);
          if (module.default && Array.isArray(module.default)) {
            products = module.default.map(p => ({
              id: p.id,
              title: p.title,
              category: p.category,
              price: 3.0
            }));
            renderGrid();
            return;
          }
        } catch (e) {
          console.warn('Dynamic import failed, trying fetch+eval', e);
        }
        try {
          const resp = await fetch(url);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const text = await resp.text();
          const match = text.match(/export default (\[[\s\S]*?\]);/);
          if (match && match[1]) {
            const data = eval(match[1]);
            products = data.map(p => ({
              id: p.id,
              title: p.title,
              category: p.category,
              price: 3.0
            }));
            renderGrid();
            return;
          }
        } catch (err) {
          console.error('Failed to load products', err);
        }
        document.getElementById('productGrid').innerHTML = '<div style="text-align:center; padding:2rem;">⚠️ Failed to load products. Please refresh or check your connection.</div>';
      }

      // --------------------------------------------------------------
      // 5. Event listeners
      // --------------------------------------------------------------
      function bindEvents() {
        document.querySelectorAll('.category-list li').forEach(li => {
          li.addEventListener('click', () => {
            document.querySelectorAll('.category-list li').forEach(l => l.classList.remove('active'));
            li.classList.add('active');
            activeCategory = li.dataset.cat;
            renderGrid();
          });
        });
        document.querySelectorAll('.sort-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSort = btn.dataset.sort;
            renderGrid();
          });
        });
        document.getElementById('searchInput').addEventListener('input', (e) => {
          searchQuery = e.target.value;
          renderGrid();
        });
        // Listen for language changes from shared header
        document.addEventListener('languageChanged', () => {
          currentLang = localStorage.getItem('language') || 'en';
          applyStoreTranslations();
          renderGrid(); // re-render to update prices (currency changes)
        });
      }

      // --------------------------------------------------------------
      // 6. Initialise
      // --------------------------------------------------------------
      applyStoreTranslations();
      bindEvents();
      loadProducts();
    }
  </script>
</body>
</html>
