<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX | Store</title>
  <!-- Shared CSS -->
  <link rel="stylesheet" href="https://velutinx.github.io/assets/css/top.css">
  <!-- Store-specific styles (product grid, filters) -->
  <style>
    .main-container {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      gap: 2rem;
    }
    .store-filter-sidebar {
      width: 260px;
      flex-shrink: 0;
    }
    .section-title {
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--text);
    }
    .category-list, .sort-options {
      list-style: none;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 1.8rem;
      overflow: hidden;
    }
    .category-list li, .sort-btn {
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text);
      background: var(--card);
      border: none;
      width: 100%;
      text-align: left;
      font-size: 1rem;
    }
    .category-list li:hover, .sort-btn:hover { background: var(--darker); }
    .category-list li.active, .sort-btn.active {
      background: var(--accent);
      color: #1f1a12;
      font-weight: 600;
    }
    .products-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .products-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }
    .search-bar-wrapper { width: 280px; }
    .input-base {
      display: flex;
      align-items: center;
      background: var(--card);
      border-radius: 40px;
      border: 1px solid var(--border);
      padding: 6px 12px;
      gap: 8px;
    }
    .input-element {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      padding: 8px 0;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.8rem;
    }
    .product-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.2);
    }
    .card-image {
      width: 100%;
      aspect-ratio: 3/3.5;
      object-fit: cover;
      display: block;
      background: #d9d4c2;
    }
    .card-content { padding: 1rem; }
    .card-title { font-weight: 600; margin-bottom: 0.5rem; }
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--price-red);
    }
    .cart-btn {
      width: 44px;
      height: 44px;
      background: var(--btn-cart);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .cart-btn svg { width: 26px; height: 26px; }
    .cart-btn.added { background: var(--success); }
    @media (max-width: 780px) {
      .main-container { flex-direction: column; }
      .store-filter-sidebar { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Header placeholder – shared header will be injected here -->
  <div id="header-placeholder"></div>

  <!-- Store content (unique to this page) -->
  <div class="main-container">
    <aside class="store-filter-sidebar">
      <div class="section-title">Filter by Category</div>
      <ul class="category-list" id="categoryList">
        <li data-cat="all" class="active">All Products</li>
        <li data-cat="female">Female Models</li>
        <li data-cat="femboy">Femboy Models</li>
        <li data-cat="membership">Memberships</li>
      </ul>
      <div class="section-title">Sort by</div>
      <div id="sortContainer">
        <button class="sort-btn active" data-sort="newest">Newest</button>
        <button class="sort-btn" data-sort="oldest">Oldest</button>
        <button class="sort-btn" data-sort="price-asc">Price: Low to High</button>
        <button class="sort-btn" data-sort="price-desc">Price: High to Low</button>
      </div>
    </aside>
    <main class="products-section">
      <div class="products-header">
        <h2>Latest Content</h2>
        <div class="search-bar-wrapper">
          <div class="input-base">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="gray"><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path><path d="M21 21l-6 -6"></path></svg>
            <input type="search" id="searchInput" class="input-element" placeholder="Search...">
          </div>
        </div>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>

  <!-- Shared JS -->
  <script src="https://velutinx.github.io/assets/js/top.js"></script>

  <!-- Store-specific JS (product loading, filtering, rendering) -->
  <script>
    // This part remains exactly as in the original store HTML, using the shared cart functions.
    // (The full product loading and grid rendering code would go here.)
  </script>
</body>
</html>
