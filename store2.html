<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Store</title>

  <!-- Inline header CSS (originally from https://velutinx.github.io/assets/css/header.css) -->
  <style>
    :root {
      --bg: #d3d0c1; --card: #e8e5d8; --darker: #c0bcaa; --text: #3a3528;
      --text-light: #e8e5d8; --accent: #aa9e76; --success: #22c55e;
      --red-discount: #a64a5c; --gray: #8a7b6f; --border: #aa9e76;
      --overlay: rgba(170,158,118,0.25); --btn-cart: #3a3528;
      --btn-cart-hover: #4a4538;
    }
    body.dark {
      --bg: #0f0f12; --card: #1a1a20; --darker: #121216; --text: #e6e3d8;
      --text-light: #e6e3d8; --accent: #d4c08a; --success: #8b8a5e;
      --red-discount: #a64a5c; --gray: #b8b3a5; --border: #6f6a4e;
      --overlay: rgba(15,15,18,0.75);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      transition: background 0.4s, color 0.4s;
    }
    body.drawer-open::after {
      content: ""; position: fixed; inset: 0; background: var(--overlay);
      z-index: 1190; pointer-events: none;
    }
    body.drawer-open .floating-cart { display: none; }

    /* Top nav */
    .top-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.9rem 2.5rem; background: var(--darker);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
    }
    .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; color: #000; }
    body.dark .logo { color: var(--accent); }

    .nav-actions { display: flex; align-items: center; gap: 1rem; position: relative; }

    .nav-icon {
      width: 42px; height: 42px; border-radius: 50%; background: transparent;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); border: 1px solid rgba(58,53,40,0.2);
      transition: all 0.22s; cursor: pointer;
    }
    .nav-icon:hover { background: #d3d0c1; color: #3a3528; transform: scale(1.08); border-color: #aa9e76; }
    .nav-icon.active { background: var(--success); color: white; border-color: transparent; }
    .nav-icon svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.5; }

    .login-btn {
      padding: 0.55rem 1.6rem; background: transparent; color: var(--accent);
      border: 1px solid var(--accent); border-radius: 9999px;
      font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.18s;
    }
    .login-btn:hover { background: rgba(170,158,118,0.15); }

    /* Language popover, cart drawer, floating cart, snackbar styles same as original */
    #languagePopover {
      position: absolute; top: 55px; right: 8px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); min-width: 230px; z-index: 1100;
      opacity: 0; visibility: hidden; transform: translateY(-10px);
      transition: opacity 0.5s ease, transform 0.5s ease, visibility 0s linear 0.51s;
    }
    #languagePopover.show { opacity: 1; visibility: visible; transform: translateY(0); transition-delay: 0s; }
    .lang-item {
      display: flex; align-items: center; gap: 14px; padding: 12px 18px;
      cursor: pointer; transition: background 0.2s; color: var(--text);
    }
    .lang-item:hover { background: #c0bcaa; }
    .lang-item img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

    .lang-swipe {
      position: fixed; bottom: -100%; left: 0; width: 100%; height: 20%;
      background: var(--accent); z-index: 10000; pointer-events: none; opacity: 0.9;
    }
    .lang-swipe.active { animation: langSwipeUp 0.55s ease-in forwards; }
    @keyframes langSwipeUp { to { bottom: 100%; } }

    .cart-wrapper { position: relative; }
    .cart-badge {
      position: absolute; top: -8px; right: -8px; background: var(--red-discount);
      color: white; font-size: 0.75rem; font-weight: bold; min-width: 22px;
      height: 22px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; padding: 0 6px; border: 2px solid var(--darker);
    }

    .cart-drawer {
      position: fixed; top: 0; right: -400px; width: 400px; height: 100%;
      background: var(--accent); border-left: 1px solid var(--border);
      box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 1200;
      transition: right 0.35s ease; display: flex; flex-direction: column;
      color: #1f1a12;
    }
    .cart-drawer.open { right: 0; }
    .cart-header { display: flex; justify-content: space-between; align-items: center; padding: 1.4rem 1.6rem; border-bottom: 1px solid var(--border); }
    .cart-header h5 { margin: 0; font-size: 1.45rem; }
    .cart-close { background: none; border: none; color: #1f1a12; font-size: 1.8rem; cursor: pointer; }
    .cart-items { flex: 1; overflow-y: auto; padding: 1.2rem; }
    .cart-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .cart-item img { width: 85px; height: 85px; object-fit: cover; border-radius: 8px; }
    .cart-item-info { flex: 1; }
    .cart-item-title { font-weight: 600; margin-bottom: 6px; }
    .cart-item-price { color: #1f1a12; font-weight: 700; }
    .cart-item-remove { background: none; border: none; color: var(--red-discount); font-size: 1.4rem; cursor: pointer; align-self: flex-start; }
    .cart-total { padding: 1.4rem 1.6rem; border-top: 1px solid var(--border); }
    .cart-total-row { display: flex; justify-content: space-between; margin-bottom: 1.2rem; font-weight: 600; font-size: 1.15rem; }

    .floating-cart {
      position: fixed; bottom: 24px; right: 24px; width: 64px; height: 64px;
      background: var(--accent); border-radius: 50%; display: flex;
      align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      z-index: 1250; cursor: pointer; transition: all 0.25s;
    }
    .floating-cart:hover { transform: scale(1.12); }
    .floating-cart.active { background: var(--success); }
    .floating-cart svg { width: 28px; height: 28px; stroke: white; stroke-width: 2; }
    .floating-badge {
      position: absolute; top: -8px; right: -8px; background: var(--red-discount);
      color: white; font-size: 0.75rem; font-weight: bold; min-width: 22px;
      height: 22px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; padding: 0 6px; border: 2px solid var(--darker);
    }

    #snackbar {
      position: fixed; top: 28px; right: 28px; background: var(--success);
      color: white; padding: 14px 22px; border-radius: 10px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.5); display: flex; align-items: center;
      gap: 14px; z-index: 1300; transform: translateY(-120px); opacity: 0;
      transition: all 0.45s ease;
    }
    #snackbar.show { transform: translateY(0); opacity: 1; }
  </style>

  <!-- Shop/product styles (same as provided) -->
  <style>
    .shop-header { padding: 2.2rem 2.8rem 1.6rem; background: var(--bg); }
    .shop-container { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; gap: 2rem; flex-wrap: wrap; }
    .shop-left { display: flex; align-items: center; gap: 1.2rem; }
    .shop-title { font-size: 2.3rem; font-weight: 800; color: #000; margin: 0; }
    body.dark .shop-title { color: var(--accent); }

    .gift-btn { width: 68px; height: 68px; background: transparent; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.25s; color: #22c55e; }
    .gift-btn:hover { transform: scale(1.18); }
    .gift-btn svg { width: 48px; height: 48px; stroke: currentColor; stroke-width: 2; }

    .main-container { display: flex; max-width: 1480px; margin: 0 auto; padding: 1.5rem 2.5rem; gap: 2.5rem; }
    .sidebar { width: 268px; flex-shrink: 0; }
    .products-section { flex: 1; }

    .section-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.9rem; color: var(--text); padding-left: 0.5rem; }

    .category-list { list-style: none; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .category-list li { padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.9rem; color: var(--text); cursor: pointer; transition: 0.2s; }
    .category-list li:hover { background: #c0bcaa; }
    .category-list li.active { background: var(--accent); color: #1f1a12; font-weight: 600; }
    .category-icon { width: 19px; height: 19px; stroke: currentColor; stroke-width: 1.5; flex-shrink: 0; }

    .sort-options { margin-top: 2rem; }
    .sort-btn { width: 100%; padding: 1rem 1.25rem; background: var(--card); border: 1px solid var(--border); text-align: left; margin-bottom: 0.5rem; border-radius: 10px; font-size: 1rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 0.9rem; color: var(--text); }
    .sort-btn.active { background: var(--accent); color: #1f1a12; }
    .sort-btn:hover:not(.active) { background: #c0bcaa; }
    .sort-icon { width: 19px; height: 19px; stroke: currentColor; stroke-width: 1.5; flex-shrink: 0; }

    .products-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.8rem; flex-wrap: wrap; gap: 1rem; }
    .products-header h2 { font-size: 1.65rem; font-weight: 700; color: var(--text); }
    .search-bar-wrapper { width: 340px; max-width: 100%; }
    .search-field { position: relative; }
    .input-base { position: relative; display: flex; align-items: center; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .outlined-input:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(170,158,118,0.2); }
    .adorned-start { display: flex; align-items: center; padding-left: 12px; }
    .input-adornment.start svg { color: var(--gray); opacity: 0.7; }
    .input-element { flex: 1; padding: 8px 14px 8px 8px; background: transparent; border: none; outline: none; color: var(--text); font-size: 0.95rem; }
    .input-element::placeholder { color: var(--gray); opacity: 0.7; }
    .notched-outline { position: absolute; inset: -1px 0 0; pointer-events: none; border: 1px solid var(--border); border-radius: inherit; transition: border-color 0.2s; }
    .outlined-input:focus-within .notched-outline { border-color: var(--accent); }
    .notched-outline legend { padding: 0 6px; font-size: 0.75rem; visibility: hidden; width: auto; height: 0; line-height: 0; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 1.8rem; }
    .product-card { background: var(--card); border-radius: 16px; overflow: hidden; transition: all 0.25s; border: 1px solid var(--border); cursor: pointer; }
    .product-card.hidden { display: none; }
    .product-card.added-flash { animation: flashGreen 0.6s ease-out; }
    @keyframes flashGreen { 0% { box-shadow: 0 0 0 4px rgba(34,197,94,0.6); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 16px 32px rgba(0,0,0,0.2); }
    .card-image { width: 100%; aspect-ratio: 3 / 3.7; object-fit: cover; }
    .card-content { padding: 1.2rem; }
    .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
    .price-row { display: flex; justify-content: space-between; align-items: center; }
    .price { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .price del { color: var(--gray); font-size: 1rem; margin-left: 0.6rem; }
    .cart-btn { width: 44px; height: 44px; background: var(--btn-cart); border: none; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .cart-btn:hover { background: var(--btn-cart-hover); transform: scale(1.08); }
    .cart-btn.added { background: var(--success); }
  </style>
</head>

      { id: 174, title: "[Pack 174] Jessie - Pokemon", price: 3.00, image: "https://via.placeholder.com/248x300/aa9e76/1a1a20?text=174" },
      { id: 173, title: "[Pack 173] Akane - Blue Archive", price: 1.50, image: "https://via.placeholder.com/248x300/aa9e76/1a1a20?text=173" },
      { id: 172, title: "[Pack 172] Hu Tao - Genshin Impact", price: 1.50, image: "https://via.placeholder.com/248x300/aa9e76/1a1a20?text=172" },
      { id: 171, title: "[Pack 171] Chloe von Einzbern - Fate/Grand Order", price: 3.00, image: "https://via.placeholder.com/248x300/aa9e76/1a1a20?text=171" },
    ].map(p => ({ ...p, date: Date.now() - (productsData?.length || 0 - p.id) * 86400000 * 7 })); // fake recent dates

    // The rest of the shop logic (almost identical to original)
    window.addEventListener('load', () => {
      const grid = document.getElementById("productGrid");
      const searchInput = document.getElementById("searchInput");
      const sortButtons = document.querySelectorAll(".sort-btn");
      const cartBtn = document.getElementById("cartBtn");
      const floatingCartBtn = document.getElementById("floatingCartBtn");
      const cartDrawer = document.getElementById("cartDrawer");
      const cartClose = document.getElementById("cartClose");
      const cartCountEl = document.getElementById("cartCount");
      const floatingCartCountEl = document.getElementById("floatingCartCount");
      const cartItemsEl = document.getElementById("cartItems");
      const cartTotalEl = document.getElementById("cartTotal");
      const snackbar = document.getElementById("snackbar");
      const themeBtn = document.getElementById("themeBtn");

      window.cart = [];
      let secureTotalUSD = 0;

      let currentCurrency = "USD";
      let isDark = localStorage.getItem("darkMode") === "true";
      if (isDark) document.body.classList.add("dark");

      function formatPrice(value) {
        return currentCurrency === "USD" ? `US$${value.toFixed(2)}` : `$${value.toFixed(2)}`; // stub
      }

      function createCards() {
        productsData.forEach(p => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.dataset.title = p.title.toLowerCase();
          card.dataset.price = p.price;
          card.dataset.date = p.date;

          card.innerHTML = `
            <img src="${p.image}" alt="${p.title}" class="card-image" loading="lazy">
            <div class="card-content">
              <div class="card-title">${p.title}</div>
              <div class="price-row">
                <div class="price" data-price="${p.price}">${formatPrice(p.price)}</div>
                <button class="cart-btn" title="Add to Cart">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"></path>
                    <path d="M12.5 17h-6.5v-14h-2"></path>
                    <path d="M6 5l14 1l-.86 6.017m-2.64 .983h-10.5"></path>
                    <path d="M16 19h6"></path><path d="M19 16v6"></path>
                  </svg>
                </button>
              </div>
            </div>
          `;

          // Click card → could go to detail page later
          card.addEventListener("click", e => {
            if (e.target.closest(".cart-btn")) return;
            alert(`Detail view for pack ${p.id} (implement later)`);
          });

          grid.appendChild(card);
          p.element = card;

          const btn = card.querySelector(".cart-btn");
          btn.addEventListener("click", e => {
            e.stopPropagation();
            const inCart = window.cart.some(item => item.id === p.id);
            if (inCart) {
              window.cart = window.cart.filter(item => item.id !== p.id);
              btn.innerHTML = `<svg>...</svg>`; // reset icon (copy from original)
              btn.classList.remove("added");
            } else {
              window.cart.push(p);
              btn.classList.add("added");
              // change to checkmark icon (copy SVG from original)
              btn.innerHTML = `<svg>...</svg>`;
              snackbar.classList.add("show");
              setTimeout(() => snackbar.classList.remove("show"), 2400);
            }
            updateCartDisplay();
          });
        });
      }

      function updateCartDisplay() {
        const count = window.cart.length;
        cartCountEl.textContent = count;
        floatingCartCountEl.textContent = count;

        cartItemsEl.innerHTML = "";
        secureTotalUSD = 0;

        window.cart.forEach((item, idx) => {
          secureTotalUSD += item.price;
          const div = document.createElement("div");
          div.className = "cart-item";
          div.innerHTML = `
            <img src="${item.image}" alt="${item.title}">
            <div class="cart-item-info">
              <div class="cart-item-title">${item.title}</div>
              <div class="cart-item-price">${formatPrice(item.price)}</div>
            </div>
            <button class="cart-item-remove" data-idx="${idx}">×</button>
          `;
          cartItemsEl.appendChild(div);
        });

        cartTotalEl.textContent = formatPrice(secureTotalUSD);

        const isActive = count > 0;
        [cartBtn, floatingCartBtn].forEach(btn => btn.classList.toggle("active", isActive));
      }

      function filterAndSort() {
        const query = searchInput.value.toLowerCase().trim();
        const activeSort = document.querySelector(".sort-btn.active")?.dataset.sort || "newest";

        productsData.forEach(p => {
          p.element.classList.toggle("hidden", !p.title.toLowerCase().includes(query));
        });

        let visible = Array.from(grid.children).filter(el => !el.classList.contains("hidden"));

        if (activeSort === "newest") visible.sort((a,b) => b.dataset.date - a.dataset.date);
        else if (activeSort === "oldest") visible.sort((a,b) => a.dataset.date - b.dataset.date);
        else if (activeSort === "price-asc") visible.sort((a,b) => parseFloat(a.dataset.price) - parseFloat(b.dataset.price));
        else if (activeSort === "price-desc") visible.sort((a,b) => parseFloat(b.dataset.price) - parseFloat(a.dataset.price));

        visible.forEach(el => grid.appendChild(el));
      }

      sortButtons.forEach(btn => btn.addEventListener("click", () => {
        sortButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        filterAndSort();
      }));

      searchInput.addEventListener("input", filterAndSort);

      cartBtn.addEventListener("click", () => cartDrawer.classList.toggle("open"));
      floatingCartBtn.addEventListener("click", () => cartDrawer.classList.toggle("open"));
      cartClose.addEventListener("click", () => cartDrawer.classList.remove("open"));

      cartItemsEl.addEventListener("click", e => {
        if (e.target.classList.contains("cart-item-remove")) {
          const idx = parseInt(e.target.dataset.idx);
          window.cart.splice(idx, 1);
          updateCartDisplay();
        }
      });

      themeBtn.addEventListener("click", () => {
        isDark = !isDark;
        document.body.classList.toggle("dark", isDark);
        localStorage.setItem("darkMode", isDark);
      });

      createCards();
      filterAndSort();
    });
  </script>

  <!-- PayPal SDK (use your own client-id) -->
  <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID_HERE&currency=USD"></script>
  <script>
    function initPayPal() {
      paypal.Buttons({
        createOrder: (data, actions) => {
          if (!window.cart.length) return alert("Cart empty");
          const total = window.cart.reduce((sum, item) => sum + item.price, 0);
          return actions.order.create({
            purchase_units: [{ amount: { value: total.toFixed(2), currency_code: "USD" } }]
          });
        },
        onApprove: (data, actions) => {
          return actions.order.capture().then(details => {
            alert("Payment success! Order ID: " + data.orderID);
            window.cart = [];
            updateCartDisplay();
          });
        },
        onError: err => console.error("PayPal error", err)
      }).render("#paypal-button-container");
    }
    if (window.paypal) initPayPal();
  </script>
