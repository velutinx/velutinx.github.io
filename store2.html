<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX Store</title>
  <!-- Shared CSS -->
  <link rel="stylesheet" href="/assets/css/shared.css">

  <!-- Your store-specific styles (product grid, filters, etc.) -->
  <style>
    .main-container {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      gap: 2rem;
    }
    /* ... your existing product grid styles ... */
  </style>
</head>
<body>

  <!-- This placeholder will be replaced with the header -->
  <div id="header-placeholder"></div>

  <!-- Your store content (product grid, filters) goes here -->
  <div class="main-container">
    <!-- ... your store HTML ... -->
  </div>

  <!-- Shared JavaScript (includes header injection) -->
  <script src="/assets/js/shared.js"></script>

  <!-- Your store-specific JavaScript -->
  <script>
    // Wait for the header to be ready before initialising store
    document.addEventListener('headerReady', function() {
      // Now you can safely use window.addOrToggleCart, window.syncCartButtons, etc.
      console.log('Header ready, initialising store...');
      // Your product loading and filtering code here
    });
  </script>
</body>
</html>
