<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VELUTINX | Official Store</title>
  <link rel="stylesheet" href="/assets/css/shared.css">
  <script src="https://www.paypal.com/sdk/js?client-id=AR7igvBzCZr6spSQ8DswwyQ28fU5U9hY0JwFGHcQmI7NZ5M8kvgPAqqQEN9xPPo5E1UNl-om-OWnscI3&currency=USD"></script>
  <style>
    /* store-specific styles – unchanged */
    .main-container {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem 2rem;
      gap: 2rem;
    }
    .store-filter-sidebar {
      width: 260px;
      flex-shrink: 0;
    }
    .section-title {
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-list, .sort-options {
      list-style: none;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 1.8rem;
      overflow: hidden;
    }
    .category-list li, .sort-btn {
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text);
      background: var(--card);
      border: none;
      width: 100%;
      text-align: left;
      font-size: 1rem;
    }
    .category-list li svg, .sort-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }
    .category-list li:hover, .sort-btn:hover { background: var(--darker); }
    .category-list li.active, .sort-btn.active {
      background: var(--accent);
      color: #1f1a12;
      font-weight: 600;
    }
    .products-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .products-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }
    .search-bar-wrapper { width: 280px; }
    .input-base {
      display: flex;
      align-items: center;
      background: var(--card);
      border-radius: 40px;
      border: 1px solid var(--border);
      padding: 6px 12px;
      gap: 8px;
    }
    .input-element {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      padding: 8px 0;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.8rem;
    }
    .product-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.2);
    }
    .card-image {
      width: 100%;
      aspect-ratio: 3/3.5;
      object-fit: cover;
      display: block;
      background: #d9d4c2;
    }
    .card-content { padding: 1rem; }
    .card-title { font-weight: 600; margin-bottom: 0.5rem; }
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--price-red);
    }
    .cart-btn {
      width: 44px;
      height: 44px;
      background: var(--btn-cart);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .cart-btn svg { width: 26px; height: 26px; }
    .cart-btn.added { background: var(--success); }
    @media (max-width: 780px) {
      .main-container { flex-direction: column; }
      .store-filter-sidebar { width: 100%; }
    }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="main-container">
    <aside class="store-filter-sidebar">
      <div class="section-title" id="filterTitle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h16"/><path d="M8 6v4M16 12v6"/></svg><span>Filter by Category</span></div>
      <ul class="category-list" id="categoryList">
        <li data-cat="all" class="active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span id="catAll">All Products</span></li>
        <li data-cat="female"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="9" r="6" stroke="currentColor" stroke-width="2"/><path d="M12 15V21M9 18H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span id="catFemale">Female Models</span></li>
        <li data-cat="femboy"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="14" r="6" stroke="currentColor" stroke-width="2"/><path d="M16 8L20 4M20 4H16M20 4V8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span id="catFemboy">Femboy Models</span></li>
        <li data-cat="membership"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3 6 6 .7-4.5 4.1L18 19l-6-3-6 3 1.5-6.2L3 8.7 9 8z"/></svg><span id="catMembership">Memberships</span></li>
      </ul>
      <div class="section-title" id="sortTitle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 3v12M7 15l-3-3M7 15l3-3M17 21V9M17 9l-3 3M17 9l3 3"/></svg><span>Sort by</span></div>
      <div id="sortContainer">
        <button class="sort-btn active" data-sort="newest"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v12M12 15l-3-3M12 15l3-3"/><path d="M5 21h14"/></svg><span id="sortNewest">Newest</span></button>
        <button class="sort-btn" data-sort="oldest"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21V9M12 9l-3 3M12 9l3 3"/><path d="M5 3h14"/></svg><span id="sortOldest">Oldest</span></button>
        <button class="sort-btn" data-sort="price-asc"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 15h6M4 9h10M4 3h14M20 9v12M20 21l3-3M20 21l-3-3"/></svg><span id="sortLow">Price: Low to High</span></button>
        <button class="sort-btn" data-sort="price-desc"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 15h6M4 9h10M4 3h14M20 21V9M20 9l3 3M20 9l-3-3"/></svg><span id="sortHigh">Price: High to Low</span></button>
      </div>
    </aside>

    <main class="products-section">
      <div class="products-header">
        <h2 id="latestTitle">Latest Content</h2>
        <div class="search-bar-wrapper">
          <div class="input-base">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="gray" stroke-width="2"><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path><path d="M21 21l-6 -6"></path></svg>
            <input type="search" id="searchInput" class="input-element" placeholder="Search...">
          </div>
        </div>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </main>
  </div>

  <script src="/assets/js/shared.js"></script>
  <script src="/assets/js/price.js" type="module"></script>

  <script type="module">
    import packsData from '/assets/js/packs-data.js';

    // ==================== Store‑specific translations ====================
    const storeTranslations = {
      en: {
        filterTitle: "Filter by Category", sortTitle: "Sort by", catAll: "All Products",
        catFemale: "Female Models", catFemboy: "Femboy Models", catMembership: "Memberships",
        sortNewest: "Newest", sortOldest: "Oldest", sortLow: "Price: Low to High", sortHigh: "Price: High to Low",
        latestTitle: "Latest Content", searchPlaceholder: "Search...", emptyCart: "Your cart is empty",
        addedMsg: "Added to cart", removedMsg: "Removed from cart"
      },
      ja: {
        filterTitle: "カテゴリで絞り込み", sortTitle: "並び替え", catAll: "すべて",
        catFemale: "婦人", catFemboy: "男の娘", catMembership: "メンバーシップ",
        sortNewest: "新着順", sortOldest: "古い順", sortLow: "価格: 安い順", sortHigh: "価格: 高い順",
        latestTitle: "最新コンテンツ", searchPlaceholder: "検索...", emptyCart: "カートは空です",
        addedMsg: "カートに追加しました", removedMsg: "カートから削除しました"
      },
      zh: {
        filterTitle: "按分类筛选", sortTitle: "排序方式", catAll: "所有商品",
        catFemale: "女性模型", catFemboy: "伪娘模型", catMembership: "会员资格",
        sortNewest: "最新", sortOldest: "最旧", sortLow: "价格: 从低到高", sortHigh: "价格: 从高到低",
        latestTitle: "最新内容", searchPlaceholder: "搜索...", emptyCart: "购物车是空的",
        addedMsg: "已添加到购物车", removedMsg: "已从购物车移除"
      },
      es: {
        filterTitle: "Filtrar por Categoría", sortTitle: "Ordenar por", catAll: "Todos los productos",
        catFemale: "Modelos Femeninos", catFemboy: "Modelos Femboy", catMembership: "Membresías",
        sortNewest: "Más reciente", sortOldest: "Más antiguo", sortLow: "Precio: menor a mayor", sortHigh: "Precio: mayor a menor",
        latestTitle: "Último Contenido", searchPlaceholder: "Buscar...", emptyCart: "Tu carrito está vacío",
        addedMsg: "Añadido al carrito", removedMsg: "Eliminado del carrito"
      }
    };

    // ==================== Store cart (separate from membership cart) ====================
    let storeCart = JSON.parse(localStorage.getItem('velutinx_store_cart') || '[]');

    function saveStoreCart() {
      localStorage.setItem('velutinx_store_cart', JSON.stringify(storeCart));
      updateStoreCartUI();
    }

    function updateStoreCartUI() {
      const container = document.getElementById('cartItems');
      const totalSpan = document.getElementById('cartTotal');
      if (!container) return;
      const t = storeTranslations[window.currentLanguage || 'en'];
      container.innerHTML = storeCart.length === 0 ? `<div style="padding:1rem;">${t.emptyCart}</div>` : '';
      let total = 0;
      storeCart.forEach((item, idx) => {
        const priceStr = window.getFormattedPrice(item.priceKey);
        total += window.priceKeyMap[item.priceKey] || 0;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `<img src="${item.image}" alt="${item.title}"><div class="cart-item-info"><div class="cart-item-title">${escapeHtml(item.title)}</div><div class="cart-item-price">${priceStr}</div></div><button class="cart-item-remove" data-idx="${idx}">✕</button>`;
        container.appendChild(div);
      });
      document.querySelectorAll('.cart-item-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(btn.dataset.idx);
          storeCart.splice(idx, 1);
          saveStoreCart();
          showSnackbar(t.removedMsg, true);
          renderStoreGrid();
        });
      });
      if (totalSpan) totalSpan.innerText = window.formatPrice(total);
      document.querySelectorAll('#cartCount, #floatingCartCount').forEach(el => { if (el) el.textContent = storeCart.length; });

      // Re‑render PayPal button if drawer is open
      const cartDrawer = document.getElementById('cartDrawer');
      if (cartDrawer && cartDrawer.classList.contains('open')) {
        renderPayPalButton();
      }
    }

    function showSnackbar(msg, isRemove) { /* same */ }

    window.addOrToggleCart = function(product) {
      const idx = storeCart.findIndex(i => String(i.id) === String(product.id));
      const t = storeTranslations[window.currentLanguage || 'en'];
      if (idx > -1) {
        storeCart.splice(idx, 1);
        showSnackbar(t.removedMsg, true);
      } else {
        storeCart.push({ id: product.id, title: product.title, priceKey: product.priceKey, image: product.image, type: 'store' });
        showSnackbar(t.addedMsg, false);
      }
      saveStoreCart();
      renderStoreGrid();
    };

    // ==================== Store rendering logic ====================
    let products = [];
    let activeCategory = "all";
    let currentSort = "newest";
    let searchQuery = "";
    let currentLang = localStorage.getItem('language') || 'en';

    function applyStoreTranslations() { /* same as before with null checks */ }

    function getFilteredSorted() { /* same */ }

    function renderStoreGrid() { /* same */ }

    function escapeHtml(str) { /* same */ }

    function bindStoreEvents() {
      document.querySelectorAll('.category-list li').forEach(li => {
        li.addEventListener('click', () => {
          document.querySelectorAll('.category-list li').forEach(l => l.classList.remove('active'));
          li.classList.add('active');
          activeCategory = li.dataset.cat;
          renderStoreGrid();
        });
      });
      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentSort = btn.dataset.sort;
          renderStoreGrid();
        });
      });
      document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderStoreGrid();
      });
      document.addEventListener('languageChanged', () => {
        currentLang = localStorage.getItem('language') || 'en';
        applyStoreTranslations();
        renderStoreGrid();
        const drawer = document.getElementById('cartDrawer');
        if (drawer && drawer.classList.contains('open')) {
          updateStoreCartUI(); // re‑render cart with new prices
        }
      });
    }

    // ==================== Ensure store cart is shown when drawer opens ====================
    function observeCartDrawer() {
      const cartDrawer = document.getElementById('cartDrawer');
      if (!cartDrawer) return;
      const observer = new MutationObserver((mutations) => {
        for (const mutation of mutations) {
          if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
            if (cartDrawer.classList.contains('open')) {
              updateStoreCartUI();
            }
          }
        }
      });
      observer.observe(cartDrawer, { attributes: true });
    }

    // ==================== PayPal integration ====================
    function renderPayPalButton() {
      const container = document.getElementById('paypal-button-container');
      if (!container) return;
      container.innerHTML = '';
      const items = storeCart.map(item => ({ priceKey: item.priceKey, quantity: 1 }));
      if (items.length === 0) {
        container.innerHTML = '<p style="text-align:center; margin-top:1rem;">Add items to checkout</p>';
        return;
      }

      paypal.Buttons({
        createOrder: async () => {
          const response = await fetch('https://velutinx-paypal-worker.velutinx.workers.dev', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cart: items })
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Order creation failed');
          return data.orderID;
        },
        onApprove: (data, actions) => {
          return actions.order.capture().then(() => {
            storeCart = [];
            saveStoreCart();
            updateStoreCartUI();
            renderStoreGrid();
            window.location.href = `/s/success.html?orderID=${data.orderID}`;
          });
        },
        onError: (err) => {
          console.error('PayPal error', err);
          alert('Something went wrong. Please try again.');
        }
      }).render(container);
    }

    window.setupStoreCheckout = function() {
      renderPayPalButton();
    };

    // ==================== Initialise when header and price map are ready ====================
    function initStore() {
      products = packsData.map(p => ({
        id: p.id,
        title: p.title,
        category: p.category,
        priceKey: p.price
      }));
      applyStoreTranslations();
      bindStoreEvents();
      renderStoreGrid();
      updateStoreCartUI();
      observeCartDrawer();
      renderPayPalButton(); // initial render (drawer may already be open)
    }

    // Override the shared updateCartUI to prevent it from overwriting our store cart
    window.originalUpdateCartUI = window.updateCartUI;
    window.updateCartUI = function() {
      // Do nothing – we handle cart rendering ourselves
    };

    // Also prevent shared cart from being saved when we call saveCart
    window.saveCart = function() {};

    // Ensure store cart is always shown when drawer opens, regardless of language
    function ensureCartDisplay() {
      const drawer = document.getElementById('cartDrawer');
      if (drawer && drawer.classList.contains('open')) {
        updateStoreCartUI();
      }
    }

    const cartBtn = document.getElementById('cartBtn');
    const floatCartBtn = document.getElementById('floatingCartBtn');
    if (cartBtn) cartBtn.addEventListener('click', ensureCartDisplay);
    if (floatCartBtn) floatCartBtn.addEventListener('click', ensureCartDisplay);

    document.addEventListener('headerReady', () => {
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          document.addEventListener('priceMapReady', initStore);
          if (window.priceKeyMap && window.priceUsdMap) initStore();
        });
      } else {
        document.addEventListener('priceMapReady', initStore);
        if (window.priceKeyMap && window.priceUsdMap) initStore();
      }
    });
  </script>
</body>
</html>
