<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Composer – Velutinx</title>
    <link rel="stylesheet" href="/assets/css/format-private.css">
    <!-- SortableJS (required for drag‑to‑reorder thumbnails) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="/assets/js/twitter-composer.js" defer></script>
</head>
<body>
<div class="container">
    <h1>🐦 Twitter Composer</h1>

    <!-- Master Post -->
    <div class="twitter-master-post">
        <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #ddd;">📝 Master Post (mirrors to all accounts)</label>
        <textarea id="masterPost" class="master-post" rows="4" placeholder="Write your tweet…"></textarea>
        <!-- Counter is added by JS -->
    </div>

    <!-- Account Cards Grid -->
    <div class="accounts-grid" style="display: flex; flex-wrap: wrap; gap: 20px;">
        <!-- Account 1: Velutinx2 -->
        <div class="account-card" data-account="1">
            <h3>@Velutinx2</h3>
            <textarea id="post-1" class="account-post" rows="4" placeholder="Edit for this account…"></textarea>
            <div class="dropzone" id="dz-1">📸 Drop images or Click</div>
            <div class="thumbnail-container" id="container-1"></div>
            <button class="post-btn" onclick="sendToWorker(1)">🚀 Post</button>
            <div id="status-1" class="status-msg"></div>
        </div>

        <!-- Account 2: placeholder -->
        <div class="account-card" data-account="2">
            <h3>@TwitterAcct_2</h3>
            <textarea id="post-2" class="account-post" rows="4" placeholder="Edit for this account…"></textarea>
            <div class="dropzone" id="dz-2">📸 Drop images or Click</div>
            <div class="thumbnail-container" id="container-2"></div>
            <button class="post-btn" onclick="sendToWorker(2)">🚀 Post</button>
            <div id="status-2" class="status-msg"></div>
        </div>

        <!-- Account 3: placeholder -->
        <div class="account-card" data-account="3">
            <h3>@TwitterAcct_3</h3>
            <textarea id="post-3" class="account-post" rows="4" placeholder="Edit for this account…"></textarea>
            <div class="dropzone" id="dz-3">📸 Drop images or Click</div>
            <div class="thumbnail-container" id="container-3"></div>
            <button class="post-btn" onclick="sendToWorker(3)">🚀 Post</button>
            <div id="status-3" class="status-msg"></div>
        </div>
    </div>
</div>
</body>
</html>
