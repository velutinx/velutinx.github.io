<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Multi-Account Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #15202b; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Master Post Area */
        .master-section { background: #192734; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #38444d; }
        textarea { width: 100%; background: #253341; color: white; border: 1px solid #38444d; border-radius: 8px; padding: 10px; resize: vertical; min-height: 80px; box-sizing: border-box; }
        
        /* Grid for 3 Accounts */
        .accounts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .account-card { background: #192734; padding: 15px; border-radius: 12px; border: 1px solid #38444d; }
        .account-header { font-weight: bold; margin-bottom: 10px; color: #1da1f2; border-bottom: 1px solid #38444d; padding-bottom: 5px; }

        /* Dropzone & Thumbnails */
        .dropzone { border: 2px dashed #38444d; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; margin: 10px 0; transition: 0.2s; }
        .dropzone:hover { border-color: #1da1f2; background: #253341; }
        
        .thumbnail-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; min-height: 100px; }
        .thumbnail-item { position: relative; border-radius: 4px; overflow: hidden; aspect-ratio: 1/1; background: #253341; cursor: move; }
        .thumbnail-item img { width: 100%; height: 100%; object-fit: cover; }
        .thumbnail-item.dragging { opacity: 0.5; border: 2px solid #1da1f2; }
        
        .remove-btn { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; }

        /* Buttons */
        .post-btn { width: 100%; padding: 12px; margin-top: 15px; background: #1da1f2; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .post-btn:hover { background: #1a91da; }
        .status-msg { margin-top: 8px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Twitter Post Manager</h2>

    <div class="master-section">
        <label><strong>Step 1: Write Master Post (Mirrors to all 3)</strong></label>
        <textarea id="masterPost" placeholder="Type your tweet here..."></textarea>
    </div>

    <div class="accounts-grid">
        <div class="account-card" data-account="1">
            <div class="account-header">Twitter Account @1</div>
            <textarea id="post1" class="acc-post" placeholder="Individual edit for Acct 1..."></textarea>
            <div class="dropzone" id="dropzone1">Click or Drop 4 Images</div>
            <div class="thumbnail-container" id="container1" data-account="1"></div>
            <button class="post-btn" onclick="postToTwitter(1)">🚀 Post Tweet</button>
            <div id="status1" class="status-msg"></div>
        </div>

        <div class="account-card" data-account="2">
            <div class="account-header">Twitter Account @2</div>
            <textarea id="post2" class="acc-post" placeholder="Individual edit for Acct 2..."></textarea>
            <div class="dropzone" id="dropzone2">Click or Drop 4 Images</div>
            <div class="thumbnail-container" id="container2" data-account="2"></div>
            <button class="post-btn" onclick="postToTwitter(2)">🚀 Post Tweet</button>
            <div id="status2" class="status-msg"></div>
        </div>

        <div class="account-card" data-account="3">
            <div class="account-header">Twitter Account @3</div>
            <textarea id="post3" class="acc-post" placeholder="Individual edit for Acct 3..."></textarea>
            <div class="dropzone" id="dropzone3">Click or Drop 4 Images</div>
            <div class="thumbnail-container" id="container3" data-account="3"></div>
            <button class="post-btn" onclick="postToTwitter(3)">🚀 Post Tweet</button>
            <div id="status3" class="status-msg"></div>
        </div>
    </div>
</div>

<script>
    // Store images for each account
    window.accountImages = { 1: [], 2: [], 3: [] };
    let dragSource = null;

    // --- Syncing Logic ---
    const master = document.getElementById('masterPost');
    const childPosts = [document.getElementById('post1'), document.getElementById('post2'), document.getElementById('post3')];

    master.addEventListener('input', () => {
        childPosts.forEach(p => p.value = master.value);
    });

    // --- Drag & Drop Rendering ---
    window.renderThumbnails = function(accId) {
        const container = document.getElementById(`container${accId}`);
        const files = window.accountImages[accId];
        container.innerHTML = '';

        files.forEach((file, idx) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const div = document.createElement('div');
                div.className = 'thumbnail-item';
                div.draggable = true;
                div.dataset.index = idx;
                div.dataset.account = accId;

                const img = document.createElement('img');
                img.src = e.target.result;
                div.appendChild(img);

                const btn = document.createElement('button');
                btn.className = 'remove-btn';
                btn.innerHTML = '✕';
                btn.onclick = (ev) => {
                    ev.stopPropagation();
                    window.accountImages[accId].splice(idx, 1);
                    renderThumbnails(accId);
                };
                div.appendChild(btn);

                // Re-order drag events
                div.addEventListener('dragstart', (e) => { dragSource = div; div.classList.add('dragging'); });
                div.addEventListener('dragover', (e) => e.preventDefault());
                div.addEventListener('drop', handleDrop);
                div.addEventListener('dragend', () => div.classList.remove('dragging'));

                container.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    };

    function handleDrop(e) {
        e.preventDefault();
