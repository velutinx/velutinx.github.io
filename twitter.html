<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Composer – Velutinx</title>
    <link rel="stylesheet" href="/assets/css/format-private.css">
    <style>
        /* minor overrides for Twitter-specific tweaks */
        .twitter-master-post {
            margin-bottom: 24px;
        }
        .char-count {
            display: block;
            text-align: right;
            margin-top: 4px;
            font-size: 0.8rem;
            color: #888;
        }
        .char-count.over {
            color: #f44336;
        }
        .account-card textarea {
            margin-bottom: 8px;
        }
        .post-btn {
            width: 100%;
            background: #1da1f2;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .post-btn:hover {
            background: #0f8ad6;
        }
        .status-msg {
            margin-top: 8px;
            font-size: 0.8rem;
            text-align: center;
            min-height: 18px;
        }
        .dropzone {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🐦 Twitter Composer</h1>

    <!-- Master Post -->
    <div class="twitter-master-post">
        <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #ddd;">📝 Master Post (mirrors to all accounts)</label>
        <textarea id="masterPost" class="master-post" rows="4" placeholder="Write your tweet…" maxlength="280"></textarea>
        <span class="char-count" id="master-counter">0/280</span>
    </div>

    <!-- Account Cards Grid -->
    <div class="accounts-grid" style="display: flex; flex-wrap: wrap; gap: 20px;">
        <!-- Account 1: Velutinx2 -->
        <div class="account-card" data-account="1">
            <h3>@Velutinx2</h3>
            <textarea id="post-1" class="account-post" rows="4" placeholder="Edit for this account…" maxlength="280"></textarea>
            <span class="char-count" id="counter-1">0/280</span>
            <div class="dropzone" onclick="triggerInput(1)" id="dz-1">📸 Drop images or Click</div>
            <div class="thumbnail-container" id="container-1"></div>
            <button class="post-btn" onclick="sendToWorker(1)">🚀 Post</button>
            <div id="status-1" class="status-msg"></div>
        </div>

        <!-- Account 2: placeholder -->
        <div class="account-card" data-account="2">
            <h3>@TwitterAcct_2</h3>
            <textarea id="post-2" class="account-post" rows="4" placeholder="Edit for this account…" maxlength="280"></textarea>
            <span class="char-count" id="counter-2">0/280</span>
            <div class="dropzone" onclick="triggerInput(2)" id="dz-2">📸 Drop images or Click</div>
            <div class="thumbnail-container" id="container-2"></div>
            <button class="post-btn" onclick="sendToWorker(2)">🚀 Post</button>
            <div id="status-2" class="status-msg"></div>
        </div>

        <!-- Account 3: placeholder -->
        <div class="account-card" data-account="3">
            <h3>@TwitterAcct_3</h3>
            <textarea id="post-3" class="account-post" rows="4" placeholder="Edit for this account…" maxlength="280"></textarea>
            <span class="char-count" id="counter-3">0/280</span>
            <div class="dropzone" onclick="triggerInput(3)" id="dz-3">📸 Drop images or Click</div>
            <div class="thumbnail-container" id="container-3"></div>
            <button class="post-btn" onclick="sendToWorker(3)">🚀 Post</button>
            <div id="status-3" class="status-msg"></div>
        </div>
    </div>
</div>

<script>
    // ---------- Data store ----------
    window.accountImages = { 1: [], 2: [], 3: [] };
    let dragSourceElement = null;

    // ---------- Character counter (280 limit) ----------
    function updateCharCount(textareaId, counterId) {
        const ta = document.getElementById(textareaId);
        const counter = document.getElementById(counterId);
        if (ta && counter) {
            const len = ta.value.length;
            counter.textContent = len + '/280';
            counter.classList.toggle('over', len > 280);
        }
    }

    const master = document.getElementById('masterPost');
    const children = [
        document.getElementById('post-1'),
        document.getElementById('post-2'),
        document.getElementById('post-3')
    ];

    // Mirror master to children + counters
    master.addEventListener('input', () => {
        children.forEach((ta, idx) => {
            ta.value = master.value;
            updateCharCount('post-' + (idx + 1), 'counter-' + (idx + 1));
        });
        updateCharCount('masterPost', 'master-counter');
    });

    // Individual overrides update their own counter
    children.forEach((ta, idx) => {
        ta.addEventListener('input', () => {
            updateCharCount('post-' + (idx + 1), 'counter-' + (idx + 1));
        });
    });

    // ---------- File input & drop ----------
    function triggerInput(id) {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.accept = 'image/*';
        input.onchange = (e) => handleFiles(e.target.files, id);
        input.click();
    }

    function handleFiles(files, id) {
        const newFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
        window.accountImages[id].push(...newFiles);
        renderThumbnails(id);
    }

    // Render thumbnails for an account (order-safe)
    async function renderThumbnails(id) {
        const container = document.getElementById('container-' + id);
        container.innerHTML = '';
        const files = window.accountImages[id];
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const dataUrl = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
            const item = document.createElement('div');
            item.className = 'thumbnail-item';
            item.draggable = true;
            item.dataset.index = i;
            item.dataset.accId = id;
            item.addEventListener('dragstart', handleDragStart);
            item.addEventListener('dragover', handleDragOver);
            item.addEventListener('drop', handleDrop);
            item.addEventListener('dragend', handleDragEnd);

            const img = document.createElement('img');
            img.src = dataUrl;
            item.appendChild(img);

            const remove = document.createElement('button');
            remove.className = 'remove-btn';
            remove.innerHTML = '✕';
            remove.onclick = (ev) => {
                ev.stopPropagation();
                const currentFiles = window.accountImages[id];
                currentFiles.splice(currentFiles.indexOf(file), 1);
                renderThumbnails(id);
            };
            item.appendChild(remove);
            container.appendChild(item);
        }
    }

    function handleDragStart(e) {
        dragSourceElement = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }
    function handleDragOver(e) {
        if (e.preventDefault) e.preventDefault();
        return false;
    }
    function handleDrop(e) {
        e.stopPropagation();
        e.preventDefault();
        if (dragSourceElement !== this) {
            const accId = this.dataset.accId;
            const fromIdx = parseInt(dragSourceElement.dataset.index);
            const toIdx = parseInt(this.dataset.index);
            const files = window.accountImages[accId];
            const movedItem = files.splice(fromIdx, 1)[0];
            files.splice(toIdx, 0, movedItem);
            renderThumbnails(accId);
        }
        return false;
    }
    function handleDragEnd() {
        this.classList.remove('dragging');
    }

    // Global dropzones
    [1, 2, 3].forEach(id => {
        const dz = document.getElementById('dz-' + id);
        dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.borderColor = '#5a6e3c'; });
        dz.addEventListener('dragleave', () => { dz.style.borderColor = '#3a4050'; });
        dz.addEventListener('drop', (e) => {
            e.preventDefault();
            dz.style.borderColor = '#3a4050';
            handleFiles(e.dataTransfer.files, id);
        });
    });

    // ---------- Post to Cloudflare Worker ----------
    async function sendToWorker(id) {
        const status = document.getElementById('status-' + id);
        const text = document.getElementById('post-' + id).value;
        const images = window.accountImages[id];
        status.innerText = '⏳ Processing...';
        status.style.color = '#aaa';

        const formData = new FormData();
        formData.append('accId', id);
        formData.append('text', text);
        images.forEach(img => formData.append('images', img));

        try {
            const res = await fetch('https://twitter-post.velutinx.workers.dev', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.data && data.data.id) {
                status.innerText = '✅ Posted!';
                status.style.color = '#4CAF50';
            } else {
                status.innerText = '❌ Error: ' + (data.error || 'Check Console');
                status.style.color = '#f44336';
                console.log(data);
            }
        } catch (e) {
            status.innerText = '❌ Connection Failed';
            status.style.color = '#f44336';
        }
    }
</script>
</body>
</html>
