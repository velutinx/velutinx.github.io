<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX — Artwork</title>
  <!-- Shared header CSS -->
  <link rel="stylesheet" href="/assets/css/shared.css">
  <!-- Page‑specific CSS -->
  <link rel="stylesheet" href="/assets/css/format.css">
  <style>
    /* Hide cart and website button on artwork page */
    .artwork-page .login-btn,
    .artwork-page .cart-wrapper,
    .artwork-page .floating-cart {
      display: none !important;
    }
    /* Optional: adjust top‑nav background if needed */
    .artwork-page .top-nav {
      background: var(--bg) !important;
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body class="artwork-page">

  <!-- Header will be injected here by shared.js -->
  <div id="header-placeholder"></div>

  <div class="divider"></div>

  <section class="artwork-wrap">
    <div class="artwork-intro" id="artworkIntro">
      Hello! These are just a few small samples of my artwork — I share a lot more on my free Discord! — Temporal Images
    </div>
    <div class="gallery" id="gallery"></div>
  </section>

  <div class="divider"></div>

  <div class="zoom-overlay" id="zoomOverlay"></div>

  <!-- Page‑specific translation script (must be loaded before shared.js so functions are ready) -->
  <script src="/assets/js/translt.js"></script>
  <!-- Shared header JS (injects header, sidebar, cart, etc.) -->
  <script src="/assets/js/shared.js"></script>
  <!-- Gallery and other scripts -->
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // Apply artwork translations
    function applyArtworkTranslations() {
      if (typeof window.applyTranslations === 'function') {
        window.applyTranslations('artwork');
      }
    }

    // Wait for shared.js to inject the header and dispatch 'headerReady'
    document.addEventListener('headerReady', () => {
      applyArtworkTranslations();
    });

    // Re‑apply when language changes (shared.js dispatches this)
    document.addEventListener('languageChanged', () => {
      applyArtworkTranslations();
    });

    // Dark mode from localStorage (shared.js already handles theme, but this ensures consistency)
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }

    // Fallback: if header is already present (e.g., shared.js ran synchronously before this listener)
    // but translt.js is already loaded because we moved it before shared.js, so apply directly
    if (document.getElementById('artworkIntro')) {
      applyArtworkTranslations();
    }
  </script>
</body>
</html>
