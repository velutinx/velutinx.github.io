<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX — Artwork</title>
  <!-- Shared header CSS -->
  <link rel="stylesheet" href="/assets/css/shared.css">
  <!-- Page‑specific CSS -->
  <link rel="stylesheet" href="/assets/css/format.css">
  <style>
    /* Hide cart and website button on artwork page */
    .artwork-page .login-btn,
    .artwork-page .cart-wrapper,
    .artwork-page .floating-cart {
      display: none !important;
    }
    /* Adjust top‑nav background to match page background */
    .artwork-page .top-nav {
      background: var(--bg) !important;
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body class="artwork-page">

  <!-- Header will be injected here by shared.js -->
  <div id="header-placeholder"></div>

  <div class="divider"></div>

  <section class="artwork-wrap">
    <div class="artwork-intro" id="artworkIntro">
      Hello! These are just a few small samples of my artwork — I share a lot more on my free Discord! — Temporal Images
    </div>
    <div class="gallery" id="gallery"></div>
  </section>

  <div class="divider"></div>

  <div class="zoom-overlay" id="zoomOverlay"></div>

  <!-- Shared header JS (injects header, sidebar, cart, etc.) -->
  <script src="/assets/js/shared.js"></script>
  <!-- Page‑specific scripts -->
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    // Apply artwork translations using the current language from translt.js
    function applyArtworkTranslations() {
      if (typeof window.applyTranslations === 'function') {
        window.applyTranslations('artwork');
      }
    }

    // Initial apply (when page loads, after translt.js is ready)
    applyArtworkTranslations();

    // When language changes via shared header, update translt.js's language and reapply
    document.addEventListener('languageChanged', (e) => {
      // e.detail contains { language, currency }
      const newLang = e.detail.language;
      if (newLang && typeof window.setLanguage === 'function') {
        // Update translt.js's internal language (this also updates window.currentLanguage)
        window.setLanguage(newLang);
      } else if (newLang) {
        // Fallback: manually update window.currentLanguage
        window.currentLanguage = newLang;
      }
      // Reapply artwork translations
      applyArtworkTranslations();
    });

    // Ensure dark mode from localStorage is applied (shared.js already handles this, but just in case)
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
