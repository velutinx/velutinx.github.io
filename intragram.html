<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Poster – Velutinx</title>
    <link rel="stylesheet" href="/assets/css/format-private.css">
    <style>
        .insta-container { max-width: 600px; margin: 0 auto; }
        .drop-area {
            border: 2px dashed #3a4050;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: #0f131a;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .drop-area:hover, .drop-area.drag-over { border-color: #5a6e3c; }
        .preview-img {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 4/5;
            object-fit: contain;
            background: #03060b;
            border-radius: 8px;
            margin: 0 auto 12px;
            display: none;
            border: 1px solid #2a2f38;
        }
        .preview-img.active { display: block; }
        .caption-input {
            width: 100%;
            min-height: 80px;
            background: #0a0e14;
            border: 1px solid #2a2f38;
            border-radius: 10px;
            color: #eee;
            padding: 10px;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 16px;
        }
        .button-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .process-btn {
            flex: 1;
            padding: 12px;
            background: #3a4050;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .process-btn:hover { background: #4a5060; }
        .post-btn {
            flex: 1;
            padding: 12px;
            background: #d62976;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .post-btn:hover { background: #b82265; }
        .status-msg { margin-top: 10px; font-size: 13px; text-align: center; min-height: 20px; }
    </style>
</head>
<body>
<div class="container insta-container">
    <h1>📸 Instagram Poster</h1>

    <div class="drop-area" id="dropArea">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <div>🖼️ Drop an image here or click to select</div>
        <div class="aspect-hint">Background + watermarks will be applied automatically</div>
    </div>

    <!-- Preview of the ORIGINAL selected image (just for feedback) -->
    <img id="preview" class="preview-img" alt="Original preview" />

    <textarea class="caption-input" id="caption" placeholder="Write your caption and hashtags…"></textarea>

    <div class="button-row">
        <button class="process-btn" id="processBtn" disabled>🛠️ Process & Download</button>
        <button class="post-btn" id="postBtn" disabled>🚀 Post to Instagram</button>
    </div>
    <div id="status" class="status-msg"></div>
</div>

<script>
    (function() {
        const proxyBase = 'https://instagram-post.velutinx.workers.dev/proxy?url=';
        const canvasBase = 'https://www.velutinx.com/images/instagram/PreRotatedCanvases/';
        const centerWmUrl = 'https://www.velutinx.com/images/instagram/Rotated%20Warermark.png';
        const cornerWmUrl = 'https://www.velutinx.com/images/instagram/Watermark%20Corner.png';

        const canvasAngles = [];
        for (let angle = 0; angle <= 355; angle += 5) canvasAngles.push(angle);

        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const caption = document.getElementById('caption');
        const postBtn = document.getElementById('postBtn');
        const statusDiv = document.getElementById('status');

        let selectedFile = null;
        let selectedBlob = null;

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                showToast('Please select an image file', 'error');
                return;
            }
            selectedFile = file;
            selectedBlob = file.slice(0, file.size, file.type);
            const url = URL.createObjectURL(selectedBlob);
            preview.src = url;
            preview.classList.add('active');
            postBtn.disabled = false;
            statusDiv.textContent = 'Ready. Click “Post to Instagram” to create your post.';
        }

        dropArea.addEventListener('click', () => fileInput.click());
        dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
        dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
        dropArea.addEventListener('drop', e => {
            e.preventDefault();
            dropArea.classList.remove('drag-over');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

        function loadImageWithProxy(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error(`Failed to load ${url}`));
                img.src = proxyBase + encodeURIComponent(url);
            });
        }

        async function loadRandomCanvas(maxTries = 20) {
            const shuffled = [...canvasAngles].sort(() => Math.random() - 0.5);
            for (let i = 0; i < Math.min(maxTries, shuffled.length); i++) {
                const angle = shuffled[i];
                const url = canvasBase + angle + '.jpg';
                try {
                    return await loadImageWithProxy(url);
                } catch (e) {
                    console.warn(`Canvas ${angle}.jpg not found, trying another…`);
                }
            }
            console.warn('No canvas – using black background.');
            const canvas = document.createElement('canvas');
            canvas.width = 2160; canvas.height = 2688;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 2160, 2688);
            const img = new Image();
            img.src = canvas.toDataURL('image/jpeg');
            await new Promise(r => img.onload = r);
            return img;
        }

        postBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            const captionText = caption.value.trim();
            if (!captionText) {
                showToast('Please write a caption', 'error');
                return;
            }

            statusDiv.textContent = '⏳ Compositing & posting…';
            postBtn.disabled = true;

            try {
                // Compose image (same as before)
                const userImg = new Image();
                userImg.src = URL.createObjectURL(selectedBlob);
                await userImg.decode();

                const [canvasImg, centerWm, cornerWm] = await Promise.all([
                    loadRandomCanvas(),
                    loadImageWithProxy(centerWmUrl),
                    loadImageWithProxy(cornerWmUrl),
                ]);

                const out = document.createElement('canvas');
                out.width = 2160;
                out.height = 2688;
                const ctx = out.getContext('2d');

                // 1) Background canvas
                ctx.drawImage(canvasImg, 0, 0, 2160, 2688);

                // 2) Uploaded image – fit inside, centered
                const fitScale = Math.min(2160 / userImg.width, 2688 / userImg.height);
                const drawW = userImg.width * fitScale;
                const drawH = userImg.height * fitScale;
                const dx = (2160 - drawW) / 2;
                const dy = (2688 - drawH) / 2;
                ctx.drawImage(userImg, dx, dy, drawW, drawH);

                // 3) Center watermark (20% opacity)
                ctx.globalAlpha = 0.2;
                ctx.drawImage(centerWm, (2160 - centerWm.width) / 2, (2688 - centerWm.height) / 2);
                ctx.globalAlpha = 1.0;

                // 4) Corner watermark (northeast +200+30)
                ctx.drawImage(cornerWm, 2160 - cornerWm.width - 200, 30);

                // Convert final canvas to Blob
                const finalBlob = await new Promise(resolve => out.toBlob(resolve, 'image/jpeg', 0.95));

                // Send to Worker
                const fd = new FormData();
                fd.append('caption', captionText);
                fd.append('image', finalBlob, 'instagram_post.jpg');

                const resp = await fetch('https://instagram-post.velutinx.workers.dev', {
                    method: 'POST',
                    body: fd
                });
                const data = await resp.json();

                if (data.success) {
                    statusDiv.textContent = '✅ Posted!';
                    showToast('Instagram post published!', 'success');
                    // Reset
                    preview.src = ''; preview.classList.remove('active');
                    selectedFile = null; selectedBlob = null;
                    caption.value = '';
                    postBtn.disabled = true;
                } else {
                    throw new Error(data.error || data.detail?.message || 'Unknown error');
                }
            } catch (err) {
                statusDiv.textContent = '❌ ' + err.message;
                showToast('Post failed: ' + err.message, 'error');
            } finally {
                postBtn.disabled = false;
            }
        });
    })();
</script>
</body>
</html>
