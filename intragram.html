<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Post – Velutinx</title>
    <link rel="stylesheet" href="/assets/css/format-private.css">
    <style>
        .insta-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .drop-area {
            border: 2px dashed #3a4050;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: #0f131a;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .drop-area:hover, .drop-area.drag-over {
            border-color: #5a6e3c;
        }
        .preview-img {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 4 / 5;
            object-fit: contain;
            background: #03060b;
            border-radius: 8px;
            margin: 0 auto 12px auto;
            display: none;
            border: 1px solid #2a2f38;
        }
        .preview-img.active {
            display: block;
        }
        .caption-input {
            width: 100%;
            min-height: 80px;
            background: #0a0e14;
            border: 1px solid #2a2f38;
            border-radius: 10px;
            color: #eee;
            padding: 10px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 16px;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .process-btn {
            flex: 1;
            padding: 12px;
            background: #3a4050;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .process-btn:hover {
            background: #4a5060;
        }
        .post-btn {
            flex: 1;
            padding: 12px;
            background: #d62976;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .post-btn:hover {
            background: #b82265;
        }
        .status-msg {
            margin-top: 10px;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>
<div class="container insta-container">
    <h1>📸 Instagram Poster</h1>

    <div class="drop-area" id="dropArea">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <div>🖼️ Drop an image here or click to select</div>
        <div class="aspect-hint">Image will be cropped to 4:5 (portrait)</div>
    </div>

    <img id="preview" class="preview-img" alt="Preview" />

    <textarea class="caption-input" id="caption" placeholder="Write your caption and hashtags…"></textarea>

    <div class="button-row">
        <button class="process-btn" id="processBtn" disabled>🛠️ Process & Download</button>
        <button class="post-btn" id="postBtn" disabled>🚀 Post to Instagram</button>
    </div>
    <div id="status" class="status-msg"></div>
</div>

<script>
    (function() {
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const caption = document.getElementById('caption');
        const processBtn = document.getElementById('processBtn');
        const postBtn = document.getElementById('postBtn');
        const statusDiv = document.getElementById('status');

        let selectedFile = null;
        let croppedBlob = null;

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Crop image to 4:5 aspect ratio (cover crop)
        function cropToPortrait(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const targetRatio = 4 / 5;
                    const imgRatio = img.width / img.height;
                    let cropWidth, cropHeight, offsetX = 0, offsetY = 0;

                    if (imgRatio > targetRatio) {
                        cropHeight = img.height;
                        cropWidth = cropHeight * targetRatio;
                        offsetX = (img.width - cropWidth) / 2;
                    } else {
                        cropWidth = img.width;
                        cropHeight = cropWidth / targetRatio;
                        offsetY = (img.height - cropHeight) / 2;
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = cropWidth;
                    canvas.height = cropHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, offsetX, offsetY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

                    canvas.toBlob(blob => {
                        if (blob) resolve(blob);
                        else reject(new Error('Canvas toBlob failed'));
                    }, file.type || 'image/jpeg', 0.9);
                };
                img.onerror = () => reject(new Error('Image load error'));
            });
        }

        async function processFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('Please select an image file', 'error');
                return;
            }
            selectedFile = file;
            statusDiv.textContent = 'Cropping to 4:5…';
            try {
                croppedBlob = await cropToPortrait(file);
                const previewUrl = URL.createObjectURL(croppedBlob);
                preview.src = previewUrl;
                preview.classList.add('active');
                processBtn.disabled = false;
                postBtn.disabled = false;
                statusDiv.textContent = 'Ready.';
            } catch (err) {
                showToast('Failed to process image', 'error');
                console.error(err);
            }
        }

        dropArea.addEventListener('click', () => fileInput.click());
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('drag-over');
        });
        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('drag-over');
        });
        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });

        // ========== PROCESS & DOWNLOAD ==========
        processBtn.addEventListener('click', async () => {
            if (!croppedBlob || !selectedFile) return;

            statusDiv.textContent = '⏳ Processing on server...';
            processBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('image', croppedBlob, selectedFile.name || 'post.jpg');

                const response = await fetch('https://instagram-post.velutinx.workers.dev', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || 'Server error');
                }

                // Download the processed image
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (selectedFile.name || 'processed').replace(/\.[^.]+$/, '') + '_instagram.jpg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusDiv.textContent = '✅ Downloaded! Check your downloads folder.';
                showToast('Processed image downloaded', 'success');
            } catch (err) {
                statusDiv.textContent = '❌ ' + err.message;
                showToast('Processing failed: ' + err.message, 'error');
            } finally {
                processBtn.disabled = false;
            }
        });

        // ========== POST TO INSTAGRAM (unchanged for now) ==========
        postBtn.addEventListener('click', async () => {
            if (!croppedBlob || !selectedFile) return;

            const captionText = caption.value.trim();
            if (!captionText) {
                showToast('Please write a caption', 'error');
                return;
            }

            statusDiv.textContent = '⏳ Posting to Instagram...';
            postBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('caption', captionText);
                formData.append('image', croppedBlob, selectedFile.name || 'post.jpg');

                const response = await fetch('https://instagram-post.velutinx.workers.dev', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    statusDiv.textContent = '✅ Posted!';
                    showToast('Instagram post succeeded!', 'success');
                    preview.classList.remove('active');
                    preview.src = '';
                    selectedFile = null;
                    croppedBlob = null;
                    caption.value = '';
                    processBtn.disabled = true;
                    postBtn.disabled = true;
                } else {
                    statusDiv.textContent = '❌ ' + (data.error || 'Unknown error');
                    showToast('Failed: ' + (data.error || 'error'), 'error');
                }
            } catch (err) {
                statusDiv.textContent = '❌ Connection failed';
                showToast('Network error', 'error');
            } finally {
                postBtn.disabled = false;
            }
        });
    })();
</script>
</body>
</html>
