<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Poster – Velutinx</title>
    <link rel="stylesheet" href="/assets/css/format-private.css">
    <style>
        .insta-container { max-width: 600px; margin: 0 auto; }
        .drop-area {
            border: 2px dashed #3a4050;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: #0f131a;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .drop-area:hover, .drop-area.drag-over { border-color: #5a6e3c; }
        .preview-img {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 4/5;
            object-fit: contain;
            background: #03060b;
            border-radius: 8px;
            margin: 0 auto 12px;
            display: none;
            border: 1px solid #2a2f38;
        }
        .preview-img.active { display: block; }
        .caption-input {
            width: 100%;
            min-height: 80px;
            background: #0a0e14;
            border: 1px solid #2a2f38;
            border-radius: 10px;
            color: #eee;
            padding: 10px;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 16px;
        }
        .button-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .process-btn {
            flex: 1;
            padding: 12px;
            background: #3a4050;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .process-btn:hover { background: #4a5060; }
        .post-btn {
            flex: 1;
            padding: 12px;
            background: #d62976;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .post-btn:hover { background: #b82265; }
        .status-msg { margin-top: 10px; font-size: 13px; text-align: center; min-height: 20px; }
    </style>
</head>
<body>
<div class="container insta-container">
    <h1>📸 Instagram Poster</h1>

    <div class="drop-area" id="dropArea">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <div>🖼️ Drop an image here or click to select</div>
        <div class="aspect-hint">Image will be cropped to 4:5 (portrait)</div>
    </div>

    <img id="preview" class="preview-img" alt="Cropped preview" />

    <textarea class="caption-input" id="caption" placeholder="Write your caption and hashtags…"></textarea>

    <div class="button-row">
        <button class="process-btn" id="processBtn" disabled>🛠️ Process & Download</button>
        <button class="post-btn" id="postBtn" disabled>🚀 Post to Instagram</button>
    </div>
    <div id="status" class="status-msg"></div>
</div>

<script>
    (function() {
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const caption = document.getElementById('caption');
        const processBtn = document.getElementById('processBtn');
        const postBtn = document.getElementById('postBtn');
        const statusDiv = document.getElementById('status');

        let selectedFile = null;
        let croppedBlob = null;          // 4:5 cropped image blob
        let uploadedImage = null;        // Image object of uploaded file (for compositing)

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Crop image to 4:5 (cover crop) using a canvas
        function cropToPortrait(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const targetRatio = 4 / 5;
                    const imgRatio = img.width / img.height;
                    let srcX = 0, srcY = 0, srcW = img.width, srcH = img.height;

                    if (imgRatio > targetRatio) {
                        // wider than 4:5 → crop width
                        srcW = img.height * targetRatio;
                        srcX = (img.width - srcW) / 2;
                    } else {
                        // taller than 4:5 → crop height
                        srcH = img.width / targetRatio;
                        srcY = (img.height - srcH) / 2;
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = srcW;
                    canvas.height = srcH;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);

                    canvas.toBlob(blob => {
                        if (blob) resolve(blob);
                        else reject(new Error('Canvas toBlob failed'));
                    }, file.type || 'image/jpeg', 0.9);
                };
                img.onerror = () => reject(new Error('Image load error'));
            });
        }

        // When a file is selected/dropped
        async function processFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('Please select an image file', 'error');
                return;
            }
            selectedFile = file;
            statusDiv.textContent = 'Cropping to 4:5…';

            try {
                croppedBlob = await cropToPortrait(file);
                const previewUrl = URL.createObjectURL(croppedBlob);
                preview.src = previewUrl;
                preview.classList.add('active');
                processBtn.disabled = false;
                postBtn.disabled = false;
                statusDiv.textContent = 'Ready. You can now process & download or post.';
            } catch (err) {
                showToast('Failed to process image', 'error');
                console.error(err);
            }
        }

        // Drag & drop + file input events
        dropArea.addEventListener('click', () => fileInput.click());
        dropArea.addEventListener('dragover', e => {
            e.preventDefault();
            dropArea.classList.add('drag-over');
        });
        dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
        dropArea.addEventListener('drop', e => {
            e.preventDefault();
            dropArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        });
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });

        // ------------------------------------------------------------
        //  PROCESS & DOWNLOAD – does the full compositing (canvas + watermarks)
        // ------------------------------------------------------------
        processBtn.addEventListener('click', async () => {
            if (!croppedBlob) return;

            statusDiv.textContent = '⏳ Compositing...';
            processBtn.disabled = true;

            try {
                // 1. Load the uploaded image (the 4:5 cropped version)
                const userImg = new Image();
                userImg.src = URL.createObjectURL(croppedBlob);
                await userImg.decode();

                // 2. Pick a random canvas (0‑71.jpg)
                const canvasIdx = Math.floor(Math.random() * 72);
                const canvasUrl = `https://www.velutinx.com/images/instagram/PreRotatedCanvases/${canvasIdx}.jpg`;

                // 3. Load watermarks
                const centerWmUrl = 'https://www.velutinx.com/images/instagram/Rotated%20Warermark.png';
                const cornerWmUrl = 'https://www.velutinx.com/images/instagram/Watermark%20Corner.png';

                const [canvasImg, centerWm, cornerWm] = await Promise.all([
                    loadImage(canvasUrl),
                    loadImage(centerWmUrl),
                    loadImage(cornerWmUrl),
                ]);

                // 4. Final output canvas (2160x2688)
                const outCanvas = document.createElement('canvas');
                outCanvas.width = 2160;
                outCanvas.height = 2688;
                const ctx = outCanvas.getContext('2d');

                // Layer 1: background canvas (already 2160x2688)
                ctx.drawImage(canvasImg, 0, 0, 2160, 2688);

                // Layer 2: uploaded image (cover to 2160x2688, centred)
                const userW = userImg.width;
                const userH = userImg.height;
                const scale = Math.max(2160 / userW, 2688 / userH);
                const drawW = userW * scale;
                const drawH = userH * scale;
                const dx = (2160 - drawW) / 2;
                const dy = (2688 - drawH) / 2;
                ctx.drawImage(userImg, dx, dy, drawW, drawH);

                // Layer 3: centre watermark (20% opacity)
                ctx.globalAlpha = 0.2;
                const centerWmX = (2160 - centerWm.width) / 2;
                const centerWmY = (2688 - centerWm.height) / 2;
                ctx.drawImage(centerWm, centerWmX, centerWmY);
                ctx.globalAlpha = 1.0;

                // Layer 4: corner watermark (northeast +200 from right, +30 from top)
                const cornerWmX = 2160 - cornerWm.width - 200;
                const cornerWmY = 30;
                ctx.drawImage(cornerWm, cornerWmX, cornerWmY);

                // 5. Convert to Blob and download
                outCanvas.toBlob(async (finalBlob) => {
                    if (!finalBlob) {
                        showToast('Failed to generate image', 'error');
                        processBtn.disabled = false;
                        statusDiv.textContent = 'Error';
                        return;
                    }

                    // Download
                    const url = URL.createObjectURL(finalBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = (selectedFile.name || 'processed').replace(/\.[^.]+$/, '') + '_instagram.jpg';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    // Clean up created URLs
                    URL.revokeObjectURL(canvasImg.src);
                    URL.revokeObjectURL(centerWm.src);
                    URL.revokeObjectURL(cornerWm.src);

                    statusDiv.textContent = '✅ Downloaded! Check your downloads folder.';
                    showToast('Processed image downloaded', 'success');
                    processBtn.disabled = false;
                }, 'image/jpeg', 0.95);

            } catch (err) {
                statusDiv.textContent = '❌ ' + err.message;
                showToast('Processing failed: ' + err.message, 'error');
                processBtn.disabled = false;
            }
        });

        // Helper to load an image from a URL (with CORS)
        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';  // important for cross‑origin URLs
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('Failed to load ' + src));
                img.src = src;
            });
        }

        // ------------------------------------------------------------
        //  POST TO INSTAGRAM – placeholder (sends cropped image + caption)
        // ------------------------------------------------------------
        postBtn.addEventListener('click', async () => {
            if (!croppedBlob || !selectedFile) return;

            const captionText = caption.value.trim();
            if (!captionText) {
                showToast('Please write a caption', 'error');
                return;
            }

            statusDiv.textContent = '⏳ Posting to Instagram...';
            postBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('caption', captionText);
                // For now we send the raw 4:5 cropped image; later you can send the composited one.
                formData.append('image', croppedBlob, selectedFile.name || 'post.jpg');

                const response = await fetch('https://instagram-post.velutinx.workers.dev', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    statusDiv.textContent = '✅ Posted!';
                    showToast('Instagram post succeeded!', 'success');
                    // Reset form
                    preview.classList.remove('active');
                    preview.src = '';
                    selectedFile = null;
                    croppedBlob = null;
                    caption.value = '';
                    processBtn.disabled = true;
                    postBtn.disabled = true;
                } else {
                    statusDiv.textContent = '❌ ' + (data.error || 'Unknown error');
                    showToast('Failed: ' + (data.error || 'error'), 'error');
                }
            } catch (err) {
                statusDiv.textContent = '❌ Connection failed';
                showToast('Network error', 'error');
            } finally {
                postBtn.disabled = false;
            }
        });
    })();
</script>
</body>
</html>
