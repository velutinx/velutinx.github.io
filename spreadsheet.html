<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Centralized Income & Expenses (Cloud Sync)</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 1. Moment first -->
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <!-- 2. Chart.js second -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- 3. Moment adapter (registers after Chart) -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@1.0.1/dist/chartjs-adapter-moment.min.js"></script>
    <!-- 4. Hammer and zoom plugin -->
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0c10; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; color: #e0e0e0;
        }
        .container {
            max-width: 1400px; width: 100%;
            background: #11151c; border-radius: 16px;
            padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); border: 1px solid #2a2f38;
        }
        h1 { margin-top: 0; color: #f0f0f0; font-weight: 500; }
        .dashboard {
            display: flex; gap: 20px; flex-wrap: wrap;
        }
        .table-section {
            flex: 1 1 60%; min-width: 600px;
        }
        .chart-section {
            flex: 1 1 35%; min-width: 350px;
            background: #0c1017; border-radius: 14px; padding: 16px; border: 1px solid #252b33;
        }
        .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; min-width: 100px; }
        .form-group label { font-size: 0.8rem; color: #aaa; margin-bottom: 4px; font-weight: 500; }
        select, input {
            background: #0a0e14; border: 1px solid #2a2f38; border-radius: 8px;
            color: #e0e0e0; padding: 8px 10px; font-size: 0.9rem; outline: none;
        }
        select:focus, input:focus { border-color: #5a6e3c; }
        input:disabled { opacity: 0.4; cursor: not-allowed; }
        .recurring-group { display: flex; align-items: center; gap: 6px; margin-top: 20px; }
        .btn {
            background: #2c6e2c; color: white; border: none; padding: 8px 16px;
            border-radius: 30px; cursor: pointer; font-weight: 500; transition: background 0.2s;
        }
        .btn:hover { background: #3e8e3e; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; background: #4a5a4a; }
        .export-btn { margin-top: 20px; background: #3b4a5a; }
        .export-btn:hover { background: #2c6e9e; }
        .table-wrapper { margin-top: 16px; background: #0c1017; border-radius: 14px; border: 1px solid #252b33; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; color: #ddd; }
        th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #252b33; }
        th { background: #0a0e14; color: #aaa; font-weight: 500; }
        .delete-btn { background: none; border: none; color: #f44336; cursor: pointer; font-size: 1rem; }
        .empty-message { text-align: center; padding: 40px; color: #777; }
        .toast-notification {
            position: fixed; top: 20px; right: 20px; background: #1e2a1e; color: #d4ffd4;
            padding: 10px 18px; border-radius: 40px; font-size: 13px; z-index: 10000;
            box-shadow: 0 4px 12px black; border-left: 4px solid #4caf50;
            opacity: 0; transform: translateX(20px); transition: 0.15s;
        }
        .toast-notification.error { background: #2c1a1a; border-left-color: #f44336; color: #ffc9c9; }
        .toast-notification.show { opacity: 1; transform: translateX(0); }

        .month-header td { background: #1a1f2a; cursor: pointer; font-weight: 500; color: #ccc; }
        .month-header td:hover { background: #232a38; }
        .hidden-row { display: none; }
        .toggle-icon { margin-right: 6px; font-size: 0.8rem; }

        .row-income { background-color: #1a3a1a; }
        .row-expense { background-color: #3a1a1a; }
        .row-income:hover, .row-expense:hover { filter: brightness(1.2); }

        .range-btns { display: flex; gap: 6px; margin-bottom: 12px; }
        .range-btn {
            background: #2a2f38; border: none; color: #ccc; padding: 4px 12px;
            border-radius: 20px; cursor: pointer; font-size: 0.8rem;
        }
        .range-btn.active { background: #2c6e2c; color: white; }
        .chart-container { position: relative; height: 400px; }
    </style>
</head>
<body>
<div class="container">
    <h1>💰 Centralized Income & Expenses (Cloud Sync)</h1>

    <div class="dashboard">
        <!-- Left side: table -->
        <div class="table-section">
            <div class="form-row" id="entryForm">
                <div class="form-group">
                    <label for="monthSelect">Month</label>
                    <select id="monthSelect">
                        <option value="1">January</option><option value="2">February</option>
                        <option value="3">March</option><option value="4">April</option>
                        <option value="5">May</option><option value="6">June</option>
                        <option value="7">July</option><option value="8">August</option>
                        <option value="9">September</option><option value="10">October</option>
                        <option value="11">November</option><option value="12">December</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="daySelect">Day</label>
                    <select id="daySelect"></select>
                </div>
                <div class="form-group">
                    <label for="amountInput">Amount</label>
                    <input type="number" id="amountInput" placeholder="0.00" min="0.01" step="0.01">
                </div>
                <div class="form-group">
                    <label for="currencySelect">Currency</label>
                    <select id="currencySelect">
                        <option value="USD" selected>USD</option><option value="EUR">EUR</option>
                        <option value="GBP">GBP</option><option value="JPY">JPY</option>
                        <option value="CAD">CAD</option><option value="AUD">AUD</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="categorySelect">Category</label>
                    <select id="categorySelect">
                        <option value="Patreon subscription">Patreon subscription</option>
                        <option value="Patreon sales">Patreon sales</option>
                        <option value="Ko-Fi subscriptions">Ko-Fi subscriptions</option>
                        <option value="Subscribestar subscriptions">Subscribestar subscriptions</option>
                        <option value="Website payments">Website payments</option>
                        <option value="Expenses" selected>Expenses</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="conceptInput">Concept</label>
                    <input type="text" id="conceptInput" placeholder="e.g. Railway subscription" disabled>
                </div>
                <div class="recurring-group">
                    <input type="checkbox" id="recurringCheck">
                    <label for="recurringCheck">Recurring monthly</label>
                </div>
                <button class="btn" id="addEntryBtn">Add to Spreadsheet</button>
            </div>

            <div class="table-wrapper">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Date</th><th>Amount</th><th>Currency</th>
                            <th>Category</th><th>Description</th><th>Recurring</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="empty-message"><td colspan="7">Loading entries from server...</td></tr>
                    </tbody>
                </table>
            </div>
            <button class="btn export-btn" id="exportBtn" disabled>📥 Export to Excel</button>
        </div>

        <!-- Right side: chart -->
        <div class="chart-section">
            <div class="range-btns">
                <button class="range-btn active" data-days="30">30D</button>
                <button class="range-btn" data-days="60">60D</button>
                <button class="range-btn" data-days="90">90D</button>
                <button class="range-btn" data-days="180">180D</button>
                <button class="range-btn" data-days="365">1Y</button>
            </div>
            <div class="chart-container">
                <canvas id="incomeChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const WORKER_URL = 'https://spreadsheet-database.velutinx.workers.dev';
        const SUPABASE_URL = "https://knbvlyngmjaxndkiqggl.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuYnZseW5nbWpheG5ka2lxZ2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjI0NzEsImV4cCI6MjA4NjM5ODQ3MX0.mxthCDB6dCaHcEDMFN48pFnaJmcBbilXfP7tL-YAV08";

        let entries = [];
        window.entries = entries;

        let supabaseClient = null;
        let incomeChart = null;

        let monthSelect, daySelect, amountInput, currencySelect, categorySelect;
        let conceptInput, recurringCheck, addBtn, tableBody, exportBtn;

        const monthNames = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
            'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        function formatDate(month, day, year = null) {
            const y = year || new Date().getFullYear();
            const m = monthNames[month];
            const d = String(day).padStart(2, '0');
            return `${m} ${d} ${y}`;
        }

        function populateDays() {
            daySelect.innerHTML = '';
            for (let d = 1; d <= 31; d++) {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d;
                daySelect.appendChild(opt);
            }
        }

        function setDefaultDate() {
            const today = new Date();
            monthSelect.value = today.getMonth() + 1;
            populateDays();
            daySelect.value = today.getDate();
        }

        function updateConceptState() {
            if (categorySelect.value === 'Expenses') {
                conceptInput.disabled = false;
                conceptInput.placeholder = 'e.g. Railway subscription';
            } else {
                conceptInput.disabled = true;
                conceptInput.value = '';
                conceptInput.placeholder = '';
            }
        }

        // ---------- Server sync ----------
        async function fetchEntries() {
            try {
                tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center;">Loading entries...</td></tr>`;
                const res = await fetch(`${WORKER_URL}/entries`);
                if (!res.ok) throw new Error('Server error');
                const data = await res.json();
                entries = data.map(e => ({
                    id: e.id,
                    month: e.month,
                    day: e.day,
                    amount: e.amount,
                    currency: e.currency,
                    category: e.category,
                    concept: e.concept || '',
                    recurring: Boolean(e.recurring)
                }));
            } catch (err) {
                console.error('Failed to fetch entries', err);
                showToast('⚠ Could not connect to server – working offline.', 'error');
                entries = [];
            }
            refreshAll();
        }

        async function addEntry(entryData) {
            const newEntry = {
                month: entryData.month,
                day: entryData.day,
                amount: entryData.amount,
                currency: entryData.currency,
                category: entryData.category,
                concept: entryData.concept || '',
                recurring: entryData.recurring || false
            };

            try {
                const res = await fetch(`${WORKER_URL}/entries`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newEntry)
                });
                if (!res.ok) throw new Error('Failed to save');
                const serverResp = await res.json();
                entries.push({ id: serverResp.id, ...newEntry });
                return true;
            } catch (err) {
                entries.push({ id: null, ...newEntry });
                showToast('Entry saved locally (server unreachable).', 'error');
                return false;
            }
        }

        async function deleteEntry(index) {
            const entry = entries[index];
            if (entry.id) {
                try {
                    await fetch(`${WORKER_URL}/entries/${entry.id}`, { method: 'DELETE' });
                } catch (err) {
                    showToast('Could not delete from server.', 'error');
                }
            }
            entries.splice(index, 1);
            refreshAll();
            showToast('Entry removed.', 'info');
        }

        async function handleAddClick() {
            const month = parseInt(monthSelect.value);
            const day = parseInt(daySelect.value);
            const amount = parseFloat(amountInput.value);
            const currency = currencySelect.value;
            const category = categorySelect.value;
            const concept = conceptInput.value.trim();
            const recurring = recurringCheck.checked;

            if (isNaN(amount) || amount <= 0) {
                showToast('Please enter a valid positive amount.', 'error');
                return;
            }
            if (category === 'Expenses' && concept === '') {
                showToast('Please enter a description for the expense.', 'error');
                return;
            }

            const success = await addEntry({ month, day, amount, currency, category, concept, recurring });
            if (success) {
                amountInput.value = '';
                conceptInput.value = '';
                recurringCheck.checked = false;
                categorySelect.value = 'Expenses';
                updateConceptState();
                refreshAll();
                showToast('Entry added!', 'success');
            }
        }

        // ---------- Website sync ----------
        const IMPORTED_IDS_KEY = 'imported_website_order_ids';
        function getImportedIds() { return JSON.parse(localStorage.getItem(IMPORTED_IDS_KEY) || '[]'); }
        function addImportedId(id) {
            const ids = getImportedIds();
            if (!ids.includes(id)) { ids.push(id); localStorage.setItem(IMPORTED_IDS_KEY, JSON.stringify(ids)); }
        }

        function buildWebsiteDescription(order) {
            const email = order.paypal_email || 'unknown';
            let items = '';
            if (order.cart) {
                try { const parsed = JSON.parse(order.cart); items = parsed || ''; } catch (e) { items = order.cart; }
            }
            return `${email} – ${items}`;
        }

        async function autoSyncWebsitePayments() {
            if (!supabaseClient) return;
            try {
                const { data, error } = await supabaseClient
                    .from('successs')
                    .select('*')
                    .eq('status', 'completed')
                    .order('purchased_at', { ascending: true });
                if (error) throw error;
                const importedIds = getImportedIds();
                let addedCount = 0;
                for (const order of data) {
                    if (importedIds.includes(order.id)) continue;
                    const date = new Date(order.purchased_at);
                    const month = date.getUTCMonth() + 1;
                    const day = date.getUTCDate();
                    const amount = parseFloat(order.amount);
                    const currency = order.currency || 'USD';
                    const description = buildWebsiteDescription(order);
                    const duplicate = entries.some(e =>
                        e.month === month && e.day === day && e.amount === amount &&
                        e.currency === currency && e.category === 'Website payments');
                    if (duplicate) { addImportedId(order.id); continue; }
                    const success = await addEntry({
                        month, day, amount, currency,
                        category: 'Website payments',
                        concept: description,
                        recurring: false
                    });
                    if (success) { addImportedId(order.id); addedCount++; } else break;
                }
                if (addedCount > 0) {
                    refreshAll();
                    showToast(`✅ Synced ${addedCount} new website payments.`, 'success');
                }
            } catch (err) {
                console.error('Website sync error:', err);
                showToast(`❌ Could not sync website payments (${err.message})`, 'error');
            }
        }

        // ---------- Patreon sync ----------
        const PATREON_PROXY = 'https://patreon-api-proxy.velutinx.workers.dev';
        const IMPORTED_PATREON_KEY = 'imported_patreon_charges';
        function getImportedPatreonCharges() { return JSON.parse(localStorage.getItem(IMPORTED_PATREON_KEY) || '[]'); }
        function addImportedPatreonCharge(key) {
            const keys = getImportedPatreonCharges();
            if (!keys.includes(key)) { keys.push(key); localStorage.setItem(IMPORTED_PATREON_KEY, JSON.stringify(keys)); }
        }

        async function autoSyncPatreon() {
            try {
                const res = await fetch(PATREON_PROXY);
                if (!res.ok) throw new Error(`Proxy error: ${res.status}`);
                const members = await res.json();
                const importedKeys = getImportedPatreonCharges();
                let addedCount = 0;
                for (const m of members) {
                    const chargeDate = new Date(m.lastChargeDate);
                    const month = chargeDate.getUTCMonth() + 1;
                    const day = chargeDate.getUTCDate();
                    const amount = m.amountCents / 100;
                    const chargeKey = `${m.memberId}_${m.lastChargeDate}`;
                    if (importedKeys.includes(chargeKey)) continue;
                    const desc = `${m.name} (${m.email}) – ${m.tierTitle}`;
                    const duplicate = entries.some(e =>
                        e.month === month && e.day === day && e.amount === amount &&
                        e.currency === 'USD' && e.category === 'Patreon subscription');
                    if (duplicate) { addImportedPatreonCharge(chargeKey); continue; }
                    const success = await addEntry({
                        month, day, amount,
                        currency: 'USD',
                        category: 'Patreon subscription',
                        concept: desc,
                        recurring: false,
                    });
                    if (success) { addImportedPatreonCharge(chargeKey); addedCount++; } else break;
                }
                if (addedCount > 0) {
                    refreshAll();
                    showToast(`✅ Synced ${addedCount} new Patreon subscriptions.`, 'success');
                }
            } catch (err) {
                console.error('Patreon sync error:', err);
                showToast(`❌ Patreon sync error: ${err.message}`, 'error');
            }
        }

        // ---------- Table rendering ----------
        function renderTable() {
            tableBody.innerHTML = '';
            if (entries.length === 0) {
                tableBody.innerHTML = `<tr class="empty-message"><td colspan="7">No entries yet. Add your first income/expense above.</td></tr>`;
                exportBtn.disabled = true;
                return;
            }

            entries.sort((a, b) => (a.month * 100 + a.day) - (b.month * 100 + b.day));

            const currentYear = new Date().getFullYear();
            const currentMonth = new Date().getMonth() + 1;
            const groups = new Map();
            for (const entry of entries) {
                const key = `${currentYear}-${entry.month}`;
                if (!groups.has(key)) groups.set(key, []);
                groups.get(key).push(entry);
            }

            const sortedKeys = Array.from(groups.keys()).sort((a, b) => {
                const [y1, m1] = a.split('-').map(Number);
                const [y2, m2] = b.split('-').map(Number);
                return y1 - y2 || m1 - m2;
            });

            for (const key of sortedKeys) {
                const [y, m] = key.split('-').map(Number);
                const monthEntries = groups.get(key);
                const monthTotal = monthEntries.reduce((sum, e) =>
                    sum + (e.category === 'Expenses' ? -e.amount : e.amount), 0);
                const currencySet = new Set(monthEntries.map(e => e.currency));
                const currency = currencySet.size === 1 ? currencySet.values().next().value : 'mixed';
                const isCurrent = (y === currentYear && m === currentMonth);
                const monthName = monthNames[m] + ' ' + y;

                const headerTr = document.createElement('tr');
                headerTr.className = 'month-header';
                headerTr.dataset.monthKey = key;
                headerTr.innerHTML = `
                    <td colspan="7" style="cursor:pointer;">
                        <span class="toggle-icon">${isCurrent ? '▼' : '▶'}</span>
                        <strong>${monthName}</strong> – ${monthEntries.length} entries, total:
                        <span style="color: ${monthTotal >= 0 ? '#4caf50' : '#f44336'}">
                            ${monthTotal.toFixed(2)} ${currency}
                        </span>
                        ${isCurrent ? ' (current)' : ''}
                    </td>
                `;
                tableBody.appendChild(headerTr);

                for (const entry of monthEntries) {
                    const dateStr = formatDate(entry.month, entry.day, y);
                    const amountDisplay = entry.amount.toFixed(2);
                    const desc = entry.concept || '';
                    const recurringHtml = entry.recurring ? '<span style="color:#4caf50; font-weight:bold;">✔</span>' : '';
                    const deleteHtml = (entry.category === 'Expenses')
                        ? `<button class="delete-btn" data-index="${entries.indexOf(entry)}" title="Delete">✕</button>`
                        : '';
                    const rowClass = 'entry-row ' +
                        (isCurrent ? '' : 'hidden-row ') +
                        (entry.category === 'Expenses' ? 'row-expense' : 'row-income');

                    const tr = document.createElement('tr');
                    tr.className = rowClass;
                    tr.dataset.monthKey = key;
                    tr.innerHTML = `
                        <td>${dateStr}</td>
                        <td>${amountDisplay}</td>
                        <td>${entry.currency}</td>
                        <td>${entry.category}</td>
                        <td>${desc}</td>
                        <td>${recurringHtml}</td>
                        <td>${deleteHtml}</td>
                    `;
                    tableBody.appendChild(tr);
                }
            }

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    deleteEntry(idx);
                });
            });

            document.querySelectorAll('.month-header').forEach(header => {
                header.addEventListener('click', function() {
                    const monthKey = this.dataset.monthKey;
                    const icon = this.querySelector('.toggle-icon');
                    const isOpen = icon.textContent.trim() === '▼';
                    icon.textContent = isOpen ? '▶' : '▼';
                    document.querySelectorAll(`.entry-row[data-month-key="${monthKey}"]`).forEach(row => {
                        row.classList.toggle('hidden-row', isOpen);
                    });
                });
            });

            exportBtn.disabled = false;
        }

        // ---------- Cumulative chart (reset each month) ----------
        function buildChart(initialDays) {
            if (incomeChart) {
                incomeChart.destroy();
                incomeChart = null;
            }
            if (entries.length === 0) return;

            const currentYear = new Date().getFullYear();
            const now = moment().endOf('day');
            const startDate = moment().subtract(initialDays - 1, 'days').startOf('day');

            // 1. Aggregate daily amounts per category for all entries
            const dailyMap = new Map();   // key: YYYY-MM-DD
            entries.forEach(e => {
                const date = moment(new Date(currentYear, e.month - 1, e.day)).format('YYYY-MM-DD');
                if (!dailyMap.has(date)) {
                    dailyMap.set(date, { patreon: 0, website: 0, expense: 0 });
                }
                const d = dailyMap.get(date);
                if (e.category === 'Patreon subscription') d.patreon += e.amount;
                else if (e.category === 'Website payments') d.website += e.amount;
                else if (e.category === 'Expenses') d.expense += e.amount;
            });

            // 2. Build arrays of points (one per day) with cumulative values per month
            const dates = [], patreonCum = [], websiteCum = [], expenseCum = [], netCum = [];
            // Track cumulative totals that reset on the 1st of each month
            let curPatreon = 0, curWebsite = 0, curExpense = 0;
            let lastMonth = null;

            for (let d = moment(startDate); d.isSameOrBefore(now, 'day'); d.add(1, 'day')) {
                const key = d.format('YYYY-MM-DD');
                const month = d.month() + 1;  // 1‑based
                const dayOfMonth = d.date();

                // If we crossed into a new month, reset accumulators
                if (lastMonth !== null && month !== lastMonth) {
                    curPatreon = 0;
                    curWebsite = 0;
                    curExpense = 0;
                }
                lastMonth = month;

                // Add today's amounts
                const today = dailyMap.get(key) || { patreon: 0, website: 0, expense: 0 };
                curPatreon += today.patreon;
                curWebsite += today.website;
                curExpense += today.expense;

                const net = curPatreon + curWebsite - curExpense;

                dates.push(d.toDate());
                patreonCum.push(curPatreon);
                websiteCum.push(curWebsite);
                expenseCum.push(curExpense);
                netCum.push(net);
            }

            // 3. Create chart
            const ctx = document.getElementById('incomeChart').getContext('2d');
            incomeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'Patreon',
                            data: dates.map((d, i) => ({ x: d, y: patreonCum[i] })),
                            borderColor: '#3b82f6',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 3,
                            tension: 0,
                            stepped: false,
                        },
                        {
                            label: 'Website',
                            data: dates.map((d, i) => ({ x: d, y: websiteCum[i] })),
                            borderColor: '#f97316',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 3,
                            tension: 0,
                        },
                        {
                            label: 'Expenses (abs)',
                            data: dates.map((d, i) => ({ x: d, y: expenseCum[i] })),
                            borderColor: '#ef4444',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 3,
                            tension: 0,
                        },
                        {
                            label: 'Net Income',
                            data: dates.map((d, i) => ({ x: d, y: netCum[i] })),
                            borderColor: '#22c55e',
                            backgroundColor: 'transparent',
                            borderWidth: 3,
                            pointRadius: 0,
                            pointHoverRadius: 3,
                            tension: 0,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'nearest', axis: 'x', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#aaa' } },
                        zoom: {
                            zoom: {
                                wheel: { enabled: true },
                                pinch: { enabled: true },
                                mode: 'x',
                            },
                            pan: { enabled: true, mode: 'x' },
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'day', displayFormats: { day: 'MMM D' } },
                            min: startDate.toDate(),
                            max: now.toDate(),
                            ticks: { color: '#aaa', maxRotation: 45 },
                            grid: { color: '#2a2f38' }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#aaa', callback: v => '$' + v },
                            grid: { color: '#2a2f38' }
                        }
                    }
                }
            });
        }

        function refreshAll() {
            renderTable();
            const activeBtn = document.querySelector('.range-btn.active');
            const days = activeBtn ? parseInt(activeBtn.dataset.days) : 30;
            buildChart(days);
        }

        function setupRangeButtons() {
            document.querySelectorAll('.range-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    buildChart(parseInt(this.dataset.days));
                });
            });
        }

        function exportToExcel() {
            if (entries.length === 0) return;
            const data = entries.map(e => ({
                Date: formatDate(e.month, e.day),
                Amount: e.category === 'Expenses' ? -e.amount : e.amount,
                Currency: e.currency,
                Category: e.category,
                Description: e.concept || '',
                Recurring: e.recurring ? 'Yes' : 'No'
            }));
            const ws = XLSX.utils.json_to_sheet(data, {
                header: ['Date','Amount','Currency','Category','Description','Recurring']
            });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Income & Expenses');
            XLSX.writeFile(wb, 'income_expenses.xlsx');
            showToast('Excel downloaded!', 'success');
        }

        function showToast(msg, type='success') {
            let toast = document.getElementById('liveToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'liveToast';
                toast.className = 'toast-notification';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.className = `toast-notification ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            monthSelect = document.getElementById('monthSelect');
            daySelect = document.getElementById('daySelect');
            amountInput = document.getElementById('amountInput');
            currencySelect = document.getElementById('currencySelect');
            categorySelect = document.getElementById('categorySelect');
            conceptInput = document.getElementById('conceptInput');
            recurringCheck = document.getElementById('recurringCheck');
            addBtn = document.getElementById('addEntryBtn');
            tableBody = document.getElementById('tableBody');
            exportBtn = document.getElementById('exportBtn');

            if (typeof supabase === 'undefined') {
                showToast('Supabase library missing – auto‑sync disabled.', 'error');
                supabaseClient = null;
            } else {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false } });
            }

            setDefaultDate();
            updateConceptState();

            categorySelect.addEventListener('change', updateConceptState);
            addBtn.addEventListener('click', handleAddClick);
            exportBtn.addEventListener('click', exportToExcel);
            setupRangeButtons();

            await fetchEntries();
            await autoSyncWebsitePayments();
            await autoSyncPatreon();

            // Default chart: last 30 days
            buildChart(30);
        });
    })();
</script>
</body>
</html>
