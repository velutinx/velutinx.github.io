<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VELUTINX — Contact</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    /* Circular menu styles – integrated from your standalone version */
    .menu {
      position: relative;
      width: 60px;
      height: 60px;
      margin: 0 auto; /* center in the column */
    }
    .checkbox {
      position: absolute;
      opacity: 0;
    }
    .label_checkbox,
    .menu_link {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .35s;
      background: white;
      box-shadow: 0 0 8px rgba(0,0,0,.35);
    }
    .label_checkbox {
      z-index: 10;
      cursor: pointer;
    }
    .menu_icon {
      width: 60%;
      height: 60%;
      object-fit: contain;
    }
    .icon_plus,
    .icon_close {
      width: 26px;
      height: 26px;
      position: absolute;
      transition: .25s;
    }
    .icon_close {
      opacity: 0;
    }
    .checkbox:checked ~ .label_checkbox .icon_plus {
      opacity: 0;
    }
    .checkbox:checked ~ .label_checkbox .icon_close {
      opacity: 1;
    }
    /* Radial positions */
    .checkbox:checked ~ .twitter {
      transform: translate(70px, -70px);
    }
    .checkbox:checked ~ .bluesky {
      transform: translateY(-95px);
    }
    .checkbox:checked ~ .pixiv {
      transform: translate(-70px, -70px);
    }
    .checkbox:checked ~ .kofi {
      transform: translate(70px, 70px);
    }
    .checkbox:checked ~ .instagram {
      transform: translateY(95px);
    }
    .checkbox:checked ~ .substar {
      transform: translate(-70px, 70px);
    }
  </style>
</head>
<body>

  <!-- Swipe animation layer -->
  <div class="lang-swipe" id="langSwipe"></div>

  <div class="background-wrapper">
    <div class="background-gradient"></div>
    <div class="wave-overlay"></div>
  </div>

  <!-- Language selector: globe button + popover -->
  <div id="langContainer">
    <button class="lang-btn" title="Select Language">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 5h7"></path>
        <path d="M7 4c0 4.846 0 7 .5 8"></path>
        <path d="M10 8.5c0 2.286 -2 4.5 -3.5 4.5s-2.5 -1.135 -2.5 -2c0 -2 1 -3 3 -3s5 .57 5 2.857c0 1.524 -.667 2.571 -2 3.143"></path>
        <path d="M12 20l4 -9l4 9"></path>
        <path d="M19.1 18h-6.2"></path>
      </svg>
    </button>

    <div id="languagePopover">
      <div class="lang-item" data-lang="en">
        <img src="https://flagcdn.com/w40/us.png" alt="English" />
        <p>English</p>
      </div>
      <div class="lang-item" data-lang="ja">
        <img src="https://flagcdn.com/w40/jp.png" alt="Japanese" />
        <p>日本語</p>
      </div>
      <div class="lang-item" data-lang="zh">
        <img src="https://flagcdn.com/w40/cn.png" alt="Chinese" />
        <p>简体中文</p>
      </div>
      <div class="lang-item" data-lang="es">
        <img src="https://flagcdn.com/w40/mx.png" alt="Spanish" />
        <p>Español</p>
      </div>
    </div>
  </div>

  <!-- Theme toggle -->
  <div class="theme-toggle" id="themeToggle">
    <div class="theme-knob"></div>
  </div>

  <!-- Page wrapper -->
  <div id="page">

    <!-- Navigation -->
    <div id="navContainer"></div>

    <div class="divider"></div>

    <!-- Contact form & social menu -->
    <section class="contact-wrap">
      <div class="contact-left">
        <h2 id="contactTitle">CONTACT</h2>
        <p id="contactDesc">Use this form if you'd like to contact me via email!</p>

        <form id="contactForm" action="https://formspree.io/f/xqebavbr" method="POST">
          <input type="hidden" name="_subject" value="New Contact from Website">

          <div class="form-group">
            <label id="labelName">NAME</label>
            <input type="text" id="name" name="name" placeholder="Name">
          </div>
          <div class="form-group">
            <label id="labelEmail">EMAIL</label>
            <input type="email" id="email" name="email" placeholder="Email">
          </div>
          <div class="form-group">
            <label id="labelMessage">MESSAGE</label>
            <textarea id="message" name="message" placeholder="Message"></textarea>
          </div>
          <div class="send-row">
            <button class="send-btn" id="sendBtn" type="submit">SEND</button>
          </div>
        </form>
      </div>

      <div class="contact-right" id="socialArea">
        <!-- Circular social menu -->
        <div class="menu">
          <input type="checkbox" id="check" class="checkbox">
          <label for="check" class="label_checkbox">
            <!-- PLUS -->
            <svg class="icon_plus" viewBox="0 0 24 24">
              <path d="M12 3v18M3 12h18" stroke="#333" stroke-width="4" stroke-linecap="round"/>
            </svg>
            <!-- X -->
            <svg class="icon_close" viewBox="0 0 24 24">
              <path d="M5 5L19 19M19 5L5 19" stroke="#333" stroke-width="4" stroke-linecap="round"/>
            </svg>
          </label>

          <!-- Twitter -->
          <a href="https://x.com/VelutinxSFW" target="_blank" class="menu_link twitter">
            <img src="https://www.velutinx.com/images/LogoTwitter.png" class="menu_icon" alt="Twitter">
          </a>
          <!-- Bluesky -->
          <a href="https://bsky.app/profile/velutinxx.bsky.social" target="_blank" class="menu_link bluesky">
            <img src="https://www.velutinx.com/images/LogoBluesky.png" class="menu_icon" alt="Bluesky">
          </a>
          <!-- Pixiv -->
          <a href="https://www.pixiv.net/en/users/117116845" target="_blank" class="menu_link pixiv">
            <img src="https://www.velutinx.com/images/LogoPixiv.png" class="menu_icon" alt="Pixiv">
          </a>
          <!-- Ko‑fi -->
          <a href="https://ko-fi.com/velutinxstudio" target="_blank" class="menu_link kofi">
            <img src="https://www.velutinx.com/images/LogoKoFi.png" class="menu_icon" alt="Ko‑fi">
          </a>
          <!-- Instagram -->
          <a href="https://www.instagram.com/velutinxx/" target="_blank" class="menu_link instagram">
            <img src="https://www.velutinx.com/images/LogoInstagram.png" class="menu_icon" alt="Instagram">
          </a>
          <!-- SubscribeStar -->
          <a href="https://subscribestar.adult/velutinx" target="_blank" class="menu_link substar">
            <img src="https://www.velutinx.com/images/LogoSubscribeStar.png" class="menu_icon" alt="SubscribeStar">
          </a>
        </div>
      </div>
    </section>

    <div class="divider"></div>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/navigation.js"></script>
  <script src="/assets/js/translations.js"></script>

  <script>
    // Dark mode
    if (localStorage.getItem("darkMode") === "true") {
      document.body.classList.add("dark");
    }

    // Theme toggle
    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode", document.body.classList.contains("dark"));
    };

    // Cursor sparkles
    let lastStarTime = 0;
    document.addEventListener("mousemove", (e) => {
      const now = Date.now();
      if (now - lastStarTime < 45) return;
      lastStarTime = now;

      const star = document.createElement("div");
      star.className = "star";
      star.textContent = "✦";
      star.style.setProperty("--drift", Math.random());
      star.style.left = `${e.clientX}px`;
      star.style.top = `${e.clientY}px`;
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 2000);
    });

    // Social area falling stars (applies to the new menu area)
    const socialArea = document.getElementById("socialArea");
    if (socialArea) {
      setInterval(() => {
        const star = document.createElement("div");
        star.className = "social-star";
        star.textContent = "✦";
        star.style.left = Math.random() * socialArea.clientWidth + "px";
        star.style.top = "0px";
        socialArea.appendChild(star);
        setTimeout(() => star.remove(), 6000);
      }, 700);
    }

    // Contact form submission + validation
    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("name");
      const email = document.getElementById("email");
      const message = document.getElementById("message");

      [name, email, message].forEach(input => {
        input.style.borderColor = '';
        input.style.animation = 'none';
      });

      let hasError = false;

      if (!name.value.trim()) { name.style.borderColor = '#b33'; name.style.animation = 'shake 0.35s'; hasError = true; }
      if (!email.value.trim() || !email.value.includes("@")) { email.style.borderColor = '#b33'; email.style.animation = 'shake 0.35s'; hasError = true; }
      if (!message.value.trim()) { message.style.borderColor = '#b33'; message.style.animation = 'shake 0.35s'; hasError = true; }

      if (hasError) {
        const errorText = translations.contact?.[currentLanguage]?.errorText || "Please fill out all fields correctly ♡";
        showPopup(errorText);
        return;
      }

      const successText = translations.contact?.[currentLanguage]?.successText || "Message sent successfully! You will hear back soon! ♡♡";
      showPopup(successText);

      this.submit();
    });

    // Popup function
    function showPopup(text) {
      const popup = document.createElement("div");
      popup.textContent = text;
      popup.style.position = "fixed";
      popup.style.top = "20px";
      popup.style.right = "20px";
      popup.style.background = "#eeeae0";
      popup.style.border = "3px solid #aa9e76";
      popup.style.padding = "14px 18px";
      popup.style.borderRadius = "10px";
      popup.style.fontSize = "13px";
      popup.style.fontWeight = "700";
      popup.style.color = "#b33";
      popup.style.boxShadow = "6px 6px 0 rgba(0,0,0,0.4)";
      popup.style.zIndex = "99999";
      popup.style.opacity = "0";
      popup.style.transition = "opacity 0.5s ease";
      document.body.appendChild(popup);

      setTimeout(() => popup.style.opacity = "1", 10);
      setTimeout(() => {
        popup.style.opacity = "0";
        setTimeout(() => popup.remove(), 500);
      }, 5000);
    }

    // Send button shake
    document.getElementById("sendBtn").addEventListener("click", () => {
      const btn = document.getElementById("sendBtn");
      btn.style.animation = "none";
      void btn.offsetWidth;
      btn.style.animation = "shake 0.35s";
    });

    // Language switch
    document.querySelectorAll('.lang-item').forEach(item => {
      item.addEventListener('click', () => {
        setLanguage(item.dataset.lang);
      });
    });

    // Apply contact page translations on load
    applyTranslations('contact');

    // Re-apply after language change
    document.addEventListener('languageChanged', () => {
      applyTranslations('contact');
    });
  </script>

  <script src="/assets/js/tab-title-animation.js"></script>

</body>
</html>
