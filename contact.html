<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELUTINX — Contact</title>
  <link rel="stylesheet" href="/assets/css/shared.css">
  <link rel="stylesheet" href="/assets/css/format.css">
  <style>
    .contact-page .login-btn,
    .contact-page .cart-wrapper,
    .contact-page .floating-cart {
      display: none !important;
    }
    .contact-page .top-nav {
      background: var(--bg) !important;
      border-bottom: 1px solid var(--border);
    }
    #page {
      opacity: 0;
    }
  </style>
</head>
<body class="contact-page">

  <div id="header-placeholder"></div>

  <div id="page">
    <div class="divider"></div>

    <section class="contact-wrap">
      <div class="contact-left">
        <h2 id="contactTitle">CONTACT</h2>
        <p id="contactDesc">Use this form if you'd like to contact me via email!</p>

        <form id="contactForm" action="https://formspree.io/f/xqebavbr" method="POST">
          <input type="hidden" name="_subject" value="New Contact from Website">

          <div class="form-group">
            <label id="labelName">NAME</label>
            <input type="text" id="name" name="name" placeholder="Name">
          </div>
          <div class="form-group">
            <label id="labelEmail">EMAIL</label>
            <input type="email" id="email" name="email" placeholder="Email">
          </div>
          <div class="form-group">
            <label id="labelMessage">MESSAGE</label>
            <textarea id="message" name="message" placeholder="Message"></textarea>
          </div>
          <div class="send-row">
            <button class="send-btn" id="sendBtn" type="submit" data-cursor-expand>SEND</button>
          </div>
        </form>
      </div>

      <div class="contact-right" id="socialArea"></div>
    </section>

    <div class="divider"></div>
  </div>

  <script src="/assets/js/shared.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="/assets/js/translt.js"></script>
  <script src="/assets/js/format.js"></script>
  <script src="/assets/js/tab-title-animation.js"></script>

  <script>
    function applyContactTranslations() {
      if (typeof window.applyTranslations === 'function') {
        window.applyTranslations('contact');
      }
    }

    applyContactTranslations();

    document.addEventListener('languageChanged', (e) => {
      const newLang = e.detail.language;
      if (newLang && typeof window.setLanguage === 'function') {
        window.setLanguage(newLang);
      } else if (newLang) {
        window.currentLanguage = newLang;
      }
      applyContactTranslations();
    });

    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
