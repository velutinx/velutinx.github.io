<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Velutinx</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }
    
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    
    .banner {
      width: 100%;
      max-width: 900px;
      margin: 40px auto 60px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      background: #000; /* fallback color while video loads */
    }
    
    .banner-video {
      width: 100%;
      height: auto;
      display: block;
      /* Optional: makes it fill the area better if aspect ratio varies */
      /* object-fit: cover; */
    }
    
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-align: center;
      letter-spacing: -1px;
    }
    
    p {
      font-size: 1.3rem;
      opacity: 0.85;
      max-width: 600px;
      text-align: center;
      margin-bottom: 3rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="banner">
      <video 
        autoplay 
        loop 
        muted 
        playsinline 
        class="banner-video"
      >
        <source src="https://raw.githubusercontent.com/velutinx/velutinx.github.io/main/images/background.mp4" type="video/mp4">
        <!-- Optional: Add WebM version later for better performance on some browsers -->
        <!-- <source src="..." type="video/webm"> -->
        Sorry, your browser doesn't support embedded videos or the file couldn't load.
      </video>
    </div>
    
    <h1>Welcome</h1>
    <p>whatever this place ends up being... it's currently under construction...</p>
  </div>

</body>
</html>
