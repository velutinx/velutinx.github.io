<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>入場 - ACCESS WEBSITE</title>

<style>
@font-face {
  font-family: 'Kozuka Mincho Pr6N L';
  src: url('/fonts/KozukaMinchoPr6NL.otf') format('opentype');
}

@font-face {
  font-family: 'Trajan Pro Bold';
  src: url('/fonts/TrajanPro-Bold.otf') format('opentype');
}

body {
  background: white;
  min-height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* ================= CARD ================= */

.container { position: relative; z-index: 10; text-align: center; }

.card {
  border: 2px solid black;
  padding: 5px 60px;
  background: white;
  transform: scale(5);
  filter: blur(12px);
  opacity: 0;
  animation: loadIn 0.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
  cursor: pointer;
  display: inline-block;
}

@keyframes loadIn {
  to { transform: scale(1); filter: blur(0); opacity: 1; }
}

.japanese {
  font-family: 'Kozuka Mincho Pr6N L', serif;
  font-size: 20px;
  letter-spacing: 0.35em;
  font-weight: bold;
}

.english {
  font-family: 'Trajan Pro Bold', serif;
  font-size: 7px;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  margin-top: 20px;
  opacity: 0;
  animation: fadeInText 0.4s ease 0.15s forwards;
}

@keyframes fadeInText { to { opacity: 1; } }

.fade-out { animation: blurFade 1.2s ease forwards; }

@keyframes blurFade {
  0% { filter: blur(0); opacity: 1; }
  50% { filter: blur(8px); opacity: 0.6; }
  100% { filter: blur(20px); opacity: 0; }
}

/* ============ GLITCH ============ */

.tv-glitch {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  background:
    repeating-linear-gradient(to bottom,
      transparent 0px,
      #111 1px,
      transparent 3px,
      #000 4px),
    linear-gradient(90deg,
      rgba(255,0,0,0.15) 0%,
      transparent 33%,
      rgba(0,255,255,0.12) 66%,
      transparent 100%);
  background-size: 100% 4px, 100% 100%;
  mix-blend-mode: multiply;
}

.tv-glitch.active {
  opacity: 0.9;
  animation:
    glitchShake 1.2s steps(10) forwards,
    verticalRoll 0.10s linear infinite;
}

@keyframes glitchShake {
  0% { transform: translate(0,0); opacity: 0; }
  10% { transform: translate(6px,-6px); opacity: 1; }
  30% { transform: translate(-7px,7px); }
  50% { transform: translate(5px,-5px); }
  70% { transform: translate(-6px,6px); }
  100% { transform: translate(0,0); opacity: 0; }
}

@keyframes verticalRoll {
  0% { background-position: 0 0, 0 0; }
  100% { background-position: 0 12px, 0 0; }
}

/* ============ WHITE FLASH ============ */

.white-screen {
  position: fixed;
  inset: 0;
  background: white;
  z-index: 150;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.white-screen.active { opacity: 1; }

/* ============ SHUTDOWN ============ */

.shutdown {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.shutdown.active { opacity: 1; }

.shutdown-line {
  width: 100%;
  height: 100%;
  background: white;
  transform-origin: center;
}

@keyframes collapseY {
  0% { transform: scaleY(1); }
  100% { transform: scaleY(0.02); }
}

@keyframes collapseX {
  0% { transform: scaleX(1); }
  100% { transform: scaleX(0); }
}

/* ================= LOADING SCREEN ================= */

.loading-screen{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:300;
  opacity:0;
  pointer-events:none;
}

.loading-screen.active{ opacity:1; }

:root{ --coffee:#E6D5B8; }

.wrapper{ text-align:center; }

.loader{ position:relative; width:600px; height:32px; }

.fill{
  position:absolute;
  top:8px;
  left:8px;
  height:16px;
  width:0%;
  background:var(--coffee);
}

svg{ position:absolute; inset:0; width:100%; height:100%; }

rect.progress-border{
  fill:none;
  stroke:var(--coffee);
  stroke-width:3;
  stroke-linecap:round;
  stroke-dasharray:1264;
  stroke-dashoffset:1264;
}

.percent{
  margin-top:18px;
  font-size:48px;
  font-family: 'Trajan Pro Bold', serif;
  color:var(--coffee);
  letter-spacing:2px;
}

.flash{ animation:flashAnim 0.18s ease-in-out 3; }

@keyframes flashAnim{
  0%{ opacity:1; }
  50%{ opacity:0; }
  100%{ opacity:1; }
}

@keyframes fillBar{
  from{ width:0%; }
  to{ width:calc(100% - 16px); }
}

@keyframes borderBuild{
  from{ stroke-dashoffset:1264; }
  to{ stroke-dashoffset:0; }
}

/* ================= FINAL SWEEP ================= */

.final-sweep{
  position:fixed;
  inset:0;
  background:black;
  z-index:999;
  opacity:0;
  pointer-events:none;
}

.final-sweep.active{ opacity:1; }

.sweep-reveal{
  position:absolute;
  top:0;
  right:0;
  height:100%;
  width:0%;
  background:white;
}

.sweep-line{
  position:absolute;
  top:0;
  right:0;
  width:10px;
  height:100%;
  background:#aa9e76;
  box-shadow:0 0 30px #aa9e76;
}

@keyframes sweepMove{
  from{ right:0; }
  to{ right:100%; }
}

@keyframes sweepReveal{
  from{ width:0%; }
  to{ width:100%; }
}

</style>
</head>
<body>

<div class="container">
  <div class="card" id="card">
    <div class="japanese">入場</div>
  </div>
  <div class="english" id="englishText">ACCESS WEBSITE</div>
</div>

<div class="tv-glitch" id="glitch"></div>
<div class="white-screen" id="whiteScreen"></div>

<div class="shutdown" id="shutdown">
  <div class="shutdown-line" id="shutdownLine"></div>
</div>

<div class="loading-screen" id="loadingScreen">
  <div class="wrapper">
    <div class="loader">
      <div class="fill" id="fill"></div>
      <svg viewBox="0 0 600 32">
        <rect class="progress-border" id="border"
              x="1.5" y="1.5"
              width="597" height="29"/>
      </svg>
    </div>
    <div class="percent" id="percent">0%</div>
  </div>
</div>

<!-- FINAL SWEEP OVERLAY -->
<div class="final-sweep" id="finalSweep">
  <div class="sweep-reveal" id="sweepReveal"></div>
  <div class="sweep-line" id="sweepLine"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const card = document.getElementById('card');
  const english = document.getElementById('englishText');
  const glitch = document.getElementById('glitch');
  const whiteScreen = document.getElementById('whiteScreen');
  const shutdown = document.getElementById('shutdown');
  const loadingScreen = document.getElementById('loadingScreen');

  card.addEventListener('click', () => {

    glitch.classList.add('active');
    card.classList.add('fade-out');
    english.classList.add('fade-out');

    setTimeout(() => { whiteScreen.classList.add('active'); }, 1200);

    setTimeout(() => {
      shutdown.classList.add('active');
      const line = document.getElementById("shutdownLine");
      line.style.animation = "collapseY 0.35s forwards";
      setTimeout(() => {
        line.style.animation = "collapseX 0.25s forwards";
      }, 350);
    }, 1600);

    setTimeout(() => {
      loadingScreen.classList.add("active");
      document.getElementById("fill").style.animation = "fillBar 1.3s linear forwards";
      document.getElementById("border").style.animation = "borderBuild 1.3s linear forwards";
      startPercent();
    }, 2200);

  });

  function startPercent(){
    const duration = 1300;
    const percentEl = document.getElementById("percent");
    let start = null;

    function animate(timestamp){
      if(!start) start = timestamp;
      let progress = timestamp - start;
      let percent = Math.min(Math.floor((progress/duration)*100),100);
      percentEl.textContent = percent + "%";

      if(progress < duration){
        requestAnimationFrame(animate);
      } else {
        percentEl.classList.add("flash");

        /* AFTER FLASH FINISHES → START SWEEP */
        setTimeout(startFinalSweep, 540);
      }
    }

    requestAnimationFrame(animate);
  }

  function startFinalSweep(){
    const sweep = document.getElementById("finalSweep");
    const line = document.getElementById("sweepLine");
    const reveal = document.getElementById("sweepReveal");

    sweep.classList.add("active");
    line.style.animation = "sweepMove 0.3s linear forwards";
    reveal.style.animation = "sweepReveal 0.3s linear forwards";
  }

});
</script>

</body>
</html>
