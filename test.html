<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>予告 - Next Episode</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0a0a0a;          /* near-black */
      color: #f0f0f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 90vw;
    }
    
    .box {
      background: rgba(255, 255, 255, 0.08);  /* subtle white overlay */
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(8px);     /* glassmorphism effect if supported */
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    
    h1 {
      font-size: clamp(4rem, 12vw, 8rem);   /* big but responsive */
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      color: #ffffff;
    }
    
    .subtitle {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      opacity: 0.9;
      text-transform: uppercase;
    }
    
    .japanese {
      font-family: "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; /* better JP font fallback */
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="box">
      <h1 class="japanese">予 告</h1>
      <div class="subtitle">NEXT EPISODE</div>
    </div>
  </div>

</body>
</html>
