<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Income Overview</title>
    <link rel="stylesheet" href="/assets/css/format-private.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="/assets/js/chart.js" defer></script>
</head>
<body>

    <div class="app" id="app">

        <div class="jcsb">
            <div class="fw-b fs-20">Income Overview</div>
            <div class="flex flex-wrap gap-8">
                <div class="date-picker">
                    <span class="icon-calendar"></span>
                    <select id="monthSelect">
                        <option value="0">Jan</option><option value="1">Feb</option>
                        <option value="2">Mar</option><option value="3">Apr</option>
                        <option value="4">May</option><option value="5">Jun</option>
                        <option value="6" selected>Jul</option>
                        <option value="7">Aug</option><option value="8">Sep</option>
                        <option value="9">Oct</option><option value="10">Nov</option>
                        <option value="11">Dec</option>
                    </select>
                    <span class="sep">/</span>
                    <select id="yearSelect">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                        <option value="2027">2027</option>
                    </select>
                    <span class="icon-chevron"></span>
                </div>
                <div class="radio-group">
                    <label class="active" data-view="month">Month</label>
                    <label data-view="year">Year</label>
                </div>
            </div>
        </div>

        <div class="stat-grid">
            <div class="stat-card" id="statEstimateCard">
                <div class="label">Total Estimate Income (USD)</div>
                <div class="value" id="statEstimate">$0.00</div>
                <div class="stat-tooltip" id="statEstimateTooltip"></div>
            </div>
            <div class="stat-card" id="statPastMonthCard">
                <div class="label">Past Month Income (USD)</div>
                <div class="value" id="statPastMonth">$0.00</div>
                <div class="stat-tooltip" id="statPastMonthTooltip"></div>
            </div>
        </div>

        <div class="chart-row">
            <div class="chart-col">
                <div class="chart-title">Cumulative Net Income (USD) <span style="color:#5a6278;font-size:11px;">(income − expenses)</span></div>
                <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
            </div>
            <div class="chart-col">
                <div class="chart-title">Income Streams by Platform (USD)</div>
                <div class="chart-wrap" id="pieChartContainer"></div>
                <div class="donut-legend" id="donutLegend"></div>
            </div>
        </div>

        <div class="jcsb mt-20">
            <div class="fw-b fs-20">Income Details</div>
            <div class="flex flex-wrap gap-8">
                <button class="btn-outline" id="exportBtn">
                    <span class="icon-download"></span> Export Current View (CSV)
                </button>
                <div class="date-picker" style="max-width:150px;">
                    <span class="icon-calendar"></span>
                    <span>2026-07</span>
                    <span class="icon-chevron"></span>
                </div>
                <div class="radio-group">
                    <label class="active">Month</label>
                    <label>Year</label>
                </div>
            </div>
        </div>

        <div class="flex jcfe mt-6">
            <div class="search-box" style="max-width:220px;width:100%;">
                <span class="icon-search"></span>
                <input type="text" placeholder="Search all fields..." id="searchInput" />
            </div>
        </div>

        <div class="table-wrap mt-4" id="tableWrap">
            <table>
                <thead>
                    <tr>
                        <th data-sort="date">Date <span class="sort-icon">↕</span></th>
                        <th data-sort="subscriber">Subscriber <span class="sort-icon">↕</span></th>
                        <th data-sort="platform">Platform <span class="sort-icon">↕</span></th>
                        <th data-sort="type">Type <span class="sort-icon">↕</span></th>
                        <th data-sort="amount">Attempted Amt. <span class="sort-icon">↕</span></th>
                        <th data-sort="share">Creator's Share <span class="sort-icon">↕</span></th>
                        <th data-sort="status">Status <span class="sort-icon">↕</span></th>
                        <th data-sort="orderId">Order ID <span class="sort-icon">↕</span></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="pagination-bar">
            <span>Total <span id="rowCount">0</span> records</span>
            <div class="page-controls">
                <select id="pageSizeSelect">
                    <option value="10">10 / page</option>
                    <option value="25">25 / page</option>
                    <option value="50" selected>50 / page</option>
                    <option value="100">100 / page</option>
                </select>
                <button class="page-btn" id="prevPageBtn" disabled><span class="icon-chevron-left"></span></button>
                <span class="page-num" id="currentPageDisplay">1</span>
                <button class="page-btn" id="nextPageBtn" disabled><span class="icon-chevron-right"></span></button>
            </div>
        </div>

    </div>

</body>
</html>
