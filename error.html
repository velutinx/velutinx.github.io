<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Error Logs – Velutinx</title>
    <style>
        /* ── Same dark theme as your helper site ── */
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0c10;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e0e0e0;
        }
        .container {
            max-width: 1800px;
            width: 100%;
            background: #11151c;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 1px solid #2a2f38;
        }
        h1 {
            margin-top: 0;
            color: #f0f0f0;
            font-weight: 500;
            letter-spacing: -0.3px;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            background: #2a2f38;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn:hover { background: #3a4050; }
        .btn-primary { background: #2c6e2c; }
        .btn-primary:hover { background: #3e8e3e; }
        .btn-danger { background: #b71c1c; }
        .btn-danger:hover { background: #c62828; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Table styles ── */
        .table-wrapper {
            margin-top: 16px;
            background: #0c1017;
            border-radius: 14px;
            border: 1px solid #252b33;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            color: #ddd;
        }
        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid #252b33;
            vertical-align: top;
        }
        th {
            background: #0a0e14;
            color: #aaa;
            font-weight: 500;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .error { color: #f87171; }
        .worker { color: #60a5fa; }
        .time { color: #888; font-size: 0.8rem; white-space: nowrap; }
        .stack {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #aaa;
            word-break: break-word;
            max-width: 400px;
            white-space: pre-wrap;
        }

        /* ── MUTED ROW STYLES ── */
        .log-row.muted {
            opacity: 0.5;
            filter: grayscale(0.8);
            background-color: #1a1a24;
        }
        .log-row.muted .error { color: #777; }
        .log-row.muted .worker { color: #777; }
        .log-row.muted .time { color: #555; }
        .log-row.muted .stack { color: #555; }

        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #777;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8899a6;
        }
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e2a1e;
            color: #d4ffd4;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            z-index: 10000;
            box-shadow: 0 4px 12px black;
            backdrop-filter: blur(4px);
            border-left: 4px solid #4caf50;
            opacity: 0;
            transform: translateX(20px);
            transition: 0.2s;
        }
        .toast-notification.show {
            opacity: 1;
            transform: translateX(0);
        }
        .toast-notification.error {
            background: #2c1a1a;
            border-left-color: #f44336;
            color: #ffc9c9;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: #2a2f38;
        }
        .status-badge.online { background: #2e5a3e; color: #a3f0b0; }
        .status-badge.offline { background: #5a3a3a; color: #ffb0b0; }

        @media (max-width: 700px) {
            .container { padding: 16px; }
            th, td { padding: 8px 10px; font-size: 0.75rem; }
            .stack { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-actions">
            <h1>📋 Central Error Logs</h1>
            <div class="btn-group">
                <span class="status-badge online" id="statusBadge">● Online</span>
                <button class="btn btn-primary" id="muteBtn">🔇 Mute All</button>
                <button class="btn" id="unmuteBtn">🔊 Unmute All</button>
                <button class="btn" id="refreshBtn">⟳ Refresh</button>
            </div>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Worker</th>
                        <th>Error</th>
                        <th>URL</th>
                        <th>Stack</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    <tr class="empty-row"><td colspan="5">Loading logs…</td></tr>
                </tbody>
            </table>
        </div>
        <div style="margin-top: 16px; font-size: 0.8rem; color: #666; text-align: center;">
            Auto‑refreshes every 10 seconds &nbsp;·&nbsp; Last updated: <span id="lastUpdate">—</span>
        </div>
    </div>

    <div id="toast" class="toast-notification"></div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const LOGGER_URL = 'https://error-logger.velutinx.workers.dev';
        const SEEN_IDS_KEY = 'error_logs_seen_ids';

        // ============================================================
        // DOM refs
        // ============================================================
        const tbody = document.getElementById('logBody');
        const refreshBtn = document.getElementById('refreshBtn');
        const muteBtn = document.getElementById('muteBtn');
        const unmuteBtn = document.getElementById('unmuteBtn');
        const statusBadge = document.getElementById('statusBadge');
        const lastUpdateSpan = document.getElementById('lastUpdate');

        // ============================================================
        // Toast helper
        // ============================================================
        let toastTimeout;

        function showToast(msg, isError = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast-notification show' + (isError ? ' error' : '');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => el.classList.remove('show'), 3000);
        }

        // ============================================================
        // Manage seen IDs in localStorage
        // ============================================================
        function getSeenIds() {
            try {
                return JSON.parse(localStorage.getItem(SEEN_IDS_KEY) || '[]');
            } catch { return []; }
        }

        function setSeenIds(ids) {
            localStorage.setItem(SEEN_IDS_KEY, JSON.stringify(ids));
        }

        function addSeenIds(newIds) {
            const current = getSeenIds();
            const combined = [...current, ...newIds];
            // deduplicate
            const unique = [...new Set(combined)];
            setSeenIds(unique);
        }

        function clearSeenIds() {
            localStorage.removeItem(SEEN_IDS_KEY);
        }

        // ============================================================
        // Render logs
        // ============================================================
        function renderLogs(logs) {
            const seenIds = getSeenIds();

            if (!logs || logs.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="5">✨ No errors logged yet.</td></tr>';
                return;
            }

            let html = '';
            logs.forEach(log => {
                const id = log.id || '';
                const isMuted = seenIds.includes(id);
                const time = log.received || log.timestamp || '—';
                const worker = log.worker || 'unknown';
                const error = log.error || '—';
                const url = log.url || '—';
                const stack = log.stack || '—';

                html += `
                    <tr class="log-row ${isMuted ? 'muted' : ''}" data-id="${id}">
                        <td class="time">${escapeHtml(time)}</td>
                        <td class="worker">${escapeHtml(worker)}</td>
                        <td class="error">${escapeHtml(error)}</td>
                        <td>${escapeHtml(url)}</td>
                        <td class="stack">${escapeHtml(stack)}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // ============================================================
        // Fetch and update
        // ============================================================
        async function fetchLogs() {
            refreshBtn.disabled = true;
            refreshBtn.textContent = '⏳ Loading…';
            statusBadge.textContent = '● Connecting…';
            statusBadge.className = 'status-badge offline';

            try {
                const res = await fetch(LOGGER_URL + '/logs');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const logs = await res.json();

                statusBadge.textContent = '● Online';
                statusBadge.className = 'status-badge online';
                lastUpdateSpan.textContent = new Date().toLocaleString();

                renderLogs(logs);
            } catch (err) {
                console.error('Fetch error:', err);
                statusBadge.textContent = '● Offline';
                statusBadge.className = 'status-badge offline';
                tbody.innerHTML = `<tr class="empty-row"><td colspan="5">❌ Failed to load logs: ${escapeHtml(err.message)}</td></tr>`;
                showToast('Error fetching logs: ' + err.message, true);
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = '⟳ Refresh';
            }
        }

        // ============================================================
        // Mute / Unmute
        // ============================================================
        function muteCurrent() {
            // Get all row IDs currently displayed
            const rows = tbody.querySelectorAll('.log-row');
            const ids = [];
            rows.forEach(row => {
                const id = row.dataset.id;
                if (id) ids.push(id);
            });
            if (ids.length === 0) {
                showToast('No logs to mute.', false);
                return;
            }
            addSeenIds(ids);
            // Apply muted class to all rows
            rows.forEach(row => row.classList.add('muted'));
            showToast(`🔇 Muted ${ids.length} log${ids.length > 1 ? 's' : ''}.`);
        }

        function unmuteAll() {
            clearSeenIds();
            // Remove muted class from all rows
            tbody.querySelectorAll('.log-row').forEach(row => row.classList.remove('muted'));
            showToast('🔊 All logs unmuted.');
        }

        // ============================================================
        // Escape HTML
        // ============================================================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================================
        // Auto-refresh
        // ============================================================
        let refreshInterval;

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(fetchLogs, 10000);
        }

        // ============================================================
        // Init
        // ============================================================
        refreshBtn.addEventListener('click', () => {
            fetchLogs();
            startAutoRefresh();
        });

        muteBtn.addEventListener('click', muteCurrent);
        unmuteBtn.addEventListener('click', unmuteAll);

        fetchLogs();
        startAutoRefresh();

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                fetchLogs();
            }
        });
    </script>
</body>
</html>
