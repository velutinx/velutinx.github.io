<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Error Logs</title>
    <link rel="stylesheet" href="/assets/css/format-private.css">
</head>
<body>
    <div class="container">
        <div class="error-logs-header">
            <h1>📋 Central Error Logs</h1>
            <button class="btn" id="muteBtn">🔇 Mute All</button>
        </div>
        <div class="table-wrapper error-logs-table">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Worker</th>
                        <th>Error</th>
                        <th>URL</th>
                        <th>Stack</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    <tr class="empty-row"><td colspan="5">Loading logs…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/assets/js/error-logs.js"></script>
</body>
</html>
