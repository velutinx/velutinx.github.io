<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Error Logs – Velutinx</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0c10;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e0e0e0;
        }
        .container {
            max-width: 1800px;
            width: 100%;
            background: #11151c;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 1px solid #2a2f38;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; color: #f0f0f0; font-weight: 500; letter-spacing: -0.3px; }
        .btn {
            background: #2a2f38;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn-primary { background: #b71c1c; }
        .btn-primary:hover { background: #c62828; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .table-wrapper {
            margin-top: 16px;
            background: #0c1017;
            border-radius: 14px;
            border: 1px solid #252b33;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            color: #ddd;
        }
        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid #252b33;
            vertical-align: top;
        }
        th {
            background: #0a0e14;
            color: #aaa;
            font-weight: 500;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .error { color: #f87171; }
        .worker { color: #60a5fa; }
        .time { color: #888; font-size: 0.8rem; white-space: nowrap; }
        .stack {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #aaa;
            word-break: break-word;
            max-width: 400px;
            white-space: pre-wrap;
        }

        /* ── MUTED ROW STYLES ── */
        .log-row.muted {
            opacity: 0.35;
            filter: grayscale(0.9);
            background-color: #16161e;
        }
        .log-row.muted .error,
        .log-row.muted .worker,
        .log-row.muted .time,
        .log-row.muted .stack {
            color: #555 !important;
        }

        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #777;
        }
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e2a1e;
            color: #d4ffd4;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            z-index: 10000;
            box-shadow: 0 4px 12px black;
            backdrop-filter: blur(4px);
            border-left: 4px solid #4caf50;
            opacity: 0;
            transform: translateX(20px);
            transition: 0.2s;
        }
        .toast-notification.show {
            opacity: 1;
            transform: translateX(0);
        }
        .toast-notification.error {
            background: #2c1a1a;
            border-left-color: #f44336;
            color: #ffc9c9;
        }
        @media (max-width: 700px) {
            .container { padding: 16px; }
            th, td { padding: 8px 10px; font-size: 0.75rem; }
            .stack { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-actions">
            <h1>📋 Central Error Logs</h1>
            <button class="btn btn-primary" id="muteBtn">🔇 Mute All</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Worker</th>
                        <th>Error</th>
                        <th>URL</th>
                        <th>Stack</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    <tr class="empty-row"><td colspan="5">Loading logs…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="toast-notification"></div>

    <script>
        const LOGGER_URL = 'https://error-logger.velutinx.workers.dev';
        const SEEN_IDS_KEY = 'error_logs_seen_ids';

        const tbody = document.getElementById('logBody');
        const muteBtn = document.getElementById('muteBtn');

        let toastTimeout;

        function showToast(msg, isError = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast-notification show' + (isError ? ' error' : '');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => el.classList.remove('show'), 3000);
        }

        // ─── Seen IDs as a Set ──────────────────────────────────────
        function getSeenIds() {
            try {
                const raw = localStorage.getItem(SEEN_IDS_KEY);
                return raw ? new Set(JSON.parse(raw)) : new Set();
            } catch { return new Set(); }
        }

        function saveSeenIds(set) {
            localStorage.setItem(SEEN_IDS_KEY, JSON.stringify([...set]));
        }

        function addSeenIds(newIds) {
            const set = getSeenIds();
            newIds.forEach(id => set.add(id));
            saveSeenIds(set);
        }

        function clearSeenIds() {
            localStorage.removeItem(SEEN_IDS_KEY);
        }

        // ─── Render ──────────────────────────────────────────────────
        function renderLogs(logs) {
            const seenIds = getSeenIds();

            if (!logs || logs.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="5">✨ No errors logged yet.</td></tr>';
                return;
            }

            let html = '';
            logs.forEach(log => {
                // Ensure ID is a string – this is the FIX
                const id = log.id !== undefined && log.id !== null ? String(log.id) : '';
                const isMuted = seenIds.has(id);
                const time = log.received || log.timestamp || '—';
                const worker = log.worker || 'unknown';
                const error = log.error || '—';
                const url = log.url || '—';
                const stack = log.stack || '—';

                html += `
                    <tr class="log-row ${isMuted ? 'muted' : ''}" data-id="${id}">
                        <td class="time">${escapeHtml(time)}</td>
                        <td class="worker">${escapeHtml(worker)}</td>
                        <td class="error">${escapeHtml(error)}</td>
                        <td>${escapeHtml(url)}</td>
                        <td class="stack">${escapeHtml(stack)}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;

            // Debug: log the first 3 IDs (open browser console to see this)
            if (logs.length > 0) {
                const sample = logs.slice(0, 3).map(l => l.id);
                console.log('🧾 Log IDs from database:', sample);
                console.log('🔒 Seen IDs in localStorage:', [...seenIds]);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ─── Fetch ──────────────────────────────────────────────────
        async function fetchLogs() {
            try {
                const res = await fetch(LOGGER_URL + '/logs');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const logs = await res.json();
                renderLogs(logs);
            } catch (err) {
                console.error('Fetch error:', err);
                tbody.innerHTML = `<tr class="empty-row"><td colspan="5">❌ Failed to load logs: ${escapeHtml(err.message)}</td></tr>`;
            }
        }

        // ─── Mute All ─────────────────────────────────────────────────
        function muteCurrent() {
            const rows = tbody.querySelectorAll('.log-row');
            const ids = [];
            rows.forEach(row => {
                const id = row.dataset.id;
                if (id) ids.push(id);
            });
            if (ids.length === 0) {
                showToast('No logs to mute.');
                return;
            }
            addSeenIds(ids);
            rows.forEach(row => row.classList.add('muted'));
            showToast(`🔇 Muted ${ids.length} log${ids.length > 1 ? 's' : ''}.`);
        }

        // ─── Auto‑refresh ────────────────────────────────────────────
        let refreshInterval;

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(fetchLogs, 10000);
        }

        // ─── Init ──────────────────────────────────────────────────
        muteBtn.addEventListener('click', muteCurrent);

        fetchLogs();
        startAutoRefresh();

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) fetchLogs();
        });
    </script>
</body>
</html>
